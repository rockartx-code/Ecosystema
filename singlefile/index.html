const Hist={h:[],i:-1,push(c){if(c){this.h.unshift(c);this.i=-1;}},up(){this.i=Math.min(this.i+1,this.h.length-1);return this.h[this.i]||'';},down(){this.i=Math.max(this.i-1,0);return this.h[this.i]||'';}};
function parse(raw){const trimmed=raw.trim().replace(/\s+/,' ');const parts=trimmed.split(' ');return{verb:parts[0].toLowerCase(),args:parts.slice(1),raw:trimmed};}

async function dispatch(cmd){
  const{verb,args}=cmd;

  // SOCKET: command:before
  const pre=EventBus.emitCancellable('command:before',{verb,args,cancelled:false});
  if(pre.cancelled)return;

  // Si somos cliente P2P, reenviar la acción al host también
  if(Net.isClient()) Net.sendAction(verb, args);

  // ── BATALLA ACTIVA — sistema por turnos ──────────────────────
  const battle=Net.getMyBattle();
  if(battle && battle.estado==='activo'){
    const actor=Net.getBattleActor?.(battle)||actorActualGlobal(battle);
    const esMiTurno=actor?.playerId===Player.get().id;

    // Comandos siempre disponibles en batalla
    if(verb==='batalla'||verb==='b'){Net.renderBattle?.(battle);return;}
    if(verb==='examinar'||verb==='ex'){
      const q=(args[0]||'').toLowerCase();
      const t=battle.cola.find(c=>!q||c.name.toLowerCase().includes(q));
      if(t){
        const el=t.elemento_estado?` [${t.elemento_estado}]`:'';
        const poise=t.poise!=null?` P:${t.poise}/${t.poise_max||50}`:'';
        const heridas=(t.heridas||[]).length?` ⚠${t.heridas.join(',')}` : '';
        R.w(`${t.name}  HP:${t.hp}/${t.maxHp}  ATK:${t.atk}  DEF:${t.def}${poise}${el}${heridas}${t.poise_roto?' ⚡VULNERABLE':''}`,t.color||'t-out');
      } else R.w('No encontrado.','t-dim');
      return;
    }
    if(verb==='estado'||verb==='stats'){cmdEstado();return;}
    if(verb==='ayuda'||verb==='help'||verb==='?'){cmdAyuda(args.join(' '));return;}
    if(verb==='tactica'||verb==='táctica'){Tactics.cmdTactica();return;}
    // Huir siempre funciona (cualquier turno)
    if(verb==='huir'||verb==='h'){
      Net.sendBattleAction(battle.id,Player.get().id,'huir',null);
      Combat.active=false;
      return;
    }

    if(!esMiTurno){
      // Si la IA está procesando, decírselo al jugador
      if(battle._aiThinking){
        R.w(`⏳ ${actor?.name||'IA'} está actuando...`,'t-dim');
        return;
      }
      // Si no está pensando pero es turno de IA → re-disparar el tick (puede haberse perdido)
      if(actor&&actor.tipo!=='player'){
        R.w(`⏳ Turno de ${actor.name} — procesando...`,'t-dim');
        setTimeout(()=>Net.tickAI?.(battle),100);
        return;
      }
      R.w(`⧗ Turno de ${actor?.name||'IA'}. Espera — o escribe "huir".`,'t-dim');
      return;
    }
    // Acciones de turno del jugador
    if(['atacar','a','atk'].includes(verb)){Net.sendBattleAction(battle.id,Player.get().id,'atacar',args.join(' ')||null);return;}
    if(verb==='defender'||verb==='d'){Net.sendBattleAction(battle.id,Player.get().id,'defender',null);return;}
    if(['magia','lanzar'].includes(verb)){Net.sendBattleAction(battle.id,Player.get().id,'magia',args.join(' ')||null);return;}
    if(['habilidad','hab'].includes(verb)){Net.sendBattleAction(battle.id,Player.get().id,'habilidad',args.join(' ')||null);return;}
    if(verb==='usar'){
      // Usar ítem durante el turno (consume el turno)
      const item=Player.findItem(args.join(' '));
      if(item&&ItemSystem.CATALOGO[item.blueprint]){ItemSystem.aplicar(item,battle);R.upd();Net.sendBattleAction(battle.id,Player.get().id,'defender',null);return;}
      R.w('No puedes usar eso en batalla.','t-dim');return;
    }
    if(verb==='vincular'){
      CreatureEngine.cmdVincular(args.join(' ')||null, battle);return;
    }
    R.w('Tu turno: atacar [obj] · defender · magia [mag] · habilidad [hab] · usar [ítem] · vincular [ancla] · huir · examinar','t-pel');
    return;
  }

  // ── COMBATE LEGACY (NPC narrativo: rendir/intimidar/captura) ─────────────
  if(Combat.isActive()){
    if(await CommandRegistry.run('combat:'+verb,args))return;
    if(['atacar','a'].includes(verb)){Combat.atk();return;}
    if(['huir','h'].includes(verb)){Combat.flee();return;}
    if(verb==='rendir'){Combat.rendir();return;}
    if(verb==='intimidar'){Combat.intimidar();return;}
    if(verb==='examinar'||verb==='ex'){Combat.examEnemy();return;}
    R.w('combate: atacar · huir · rendir · intimidar · examinar','t-pel');
    return;
  }

  // Intentar comando de plugin primero
  if(await CommandRegistry.run(verb,args)){
    EventBus.emit('command:after',{verb,args});return;
  }

  // Comandos del motor
  switch(verb){
    case 'ir':case 'go':cmdIr(args[0]);break;
    case 'n':cmdIr('norte');break;case 's':cmdIr('sur');break;
    case 'e':cmdIr('este');break; case 'o':cmdIr('oeste');break;
    case 'mirar':case 'l':case 'ver':cmdMirar();break;
    case 'hablar':cmdHablar(args.join(' '));break;
    case 'preguntar':cmdPreguntar(args[0],args.slice(1).join(' '));break;
    case 'observar':cmdObservar(args.join(' '));break;
    case 'traicionar':cmdTraicionar(args.join(' '));break;
    case 'npcs':case 'personas':cmdNPCs();break;
    case 'misiones':case 'mis':cmdMisiones();break;
    case 'aceptar':cmdAceptar(args.join(' '));break;
    case 'rechazar':cmdRechazar(args.join(' '));break;
    case 'completar':cmdCompletar(args.join(' '));break;
    case 'facciones':case 'faccion':FactionSystem.cmdFacciones();break;
    case 'bosses':case 'boss':BossSystem.cmdBosses();break;
    case 'reputacion':case 'rep':{
      R.sp();R.w('— REPUTACIÓN —','t-acc');
      const facs=ModuleLoader.get('facciones')||FactionSystem.FACCIONES_BASE||{};
      const rep=Player.get().reputacion||{};
      Object.entries(rep).forEach(([id,v])=>{
        const f=facs[id];const rango=FactionSystem.getRango(v);
        R.w(`  ${rango.icon} ${f?.nombre||id}  ${v}  [${rango.nombre}]`,rango.color);
      });
      R.sp();break;
    }
    case 'arcos':case 'arcs':case 'arc':ArcEngine.cmdArcs();break;
    case 'mapa':case 'map':case 'secciones':{
      // mapa [jugador] → mostrar camino hacia ese jugador
      if(args.length){
        const query=args.join(' ').toLowerCase();
        // Buscar jugador por nombre (incluye host)
        const todosJugadores=[
          ...Object.values(Net.getPlayers()),
          // Si hay jugadores conectados como cliente, el host ya está en players por buildSnapshot
        ].filter(p=>p.id!==Player.get().id);
        const target=todosJugadores.find(p=>p.name.toLowerCase().includes(query));
        if(!target){R.w(`Jugador "${args.join(' ')}" no encontrado.`,'t-dim');R.w('Jugadores visibles: '+(todosJugadores.map(p=>p.name).join(', ')||'ninguno'),'t-dim');break;}

        // BFS desde posición actual hasta nodo del jugador objetivo
        const fromId=Player.pos();
        const toId=target.nodeId;

        if(fromId===toId){
          R.sp();R.w(`${target.name} está EN ESTE NODO.`,target.color||'t-eco',true);R.sp();break;
        }

        // BFS con reconstrucción de camino
        const visited=new Map([[fromId,null]]);
        const queue=[fromId];
        let found=false;
        while(queue.length&&!found){
          const cur=queue.shift();
          for(const[dir,nid] of Object.entries(World.exits(cur))){
            if(!visited.has(nid)){
              visited.set(nid,{from:cur,dir});
              if(nid===toId){found=true;break;}
              queue.push(nid);
            }
          }
        }

        R.sp();R.sep('─');
        R.w(`◉ RUTA → ${target.name}`,target.color||'t-eco',true);
        if(!found){
          R.w('No hay ruta conocida (sección no explorada o desconectada).','t-dim');
        } else {
          // Reconstruir camino
          const path=[];
          let cur=toId;
          while(visited.get(cur)){
            const{from,dir}=visited.get(cur);
            path.unshift({dir,nodeId:cur,name:World.node(cur)?.name||cur});
            cur=from;
          }
          R.w(`Distancia: ${path.length} paso${path.length!==1?'s':''}  ·  Desde: ${World.node(fromId)?.name||fromId}`,'t-dim');
          R.sp();
          path.forEach((step,i)=>{
            const n=World.node(step.nodeId);
            const dif=n?.dificultad;
            const difTag=dif>=3?'[⚠ PELIGROSO]':dif>=2?'[HOSTIL]':'';
            R.w(`  ${i+1}. ${step.dir.toUpperCase().padEnd(6)} → ${n?.name||step.nodeId} [${n?.tipo||'?'}] ${difTag}`,
              step.nodeId===toId?(target.color||'t-eco'):'t-dim');
          });
          R.sp();
          R.w(`Destino: ${World.node(toId)?.name||toId}  [${World.node(toId)?.tipo||'?'}]`,target.color||'t-eco');
          // Advertencia de boss en el camino
          const bossEnRuta=BossSystem.getBosses().filter(b=>!b.eliminado&&path.some(s=>s.nodeId===b.nodeId));
          if(bossEnRuta.length) R.w(`⚠ HAY UN BOSS EN LA RUTA: ${bossEnRuta.map(b=>b.def.nombre).join(', ')}`,'t-cor',true);
        }
        R.sep('─');R.sp();
        break;
      }

      // Sin argumento → mostrar estado del mundo
      R.sp();R.w('— ESTADO DEL MUNDO —','t-acc');
      const totalNodos=Object.keys(World.all()).length;
      const visitados=Object.values(World.all()).filter(n=>n.visitado).length;
      const dif=World.calcDificultad();
      R.w(`Nodos explorados: ${visitados}/${totalNodos}`,'t-dim');
      R.w(`Secciones expandidas: ${World.sectionCount||0}`,'t-dim');
      R.w(`Dificultad actual: ×${dif.toFixed(2)}`,dif>=3?'t-pel':dif>=2?'t-mem':'t-dim');
      const n=World.node(Player.pos());
      R.w(`Nodo actual: ${n?.name||'?'}  [${n?.tipo||'?'}]${n?.seccion?' Sección '+n.seccion:''}${World.isBorder(Player.pos())?'  ← FRONTERA':''}`,World.isBorder(Player.pos())?'t-eco':'t-dim');
      const porSeccion={};
      Object.values(World.all()).filter(x=>x.seccion).forEach(x=>{if(!porSeccion[x.seccion])porSeccion[x.seccion]={total:0,vis:0,dif:x.dificultad};porSeccion[x.seccion].total++;if(x.visitado)porSeccion[x.seccion].vis++;});
      if(Object.keys(porSeccion).length){R.sp();R.w('Secciones:','t-acc');Object.entries(porSeccion).forEach(([s,d])=>R.w(`  Sección ${s}  ${d.vis}/${d.total} nodos  ×${(d.dif||1).toFixed(1)}`,d.dif>=3?'t-pel':d.dif>=2?'t-mem':'t-dim'));}
      // Mostrar otros jugadores
      const otrosJ=Object.values(Net.getPlayers()).filter(p=>p.id!==Player.get().id);
      if(otrosJ.length){
        R.sp();R.w('Jugadores en el mundo:','t-eco');
        otrosJ.forEach(p=>{
          const dist=BossSystem.distancia(Player.pos(),p.nodeId);
          const nJ=World.node(p.nodeId);
          R.w(`  ${p.name}  → ${nJ?.name||p.nodeId}  [${dist===0?'AQUÍ':dist+' paso'+(dist!==1?'s':'')}]`,p.color||'t-eco');
        });
        R.w('  mapa [nombre] para ver la ruta.','t-dim');
      }
      if(World.isBorder(Player.pos()))R.w('\nFrontera — muévete en una dirección sin salida para expandir el mapa.','t-eco');
      R.sp();break;
    }
    case 'descansar':case 'rest':case 'dormir':await Tactics.cmdDescansar();break;
    case 'tactica':case 'táctica':case 'tac':Tactics.cmdTactica();break;
    case 'items':case 'ítems':ItemSystem.cmdItems();break;
    case 'reparar':case 'repair':{
      // Reparar arma equipada con kit de reparación del inventario
      const kitId=args[0];
      const kit=kitId?Player.findItem(kitId):Player.get().inventory.find(i=>['kit_reparacion','kit_maestro','lima_afilado'].includes(i.blueprint));
      if(!kit){R.w('No tienes kit de reparación. Busca "kit_reparacion" o "kit_maestro".','t-dim');break;}
      const curBattle=Net.getMyBattle();
      ItemSystem.aplicar(kit,curBattle||null);
      save();break;
    }
    case 'forjar':cmdForjar(args);break;
    case 'encarnar':cmdForjar(args,'corporal');break;
    case 'conjurar':cmdForjar(args,'mágico');break;
    case 'fusionar':cmdFusionar(args);break;
    case 'recetas':cmdRecetas();break;
    case 'materiales':cmdMateriales();break;
    case 'habilidades':case 'hab':cmdHabilidades();break;
    case 'magias':case 'mag':cmdMagias();break;
    case 'lanzar':cmdLanzar(args.join(' '));break;
    case 'recargar':cmdRecargar(args);break;
    case 'criaturas':case 'comp':cmdCompañeros();break;
    case 'capturar':cmdCapturar(args.join(' '));break;
    case 'liberar':cmdLiberar(args.join(' '));break;
    case 'modo':cmdModo(args[0],args.slice(1).join(' '));break;
    case 'nombrar':cmdNombrar(args[0],args.slice(1).join(' '));break;
    case 'criar':cmdCriar(args[0],args[1]);break;
    case 'vincular':{
      const battle=Net.getMyBattle();
      CreatureEngine.cmdVincular(args.join(' ')||null, battle);
      break;
    }
    case 'anclas':CreatureEngine.cmdAnclas();break;
    case 'inventario':case 'inv':cmdInv();break;
    case 'recoger':case 'tomar':cmdRecoger(args.join(' '));break;
    case 'soltar':case 'drop':cmdSoltar(args.join(' '));break;
    case 'equipar':cmdEquipar(args.join(' '));break;
    case 'usar':cmdUsar(args.join(' '));break;
    case 'atacar':case 'atk':cmdAtacar(args.join(' '));break;
    case 'examinar':case 'ex':cmdExaminar(args.join(' '));break;
    case 'estado':case 'stats':cmdEstado();break;
    case 'legados':case 'ecos':cmdLegados();break;
    case 'epitafio':cmdEpitafio();break;
    case 'plugins':cmdPlugins();break;
    case 'modulos':cmdModulos();break;
    case 'eventos':cmdEventos();break;
    case 'cargar_modulo':cmdCargarModulo(args.join(' '));break;
    case 'cargar_plugin':cmdCargarPlugin(args.join(' '));break;
    case 'descargar_plugin':PluginLoader.unregister(args[0]);R.w(`Plugin "${args[0]}" descargado.`,'t-mem');break;
    case 'conectar':case 'connect':
    case 'servidor':case 'server':
    case 'host':case 'iniciar':case 'iniciar_servidor':case 'start_server':
      if(args.length) await Net.connect(args.join(''));
      else await Net.host();
      break;
    case 'aceptar_conexion':case 'accept_conn':
      // args[0] = código SDP, args[1] = slotId opcional
      await Net.acceptConexion(args[0], args[1]||null);break;
    case 'desconectar':case 'disconnect':Net.disconnect();break;
    case 'jugadores':case 'players':case 'red':case 'net':Net.cmdJugadores();break;

    // ── BATALLA POR TURNOS ──────────────────────────────────────
    case 'atacar_b':case 'atk_b':{
      const battle=Net.getMyBattle();
      if(!battle){R.w('No estás en batalla.','t-dim');break;}
      Net.sendBattleAction(battle.id,Player.get().id,'atacar',args.join(' ')||null);break;
    }
    case 'defender':{
      const battle=Net.getMyBattle();
      if(!battle){R.w('No estás en batalla.','t-dim');break;}
      Net.sendBattleAction(battle.id,Player.get().id,'defender',null);break;
    }
    case 'habilidad_b':{
      const battle=Net.getMyBattle();
      if(!battle){R.w('No estás en batalla.','t-dim');break;}
      Net.sendBattleAction(battle.id,Player.get().id,'habilidad',args.join(' ')||null);break;
    }
    case 'magia_b':{
      const battle=Net.getMyBattle();
      if(!battle){R.w('No estás en batalla.','t-dim');break;}
      Net.sendBattleAction(battle.id,Player.get().id,'magia',args.join(' ')||null);break;
    }
    case 'huir_b':{
      const battle=Net.getMyBattle();
      if(!battle){R.w('No estás en batalla.','t-dim');break;}
      Net.sendBattleAction(battle.id,Player.get().id,'huir',null);break;
    }
    case 'unirse_batalla':case 'unirse':{
      const battleEnNodo=Object.values(Net.battles).find(b=>b.nodeId===Player.pos()&&b.estado==='activo');
      if(!battleEnNodo){R.w('No hay batalla activa en este nodo.','t-dim');break;}
      Net.joinBattle(battleEnNodo.id);break;
    }
    case 'batalla':case 'status_batalla':{
      const battle=Net.getMyBattle();
      if(!battle){R.w('No estás en batalla.','t-dim');break;}
      Net.renderBattle?Net.renderBattle(battle):R.w('—','t-dim');break;
    }

    // ── TRADE ───────────────────────────────────────────────────
    case 'comerciar':{
      if(!Net.isOnline()){R.w('Necesitas estar conectado para comerciar.','t-dim');break;}
      if(!args.length){R.w('comerciar [nombre_jugador]','t-dim');break;}
      const tq=args.join(' ').toLowerCase();
      const tj=Object.values(Net.getPlayers()).find(x=>x.nodeId===Player.pos()&&x.name.toLowerCase().includes(tq));
      if(!tj){R.w(`${args.join(' ')} no está en este nodo.`,'t-dim');break;}
      Net.initTrade(Player.get().id,Player.get().name,tj.id);
      Net.sendTradeMsg({type:'TRADE_REQUEST',fromId:Player.get().id,fromName:Player.get().name,toId:tj.id,tradeId:Net.getTrade(Player.get().id)?.id||''});
      R.w(`Solicitud de comercio enviada a ${tj.name}.`,'t-mem');break;
    }
    case 'aceptar_trade':{
      const trade=Net.getTrade(Player.get().id);
      if(!trade||trade.estado!=='pendiente'){R.w('Sin solicitud de comercio pendiente.','t-dim');break;}
      trade.estado='activo';trade.b.nombre=Player.get().name;
      Net.sendTradeMsg({type:'TRADE_RESPONSE',fromId:Player.get().id,tradeId:trade.id,accepted:true});
      R.w('Comercio aceptado.','t-mem');Net.renderTrade(trade);break;
    }
    case 'rechazar_trade':{
      const trade=Net.getTrade(Player.get().id);
      if(!trade){R.w('Sin solicitud pendiente.','t-dim');break;}
      trade.estado='cerrado';
      Net.sendTradeMsg({type:'TRADE_RESPONSE',fromId:Player.get().id,tradeId:trade.id,accepted:false});
      R.w('Comercio rechazado.','t-dim');break;
    }
    case 'ofrecer':{
      const trade=Net.getTrade(Player.get().id);
      if(!trade||trade.estado!=='activo'){R.w('No hay comercio activo. Usa "comerciar [jugador]".','t-dim');break;}
      const item=Player.findItem(args.join(' '));
      if(!item){R.w(`No tienes "${args.join(' ')}".`,'t-dim');break;}
      const lado=trade.a.playerId===Player.get().id?trade.a:trade.b;
      if(lado.oferta.find(x=>x.id===item.id)){R.w('Ya está en oferta.','t-dim');break;}
      lado.oferta.push(item);lado.confirmado=false;
      Net.sendTradeMsg({type:'TRADE_OFFER',fromId:Player.get().id,tradeId:trade.id,oferta:lado.oferta});
      Net.renderTrade(trade);break;
    }
    case 'retirar':{
      const trade=Net.getTrade(Player.get().id);
      if(!trade||trade.estado!=='activo'){R.w('No hay comercio activo.','t-dim');break;}
      const lado=trade.a.playerId===Player.get().id?trade.a:trade.b;
      const q=args.join(' ').toLowerCase();
      const idx=lado.oferta.findIndex(i=>(i.nombre||i.blueprint).toLowerCase().includes(q));
      if(idx<0){R.w(`"${q}" no está en tu oferta.`,'t-dim');break;}
      lado.oferta.splice(idx,1);lado.confirmado=false;
      Net.sendTradeMsg({type:'TRADE_OFFER',fromId:Player.get().id,tradeId:trade.id,oferta:lado.oferta});
      Net.renderTrade(trade);break;
    }
    case 'confirmar_trade':{
      const trade=Net.getTrade(Player.get().id);
      if(!trade||trade.estado!=='activo'){R.w('No hay comercio activo.','t-dim');break;}
      const lado=trade.a.playerId===Player.get().id?trade.a:trade.b;
      lado.confirmado=true;
      Net.sendTradeMsg({type:'TRADE_CONFIRM',fromId:Player.get().id,tradeId:trade.id});
      if(trade.a.confirmado&&trade.b.confirmado) Net.handleTradeMsg({type:'TRADE_CONFIRM',fromId:Player.get().id,tradeId:trade.id});
      else R.w('Esperando confirmación del otro jugador...','t-mem');break;
    }
    case 'cancelar_trade':{
      const trade=Net.getTrade(Player.get().id);
      if(!trade){R.w('Sin comercio activo.','t-dim');break;}
      trade.estado='cerrado';
      Net.sendTradeMsg({type:'TRADE_CANCEL',fromId:Player.get().id,tradeId:trade.id});
      R.w('Comercio cancelado.','t-dim');break;
    }

    // ── PvP ─────────────────────────────────────────────────────
    case 'aceptar_pvp':{
      const req=window._pendingPvP;
      if(!req){R.w('Sin solicitud de duelo pendiente.','t-dim');break;}
      delete window._pendingPvP;
      const p=Player.get();
      const combatants=[
        {tipo:'player',id:req.fromId,name:req.fromName,hp:40,maxHp:40,atk:5,def:1,vivo:true,nodeId:req.nodeId,playerId:req.fromId},
        {tipo:'player',id:p.id,name:p.name,hp:p.hp,maxHp:p.maxHp,atk:Player.getAtk(),def:Player.getDef(),vivo:true,nodeId:req.nodeId,playerId:p.id},
      ];
      R.w('Duelo aceptado.','t-pel',true);
      Net.startBattle(req.nodeId, combatants);break;
    }
    case 'rechazar_pvp':{
      const req=window._pendingPvP;
      if(!req){R.w('Sin solicitud de duelo pendiente.','t-dim');break;}
      delete window._pendingPvP;
      R.w('Duelo rechazado.','t-dim');
      Net.sendAction('pvp_rejected',[req.fromId]);break;
    }
    case 'atributos':case 'attrs':XP.cmdAtributos();break;
    case 'experiencia':case 'xp':case 'exp':XP.cmdExperiencia();break;
    case 'asignar':case 'assign':XP.cmdAsignar(args.join(' '));break;
    case 'semilla':R.w(`Semilla: ${World.seed}`,'t-sis');break;
    case 'nombre':
      if(args.length){
        const rawName=args.join(' ').trim().replace(/[<>&"]/g,'').slice(0,24);
        if(rawName.length<2){R.w('El nombre debe tener al menos 2 caracteres.','t-dim');break;}
        Player.rename(rawName);
        R.w(`Nombre: ${Player.get().name}`,'t-npc');
        // Notificar al host si estamos conectados como cliente
        if(Net.isClient()) Net.sendAction('nombre',[rawName]);
      }
      break;
    case 'nuevo':case 'new':await cmdNuevo();break;
    case 'guardar':case 'save':save();R.w('Guardado.','t-cra');break;
    case 'exportar':case 'export':exportarPartida();break;
    case 'importar':case 'import':importarPartida();break;
    case 'ayuda':case 'help':case '?':cmdAyuda(args.join(' '));break;
    case 'limpiar':case 'cls':document.getElementById('out').innerHTML='';break;
    default:
      // SOCKET: command:unknown — plugins pueden interceptar comandos desconocidos
      const handled=EventBus.emit('command:unknown',{verb,args});
      if(!handled?.handled)R.w(`Desconocido: "${verb}". Escribe "ayuda".`,'t-dim');
  }
  EventBus.emit('command:after',{verb,args});
}

// ── MOVIMIENTO ──────────────────────────────────────────────────
function cmdIr(dir){
  if(!dir){R.w('¿Hacia dónde? norte/sur/este/oeste','t-dim');return;}
  const exits=World.exits(Player.pos());
  let dest=exits[dir];

  // ── Detección de frontera y expansión automática ──────────────
  if(!dest){
    // No hay salida en esa dirección — estamos en el borde del mapa
    // Si el nodo actual es frontera, expandir el mapa
    if(World.isBorder(Player.pos())){
      R.w(`Estás en el borde del mapa. Expandiendo...`,'t-eco');
      dest=World.expandSection(Player.pos(), dir);
      if(!dest){R.w(`Sin salida al ${dir}.`,'t-dim');return;}
    } else {
      R.w(`Sin salida al ${dir}.`,'t-dim');return;
    }
  }

  Player.setPos(dest);Clock.tick(1);Player.hungerTick();World.visit(dest);
  // XP exploración por nodo nuevo
  const nodoActual=World.node(dest);
  const esNuevo=!nodoActual?.visitado_prev;
  if(esNuevo){
    nodoActual.visitado_prev=true;
    const xpExtra=nodoActual?.seccion?nodoActual.seccion*5:0;
    XP.ganar('exploración',10+xpExtra,'nodo nuevo');
    // Mostrar advertencia de dificultad si es sección peligrosa
    if(nodoActual?.dificultad>=2.5){
      R.w(`⚠ ZONA HOSTIL — Enemigos ×${(nodoActual.dificultad||1).toFixed(1)} tu nivel`,'t-pel');
    }
  } else {
    XP.ganar('exploración',2,'movimiento');
  }

  // SOCKET: world:node_exit emitido al salir
  EventBus.emit('world:node_exit',{fromId:Player.pos(),toId:dest,dir});
  GS.aliveNPCs().forEach(n=>{
    if(U.chance(ModuleLoader.get('npc_desesperacion_tick_chance')||.12))n.desesperacion=U.clamp(n.desesperacion+U.rand(1,ModuleLoader.get('npc_desesperacion_tick_max')||5),0,100);
    if(U.chance(ModuleLoader.get('npc_corrupcion_tick_chance')||.07))n.corrupcion=U.clamp(n.corrupcion+U.rand(1,ModuleLoader.get('npc_corrupcion_tick_max')||3),0,100);
    if(n.desesperacion>=90&&U.chance(ModuleLoader.get('npc_quiebre_chance')||.15))setTimeout(()=>NPCEngine.consecuenciaDesperación(n),500);
  });
  Player.get().compañeros.forEach(c=>{c.memoria.ciclos++;c.afinidad=U.clamp(c.afinidad+1,0,100);});
  cmdMirar();save();
}

function cmdMirar(){
  const n=World.node(Player.pos());if(!n)return;
  R.sp();R.w(`▸ ${n.name}`,'t-acc',true);
  R.w(`${n.tipo.toUpperCase()}  ·  ${n.estado.toUpperCase()}  ·  ${Object.keys(World.exits(Player.pos())).join(', ')||'sin salidas'}`,'t-dim');
  R.sp();R.w(n.atmos,'t-out');R.sp();
  if(n.loot.length)R.w(`Objetos: ${n.loot.join(', ')}`,'t-cra');
  if(n.enemies.length)R.w(`Entidades: ${n.enemies.map(e=>`${e.nombre}(HP:${e.hp_current})`).join(', ')}`,'t-pel');
  if(n.creatures.length)R.w(`Criaturas: ${n.creatures.map(c=>`${c.nombre}[${c.arquetipo}]`).join(', ')}`,'t-cri');
  const npcs=GS.npcEnNodo(Player.pos());
  if(npcs.length){
    R.sp();
    npcs.forEach(npc=>{
      const tag=npc.estado!=='vivo'?` [${npc.estado.toUpperCase()}]`:'';
      R.w(`▷ ${npc.nombre}  [${npc.arq_vis}]${tag}${npc.misiones_ofrecidas.length?' ◈':''}`,'t-npc');
      if(npc.desesperacion>75)R.w(`  Algo en ${npc.nombre} está al límite.`,'t-dim');
      if(npc.arq_ocu_expuesto)R.w(`  [${npc.arq_ocu.toUpperCase()}]`,'t-twi');
    });
    R.w('  hablar · observar · preguntar · atacar [nombre]','t-mut');
  }
  if(Player.get().compañeros.length)R.w(`Contigo: ${Player.get().compañeros.map(c=>c.nombre).join(', ')}`,'t-cri');

  // Otros jugadores en este nodo (P2P)
  const otrosJugadores=Net.playersEnNodo(Player.pos());
  if(otrosJugadores.length){
    R.sp();
    otrosJugadores.forEach(p=>R.w(`  ◉ ${p.name}  [jugador]`,p.color||'t-eco'));
  }

  // ── Detección de boss por proximidad ─────────────────────────
  const bossesActivos=BossSystem.getBosses().filter(b=>!b.eliminado);
  bossesActivos.forEach(boss=>{
    const dist=BossSystem.distancia(Player.pos(),boss.nodeId);
    if(dist===0){
      // Ya manejado por el evento de entrada — no mostrar aquí
    } else if(dist===1){
      const exits=World.exits(Player.pos());
      const dirBoss=Object.entries(exits).find(([,id])=>id===boss.nodeId);
      R.sp();
      R.w(`☠ EL MIEDO SE SIENTE HACIA EL ${(dirBoss?.[0]||'NORTE').toUpperCase()}`,boss.def.color,true);
      R.w(boss.def.frase_cerca,'t-pel');
    } else if(dist===2){
      const dir=BossSystem.distancia?dirHaciaBossVisible(Player.pos(),boss.nodeId):'lejos';
      R.w(`${boss.def.icon} Algo poderoso se siente en el mundo.`,boss.def.color);
      R.w(boss.def.frase_lejos,'t-dim');
    }
  });

  // SOCKET: render:node_extra — plugins pueden añadir info
  const extraPayload=EventBus.emit('render:node_extra',{nodeId:Player.pos(),node:n,player:Player.get(),lines:[]});
  (extraPayload?.lines||[]).forEach(l=>R.w(l.text,l.color||'t-out'));

  if(RunMem.ecos().length&&U.chance(.12))R.w('Un rastro de algo anterior es visible aquí.','t-eco');
  R.sp();R.upd();
  // ── Trickster: aparición basada en suerte ────────────────────
  const suerte=Player.get().suerte||0;
  // Probabilidad base 2% + 1% por punto de suerte (cap 25%)
  const tricksterChance=Math.min(0.25, 0.02 + suerte*0.01);
  if(!n.destruido && U.chance(tricksterChance)){
    setTimeout(()=>_spawnTrickster(n.id), 400);
    return; // si aparece el Trickster, no spawn enemigo normal
  }

  if(n.enemies.length&&!n.destruido&&U.chance(.35)){
    const e=n.enemies[0];
    setTimeout(()=>{
      R.w(`¡${e.nombre} emerge!`,'t-pel');
      const p=Player.get();
      Net.startBattle(n.id,[
        {tipo:'player',id:p.id,name:p.name,hp:p.hp,maxHp:p.maxHp,atk:Player.getAtk(),def:Player.getDef(),nodeId:n.id,playerId:p.id,vivo:true},
        {tipo:'enemy',id:e.id,name:e.nombre,hp:e.hp_current||e.hp,maxHp:e.hp,atk:e.atk,def:e.def||0,nodeId:n.id,tags:e.tags||[],vivo:true},
      ]);
    },350);
  }
}

const TRICKSTER_FRASES_HIT=[

function _spawnTrickster(nodeId){
  const p=Player.get();
  R.sp();R.sep('═');
  R.w(`✦ ¡TRICKSTER APARECE!`,'t-cor',true);
  R.w(`Una figura imposible materializa en ${World.node(nodeId)?.name||nodeId}.`,'t-dim');
  R.w(`Suerte: ${p.suerte||0} pts — eso lo atrajo hacia ti.`,'t-mem');
  R.w(`No ataca. Tiene 999 HP. Cada golpe lo roba o altera.`,'t-dim');
  R.w(`Cada 4 turnos intenta escapar (25%).`,'t-dim');
  R.sep('═');R.sp();

  const trickId=U.uid();
  const compCombatants=(p.compañeros||[])
    .map(c=>CreatureEngine.buildCombatant(c,nodeId))
    .filter(Boolean);

  const combatants=[
    {tipo:'player',id:p.id,name:p.name,hp:p.hp,maxHp:p.maxHp,
     atk:Player.getAtk(),def:Player.getDef(),nodeId,playerId:p.id,vivo:true},
    {tipo:'enemy',id:trickId,name:'Trickster',
     hp:999,maxHp:999,atk:0,def:0,nodeId,
     tags:['trickster','ilusión','suerte'],
     vivo:true,
     esTrickster:true,
     _trickTurno:0,        // contador de turnos para escape
     color:'t-cor',},
    ...compCombatants,
  ];
  Net.startBattle(nodeId, combatants);
}

// Hook: interceptar ataques al Trickster en execBattleAction
// Se integra en _checkBattleEnd y en el AI turn del Trickster
function _procesarTrickster(battle, target, dmg, actor){
  if(!target?.esTrickster) return false;

  // Solo recibe 1 HP de daño, siempre
  target.hp=Math.max(1, target.hp-1);
  target._lootLog=target._lootLog||[];
  const frase=TRICKSTER_FRASES_HIT[Math.floor(Math.random()*TRICKSTER_FRASES_HIT.length)];
  battleLog(battle,`  ✦ Trickster: "${frase}"`,'t-cor');

  const roll=Math.random();
  const p=Player.get();

  if(roll<0.45){
    // Roba un objeto aleatorio — pero queda en inventario del jugador como "loot ganado"
    // El Trickster SUELTA objetos al ser golpeado (no roba — la descripción dice lootea)
    const inv=p.inventory.filter(i=>!['huevo_impronta'].includes(i.blueprint)&&i.estado!=='trickster_ganado');
    if(inv.length){
      const item=inv[Math.floor(Math.random()*inv.length)];
      // Marca el ítem como ganado de Trickster (ya está en inventario, se queda)
      item.estado='trickster_ganado';
      item._trickster_loot=true;
      target._lootLog.push(item.nombre||item.blueprint);
      battleLog(battle,`  ✦ ¡Trickster suelta ${item.nombre||item.blueprint}! Ya es tuyo.`,'t-cor');
    } else {
      // Genera un ítem de loot táctico del nodo
      const nodo=World.node(battle.nodeId);
      const itemTac=ItemSystem.genLootTactico(nodo?.tipo||'hub',U.rng(Date.now()));
      if(itemTac){
        itemTac.estado='trickster_ganado';
        itemTac._trickster_loot=true;
        Player.addItem(itemTac);
        target._lootLog.push(itemTac.nombre||itemTac.blueprint);
        battleLog(battle,`  ✦ Trickster materializa ${itemTac.nombre}!`,'t-cor');
      }
    }
  } else if(roll<0.75){
    // Aplica estado alterado aleatorio al jugador en la batalla
    const actorBattle=battle.cola.find(c=>c.playerId===p.id&&c.tipo==='player');
    if(actorBattle){
      const estado=TRICKSTER_ESTADOS[Math.floor(Math.random()*TRICKSTER_ESTADOS.length)];
      actorBattle.elemento_estado=estado;
      battleLog(battle,`  ✦ Trickster te aplica ${estado}!`,Tactics.ELEMENTOS[estado]?.color||'t-cor');
    }
  } else {
    // Genera un material raro del nodo como recompensa extra
    const nodo=World.node(battle.nodeId);
    const wd=D.world||{};
    const lp=wd.loot_por_tipo?.[nodo?.tipo]||Object.keys(D.mats).slice(0,3);
    const matId=lp[Math.floor(Math.random()*lp.length)];
    const mat=D.mat(matId);
    if(mat){
      const item={id:U.uid(),blueprint:matId,nombre:matId.replace(/_/g,' '),
        tipo:'material',tags:D.matTags(matId),estado:'trickster_ganado',
        _trickster_loot:true,desc:mat.desc};
      Player.addItem(item);
      target._lootLog.push(item.nombre);
      battleLog(battle,`  ✦ Trickster deja caer ${item.nombre}.`,'t-cra');
    }
  }

  R.upd();
  return true;
}

// Turno de IA del Trickster — no ataca, intenta escapar cada 4 turnos
function _tricksterAITurn(actor, battle){
  actor._trickTurno=(actor._trickTurno||0)+1;
  const frase=TRICKSTER_FRASES_TURNO[Math.floor(Math.random()*TRICKSTER_FRASES_TURNO.length)];
  battleLog(battle,frase,'t-cor');

  // Cada 4 turnos: 25% de escape
  if(actor._trickTurno%4===0){
    if(Math.random()<0.25){
      const fEsc=TRICKSTER_FRASES_ESCAPE[Math.floor(Math.random()*TRICKSTER_FRASES_ESCAPE.length)];
      battleLog(battle,`  ✦ Trickster: "${fEsc}"`,'t-cor');
      actor.vivo=false;
      actor.huyó=true;
      R.sp();R.w(`✦ El Trickster desaparece en un destello. HP restantes: ${actor.hp}/999`,'t-cor');
      // XP proporcional al daño infligido
      const xpTrick=Math.max(10,(999-actor.hp)*2);
      XP.ganar('suerte',xpTrick,`daño al Trickster: ${999-actor.hp}`);
      if(actor.hp<=1){
        // Derrotado — loot especial
        _tricksterLoot();
      }
    } else {
      battleLog(battle,`  ✦ Trickster intenta escapar... pero se queda. Por ahora.`,'t-mem');
    }
  }
}

function _tricksterLoot(){
  R.sp();R.sep('═');

  const p=Player.get();

     tags:['suerte','ilusión','trickster'],es_mitico:false,

     desc:'Fragmento del Trickster. Incrementa la suerte permanentemente.',

// ── FORJA ────────────────────────────────────────────────────────
function cmdForjar(args, modo){
  // modo: undefined=forja libre, 'corporal'=sesgar habilidad, 'mágico'=sesgar magia
  if(!args.length){
    R.w('forjar [mat1] [mat2]   — combina materiales libremente','t-dim');
    R.w('encarnar [mat1] [mat2] — sesga hacia habilidades (necesita tags corporales)','t-dim');
    R.w('conjurar [mat1] [mat2] — sesga hacia magias (necesita tags resonantes/mágicos)','t-dim');
    return;
  }
  const used=[],ids=[];
  for(const q of args){
    const item=Player.get().inventory.find(i=>
      !used.includes(i.id)&&
      (i.blueprint?.toLowerCase().includes(q.toLowerCase())||i.nombre?.toLowerCase().includes(q.toLowerCase()))
    );
    if(!item){R.w(`No tienes "${q}".`,'t-dim');return;}
    // Validar: solo materiales y anclas son forjables
    if(!['material','ancla'].includes(item.tipo)&&item.categoria!=='ancla'){
      R.w(`"${item.nombre||item.blueprint}" no es un material forjable. Solo materiales pueden usarse en la forja.`,'t-dim');
      return;
    }
    used.push(item.id);ids.push(item.blueprint);
  }
  if(ids.length<2){R.w('Necesitas al menos 2 materiales.','t-dim');return;}

  // Aplicar sesgo de modo antes de forjar
  if(modo==='corporal'){
    // encarnar: añadir un tag corporal si no hay ninguno
    const tagsCorp=['tendón','nervio','hueso','sangre','tejido','médula'];
    const hayTendon=ids.some(id=>D.matTags(id).some(t=>tagsCorp.includes(t)));
    if(!hayTendon){
      R.w('Encarnar requiere al menos un material corporal (tendón, nervio, hueso, sangre, tejido, médula).','t-pel');
      R.w(`Materiales corporales: ${Object.entries(D.mats).filter(([,m])=>m.tags?.some(t=>tagsCorp.includes(t))).map(([id])=>id).join(', ')}`,'t-dim');
      return;
    }
  } else if(modo==='mágico'){
    // conjurar: requiere tag resonante, corrupto o cristal
    const tagsMag=['resonante','corrupto','cristal','susurro','llama','vacío'];
    const hayMag=ids.some(id=>D.matTags(id).some(t=>tagsMag.includes(t)));
    if(!hayMag){
      R.w('Conjurar requiere al menos un material mágico (resonante, corrupto, cristal, susurro, llama, vacío).','t-pel');
      R.w(`Materiales mágicos: ${Object.entries(D.mats).filter(([,m])=>m.tags?.some(t=>tagsMag.includes(t))).map(([id])=>id).join(', ')}`,'t-dim');
      return;
    }
  }

  const n=World.node(Player.pos());
  const ctx={nodeId:Player.pos(),cycle:Clock.cycle,pid:Player.get().id,modo};
  const res=Forge.forjar(ids,ctx,n?.estado,Clock.get().name,modo);
  if(res.cancelled){R.w('La forja fue cancelada.','t-dim');return;}
  Clock.tick(2);Player.hungerTick();
  if(res.colapso){
    R.sp();R.w('⚠ COLAPSO DE FORJA','t-pel',true);
    R.w(`Tensión: ${(res.tension*100).toFixed(0)}%`,'t-cor');
    const d=Player.damage(U.rand(5,15));R.w(`−${d} HP`,'t-pel');
    used.forEach(id=>Player.rmItem(id));R.upd();save();return;
  }
  const item=res.item;used.forEach(id=>Player.rmItem(id));
  R.sp();
  const col=item.tipo==='habilidad'?'t-hab':item.tipo==='magia'?'t-mag':item.tipo==='mítico'?'t-cor':item.tipo==='ancla'||item.categoria==='ancla'?'t-cri':'t-cra';
  R.w(`FORJA — ${res.rType.toUpperCase()}`,'t-acc',true);
  R.w(`${item.nombre}  [${item.tipo}]`,col);
  if(item.atk)   R.w(`ATK +${item.atk}`,'t-pel');
  if(item.def)   R.w(`DEF +${item.def}`,'t-sis');
  if(item.hp)    R.w(`Cura ${item.hp}HP`,'t-cra');
  if(item.poder) R.w(`Poder: ${item.poder}`,'t-mag');
  if(item.valor) R.w(`Valor: ${item.valor}`,'t-hab');
  if(item.durabilidad!=null&&item.tipo==='arma') R.w(`Durabilidad: ${item.durabilidad}%`,'t-dim');
  if(item.desc)  R.w(item.desc,'t-dim');
  if(item.categoria==='ancla') R.w(`Ancla de captura — compatible con criaturas: ${item.tags?.join(', ')||'—'}`,'t-cri');
  R.w(`Tags: ${res.domTags.join(', ')}${res.bonus.length?' +'+res.bonus.join(','):''}`,'t-dim');
  R.w(`Tensión: ${(res.tension*100).toFixed(0)}%  #${item.imprint?.hash||'—'}${item.imprint?.mutations?.length?' {'+item.imprint.mutations.join(',')+'}':''}`,'t-dim');
  Player.get().stats.crafted++;
  const xpForja={arma:15,armadura:12,consumible:8,habilidad:30,magia:35,mítico:80,anomalía:25,reliquia:20,híbrido:18,corrupto:22,resonante:20,ancla:12,colapso:5};
  XP.ganar('forja', xpForja[res.rType]||10, `forja: ${res.rType}`);
  if(item.tipo==='habilidad'){
    if(!Player.addHab(item)){R.w('Slots cuerpo llenos. Guardado en inventario.','t-dim');Player.addItem(item);}
    else R.w('Habilidad encarnada.','t-hab');
  } else if(item.tipo==='magia'){
    if(!Player.addMag(item)){R.w('Slots mente llenos. Guardado en inventario.','t-dim');Player.addItem(item);}
    else R.w('Magia conjurada.','t-mag');
  } else {
    Player.addItem(item);
  }
  R.sp();R.upd();save();
}

function cmdFusionar(args){
  if(args.length<2){R.w('fusionar [id1] [id2] ...\nCombina ítems forjados, habilidades y magias en una reliquia mítica.','t-dim');return;}
  const items=args.map(q=>Player.findItem(q)||Player.findHab(q)||Player.findMag(q)).filter(Boolean);
  if(items.length<2){R.w(`Solo encontré ${items.length} ítem(s). Necesitas al menos 2.`,'t-dim');return;}

  const allTags=items.flatMap(i=>i.tags||[]);
  const tension=Tags.tension(allTags);

  R.sp();R.w('CONVERGENCIA — FUSIÓN','t-cor',true);
  R.w(`Elementos: ${items.map(i=>i.nombre||i.blueprint).join(' + ')}`,'t-dim');
  R.w(`Tensión de convergencia: ${(tension*100).toFixed(0)}%`,tension>.6?'t-pel':'t-dim');

  // Colapso solo si tensión > 0.8 (no aleatorio)
  if(tension>.8){
    R.w('⚠ Tensión demasiado alta. La convergencia colapsa.','t-pel');
    items.forEach(i=>{Player.rmItem(i.id);Player.rmHab(i.id);Player.rmMag(i.id);});
    const d=Player.damage(U.rand(10,25));
    R.w(`−${d} HP`,'t-pel');R.upd();save();return;
  }

  const rng=U.rng(Date.now()+Math.random());
  const ctx={nodeId:Player.pos(),cycle:Clock.cycle,pid:Player.get().id};
  const imp=Imprint.gen('reliquia_viva',allTags,ctx,tension);
  imp.parent_hash=items.map(i=>i.imprint?.hash||'—').join(':');

  // Acumular stats de todos los elementos (con penalización por tensión)
  const penalTension=1-tension*0.3;
  const totalAtk =Math.floor(items.reduce((s,i)=>s+(i.atk||0)+(i.valor||0)*0.5,0)*penalTension);
  const totalDef =Math.floor(items.reduce((s,i)=>s+(i.def||0),0)*penalTension);
  const totalPoder=Math.floor(items.reduce((s,i)=>s+(i.poder||0),0)*penalTension);
  const totalHp  =Math.floor(items.reduce((s,i)=>s+(i.hp||0),0)*penalTension);

  const muts=D.narrative.mutaciones||[];
  const adj=tension>.5?['Inestable','Corrupta','Fragmentada']:['Convergente','Primordial','Eterno'];
  const nombre=`${U.pick(adj,rng)} ${muts.length?U.pick(muts,rng):'Reliquia'}`;

  // Determinar efecto pasivo según qué tipos se fusionaron
  const tieneHab=items.some(i=>i.tipo==='habilidad'||Player.findHab(i.id));
  const tieneMag=items.some(i=>i.tipo==='magia'||Player.findMag(i.id));
  let efectoPasivo=null;
  if(tieneHab&&tieneMag)   efectoPasivo='+1_slot_magia'; // fusión mixta: slot extra
  else if(tieneHab)        efectoPasivo='atk_bonus';
  else if(tieneMag)        efectoPasivo='mana_max';

  const rel={
    id:U.uid(), blueprint:'reliquia_viva',
    nombre, tipo:'mítico',
    tags: allTags.slice(0,5),
    imprint: imp,
    estado:'convergente',
    es_mitico: true,
    atk:  totalAtk,
    def:  totalDef,
    poder:totalPoder,
    hp:   totalHp||0,
    efecto_pasivo: efectoPasivo,
    desc:`Convergencia de ${items.map(i=>i.nombre||i.blueprint).join(' + ')}. Tensión:${(tension*100).toFixed(0)}%.`,
  };

  items.forEach(i=>{Player.rmItem(i.id);Player.rmHab(i.id);Player.rmMag(i.id);});
  Player.addItem(rel);
  XP.ganar('forja',60+(items.length*10),'fusión ontológica');
  XP.ganar('mente',30,'convergencia');

  R.w(`${rel.nombre}  [MÍTICO]`,'t-cor',true);
  if(rel.atk)  R.w(`ATK +${rel.atk}`,'t-pel');
  if(rel.def)  R.w(`DEF +${rel.def}`,'t-sis');
  if(rel.poder)R.w(`Poder: ${rel.poder}`,'t-mag');
  if(rel.efecto_pasivo) R.w(`Efecto pasivo: ${rel.efecto_pasivo}`,'t-cor');
  R.w(`"equipar ${rel.nombre.split(' ')[0].toLowerCase()}" para activar sus efectos.`,'t-dim');
  R.sp();R.upd();save();
}

function cmdLanzar(target){
  const mag=Player.findMag(target);if(!mag){R.w(`No tienes magia "${target}".`,'t-dim');return;}
  if(mag.cargas<=0){R.w(`${mag.nombre} sin cargas.`,'t-mag');return;}
  mag.cargas--;mag.fragilidad=U.clamp((mag.fragilidad||0)+10,0,100);
  XP.ganar('mente', 12, `lanzar: ${mag.nombre}`);
  const n=World.node(Player.pos());
  switch(mag.efecto){
    case 'dmg_dist':
      if(n?.enemies?.length){const e=n.enemies[0];const d=Math.floor(mag.poder*.8);e.hp_current-=d;R.w(`${mag.nombre} → ${e.nombre}  −${d}HP`,'t-mag');if(e.hp_current<=0){World.rmEnemy(Player.pos(),e.id);R.w(`${e.nombre} colapsa.`,'t-cra');}}
      else R.w('Sin objetivo.','t-dim');break;
    case 'teleport':{
      const ids=Object.keys(World.all());const dest=U.pick(ids,U.rng(Math.random()));
      Player.setPos(dest);World.visit(dest);R.w(`${mag.nombre} → ${World.node(dest)?.name}`,'t-mag');cmdMirar();
      break;
    }
    case 'invisibilidad':{
      // Activa el flag de invisibilidad — WorldAI no detecta al jugador
      const p=Player.get();
      p.flags=p.flags.filter(f=>f.tipo!=='invisible'); // limpiar previo
      p.flags.push({tipo:'invisible',ciclos:3});
      p._niebla_turnos=(p._niebla_turnos||0)+3; // también evasión táctica
      R.w(`${mag.nombre} activa — invisible por 3 ciclos. Los enemigos no te detectarán.`,'t-mag');
      break;
    }
    case 'debuff':
      if(n?.enemies?.length){const e=n.enemies[0];const red=Math.max(1,Math.floor(e.atk*0.3));e.atk=Math.max(1,e.atk-red);R.w(`${mag.nombre} → ${e.nombre}  ATK −${red}`,'t-mag');}
      else R.w('Sin objetivo.','t-dim');break;
    case 'revelar':{
      const it=Player.get().inventory.find(i=>i.imprint);
      if(it)R.w(`${mag.nombre}: ${it.nombre} #${it.imprint.hash}  Tensión:${((it.imprint.tension||0)*100).toFixed(0)}%  Muts:${it.imprint.mutations?.join(',')||'—'}`,'t-mag');
      else R.w('Nada con impronta en el inventario.','t-dim');
      break;
    }
    case 'duplicar':{
      // Fuera de combate: duplicar el próximo objeto recogido
      Player.get()._duplicar_loot=true;
      R.w(`${mag.nombre} — el próximo objeto que recojas se duplicará.`,'t-mag');
      break;
    }
    case 'invocar':{
      // Genera un objeto anómalo forjado con los tags del nodo
      const tipo=n?.tipo||'hub';
      const tagsNodo=Tactics.CLIMAS_NODO[tipo]?.elemento_base?[Tactics.CLIMAS_NODO[tipo].elemento_base.toLowerCase()]:['anomalía'];
      const rng=U.rng(Date.now());
      const adj=['Anómala','Resonante','Corrompida','Antigua','Inestable'];
      const nou=['Forma','Masa','Eco','Fragmento','Cristal'];
      const nombre=`${U.pick(adj,rng)} ${U.pick(nou,rng)}`;
      const imp=Imprint.gen('anomalia',tagsNodo,{nodeId:Player.pos(),cycle:Clock.cycle,pid:Player.get().id},0.5+Math.random()*0.4);
      const item={id:U.uid(),blueprint:'anomalia_invocada',nombre,tipo:'reliquia',tags:[...tagsNodo,'anomalía'],imprint:imp,estado:'invocado',
        atk:U.rand(3,8),def:U.rand(1,4),poder:U.rand(8,20),desc:`Invocada por ${mag.nombre}. Tensión:${(imp.tension*100).toFixed(0)}%.`};
      Player.addItem(item);
      R.w(`${mag.nombre} invoca: ${nombre}  [${tagsNodo.join(',')}]  ATK+${item.atk}  DEF+${item.def}`,'t-mag');
      break;
    }
    default:R.w(`${mag.nombre}: efecto ${mag.efecto} activo.`,'t-mag');
  }
  if((mag.fragilidad||0)>=100){mag.estado='corrupta';R.w(`¡${mag.nombre} corrompida!`,'t-cor');}
  R.upd();save();
}
function cmdRecargar(args){const mag=Player.findMag(args[0]);if(!mag)return;const mat=Player.findItem(args[1]);if(!mat)return;if(!D.matTags(mat.blueprint).some(t=>['resonante','corrupto'].includes(t))){R.w('Necesitas material resonante o corrupto.','t-dim');return;}Player.rmItem(mat.id);mag.cargas=Math.min(mag.cargas_max,mag.cargas+2);mag.fragilidad=Math.max(0,(mag.fragilidad||0)-20);XP.ganar('mente',8,'recarga magia');R.w(`${mag.nombre} recargada.`,'t-mag');save();}

// ── CRIATURAS ────────────────────────────────────────────────────
// ════════════════════════════════════════════════════════════════
// CREATURE ENGINE — Captura, modos, breeding, combate
// ════════════════════════════════════════════════════════════════
const CreatureEngine = {

  // ── Arquetipo base de la criatura ─────────────────────────────
  arcData(cre){ return D.creatures[cre.arquetipo]||null; },

  // ── Anclas requeridas para capturar esta criatura ─────────────
  anclasRequeridas(cre){
    const arc=this.arcData(cre);
    return arc?.anclas||[];
  },

  // ── Verificar si el jugador tiene un ancla compatible ─────────
  tieneAnclaCompatible(cre){
    const reqs=this.anclasRequeridas(cre);
    if(!reqs.length) return {ok:true, ancla:null};
    const inv=Player.get().inventory;
    const ancla=inv.find(i=>
      reqs.includes(i.blueprint)&&
      (i.categoria==='ancla'||D.mat(i.blueprint)?.categoria==='ancla')
    );
    return {ok:!!ancla, ancla};
  },

  // ── Resistencia de voluntad al capturar ───────────────────────
  // Devuelve true si la criatura resiste el intento
  resisteCaptura(cre, tieneAncla){
    const voluntad=cre.voluntad||50;
    // Base: voluntad/100. Ancla reduce resistencia a la mitad
    const resistBase=voluntad/100;
    const resist=tieneAncla ? resistBase*0.4 : resistBase;
    return Math.random()<resist;
  },

  // ── Stats del compañero según modo ───────────────────────────
  statsEnBatalla(cre){
    const modo=cre.modo||'activo';
    const gen=Math.min(cre.linaje?.generacion||0, 10);
    const genBonus=1+gen*0.04; // +4% stats por generación, cap gen.10 = +40%
    let atk=Math.round((cre.atk||4)*genBonus);
    let def=Math.round((cre.def||0)*genBonus);
    let hp= Math.round((cre.maxHp||10)*genBonus);

    switch(modo){
      case 'activo':   /* stats base */                              break;
      case 'caza':     atk=Math.round(atk*1.4); def=Math.round(def*0.7); break;
      case 'defensivo':def=Math.round(def*1.5); atk=Math.round(atk*0.7); break;
      case 'autónomo': atk=Math.round(atk*1.1); def=Math.round(def*1.1); break;
      case 'latente':  atk=0; def=0; hp=0;                          break;
    }
    return {atk, def, hp: hp||cre.maxHp||10, modo};
  },

  // ── Construir combatant de compañero para startBattle ─────────
  buildCombatant(cre, nodeId){
    if(cre.modo==='latente'||cre.estado==='latente') return null;
    const st=this.statsEnBatalla(cre);
    return {
      tipo:'creature',
      id:cre.id,
      name:cre.nombre,
      hp: Math.min(cre.hp||cre.maxHp, st.hp),
      maxHp: st.hp,
      atk: st.atk,
      def: st.def,
      nodeId,
      tags: cre.tags||[],
      vivo: true,
      _comp_ref: cre,   // referencia para actualizar HP tras batalla
      color:'t-cri',
      // La IA tratará al compañero como aliado del jugador
      playerId: Player.get().id,  // mismo equipo que el jugador
      esCompañero: true,
    };
  },

  // ── Acción de apoyo según modo (se ejecuta al inicio del turno) ─
  apoyoEnTurno(cre, battle){
    if(cre.modo==='latente') return;
    const targets=battle.cola.filter(c=>c.vivo&&!c.esCompañero&&c.tipo!=='player');
    const player=battle.cola.find(c=>c.playerId===Player.get().id&&c.tipo==='player');
    if(!player) return;

    switch(cre.modo){
      case 'activo':
      case 'caza':{
        // Ataca al enemigo más débil
        if(!targets.length) return;
        const target=targets.reduce((a,b)=>a.hp<b.hp?a:b);
        const dmg=Math.max(1,(cre.atk||4)+Math.floor(Math.random()*3)-target.def||0);
        target.hp=Math.max(0,target.hp-dmg);
        if(target.hp<=0) target.vivo=false;
        battleLog(battle,`  ✦ ${cre.nombre} [${cre.modo}] → ${target.name}  −${dmg}HP`,'t-cri');
        cre.memoria.combates=(cre.memoria.combates||0)+1;
        break;
      }
      case 'defensivo':{
        // Protege al jugador: absorbe parte del próximo daño
        player._comp_shield=(player._comp_shield||0)+Math.floor(cre.def||1)*2;
        battleLog(battle,`  🛡 ${cre.nombre} protege a ${player.name} (+${Math.floor(cre.def||1)*2} escudo).`,'t-cri');
        break;
      }
      case 'autónomo':{
        // Evalúa la situación: ataca si hay enemigos, cura si jugador bajo HP
        if(player.hp/player.maxHp < 0.35){
          const cura=Math.floor((cre.maxHp||10)*0.15);
          player.hp=Math.min(player.maxHp,player.hp+cura);
          battleLog(battle,`  ✦ ${cre.nombre} [autónomo] cura a ${player.name} +${cura}HP.`,'t-cri');
        } else if(targets.length){
          const target=targets[Math.floor(Math.random()*targets.length)];
          const dmg=Math.max(1,(cre.atk||4)-((target.def||0)));
          target.hp=Math.max(0,target.hp-dmg);
          if(target.hp<=0) target.vivo=false;
          battleLog(battle,`  ✦ ${cre.nombre} [autónomo] → ${target.name}  −${dmg}HP`,'t-cri');
        }
        cre.memoria.combates=(cre.memoria.combates||0)+1;
        break;
      }
    }

    // Inestabilidad alta — chance de actuar de forma impredecible
    if((cre.inestabilidad||0)>60 && Math.random()<0.25){
      // Ataca a un objetivo aleatorio incluyendo aliados
      const todos=battle.cola.filter(c=>c.vivo&&c.id!==cre.id);
      if(todos.length){
        const rnd=todos[Math.floor(Math.random()*todos.length)];
        const dmg=Math.max(1,cre.atk||4);
        rnd.hp=Math.max(0,rnd.hp-dmg);
        if(rnd.hp<=0) rnd.vivo=false;
        battleLog(battle,`  ⚡ ${cre.nombre} [inestable] ataca a ${rnd.name}  −${dmg}HP`,'t-pel');
      }
    }
  },

  // ── Post-batalla: actualizar HP, afinidad, memoria ────────────
  postBatalla(victoria){
    Player.get().compañeros.forEach(cre=>{
      if(cre.modo==='latente') return;
      // Afinidad +2 por combatir juntos, +3 si victoria
      cre.afinidad=Math.min(100,(cre.afinidad||0)+(victoria?3:2));
      // Memoria de combates ya se actualiza en apoyoEnTurno
    });
  },

  // ── Comando vincular (usar ancla en combate de captura) ────────
  cmdVincular(anclaQuery, battle){
    if(!battle){R.w('Solo en combate de captura.','t-dim');return;}
    const creActor=battle.cola.find(c=>c.tipo==='creature'&&c.vivo&&c._cre_ref);
    if(!creActor){R.w('No hay criatura para vincular.','t-dim');return;}
    const cre=creActor._cre_ref;

    // Verificar HP < 30%
    const hpPct=creActor.hp/creActor.maxHp;
    if(hpPct>0.30){
      R.w(`${cre.nombre} tiene demasiada energía. Debes debilitarla más (< 30% HP).`,'t-pel');
      R.w(`HP actual: ${creActor.hp}/${creActor.maxHp} (${Math.round(hpPct*100)}%)`,'t-dim');
      return;
    }

    // Buscar ancla en inventario
    const reqs=this.anclasRequeridas(cre);
    let anclaItem=null;
    if(anclaQuery){
      anclaItem=Player.findItem(anclaQuery);
    } else {
      anclaItem=Player.get().inventory.find(i=>
        D.mat(i.blueprint)?.categoria==='ancla'&&
        (reqs.length===0||reqs.includes(i.blueprint))
      );
    }

    if(!anclaItem){
      if(reqs.length){
        R.w(`${cre.nombre} requiere: ${reqs.join(' / ')}`,'t-pel');
        R.w('Forja un ancla compatible o búscala en el mundo.','t-dim');
      } else {
        R.w('No tienes anclas en el inventario.','t-dim');
      }
      return;
    }

    // Verificar compatibilidad
    if(reqs.length&&!reqs.includes(anclaItem.blueprint)){
      R.w(`${anclaItem.nombre||anclaItem.blueprint} no es compatible con ${cre.nombre}.`,'t-pel');
      R.w(`Anclas válidas: ${reqs.join(', ')}`,'t-dim');
      return;
    }

    // Tirada de voluntad
    if(this.resisteCaptura(cre, true)){
      Player.rmItem(anclaItem.id); // el ancla se consume aunque falle
      R.w(`${cre.nombre} rechaza el vínculo. El ancla se rompe.`,'t-pel');
      R.w(`Voluntad: ${cre.voluntad}/100. Intenta de nuevo o debilítala más.`,'t-dim');
      battleLog(battle,`${cre.nombre} resiste el vínculo!`,'t-pel');
      return;
    }

    // ¡Captura exitosa!
    Player.rmItem(anclaItem.id);
    cre.estado='sometida';
    cre.hp=Math.max(1,Math.floor(creActor.maxHp*0.15));
    creActor.vivo=false; // terminar la batalla

    if(Player.addComp(cre)){
      battleLog(battle,`✦ ${cre.nombre} vinculado con ${anclaItem.nombre||anclaItem.blueprint}!`,'t-cri');
      R.sp();R.w(`✦ ${cre.nombre} ha sido vinculado.`,'t-cri',true);
      R.w(`Ancla usada: ${anclaItem.nombre||anclaItem.blueprint}`,'t-dim');
      R.w(`ATK:${cre.atk}  DEF:${cre.def}  HP:${cre.maxHp}  Voluntad:${cre.voluntad}  Inestabilidad:${cre.inestabilidad}`,'t-dim');
      R.w(`Tags: ${cre.tags.join(', ')}`,'t-dim');
      World.rmCreature(battle.nodeId,cre.id);
      XP.ganar('criaturas',60+cre.voluntad,'captura con ancla');
      Player.get().stats.capturas=(Player.get().stats.capturas||0)+1;
    } else {
      R.w(`No hay espacio para ${cre.nombre}. Libera un compañero primero.`,'t-dim');
    }
    save();
  },

  // ── Lista de anclas del inventario ────────────────────────────
  cmdAnclas(){
    R.sp();R.w('— ANCLAS DE CAPTURA —','t-cri');
    const anclas=Player.get().inventory.filter(i=>D.mat(i.blueprint)?.categoria==='ancla');
    if(!anclas.length){
      R.w('Sin anclas. Forja materiales de categoría "ancla" para capturar criaturas.','t-dim');
      R.w('Anclas disponibles: ancla_resonante · ancla_corrupta · ancla_antigua · ancla_inestable','t-dim');
      R.sp();return;
    }
    anclas.forEach(a=>{
      const def=D.mat(a.blueprint);
      R.w(`  ${a.blueprint}  — ${def?.desc||'—'}  tags: ${def?.tags?.join(', ')||'—'}`,'t-cri');
    });
    R.sp();
    // Mostrar criaturas del nodo con sus anclas requeridas
    const n=World.node(Player.pos());
    if(n?.creatures?.length){
      R.w('Criaturas aquí:','t-cri');
      n.creatures.forEach(c=>{
        const reqs=this.anclasRequeridas(c);
        const tiene=this.tieneAnclaCompatible(c);
        R.w(`  ${c.nombre}  [${c.arquetipo}]  HP:${c.hp}  Voluntad:${c.voluntad}  Anclas: ${reqs.join('/')||'ninguna'}${tiene.ok?' ✓':' ✗'}`,tiene.ok?'t-cra':'t-pel');
      });
    }
    R.sp();
  },
};

function cmdCapturar(target){
  const n=World.node(Player.pos());
  const cre=target?n?.creatures?.find(c=>c.nombre.toLowerCase().includes(target)):n?.creatures?.[0];
  if(!cre){R.w('No hay criatura para capturar.','t-dim');return;}

  cre.hp_current=cre.hp||cre.maxHp;
  const p=Player.get();

  // Verificar ancla antes de iniciar
  const {ok, ancla}=CreatureEngine.tieneAnclaCompatible(cre);
  const reqs=CreatureEngine.anclasRequeridas(cre);

  R.sp();R.sep('─');
  R.w(`CAPTURA — ${cre.nombre}  [${cre.arquetipo}]`,'t-cri',true);
  R.w(`HP:${cre.hp}  ATK:${cre.atk}  DEF:${cre.def||0}  Voluntad:${cre.voluntad}`,'t-dim');
  R.w(`Tags: ${cre.tags.join(', ')}`,'t-dim');
  if(reqs.length){
    R.w(`Anclas requeridas: ${reqs.join(' / ')}`,ok?'t-cra':'t-pel');
    if(!ok) R.w('⚠ No tienes ancla compatible. La captura será más difícil.','t-pel');
    else    R.w(`Ancla disponible: ${ancla.blueprint} ✓`,'t-cra');
  } else {

function cmdCriar(qa,qb){
  const a=Player.findComp(qa),b=Player.findComp(qb);
  if(!a||!b||a.id===b.id){R.w('Necesitas dos compañeros distintos.','t-dim');return;}
  if(a.afinidad<60||b.afinidad<60){R.w(`Ambos necesitan afinidad ≥ 60.  (${a.nombre}:${a.afinidad}  ${b.nombre}:${b.afinidad})`,'t-dim');return;}
  const fams=D.creFamilies;const compat=Object.values(fams).some(f=>f.includes(a.arquetipo)&&f.includes(b.arquetipo));
  if(!compat){R.w(`${a.nombre} [${a.arquetipo}] y ${b.nombre} [${b.arquetipo}] no son compatibles.`,'t-dim');return;}
  const rng=U.rng(Date.now()+Math.random());
  const tagsH=[...U.pickN(a.tags,Math.ceil(a.tags.length/2),rng),...U.pickN(b.tags,Math.ceil(b.tags.length/2),rng)];
  const tension=Tags.tension(tagsH);
  const cn=D.creNames;
  const nombre=(cn.prefijos?.length?U.pick(cn.prefijos,rng):'Eco')+'-'+(cn.sufijos?.length?U.pick(cn.sufijos,rng):'Bifurcado');
  const imp=Imprint.gen('breeding',tagsH,{nodeId:Player.pos(),cycle:Clock.cycle,pid:Player.get().id},tension);
  imp.parent_hash=a.imprint.hash+':'+b.imprint.hash;
  // Herencia mejorada: los hijos heredan los mejores stats + bonus generacional
  const genA=a.linaje?.generacion||0, genB=b.linaje?.generacion||0;
  const genHijo=Math.max(genA,genB)+1;
  const genBonus=1+Math.min(genHijo,10)*0.04;
  const cria={
    id:U.uid(),nombre,arquetipo:Math.random()>.5?a.arquetipo:b.arquetipo,
    tags:tagsH,imprint:imp,
    hp:   Math.round(Math.max(a.maxHp,b.maxHp)*genBonus),
    maxHp:Math.round(Math.max(a.maxHp,b.maxHp)*genBonus),
    atk:  Math.round(Math.max(a.atk,b.atk)*genBonus),
    def:  Math.round(Math.max(a.def||0,b.def||0)*genBonus),
    voluntad:  Math.round((a.voluntad+b.voluntad)/2)+U.rand(-5,5),
    afinidad:  50,
    inestabilidad: Math.max(0,Math.floor(tension*80)-genHijo*3), // cada gen reduce inestabilidad
    estado:'latente',memoria:{combates:0,ciclos:0},
    linaje:{parent_a:a.imprint.hash,parent_b:b.imprint.hash,generacion:genHijo},
    fase:0,modo:'latente',
    desc:`Gen.${genHijo}. Hijo de ${a.nombre} × ${b.nombre}.`
  };
  EventBus.emit('creature:breed_result',{cria,parentA:a,parentB:b,tension});
  const huevo={id:U.uid(),blueprint:'huevo_impronta',nombre:`Huevo de ${nombre}`,tipo:'reliquia',tags:tagsH,imprint:imp,estado:'latente',_cria:cria,desc:`Gen.${genHijo}. Tensión:${(tension*100).toFixed(0)}%. ATK:${cria.atk} DEF:${cria.def} HP:${cria.maxHp}`};
  Player.addItem(huevo);Player.get().stats.breeding++;
  XP.ganar('criaturas',40+genHijo*15,`breeding gen.${genHijo}`);
  R.sp();R.w(`BREEDING — ${a.nombre} × ${b.nombre}`,'t-cri',true);
  R.w(`${nombre}  Gen.${genHijo}  Tensión:${(tension*100).toFixed(0)}%`,'t-cri');
  R.w(`Stats heredados: HP:${cria.maxHp}  ATK:${cria.atk}  DEF:${cria.def}  (bonus generacional ×${genBonus.toFixed(2)})`,'t-dim');
  if(tension>.6)R.w('⚠ Alta inestabilidad — puede ser impredecible.','t-pel');
  else R.w(`Inestabilidad: ${cria.inestabilidad} (reducida por generación).`,'t-dim');
  R.w('"usar huevo" para incubar.','t-dim');R.sp();save();
}

function cmdRecoger(target){

  if(!found){R.w(`No hay "${target}".`,'t-dim');return;}
  // Buscar ítem táctico completo en el stash
  const itemTac=(n.loot._items||[]).find(i=>i.blueprint===found);
  if(itemTac){
    Player.addItem({...itemTac,id:U.uid()});
    World.rmLoot(Player.pos(),found);
    n.loot._items=(n.loot._items||[]).filter(i=>i.blueprint!==found);
    R.w(`Recoges: ${itemTac.nombre}  [${itemTac.tipo}]  ${itemTac.desc||''}`,'t-cra');
    R.upd();save();return;
  }
  // Ítem normal de material
  const mat=D.mat(found);
  const imp=Imprint.gen(found,[],{nodeId:Player.pos(),cycle:Clock.cycle,pid:Player.get().id});
  const isAncla=mat?.categoria==='ancla';
  Player.addItem({id:U.uid(),blueprint:found,nombre:found.replace(/_/g,' '),tipo:'material',
    categoria:mat?.categoria||undefined,
    tags:D.matTags(found),imprint:imp,estado:'nativo',desc:mat?.desc});
  World.rmLoot(Player.pos(),found);
  R.w(`Recoges: ${found.replace(/_/g,' ')}${isAncla?' [ancla de captura]':''}`,'t-cra');

  if(Player.get()._duplicar_loot){
    Player.get()._duplicar_loot=false;
    const copia={...Player.get().inventory[Player.get().inventory.length-1],id:U.uid()};
    Player.addItem(copia);

}

function _aplicarEfectoEquipado(item){
  const p=Player.get();
  if(!item.efecto_pasivo&&!item.es_mitico) return;
  const ef=item.efecto_pasivo;
  if(ef==='+1_slot_magia')    {/* ya manejado en Player.maxMag */}
  if(ef==='atk_bonus'&&item.atk) { /* ya en Player.getAtk vía equipado */ }
  if(ef==='stamina_max'&&item.valor) { p.maxStamina=Math.min(200,(p.maxStamina||100)+item.valor); R.w(`  Stamina máx +${item.valor}`,'t-dim'); }
  if(ef==='mana_max'&&item.valor)    { p.maxMana=Math.min(200,(p.maxMana||60)+item.valor); R.w(`  Maná máx +${item.valor}`,'t-dim'); }
  if(ef==='def_pasiva'&&item.def)    { /* Player.getDef() ya lee armadura.def */ }
  // Míticos de boss: efectos únicos
  if(item.es_mitico&&item.boss_id){
    const efectosBoss={
      leviatán_grieta:    {desc:'Inmunidad al estado VACÍO',  apply(p){p._inmune_vacio=true;}},
      antiguo_resonante:  {desc:'Reacciones resonantes ×1.3', apply(p){p._reac_resonante=1.3;}},
      devorador_ciclos:   {desc:'Stamina no baja del 10%',     apply(p){p._stamina_floor=0.10;}},
    };
    const ef2=efectosBoss[item.boss_id];
    if(ef2){ef2.apply(p);R.w(`  ${ef2.desc}`,'t-cor');}
  }
}

function cmdUsar(target){
  const item=Player.findItem(target);if(!item){R.w(`No tienes "${target}".`,'t-dim');return;}
  // Huevo
  if(item.blueprint==='huevo_impronta'&&item._cria){const c=item._cria;c.fase=1;c.estado='vinculada';if(!Player.addComp(c)){R.w('No hay espacio.','t-dim');return;}Player.rmItem(item.id);XP.ganar('criaturas',35,'criatura incubada');R.w(`${c.nombre} emerge.`,'t-cri',true);save();return;}
  // Ítem táctico del catálogo
  if(ItemSystem.CATALOGO[item.blueprint]){
    const curBattle=Net.getMyBattle();
    ItemSystem.aplicar(item, curBattle||null);
    R.upd();save();return;
  }
  // Legacy: HP/hambre
  const matDef=D.mat(item.blueprint);const hp=item.hp||matDef?.hp||0;const hunger=item.hunger||matDef?.hunger||0;
  if(hp){Player.heal(hp);R.w(`Curas ${hp}HP → ${Player.hp()}HP`,'t-cra');Player.rmItem(item.id);R.upd();save();}
  else if(hunger){Player.feed(hunger);R.w('Reduces el hambre.','t-cra');Player.rmItem(item.id);R.upd();save();}
  else {
    // Intentar efecto táctico inferido
    const curBattle=Net.getMyBattle();
    const ok=ItemSystem.aplicar(item,curBattle||null);
    if(!ok) R.w('No puedes usar eso directamente.','t-dim');
    else { R.upd();save(); }
  }
}

function cmdAtacar(target){
  const n=World.node(Player.pos());
  const npcsAqui=GS.npcEnNodo(Player.pos());
  const enemigosAqui=n?.enemies||[];
  const p=Player.get();

  // Si hay una batalla activa en mi nodo — unirse o actuar
  const battleEnNodo=Object.values(Net.battles).find(b=>b.nodeId===Player.pos()&&b.estado==='activo');
  if(battleEnNodo && !Net.getMyBattle()){
    R.w(`Hay una batalla en curso en este nodo.`,'t-pel');
    R.w(`"unirse_batalla" para entrar.`,'t-dim');
    return;
  }

  // Sin target — listar opciones
  if(!target){
    const hayJugadores=Object.values(Net.getPlayers()).filter(x=>x.nodeId===Player.pos());
    const hayAlgo=npcsAqui.length||enemigosAqui.length||hayJugadores.length;
    if(!hayAlgo){R.w('No hay nada que atacar aquí.','t-dim');return;}
    if(hayJugadores.length)hayJugadores.forEach(x=>R.w(`  atacar ${x.name.split(' ')[0].toLowerCase()}  — ${x.name} [jugador]`,'t-eco'));
    if(npcsAqui.length)npcsAqui.forEach(x=>R.w(`  atacar ${x.nombre.split(' ')[0].toLowerCase()}  — ${x.nombre} [${x.arq_vis}]`,'t-npc'));
    if(enemigosAqui.length)enemigosAqui.forEach(e=>R.w(`  atacar ${e.nombre.split(' ')[0].toLowerCase()}  — ${e.nombre} HP:${e.hp_current||e.hp}`,'t-pel'));
    return;
  }

  const q=target.toLowerCase();

  // ── Verificar si hay jugadores conectados en el mismo nodo (PvP) ──
  const jugadorTarget=Object.values(Net.getPlayers()).find(x=>
    x.nodeId===Player.pos() && x.name.toLowerCase().includes(q)
  );
  if(jugadorTarget){
    // Solicitar duelo PvP
    const msg={
      type:'BATTLE_REQUEST_PVP',
      fromId:p.id, fromName:p.name,
      toId:jugadorTarget.id, toName:jugadorTarget.name,
      nodeId:Player.pos(),
    };
    // Mostrar solicitud local
    R.sp();R.sep('═');
    R.w(`DESAFÍO PvP → ${jugadorTarget.name}`,'t-pel',true);
    R.w(`Solicitud de duelo enviada. Esperando respuesta.`,'t-dim');
    R.w(`${jugadorTarget.name} debe escribir "aceptar_pvp" o "rechazar_pvp".`,'t-dim');
    R.sep('═');R.sp();
    // Enviar al host/destino
    if(Net.isOnline()){
      if(Net.isHost()){
        // Reenviar al cliente objetivo
        const peerTarget=Net.getPlayers()[jugadorTarget.id]?.peerId;
        if(peerTarget){
          const clients=Net.battles; // hack — necesitamos acceso a clients
        }
      }
      Net.sendAction('pvp_request', [jugadorTarget.id, jugadorTarget.name]);
    }
    // Guardar solicitud pendiente
    window._pendingPvP={fromId:p.id, fromName:p.name, toId:jugadorTarget.id, toName:jugadorTarget.name, nodeId:Player.pos()};
    return;
  }

  // ── NPC en este nodo ──────────────────────────────────────────
  const npc=npcsAqui.find(x=>x.nombre.toLowerCase().includes(q));
  if(npc){
    const st=NPCEngine.combatStats(npc);
    npc.hp_combat=npc.hp_combat||st.hp;
    const jugadoresAqui=Object.values(Net.getPlayers()).filter(x=>x.nodeId===Player.pos());
    // Incluir compañeros del jugador según su modo
    const compCombatants=p.compañeros
      .map(c=>CreatureEngine.buildCombatant(c,Player.pos()))
      .filter(Boolean);
    const combatants=[
      {tipo:'player', id:p.id, name:p.name, hp:p.hp, maxHp:p.maxHp, atk:Player.getAtk(), def:Player.getDef(), nodeId:Player.pos(), playerId:p.id, vivo:true},
      {tipo:'npc', id:npc.id, name:npc.nombre, hp:st.hp, maxHp:st.hp, atk:st.atk, def:st.def||1, nodeId:Player.pos(), vivo:true},
      ...compCombatants,
      ...jugadoresAqui.map(j=>({tipo:'player', id:j.id, name:j.name, hp:40, maxHp:40, atk:5, def:1, nodeId:j.nodeId, playerId:j.id, peerId:j.peerId, vivo:true})),
    ];
    if(compCombatants.length) R.w(`${compCombatants.map(c=>c.name).join(', ')} entra${compCombatants.length>1?'n':''} en la batalla.`,'t-cri');
    if(jugadoresAqui.length>0) netMsg(`${jugadoresAqui.map(j=>j.name).join(', ')} también entra${jugadoresAqui.length>1?'n':''} en la batalla.`,'t-eco');
    Net.startBattle(Player.pos(), combatants);
    return;
  }

  // ── Enemigo en este nodo ──────────────────────────────────────
  const e=enemigosAqui.find(e=>e.nombre.toLowerCase().includes(q));
  if(e){
    e.hp_current=e.hp_current||e.hp;
    const jugadoresAqui=Object.values(Net.getPlayers()).filter(x=>x.nodeId===Player.pos());
    const compCombatants=p.compañeros
      .map(c=>CreatureEngine.buildCombatant(c,Player.pos()))
      .filter(Boolean);
    const combatants=[
      {tipo:'player', id:p.id, name:p.name, hp:p.hp, maxHp:p.maxHp, atk:Player.getAtk(), def:Player.getDef(), nodeId:Player.pos(), playerId:p.id, vivo:true},
      {tipo:'enemy',  id:e.id, name:e.nombre, hp:e.hp_current, maxHp:e.hp||e.hp_current, atk:e.atk, def:e.def||0, nodeId:Player.pos(), vivo:true},
      ...compCombatants,
      ...jugadoresAqui.map(j=>({tipo:'player', id:j.id, name:j.name, hp:40, maxHp:40, atk:5, def:1, nodeId:j.nodeId, playerId:j.id, peerId:j.peerId, vivo:true})),
    ];
    if(compCombatants.length) R.w(`${compCombatants.map(c=>c.name).join(', ')} entra${compCombatants.length>1?'n':''} en la batalla.`,'t-cri');
    if(jugadoresAqui.length>0) netMsg(`${jugadoresAqui.map(j=>j.name).join(', ')} también entra${jugadoresAqui.length>1?'n':''} en la batalla.`,'t-eco');
    Net.startBattle(Player.pos(), combatants);
    return;
  }

  // No encontrado
  const enMundo=Object.values(Net.getPlayers()).find(x=>x.name.toLowerCase().includes(q)&&x.nodeId!==Player.pos());
  if(enMundo){R.w(`${enMundo.name} no está en este nodo.`,'t-dim');return;}
  npcNoAqui(target);
}

function cmdEstado(){
  const p=Player.get(),c=Clock.get(),eq=p.equipped;
  R.sp();R.w(`— ${p.name} —`,'t-acc');
  R.w(`HP: ${p.hp}/${p.maxHp}  Hambre: ${p.hunger}/${p.maxHunger}`,'t-out');
  R.w(`ATK: ${Player.getAtk()}  DEF: ${Player.getDef()}`,'t-out');
  R.w(`Ciclo: ${c.cycle}  Fase: ${c.name}`,'t-mem');
  if(eq.arma)R.w(`Arma: ${eq.arma.nombre}`,'t-pel');
  if(eq.armadura)R.w(`Armadura: ${eq.armadura.nombre}`,'t-sis');
  if(p.habilidades.length)R.w(`Habilidades: ${p.habilidades.map(h=>h.nombre).join(', ')}`,'t-hab');
  if(p.magias.length)R.w(`Magias: ${p.magias.map(m=>m.nombre+'('+m.cargas+')').join(', ')}`,'t-mag');
  if(p.compañeros.length)R.w(`Compañeros: ${p.compañeros.map(c=>c.nombre).join(', ')}`,'t-cri');
  R.w(`Kills:${p.stats.kills}  Crafted:${p.stats.crafted}  Pasos:${p.stats.steps}`,'t-dim');
  R.w(`Misiones:${GS.activas().length}  Twists:${GS.twists.length}  Run:${RunMem.count()+1}`,'t-mis');
  // XP resumen rápido
  XP.init();
  const pts=XP.getPuntos();
  const ramasSorted=Object.entries(XP.RAMAS).map(([id,def])=>({id,def,lv:XP.getRama(id).nivel})).sort((a,b)=>b.lv-a.lv);
  const top=ramasSorted[0];
  if(top)R.w(`${top.def.icon} ${top.def.label} Lv${top.lv}  ${ramasSorted.slice(1).map(r=>r.def.icon+'Lv'+r.lv).join(' ')}${pts>0?'  ⬆ '+pts+' pts disponibles':''}`,pts>0?'t-mem':'t-dim');
  // Stats de plugins
  PluginLoader.list().forEach(plug=>{if(typeof plug?.onEstado==='function')plug.onEstado(p,CTX);});
  R.sp();
}

function cmdLegados(){
  R.sp();R.w('— ECOS DE RUNS ANTERIORES —','t-eco');
  const runs=RunMem.runs(),ecos=RunMem.ecos();
  if(!runs.length){R.w('Primera run.','t-dim');return;}
  runs.slice().reverse().forEach((r,i)=>{R.w(`  RUN ${runs.length-i}  ${r.player_name}  ${r.ciclos}c  [${r.muerte.causa}]${r.plugins?.length?' plug:'+r.plugins.join('+'):''}`, 't-eco');if(r.mis_ok?.length)R.w(`    ✓ ${r.mis_ok.join(', ')}`,'t-cra');r.legados?.forEach(l=>R.w(`    ∴ ${l.desc}`,'t-eco'));});
  if(ecos.length){R.sp();R.w('ECOS ACTIVOS:','t-eco');ecos.forEach(e=>R.w(`  ${e.nombre} — c${e.muerte?.ciclo} (${e.muerte?.causa})`,'t-eco'));}
  R.sp();
}

function cmdEpitafio(){const runs=RunMem.runs();if(!runs.length){R.w('Aún no has muerto.','t-dim');return;}const r=runs[runs.length-1];R.sp();R.sep('═');R.w(`EPITAFIO — ${r.player_name}`,'t-cor',true);R.w(`${r.ciclos} ciclos  ·  ${r.muerte.causa}`,'t-dim');if(r.mis_ok?.length)R.w(`Completó: ${r.mis_ok.join(', ')}`,'t-cra');r.legados?.forEach(l=>R.w(`∴ ${l.desc}`,'t-eco'));R.sep('═');R.sp();}

function cmdPlugins(){
  R.sp();R.w('— PLUGINS —','t-acc');
  const list=PluginLoader.list();
  if(!list.length){R.w('Sin plugins activos.','t-dim');}
  else list.forEach(p=>{R.w(`  ✓ ${p.id}  v${p.version||'?'}  — ${p.descripcion||''}`,p.id===list[0]?.id?'t-mag':'t-mag');
    const hooks=Object.keys(p.hooks||{});if(hooks.length)R.w(`    hooks: ${hooks.join(', ')}`,'t-dim');
    const cmds=Object.keys(p.comandos||{});if(cmds.length)R.w(`    comandos: ${cmds.join(', ')}`,'t-dim');
  });
  R.sp();
  R.w('Todos los sockets disponibles:','t-out');
  const sockets=['world:before_gen','world:after_gen','world:node_enter','world:node_exit','world:node_describe','world:tick','forge:before','forge:resolve_type','forge:after','forge:collapse','forge:imprint_gen','combat:start','combat:before_attack','combat:after_attack','combat:player_hit','combat:enemy_defeat','combat:npc_surrender','combat:npc_intimidate','combat:loot','narrative:npc_gen','narrative:npc_speak','narrative:npc_interact','narrative:npc_death','narrative:npc_twist','narrative:mission_gen','narrative:mission_complete','narrative:mission_fail','creature:gen','creature:capture_try','creature:breed_result','player:create','player:stat_change','player:item_add','player:item_remove','player:equip','player:die','memory:run_end','memory:run_start','command:before','command:unknown','command:after','render:status_bar','render:node_extra','render:inventory_item','module:loaded','plugin:loaded','plugin:unloaded'];
  const active=EventBus.events();
  sockets.forEach(s=>{const used=active.includes(s);R.w(`  ${used?'●':'○'} ${s}`+'  '+(used?`[${(EventBus._listeners[s]||[]).map(l=>l.pluginId).join(',')}]`:''),used?'t-cra':'t-dim');});
  R.sp();
}

function cmdModulos(){
  R.sp();R.w('— MÓDULOS CARGADOS —','t-acc');
  ModuleLoader.list().forEach(id=>R.w(`  ✓ ${id}`,'t-cra'));
  R.sp();R.w('cargar_modulo <json>  — cargar módulo de datos en runtime','t-dim');
  R.w('cargar_plugin <json>  — cargar plugin de lógica en runtime','t-dim');
  R.sp();
}

function cmdEventos(){
  R.sp();R.w(`— HISTORIAL DE EVENTOS (últimos 15) —`,'t-acc');
  EventBus.history(15).forEach(e=>R.w(`  ${e.event}`,'t-dim'));R.sp();
}

function cmdCargarModulo(jsonStr){
  if(!jsonStr.trim()){R.w('Uso: cargar_modulo <json>','t-dim');return;}
  try{const meta=ModuleLoader.fromString(jsonStr);R.w(`Módulo "${meta||'?'}" cargado. "nuevo" para aplicar cambios completos.`,'t-cra');}
  catch(e){R.w(`Error: ${e.message}`,'t-pel');}
}

function cmdCargarPlugin(jsonStr){
  if(!jsonStr.trim()){R.w('Uso: cargar_plugin <json>','t-dim');return;}
  try{const def=JSON.parse(jsonStr);const ok=PluginLoader.registerFromJSON(def);R.w(ok?`Plugin "${def.id}" cargado. Comandos: ${Object.keys(def.comandos||{}).join(', ')||'ninguno'}. Hooks: ${Object.keys(def.hooks||{}).join(', ')||'ninguno'}.`:`Plugin "${def.id}" ya existe.`,ok?'t-cra':'t-pel');}
  catch(e){R.w(`Error: ${e.message}`,'t-pel');}
}

  const key = (AYUDA_ALIAS[tema.toLowerCase()] || tema.toLowerCase()).replace(/[^a-záéíóúüñ_]/g,'');

  }
  R.sep('─',44);R.sp();
}

// findNPC — solo en el nodo actual (para interactuar)
// Helpers globales para acceder a funciones internas de Net desde el dispatch
function actorActualGlobal(battle){
  if(!battle) return null;
  return Net.getBattleActor?.(battle) || (()=>{
    const total=battle.cola.length;
    if(!total) return null;
    let idx=battle.turno%total, loops=0;
    while(loops<total){
      const c=battle.cola[idx];
      if(c&&c.vivo&&!c.huyó) return c;
      idx=(idx+1)%total; loops++;
    }
    return null;
  })();
}
function renderBattleGlobal(battle){ if(battle) Net.renderBattle?.(battle); }

// Helper para dirección visible hacia boss (2 saltos)
function dirHaciaBossVisible(fromId, bossId){
  const exits=World.exits(fromId);
  for(const [dir,nextId] of Object.entries(exits)){
    const exits2=World.exits(nextId);
    if(Object.values(exits2).includes(bossId)) return dir;
  }
  return Object.keys(exits)[0]||'norte';
}

function findNPC(q){
  if(!q)return null;
  const qn=q.toLowerCase().replace(/_/g,' ').trim();
  return GS.npcEnNodo(Player.pos()).find(n=>n.id===q||n.nombre.toLowerCase().includes(qn))||null;
}
// findNPCMundo — busca en todo el mundo (para info, no para interacción)
function findNPCMundo(q){
  if(!q)return null;
  return GS.aliveNPCs().find(n=>n.id===q||n.nombre.toLowerCase().includes(q.toLowerCase()))||null;
}
// npcNoAqui — mensaje estándar cuando el NPC existe pero no está aquí
function npcNoAqui(q){
  const enMundo=findNPCMundo(q);
  if(enMundo){
    const nodo=World.node(enMundo.nodeId);
    R.w(`${enMundo.nombre} no está aquí.${nodo?' Está en '+nodo.name+' ['+nodo.tipo+'].':''}`,'t-dim');
  } else {
    R.w(`No hay nadie llamado "${q}" en este nodo.`,'t-dim');
    const aqui=GS.npcEnNodo(Player.pos());
    if(aqui.length)R.w(`Aquí: ${aqui.map(n=>n.nombre).join(', ')}`,'t-dim');
  }
}
function findMision(q){
  if(!q)return null;
  const ql=q.toLowerCase().trim();
  // Buscar por id exacto, id case-insensitive, id parcial, o título parcial
  return GS.mision(q)
    || GS.allMisiones().find(m=>m.id?.toLowerCase()===ql)
    || GS.allMisiones().find(m=>m.id?.toLowerCase().includes(ql))
    || GS.activas().find(m=>m.titulo?.toLowerCase().includes(ql))
    || null;
}

async function init(forceNew=false){
  // 1. Cargar módulos JSON embebidos en el DOM
  document.querySelectorAll('script[type="application/json"][id^="module-"]').forEach(el=>{
    try{ModuleLoader.fromElement(el.id);}catch(e){console.warn('Módulo fallido:',el.id,e);}
  });

  // 2. Cargar plugins JSON+plugin embebidos en el DOM
  document.querySelectorAll('script[type="application/json+plugin"][id^="plugin-"]').forEach(el=>{
    try{const def=JSON.parse(el.textContent);PluginLoader.registerFromJSON(def);}catch(e){console.warn('Plugin fallido:',el.id,e);}
  });

  // 3. Actualizar header
  const mods=ModuleLoader.list().join('+');
  const plugs=PluginLoader.order.join('+');
  document.getElementById('hmod').textContent=`v1.4  mod:${mods}  plug:${plugs||'ninguno'}`;

  const loaded=!forceNew&&loadSave();
  R.sp();await R.tw('E C O S I S T E M A','t-acc',20);
  R.w(`v1.4 — módulos: ${mods}  ·  plugins: ${plugs||'ninguno'}`,'t-dim');
  R.w(`build: WorldAI · FactionSystem · BossSystem · TacticsEngine · ArcEngine · ItemSystem · XP`,'t-eco');
  R.sep('─');

  const ecos=RunMem.ecos();const runN=RunMem.count();

  if(loaded){
    R.w('Partida cargada.','t-sis');
    R.w(`Mundo: ${World.seed.slice(0,12)}  Ciclo: ${Clock.cycle}  NPCs: ${GS.aliveNPCs().length}`,'t-dim');
    if(ecos.length)R.w(`Ecos: ${ecos.map(e=>e.nombre).join(', ')}`,'t-eco');
    R.sp();cmdMirar();
  } else {
    const wseed=U.uid()+U.uid();
    const{startId,npcs}=World.gen(wseed,ecos);
    Player.create();Player.setPos(startId);World.visit(startId);XP.init();
    npcs.forEach(n=>GS.addNPC(n));
    D.itemsInicio.forEach(bp=>{const mat=D.mat(bp);Player.addItem({id:U.uid(),blueprint:bp,nombre:bp,tipo:'material',tags:D.matTags(bp),estado:'nativo',desc:mat?.desc});});
    // SOCKET: memory:run_start
    EventBus.emit('memory:run_start',{player:Player.get(),world:{seed:wseed,npcs},runNumber:runN+1});
    // Notificar plugins de nueva partida
    PluginLoader.list().forEach(p=>{if(typeof p?.onNewGame==='function')p.onNewGame(CTX);});
    R.sp();
    if(runN>0){R.w(`Run ${runN+1}.`,'t-eco',true);if(ecos.length){R.sp();R.w('Los ecos persisten:','t-eco');ecos.forEach(e=>R.w(`  ${e.nombre} — ciclo ${e.muerte?.ciclo} (${e.muerte?.causa})`, 't-eco'));}}
    else R.w('Primera run. El mundo no recuerda nada todavía.','t-dim');
    R.sp();R.w(`Hay ${npcs.length} personas en este mundo.`,'t-npc');
    if(PluginLoader.order.length){R.sp();R.w(`Plugins activos: ${PluginLoader.order.join(', ')}`,'t-mag');}
    R.sp();
    R.w('INICIO RÁPIDO:','t-acc');
    R.w('  mirar · ir n/s/e/o · hablar [npc] · forjar [mat] [mat]','t-dim');
    R.w('  plugins   — ver plugins activos y sockets disponibles','t-dim');
    R.w('  cargar_plugin <json>  — añadir lógica nueva en runtime','t-dim');
    R.w('  ayuda     — todos los comandos','t-dim');
    R.sp();cmdMirar();save();
  }
  R.upd();
}
