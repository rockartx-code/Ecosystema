<script id="plugin-resonance" type="application/json+plugin">
{
  "id": "resonance_field",
  "nombre": "Campo de Resonancia",
  "version": "1.0.0",
  "descripcion": "Añade un campo de resonancia que se acumula en combate y produce efectos en umbrales.",
  "modulo": {
    "materiales": {
      "núcleo_resonante": { "tags":["resonante","resonante","mineral"], "desc":"Núcleo que amplifica campos de resonancia.", "categoria":"especial" }
    }
  },
  "statusBar": [
    { "id":"resonance", "label":"RES", "getValue":"player.resonance||0", "color":"t-mag" }
  ],
  "hooks": {
    "player:create": { "fn":"onPlayerCreate" },
    "combat:after_attack": { "fn":"onAttack" },
    "world:tick": { "fn":"onTick" },
    "render:node_extra": { "fn":"onNodeExtra" }
  },
  "comandos": {
    "resonancia": { "fn":"cmdResonancia" },
    "liberar_resonancia": { "fn":"cmdLiberarResonancia" }
  },
  "handlers": {
    "onPlayerCreate": "payload.player.resonance=0;payload.player.maxResonance=100;return payload;",
    "onAttack": "if(payload.isPlayer){ctx.Player.get().resonance=ctx.U.clamp((ctx.Player.get().resonance||0)+Math.floor(payload.damage/3),0,100);}return payload;",
    "onTick": "const p=ctx.Player.get();if(p.resonance>0)p.resonance=Math.max(0,p.resonance-1);return payload;",
    "onNodeExtra": "const res=ctx.Player.get().resonance||0;if(res>50)payload.lines.push({text:`Campo resonante activo: ${res}/100`,color:'t-mag'});return payload;",
    "cmdResonancia": "const p=ctx.Player.get();ctx.R.w(`Resonancia acumulada: ${p.resonance||0}/100`,'t-mag');if((p.resonance||0)>=80)ctx.R.w('Listo para liberar. Usa \"liberar_resonancia\"','t-mag');",
    "cmdLiberarResonancia": "const p=ctx.Player.get();if((p.resonance||0)<50){ctx.R.w('Resonancia insuficiente (mín. 50).','t-dim');return;}const n=ctx.World.node(ctx.Player.pos());if(n?.enemies?.length){const dmg=Math.floor(p.resonance*0.8);n.enemies.forEach(e=>{e.hp_current-=dmg;ctx.R.w(`Descarga resonante → ${e.nombre} -${dmg}HP`,'t-mag');if(e.hp_current<=0){ctx.World.rmEnemy(ctx.Player.pos(),e.id);ctx.R.w(`${e.nombre} colapsa.`,'t-cra');}});}else ctx.R.w('Sin objetivos en el nodo.','t-dim');p.resonance=0;ctx.R.upd();"
  }
}
</script>

<script id="plugin-factions" type="application/json+plugin">
{
  "id": "factions",
  "nombre": "Sistema de Facciones",
  "version": "1.0.0",
  "descripcion": "Añade facciones al mundo. NPCs pertenecen a facciones. La reputación afecta interacciones.",
  "modulo": {
    "facciones": {
      "orden_grieta":   { "nombre":"Orden de la Grieta",  "color":"t-sis", "descripcion":"Custodian las fisuras del mundo.", "rep_inicial":0 },
      "culto_eco":      { "nombre":"Culto del Eco",       "color":"t-mag", "descripcion":"Veneran los ecos resonantes.",    "rep_inicial":0 },
      "errantes_libres":{ "nombre":"Errantes Libres",     "color":"t-mem", "descripcion":"Sin lealtades. Sin ataduras.",   "rep_inicial":10 }
    }
  },
  "statusBar": [
    { "id":"faction_rep", "label":"FAC", "getValue":"plugin_factions_topRep(player)", "color":"t-sis" }
  ],
  "hooks": {
    "narrative:npc_gen":    { "fn":"onNPCGen" },
    "narrative:npc_speak":  { "fn":"onNPCSpeak" },
    "player:create":        { "fn":"onPlayerCreate" }
  },
  "comandos": {
    "facciones": { "fn":"cmdFacciones" },
    "reputacion": { "fn":"cmdReputacion" }
  },
  "handlers": {
    "onPlayerCreate": "const facs=ctx.D.get?ctx.D.get('facciones'):ctx.ModuleLoader.get('facciones')||{};payload.player.reputacion={};Object.keys(facs).forEach(id=>{payload.player.reputacion[id]=facs[id].rep_inicial||0;});return payload;",
    "onNPCGen": "const facs=Object.keys(ctx.D.factions||{orden_grieta:1,culto_eco:1,errantes_libres:1});payload.npc.faccion=ctx.U.pick(facs,ctx.U.rng(payload.npc.id+1));return payload;",
    "onNPCSpeak": "const rep=ctx.Player.get().reputacion?.[payload.npc?.faccion]||0;if(rep<-30)payload.text='[hostil] '+payload.text;else if(rep>50)payload.text='[aliado] '+payload.text;return payload;",
    "cmdFacciones": "const facs=ctx.ModuleLoader.get('facciones')||{};ctx.R.sp();ctx.R.w('— FACCIONES —','t-acc');Object.entries(facs).forEach(([id,f])=>{const rep=ctx.Player.get().reputacion?.[id]||0;ctx.R.w(`  ${f.nombre}  REP:${rep}  ${f.descripcion}`,f.color||'t-out');});ctx.R.sp();",
    "cmdReputacion": "const facs=ctx.ModuleLoader.get('facciones')||{};ctx.R.sp();ctx.R.w('— REPUTACIÓN —','t-acc');const rep=ctx.Player.get().reputacion||{};Object.entries(rep).forEach(([id,v])=>{const f=facs[id];const col=v>50?'t-cra':v<-30?'t-pel':'t-out';ctx.R.w(`  ${f?.nombre||id}  ${v}`,col);});ctx.R.sp();"
  }
}
</script>

<script type="module">
'use strict';

// ════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════
const U={
  hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=(h*16777619)>>>0;}return h;},
  rng(seed){let s=this.hash(String(seed));return()=>{s^=s<<13;s^=s>>17;s^=s<<5;s=s>>>0;return s/0xFFFFFFFF;};},
  pick(a,r){return a[Math.floor(r()*a.length)];},
  pickN(a,n,r){const c=[...a],res=[];for(let i=0;i<n&&c.length;i++){const x=Math.floor(r()*c.length);res.push(c.splice(x,1)[0]);}return res;},
  uid(){return Math.random().toString(36).slice(2,7).toUpperCase();},
  hex(s){return this.hash(s).toString(16).slice(0,6).toUpperCase();},
  clamp(v,a,b){return Math.max(a,Math.min(b,v));},
  rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;},
  chance(p){return Math.random()<p;},
  cap(s){return s.charAt(0).toUpperCase()+s.slice(1);},
  tmpl(str,vars){return (str||'').replace(/\{(\w+)\}/g,(_,k)=>vars[k]||`{${k}}`);},
  deepMerge(base,ext){
    const out={...base};
    for(const k of Object.keys(ext||{})){
      if(Array.isArray(ext[k])&&Array.isArray(base[k]))out[k]=[...base[k],...ext[k]];
      else if(ext[k]&&typeof ext[k]==='object'&&!Array.isArray(ext[k])&&base[k]&&typeof base[k]==='object')out[k]=U.deepMerge(base[k],ext[k]);
      else out[k]=ext[k];
    }
    return out;
  }
};

// ════════════════════════════════════════════════════════════════
// EVENT BUS — corazón del sistema de plugins
// ════════════════════════════════════════════════════════════════
const EventBus={
  _listeners:{},   // evento → [{handler,pluginId,priority,once}]
  _history:[],     // log de eventos emitidos

  on(event,handler,pluginId='core',opts={}){
    if(!this._listeners[event])this._listeners[event]=[];
    this._listeners[event].push({handler,pluginId,priority:(opts.priority!=null?opts.priority:50),once:(opts.once!=null?opts.once:false)});
    this._listeners[event].sort((a,b)=>a.priority-b.priority);
  },
  once(event,handler,pluginId,opts={}){this.on(event,handler,pluginId,{...opts,once:true});},

  off(pluginId){
    for(const ev of Object.keys(this._listeners)){
      this._listeners[ev]=this._listeners[ev].filter(l=>l.pluginId!==pluginId);
    }
  },

  // Emit: cada listener puede mutar el payload. Retorna payload final.
  emit(event,payload={}){
    this._history.push({event,ts:Date.now()});
    if(this._history.length>200)this._history.shift();
    const listeners=[...(this._listeners[event]||[])];
    let current=payload;
    const toRemove=[];
    for(const l of listeners){
      try{
        const result=l.handler(current,CTX);
        if(result!==undefined)current=result;
        if(l.once)toRemove.push(l);
        // Si el payload tiene cancelled=true, detener cadena
        if(current?.cancelled)break;
      }catch(e){console.warn(`[EventBus] Error en ${l.pluginId} → ${event}:`,e);}
    }
    if(toRemove.length&&this._listeners[event])
      this._listeners[event]=this._listeners[event].filter(l=>!toRemove.includes(l));
    return current;
  },

  // Emit con posibilidad de cancelación
  emitCancellable(event,payload={}){
    const result=this.emit(event,{...payload,cancelled:false});
    return{cancelled:(result&&result.cancelled!=null?result.cancelled:false),payload:result};
  },

  // Lista de eventos registrados
  events(){return Object.keys(this._listeners);},
  history(n=20){return this._history.slice(-n);},
};

// ════════════════════════════════════════════════════════════════
// MODULE LOADER
// ════════════════════════════════════════════════════════════════
const ModuleLoader={
  loaded:[],data:{},
  get(path){return path.split('.').reduce((o,k)=>o?.[k],this.data);},
  apply(json){
    this.data=U.deepMerge(this.data,json);
    if(!this.loaded.includes(json.meta?.id||'?'))this.loaded.push(json.meta?.id||'?');
    EventBus.emit('module:loaded',{meta:json.meta,data:json});
  },
  fromElement(id){const el=document.getElementById(id);if(!el)return null;this.apply(JSON.parse(el.textContent));return this.loaded[this.loaded.length-1];},
  fromString(str){this.apply(JSON.parse(str));return this.loaded[this.loaded.length-1];},
  list(){return this.loaded;}
};

// ════════════════════════════════════════════════════════════════
// PLUGIN LOADER — carga, gestiona y persiste plugins
// ════════════════════════════════════════════════════════════════
const PluginLoader={
  plugins:{},  // id → {def, store}
  order:[],

  // Registrar plugin desde objeto JS
  register(def){
    if(this.plugins[def.id]){console.warn(`Plugin "${def.id}" ya registrado.`);return false;}
    const store={};
    this.plugins[def.id]={def,store};
    this.order.push(def.id);

    // Fusionar módulo de datos si existe
    if(def.modulo)ModuleLoader.apply({meta:{id:`plugin:${def.id}`},...def.modulo});

    // Registrar hooks
    for(const[event,hookDef]of Object.entries(def.hooks||{})){
      const priority=(hookDef.priority!=null?hookDef.priority:50);
      const handler=this._buildHandler(def,hookDef);
      if(handler)EventBus.on(event,handler,def.id,{priority});
    }

    // Registrar comandos
    for(const[verb,cmdDef]of Object.entries(def.comandos||{})){
      CommandRegistry.register(verb,this._buildCmdHandler(def,cmdDef),def.id);
    }

    // Status bar elements
    if(def.statusBar?.length)this._mountStatusBar(def);

    // Llamar onLoad
    if(typeof def.onLoad==='function')def.onLoad(CTX);

    EventBus.emit('plugin:loaded',{id:def.id,nombre:def.nombre});
    return true;
  },

  // Cargar plugin desde JSON declarativo (sin código inline por seguridad mejorada)
  registerFromJSON(json){
    // Los handlers en JSON declarativo son strings de código que se evalúan
    // en un contexto controlado. Para producción usarías un evaluador seguro.
    const handlers=json.handlers||{};
    const compiled={
      id:json.id,nombre:json.nombre,version:json.version,
      descripcion:json.descripcion,
      modulo:json.modulo,
      statusBar:json.statusBar,
      hooks:{},comandos:{},
    };

    // Compilar hooks
    for(const[event,hookDef]of Object.entries(json.hooks||{})){
      const fnStr=handlers[hookDef.fn];
      if(!fnStr)continue;
      try{
        // Evalúa el handler string como función — en producción usar sandbox
        compiled.hooks[event]={
          fn:hookDef.fn,
          priority:hookDef.priority,
          _compiled:new Function('payload','ctx',fnStr),
        };
      }catch(e){console.warn(`Plugin ${json.id}: error compilando hook ${event}:`,e);}
    }

    // Compilar comandos
    for(const[verb,cmdDef]of Object.entries(json.comandos||{})){
      const fnStr=handlers[cmdDef.fn];
      if(!fnStr)continue;
      try{
        compiled.comandos[verb]={
          fn:cmdDef.fn,
          _compiled:new Function('args','ctx',fnStr),
        };
      }catch(e){console.warn(`Plugin ${json.id}: error compilando comando ${verb}:`,e);}
    }

    return this.register(compiled);
  },

  unregister(pluginId){
    const p=this.plugins[pluginId];if(!p)return;
    EventBus.off(pluginId);
    CommandRegistry.unregister(pluginId);
    this._unmountStatusBar(pluginId);
    if(typeof p.def.onUnload==='function')p.def.onUnload(CTX);
    delete this.plugins[pluginId];
    this.order=this.order.filter(id=>id!==pluginId);
    EventBus.emit('plugin:unloaded',{id:pluginId});
  },

  get(id){return this.plugins[id]||null;},
  list(){return this.order.map(id=>this.plugins[id]?.def);},
  getStore(pluginId){return this.plugins[pluginId]?.store||{};},

  // Serializar estado de todos los plugins
  ser(){
    const out={};
    for(const[id,p]of Object.entries(this.plugins)){
      if(typeof p.def.onSave==='function')out[id]=p.def.onSave(CTX);
      else out[id]=p.store;
    }
    return out;
  },
  load(data){
    for(const[id,d]of Object.entries(data||{})){
      const p=this.plugins[id];
      if(!p)continue;
      if(typeof p.def.onLoadSave==='function')p.def.onLoadSave(d,CTX);
      else Object.assign(p.store,d);
    }
  },

  _buildHandler(def,hookDef){
    // Handler desde objeto JS (función directa)
    if(hookDef._compiled)return(payload,ctx)=>hookDef._compiled(payload,ctx);
    if(typeof hookDef.fn==='function')return hookDef.fn;
    if(typeof hookDef==='function')return hookDef;
    return null;
  },
  _buildCmdHandler(def,cmdDef){
    if(cmdDef._compiled)return(args,ctx)=>cmdDef._compiled(args,ctx);
    if(typeof cmdDef.fn==='function')return cmdDef.fn;
    if(typeof cmdDef==='function')return cmdDef;
    return null;
  },

  _mountStatusBar(def){
    const container=document.getElementById('plugin-stats');
    if(!container)return;
    for(const sb of(def.statusBar||[])){
      const el=document.createElement('div');
      el.className='st';el.id=`psb-${def.id}-${sb.id}`;
      el.innerHTML=`${sb.label} <span class="${sb.color||''}">—</span>`;
      container.appendChild(el);
    }
  },
  _unmountStatusBar(pluginId){
    const def=this.plugins[pluginId]?.def;
    for(const sb of(def?.statusBar||[])){
      document.getElementById(`psb-${pluginId}-${sb.id}`)?.remove();
    }
  },
  updateStatusBar(){
    const player=Player.get();
    for(const[pid,p]of Object.entries(this.plugins)){
      for(const sb of(p.def.statusBar||[])){
        const el=document.getElementById(`psb-${pid}-${sb.id}`);
        if(!el)continue;
        let val='—';
        try{
          if(typeof sb.getValue==='function')val=sb.getValue(player,CTX);
          else if(typeof sb.getValue==='string'){
            // Evaluar expresión simple
            val=new Function('player','ctx','plugin_factions_topRep',`return ${sb.getValue}`)(
              player,CTX,
              (p)=>{const rep=p.reputacion||{};const vals=Object.values(rep);return vals.length?Math.max(...vals):0;}
            );
          }
        }catch{}
        const span=el.querySelector('span');
        if(span){span.textContent=val;span.className=sb.color||'';}
      }
    }
  }
};

// ════════════════════════════════════════════════════════════════
// COMMAND REGISTRY — despacha comandos a motor o plugins
// ════════════════════════════════════════════════════════════════
const CommandRegistry={
  commands:{},  // verb → {handler, pluginId}

  register(verb,handler,pluginId='core'){
    this.commands[verb]={handler,pluginId};
  },
  unregister(pluginId){
    for(const v of Object.keys(this.commands)){
      if(this.commands[v].pluginId===pluginId)delete this.commands[v];
    }
  },
  has(verb){return!!this.commands[verb];},
  async run(verb,args){
    const cmd=this.commands[verb];if(!cmd)return false;
    await cmd.handler(args,CTX);return true;
  }
};

// ════════════════════════════════════════════════════════════════
// DATA ACCESSOR — interfaz tipada al módulo activo

  get mats(){return ModuleLoader.get('materiales')||{};},
  get tagAff(){return ModuleLoader.get('tag_afinidades')||{};},
  get tagOpp(){return ModuleLoader.get('tag_opuestos')||[];},

  get habPool(){return ModuleLoader.get('habilidades_pool')||[];},
  get magPool(){return ModuleLoader.get('magias_pool')||[];},
  get effects(){return ModuleLoader.get('efectos')||{};},
  get creatures(){return ModuleLoader.get('criaturas')||{};},
  get creFamilies(){return ModuleLoader.get('criatura_familias')||{};},

  mat(id){return this.mats[id]||null;},

// ════════════════════════════════════════════════════════════════
// CLOCK
// ════════════════════════════════════════════════════════════════
const Clock={
  cycle:1,phase:0,
  tick(n=1){
    for(let i=0;i<n;i++){
      this.phase=(this.phase+1)%D.phases.length;
      if(!this.phase)this.cycle++;
    }
    EventBus.emit('world:tick',{cycle:this.cycle,phase:this.phase});
  },
  get(){const p=D.phases[this.phase]||D.phases[0];return{cycle:this.cycle,phase:this.phase,name:p.id,col:p.color,bonusTags:p.bonus_tags||[],statMult:p.stat_mult||1};},
  ser(){return{cycle:this.cycle,phase:this.phase};},
  load(d){this.cycle=d.cycle;this.phase=d.phase;}
};

// ════════════════════════════════════════════════════════════════
// WORLD AI — Entidades reactivas fuera de combate
// ════════════════════════════════════════════════════════════════
const WorldAI = (() => {

  // ── Configuración de migración ────────────────────────────────
  const MIGRATION_INTERVAL = 5;   // ciclos entre migraciones
  let lastMigrationCycle = 0;

  // Tipos de nodo preferidos por tipo de entidad
  const PREFERENCIAS = {
    enemy:    { abismo:3, ruina:2, umbral:2, yermo:2, hub:0 },
    creature: { bosque:3, pantano:2, caverna:2, ruina:1, hub:0 },
    npc:      { hub:3, templo:2, ruina:1, bosque:1, abismo:0 },
  };

  // Comportamientos de movimiento
  const COMPORTAMIENTOS = {
    // Caza al jugador si lo vio recientemente
    cazador(entity, nodeId){
      const playerNode=Player.pos();
      const exits=World.exits(nodeId);
      // Moverse hacia el jugador si está 1 salto lejos
      const dirHaciaJugador=Object.entries(exits).find(([,destId])=>destId===playerNode);
      if(dirHaciaJugador && entity.vio_jugador) return dirHaciaJugador[1];
      return _randomExit(nodeId, entity);
    },
    // Patrulla un rango de nodos fijo
    patrullero(entity, nodeId){
      if(!entity._patrol_route) entity._patrol_route=[nodeId];
      const exits=Object.values(World.exits(nodeId));
      if(!exits.length) return null;
      // Avanzar en la ruta o cambiar aleatoriamente cada 3 ciclos
      if(entity._patrol_idx==null) entity._patrol_idx=0;
      entity._patrol_idx=(entity._patrol_idx+1)%Math.max(1,exits.length);
      return exits[entity._patrol_idx];
    },
    // Migra hacia nodos de su tipo preferido
    migrante(entity, nodeId){
      const tipo=entity.tipo||'enemy';
      const prefs=PREFERENCIAS[tipo]||{};
      const exits=Object.entries(World.exits(nodeId));
      if(!exits.length) return null;
      let best=null, bestScore=-1;
      exits.forEach(([,destId])=>{
        const destNode=World.node(destId);
        const score=(prefs[destNode?.tipo]||1) + Math.random()*0.5;
        if(score>bestScore){ bestScore=score; best=destId; }
      });
      return best;
    },
    // Errante aleatorio
    errante(entity, nodeId){
      return _randomExit(nodeId, entity);
    },
  };

  function _randomExit(nodeId){
    const exits=Object.values(World.exits(nodeId));
    if(!exits.length) return null;
    return exits[Math.floor(Math.random()*exits.length)];
  }

  // Asignar comportamiento según tipo y nombre
  function _asignarComportamiento(entity){
    if(entity.comportamiento) return entity.comportamiento;
    const n=(entity.nombre||entity.name||'').toLowerCase();
    if(n.includes('guardián')||n.includes('custodio')) return 'patrullero';
    if(n.includes('errante')||n.includes('eco'))       return 'errante';
    if(n.includes('cazador')||n.includes('grieta'))    return 'cazador';
    if(entity.tipo==='creature') return Math.random()<0.5?'migrante':'errante';
    return Math.random()<0.4?'cazador':'migrante';
  }

  // ── Tick de migración ─────────────────────────────────────────
  function tick(){
    const cycle=Clock.cycle;
    if(cycle - lastMigrationCycle < MIGRATION_INTERVAL) return;
    lastMigrationCycle=cycle;

    let movidos=0;
    const eventos=[];

    // Mover enemigos
    Object.values(World.all()).forEach(nodo=>{
      if(!nodo.enemies) return;
      nodo.enemies.forEach(enemy=>{
        if(!enemy.id) return;
        const comp=_asignarComportamiento({...enemy,tipo:'enemy'});
        enemy.comportamiento=comp;
        const destId=COMPORTAMIENTOS[comp]?.(enemy, nodo.id);
        if(!destId || destId===nodo.id) return;
        const destNode=World.node(destId);
        if(!destNode) return;

        // Mover enemigo al nodo destino
        destNode.enemies=destNode.enemies||[];
        destNode.enemies.push(enemy);
        nodo.enemies=nodo.enemies.filter(e=>e.id!==enemy.id);
        movidos++;

        // Si el destino es donde está el jugador — aparece como encuentro
        if(destId===Player.pos()){
          // Jugador invisible — no es detectado
          const invisible=Player.get().flags?.some(f=>f.tipo==='invisible'&&(f.ciclos||0)>0);
          if(!invisible){
            enemy.vio_jugador=true;
            eventos.push({tipo:'enemy_enter', entity:enemy, nodeId:destId});
          }
        }
        // Si sale del nodo del jugador — anunciar
        if(nodo.id===Player.pos()){
          eventos.push({tipo:'enemy_leave', entity:enemy, nodeId:nodo.id});
        }
      });
    });

    // Mover criaturas libres
    Object.values(World.all()).forEach(nodo=>{
      if(!nodo.creatures) return;
      nodo.creatures.forEach(creature=>{
        if(creature.estado!=='libre') return; // vinculadas no se mueven
        const comp=_asignarComportamiento({...creature,tipo:'creature'});
        creature.comportamiento=comp;
        const destId=COMPORTAMIENTOS[comp]?.(creature, nodo.id);
        if(!destId || destId===nodo.id) return;
        const destNode=World.node(destId);
        if(!destNode) return;

        destNode.creatures=destNode.creatures||[];
        destNode.creatures.push(creature);
        nodo.creatures=nodo.creatures.filter(c=>c.id!==creature.id);
        movidos++;

        if(destId===Player.pos())
          eventos.push({tipo:'creature_enter', entity:creature, nodeId:destId});
      });
    });

    // Mover NPCs ambulantes (errantes libres, comerciantes)
    GS.aliveNPCs().forEach(npc=>{
      if(!npc.id || npc.estado!=='vivo') return;
      const arq=npc.arq_vis||'';
      const esAmbulante=['comerciante','errante','heraldo'].includes(arq);
      if(!esAmbulante) return;
      if(Math.random()>0.3) return; // 30% chance de moverse

      const exits=Object.values(World.exits(npc.nodeId));
      if(!exits.length) return;
      const prevNode=npc.nodeId;
      npc.nodeId=exits[Math.floor(Math.random()*exits.length)];
      movidos++;

      // Si llega al nodo del jugador — notificar
      if(npc.nodeId===Player.pos())
        eventos.push({tipo:'npc_enter', entity:npc, nodeId:npc.nodeId});
      // Si se va del nodo del jugador
      if(prevNode===Player.pos())
        eventos.push({tipo:'npc_leave', entity:npc, nodeId:prevNode});
    });

    // Procesar eventos
    if(eventos.length) _procesarEventos(eventos);

    if(movidos>0) EventBus.emit('worldai:tick',{cycle,movidos,eventos:eventos.length});
  }

  function _procesarEventos(eventos){
    eventos.forEach(ev=>{
      switch(ev.tipo){
        case 'enemy_enter':
          setTimeout(()=>{
            R.sp();
            R.w(`⚠ ${ev.entity.nombre||ev.entity.name} entra en tu nodo.`,'t-pel');
            R.w(`HP:${ev.entity.hp} ATK:${ev.entity.atk}  —  "atacar" para iniciar combate.`,'t-dim');
            R.upd();
          },200);
          break;
        case 'enemy_leave':
          setTimeout(()=>{
            R.w(`${ev.entity.nombre||ev.entity.name} abandona el nodo.`,'t-dim');
          },200);
          break;
        case 'creature_enter':
          setTimeout(()=>{
            R.sp();
            R.w(`✦ ${ev.entity.nombre} merodea por aquí.`,'t-cri');
            R.w(`"capturar ${ev.entity.nombre.split('-')[0].toLowerCase()}" para intentar vincularlo.`,'t-dim');
            R.upd();
          },200);
          break;
        case 'npc_enter':
          setTimeout(()=>{
            R.sp();
            R.w(`◈ ${ev.entity.nombre} llega a este nodo.`,'t-npc');
            R.w(`"hablar ${ev.entity.nombre.split(' ')[0].toLowerCase()}" para interactuar.`,'t-dim');
            R.upd();
          },200);
          break;
        case 'npc_leave':
          setTimeout(()=>{
            R.w(`${ev.entity.nombre} se marcha.`,'t-dim');
          },200);
          break;
      }
    });
  }

  // Hook al EventBus de tick del mundo
  EventBus.on('world:tick', ()=>tick(), 'worldai');

  // Marcar que el jugador fue visto por los enemigos de su nodo
  EventBus.on('world:node_enter',({nodeId})=>{
    const n=World.node(nodeId);
    if(!n) return;
    (n.enemies||[]).forEach(e=>{e.vio_jugador=true;});
  },'worldai_sight');

  return { tick };
})();

// ════════════════════════════════════════════════════════════════
// FACTION SYSTEM — Control territorial y servicios
// ════════════════════════════════════════════════════════════════
const FactionSystem = (() => {

  // ── Definición de facciones ───────────────────────────────────
  // Se complementa con el plugin de facciones existente
  const FACCIONES_BASE = {
    orden_grieta:    { nombre:'Orden de la Grieta', color:'t-sis', tipos_nodo:['ruina','umbral'],           icon:'⟁', _tipos_nodo_base:['ruina','umbral'] },
    culto_eco:       { nombre:'Culto del Eco',      color:'t-mag', tipos_nodo:['templo','caverna','resonante'],icon:'◎', _tipos_nodo_base:['templo','caverna'] },
    errantes_libres: { nombre:'Errantes Libres',    color:'t-mem', tipos_nodo:['bosque','yermo','hub'],     icon:'◈', _tipos_nodo_base:['bosque','yermo','hub'] },
  };

  // Rangos de reputación
  const RANGOS = [
    { min:-100, max:-60, nombre:'Enemigo Declarado', color:'t-pel', icon:'⚔' },
    { min:-60,  max:-30, nombre:'Hostil',            color:'t-pel', icon:'✗'  },
    { min:-30,  max:0,   nombre:'Desconfiado',       color:'t-dim', icon:'?'  },
    { min:0,    max:30,  nombre:'Neutral',           color:'t-out', icon:'·'  },
    { min:30,   max:60,  nombre:'Conocido',          color:'t-cra', icon:'◦'  },
    { min:60,   max:80,  nombre:'Aliado',            color:'t-eco', icon:'◎'  },
    { min:80,   max:101, nombre:'Hermano/Hermana',   color:'t-cor', icon:'✦'  },
  ];

  // Control de nodos: faccionId → Set de nodeIds
  const controlNodos = {};

  // ── Inicializar control territorial ──────────────────────────
  function inicializar(){
    // Asignar nodos al mundo según tipo
    Object.entries(World.all()).forEach(([nodeId, nodo])=>{
      Object.entries(FACCIONES_BASE).forEach(([facId, fac])=>{
        if(fac.tipos_nodo.includes(nodo.tipo)){
          if(!controlNodos[facId]) controlNodos[facId]=new Set();
          // 60% de probabilidad de que la facción controle este nodo
          if(Math.random()<0.6) controlNodos[facId].add(nodeId);
        }
      });
    });
    EventBus.emit('faction:init',{controlNodos});
  }

  // ── Obtener facción dominante de un nodo ──────────────────────
  function faccionDeNodo(nodeId){
    for(const [facId, nodos] of Object.entries(controlNodos)){
      if(nodos.has(nodeId)) return facId;
    }
    return null;
  }

  // ── Obtener reputación del jugador con una facción ────────────
  function getRep(facId){
    return Player.get().reputacion?.[facId]||0;
  }

  function setRep(facId, valor){
    const p=Player.get();
    p.reputacion=p.reputacion||{};
    const prev=p.reputacion[facId]||0;
    p.reputacion[facId]=U.clamp(valor,-100,100);
    const rango=getRango(p.reputacion[facId]);
    const prevRango=getRango(prev);
    // Notificar cambio de rango
    if(rango.nombre!==prevRango.nombre){
      setTimeout(()=>{
        const fac=getFaccion(facId);
        R.sp();
        R.w(`${rango.icon} REPUTACIÓN — ${fac?.nombre||facId}`,rango.color,true);
        R.w(`${prevRango.nombre} → ${rango.nombre}  (${p.reputacion[facId]})`,rango.color);
        R.sp();
      },300);
    }
  }

  function modRep(facId, delta){ setRep(facId, getRep(facId)+delta); }

  function getRango(rep){
    return RANGOS.find(r=>rep>=r.min&&rep<r.max)||RANGOS[3];
  }

  function getFaccion(facId){
    return ModuleLoader.get('facciones')?.[facId]||FACCIONES_BASE[facId]||null;
  }

  // ── Hook al entrar a un nodo ───────────────────────────────────
  function onNodeEnter(nodeId){
    const facId=faccionDeNodo(nodeId);
    if(!facId) return;
    const rep=getRep(facId);
    const fac=getFaccion(facId);
    if(!fac) return;

    // ENEMIGO DECLARADO o HOSTIL → emboscada
    if(rep<=-30){
      _procesarHostilidad(facId, fac, nodeId, rep);
    }
    // ALIADO o superior → servicios
    else if(rep>=60){
      _procesarAlianza(facId, fac, nodeId, rep);
    }
    // NEUTRAL/CONOCIDO → mensaje de presencia
    else if(rep>=0){
      const npc=GS.npcEnNodo(nodeId).find(n=>n.faccion===facId);
      if(npc) R.w(`[${fac.icon} ${fac.nombre}] ${npc.nombre} te observa.`,fac.color||'t-out');
    }
  }

  function _procesarHostilidad(facId, fac, nodeId, rep){
    const n=World.node(nodeId);
    const prob=rep<=-60?0.8:0.45;
    if(!U.chance(prob)) return;

    R.sp();R.sep('─');
    R.w(`${fac.icon} TERRITORIO HOSTIL — ${fac.nombre}`,'t-pel',true);
    R.w(`Reputación: ${rep} [${getRango(rep).nombre}]`,'t-pel');

    // Generar emboscada: añadir enemigos escalados al nodo
    const dif=World.calcDificultad();
    const numEnemigos=rep<=-60?3:2;
    const ep=D.enemies;
    const rng=U.rng(Date.now()+nodeId);
    const nuevosEnemigos=[];

    for(let i=0;i<numEnemigos;i++){
      if(!ep.length) break;
      const base={...U.pick(ep,rng)};
      base.id=U.uid();
      base.hp=Math.round((base.hp||10)*dif*0.8);
      base.atk=Math.round((base.atk||4)*Math.sqrt(dif));
      base.hp_current=base.hp;
      base.nombre=`${fac.icon} ${base.nombre}`;  // marcar como miembro de facción
      base.faccion=facId;
      n.enemies=n.enemies||[];
      n.enemies.push(base);
      nuevosEnemigos.push(base);
    }

    R.w(`¡${numEnemigos} miembro${numEnemigos>1?'s':''} de la facción te emboscan!`,'t-pel');
    R.sep('─');R.sp();

    // Iniciar batalla automáticamente tras 800ms
    if(nuevosEnemigos.length){
      setTimeout(()=>{
        const p=Player.get();
        const combatants=[
          {tipo:'player',id:p.id,name:p.name,hp:p.hp,maxHp:p.maxHp,atk:Player.getAtk(),def:Player.getDef(),nodeId,playerId:p.id},
          ...nuevosEnemigos.map(e=>({tipo:'enemy',id:e.id,name:e.nombre,hp:e.hp,maxHp:e.hp,atk:e.atk,def:e.def||0,nodeId,tags:[facId]})),
        ];
        Net.startBattle(nodeId,combatants);
      },800);
    }

    // Reducir rep más por entrar en territorio hostil
    modRep(facId,-5);
  }

  function _procesarAlianza(facId, fac, nodeId, rep){
    R.sp();
    R.w(`${fac.icon} ${fac.nombre} — Territorio aliado  [REP: ${rep}]`,fac.color||'t-eco');

    const servicios=_serviciosDisponibles(facId, rep);
    if(servicios.length){
      R.w(`Servicios disponibles:`,fac.color||'t-eco');
      servicios.forEach(s=>R.w(`  ${s.desc}`,fac.color||'t-out'));
      // Aplicar servicios pasivos automáticamente
      servicios.forEach(s=>{
        if(s.auto) s.auto();
      });
    }
    R.sp();
  }

  function _serviciosDisponibles(facId, rep){
    const servicios=[];
    const p=Player.get();

    // REP ≥ 60: Curación básica gratuita
    if(rep>=60){
      servicios.push({
        desc:'Curación básica: +10HP (automático)',
        auto(){ p.hp=Math.min(p.maxHp,p.hp+10); R.upd(); }
      });
    }
    // REP ≥ 70: Stamina restaurada
    if(rep>=70){
      servicios.push({
        desc:'Stamina restaurada (automático)',
        auto(){ p.stamina=Math.min(p.maxStamina||100,(p.stamina||0)+30); R.upd(); }
      });
    }
    // REP ≥ 80: Ítem de facción + protección enemigos
    if(rep>=80){
      // Eliminar enemigos hostiles del nodo si la facción los controla
      const n=World.node(nodeId||Player.pos());
      if(n){
        const antes=n.enemies?.length||0;
        n.enemies=(n.enemies||[]).filter(e=>e.faccion!==facId);
        const eliminados=antes-n.enemies.length;
        if(eliminados>0) servicios.push({desc:`Protección: ${eliminados} enemigo${eliminados>1?'s':''} de la facción se retiran.`});
      }
      // Loot especial de facción
      const itemFac=ItemSystem.crear(rep>=90?'medicina_mayor':'fragmento_cura');
      if(itemFac&&Math.random()<0.4){
        Player.addItem(itemFac);
        servicios.push({desc:`Obsequio: ${itemFac.nombre}`});
      }
    }

    return servicios;
  }

  // ── Reputación por acciones ───────────────────────────────────
  function onNPCMuerto(npc){
    if(!npc.faccion) return;
    modRep(npc.faccion,-15);
    // Reputación negativa con facciones aliadas de la víctima
    Object.keys(FACCIONES_BASE).forEach(fid=>{
      if(fid!==npc.faccion && getRep(npc.faccion)>30) modRep(fid,-5);
    });
  }

  function onMisionCompletada(mision){
    const npc=GS.npc(mision.npc_id);
    if(!npc?.faccion) return;
    modRep(npc.faccion,+20);
  }

  function onTraicion(npc){
    if(!npc.faccion) return;
    modRep(npc.faccion,-25);
  }

  // ── Comando ver facciones extendido ───────────────────────────
  function cmdFacciones(){
    R.sp();R.w('— FACCIONES & TERRITORIOS —','t-acc');
    const facs=ModuleLoader.get('facciones')||FACCIONES_BASE;
    Object.entries(facs).forEach(([id,f])=>{
      const rep=getRep(id);
      const rango=getRango(rep);
      const nodos=controlNodos[id]?.size||0;
      const facBase=FACCIONES_BASE[id];
      R.w(`  ${rango.icon} ${f.nombre||facBase?.nombre||id}  REP:${rep}  [${rango.nombre}]  Nodos:${nodos}`,rango.color);
      if(rep<-30) R.w(`    → Emboscada al entrar en sus nodos.`,'t-pel');
      else if(rep>=60) R.w(`    → Servicios y protección en sus nodos.`,facBase?.color||'t-eco');
      if(facBase?.tipos_nodo) R.w(`    Tipos de nodo: ${facBase.tipos_nodo.join(', ')}`,'t-dim');
    });
    R.sp();
    // Nodo actual
    const facActual=faccionDeNodo(Player.pos());
    if(facActual){
      const fac=getFaccion(facActual);
      const rep=getRep(facActual);
      const rango=getRango(rep);
      R.w(`Nodo actual controlado por: ${fac?.nombre||facActual}  REP:${rep}  [${rango.nombre}]`,rango.color);
    } else {
      R.w('Nodo actual: Sin control de facción.','t-dim');
    }
    R.sp();
  }

  // ── Integrar con EventBus ──────────────────────────────────────
  EventBus.on('world:node_enter', ({nodeId})=>onNodeEnter(nodeId), 'faction_enter');
  EventBus.on('narrative:npc_death', ({npc})=>onNPCMuerto(npc), 'faction_npc_death');
  EventBus.on('narrative:mission_complete', ({mision})=>onMisionCompletada(mision), 'faction_mission');

  // Inicializar después de que el mundo se genere
  EventBus.on('world:after_gen', ()=>setTimeout(inicializar,100), 'faction_init');

  return {
    getRep, setRep, modRep, getRango, getFaccion,
    faccionDeNodo, controlNodos,
    onNPCMuerto, onMisionCompletada, onTraicion,
    cmdFacciones, inicializar,
  };
})();

// BOSS SYSTEM — Monstruos mundiales de poder devastador
// ════════════════════════════════════════════════════════════════
const BossSystem = (() => {

  // ── Definición de bosses ──────────────────────────────────────
  const BOSSES_DEF = [
    {
      id:'leviatán_grieta',
      nombre:'Leviatán de la Grieta',
      titulo:'El Primer Colapso',
      desc:'Una fractura del mundo que aprendió a moverse. Precede al fin de los ciclos.',
      hp:800, atk:45, def:20,
      tags:['vacío','corrupto','antiguo'],
      elemento:'VACÍO',
      poise_max:400,
      color:'t-cor',icon:'◈',
      loot_especial:['reliquia_fragmento_origen','cristal_vacío_puro','armadura_grieta','arma_colapso','magia_aniquilación','habilidad_ruptura','eco_condensado_mayor','sello_primer_ciclo'],
      xp_base:2000,
      frase_cerca:'El vacío se expande. Algo sin nombre está muy cerca.',

    },
    {
      id:'antiguo_resonante',
      nombre:'El Antiguo Resonante',
      titulo:'El Que Recuerda Todos Los Ciclos',
      desc:'Acumuló los ecos de cada run anterior. Conoce tus patrones.',
      hp:700, atk:38, def:25,
      tags:['resonante','antiguo','eco'],
      elemento:'RESONANTE',
      poise_max:350,
      color:'t-mag',icon:'◎',
      loot_especial:['corona_ecos','manto_resonancia','báculo_ciclos','cristal_memoria_total','reliquia_primera_voz','habilidad_eco_perfecto','magia_resonancia_absoluta','fragmento_origen_puro'],
      xp_base:1800,
      frase_cerca:'El aire vibra con memorias que no son tuyas. Está cerca.',
      frase_lejos:'Algo resuena desde esa dirección. Una frecuencia que no deberías reconocer.',
      ataques_especiales:['eco_masivo','memoria_paralizante','resonancia_area'],
    },
    {
      id:'devorador_ciclos',
      nombre:'El Devorador de Ciclos',
      titulo:'La Hambre sin Nombre',
      desc:'Se alimenta del tiempo. Cada ciclo que pasa lo hace más fuerte.',
      hp:600+Clock.cycle*15, atk:35+Clock.cycle, def:15,
      tags:['corrupto','hambre','ciclo'],
      elemento:'ARDIENDO',
      poise_max:300,
      color:'t-pel',icon:'✦',
      loot_especial:['ceniza_del_tiempo','brasas_eternas','armadura_ceniza','reliquia_ciclo_roto','magia_devorar','habilidad_consumir','cristal_hambre','sello_devorador'],
      xp_base:1600,
      frase_cerca:'El calor aumenta. El aire sabe a ceniza de algo que ya no existe.',
      frase_lejos:'Un calor antinatural desde esa dirección. Como si algo quemara el tiempo.',
      ataques_especiales:['devorar_stamina','ardor_total','consumir_ciclo'],
    },
  ];

  // ── Estado de los bosses activos ──────────────────────────────
  // bosseActivos: [ { def, nodeId, hp_actual, ciclo_entrada, ciclo_salida, eliminado } ]
  let bosses = [];

  // ── BFS para calcular distancia entre nodos ───────────────────
  function distancia(fromId, toId){
    if(fromId===toId) return 0;
    const visited=new Set([fromId]);
    const queue=[{id:fromId,dist:0}];
    while(queue.length){
      const{id,dist}=queue.shift();
      if(dist>3) return 999; // límite de búsqueda para eficiencia
      const exits=Object.values(World.exits(id));
      for(const nextId of exits){
        if(nextId===toId) return dist+1;
        if(!visited.has(nextId)){visited.add(nextId);queue.push({id:nextId,dist:dist+1});}
      }
    }
    return 999;
  }

  // Dirección cardinal desde fromId hacia toId (1 salto)
  function dirHacia(fromId, toId){
    const exits=World.exits(fromId);
    for(const[dir,destId] of Object.entries(exits)){
      if(destId===toId) return dir;
    }
    return null;
  }

  // Dirección hacia el boss más cercano (BFS)
  function dirHaciaBoss(fromId, bossNodeId){
    if(fromId===bossNodeId) return null;
    const visited=new Set([fromId]);
    const queue=[{id:fromId,path:[]}];
    while(queue.length){
      const{id,path}=queue.shift();
      const exits=World.exits(id);
      for(const[dir,nextId] of Object.entries(exits)){
        if(nextId===bossNodeId) return path[0]||dir;
        if(!visited.has(nextId)){
          visited.add(nextId);
          queue.push({id:nextId,path:path.length?path:[dir]});
        }
      }
      if(path.length>3) break;
    }
    return null;
  }

  // ── Generar loot mítico del boss ──────────────────────────────
  function genLootBoss(def){
    const rng=U.rng(Date.now()+def.id);
    const items=[];
    def.loot_especial.forEach(blueprint=>{
      const adj=['Antiguo','Roto','Eterno','Primordial','Corrompido','Resonante','Vacío','Último'];
      const noun=['Fragmento','Sello','Eco','Cristal','Reliquia','Esencia','Núcleo','Impronta'];
      const nombre=`${U.pick(adj,rng)} ${blueprint.replace(/_/g,' ')}`;
      const imp=Imprint.gen(blueprint,def.tags,{nodeId:'boss',cycle:Clock.cycle,pid:'boss'},0.9+Math.random()*0.1);
      imp.mutations=imp.mutations.concat(def.tags.slice(0,2));
      const tipo=['arma','armadura'].find(t=>blueprint.includes(t))||
                  ['magia','habilidad'].find(t=>blueprint.includes(t))||'mítico';
      const item={
        id:U.uid(),
        blueprint,
        nombre,
        tipo,
        tags:[...def.tags,'mítico','boss'],
        imprint:imp,
        estado:'boss_drop',
        desc:`Arrebatado a ${def.nombre}. Contiene el eco de su poder.`,
        atk:   tipo==='arma'   ? 20+U.rand(5,15) : 0,
        def:   tipo==='armadura'? 15+U.rand(3,10) : 0,
        poder: 30+U.rand(10,20),
        durabilidad:100,
        es_mitico:true,
        boss_id:def.id,
      };
      // Stats especiales según tipo
      if(tipo==='magia'){item.cargas=5;item.cargas_max=5;item.fragilidad=0;item.efecto='dmg_dist';item.poder=25+U.rand(10,15);}
      if(tipo==='habilidad'){item.efecto='atk_mult';item.valor=3;item.desc=`Habilidad de ${def.nombre}. Multiplica el daño ×3.`;}
      items.push(item);
    });
    return items;
  }

  // ── Spawnear un boss aleatorio en el mapa ─────────────────────
  function spawn(){
    const nodeIds=Object.keys(World.all());
    if(!nodeIds.length) return;
    // Elegir nodo lejos del jugador (mín 4 nodos)
    const candidatos=nodeIds.filter(id=>{
      if(id===Player.pos()) return false;
      if(bosses.some(b=>!b.eliminado&&b.nodeId===id)) return false;
      return distancia(Player.pos(),id)>=4;
    });
    if(!candidatos.length) return;
    const nodeId=candidatos[Math.floor(Math.random()*candidatos.length)];
    const defBase=BOSSES_DEF[Math.floor(Math.random()*BOSSES_DEF.length)];
    // Escalar al nivel actual del jugador
    const dif=World.calcDificultad();
    const def={...defBase,
      hp:   Math.round(defBase.hp*dif),
      atk:  Math.round(defBase.atk*Math.sqrt(dif)),
      def:  Math.round(defBase.def*Math.sqrt(dif)*0.8),
      xp_base:Math.round(defBase.xp_base*dif),
    };
    const bossState={
      def, nodeId,
      hp_actual:def.hp,
      ciclo_entrada:Clock.cycle,
      ciclo_salida:Clock.cycle+U.rand(15,40), // permanece entre 15-40 ciclos
      eliminado:false,
      id:U.uid(),
    };
    bosses.push(bossState);
    R.sp();R.sep('═');
    R.w(`${def.icon} PRESENCIA DETECTADA`,def.color,true);
    R.w(`Algo de poder incalculable ha entrado al mundo.`,'t-dim');
    R.w(`Se necesita un equipo para hacerle frente.`,'t-pel');
    R.sep('═');R.sp();
    EventBus.emit('boss:spawn',{boss:bossState,nodeId});
  }

  // ── Mover bosses activos ──────────────────────────────────────
  function moverBosses(){
    bosses.filter(b=>!b.eliminado).forEach(boss=>{
      // Salir del mapa si pasó su ciclo de salida
      if(Clock.cycle>=boss.ciclo_salida){
        const prevNode=boss.nodeId;
        boss.eliminado=true;
        // Notificar si estaba cerca
        if(distancia(Player.pos(),prevNode)<=3){
          R.sp();
          R.w(`${boss.def.icon} ${boss.def.nombre} se ha retirado del mundo.`,'t-dim');
          R.sp();
        }
        return;
      }

      // Moverse a un nodo adyacente aleatorio
      const exits=Object.values(World.exits(boss.nodeId));
      if(!exits.length) return;
      const prevNode=boss.nodeId;
      boss.nodeId=exits[Math.floor(Math.random()*exits.length)];

      // Comprobar amenaza por proximidad al jugador
      _comprobarProximidad(boss, prevNode);
    });

    // Limpiar bosses eliminados (mantener solo los recientes para historial)
    bosses=bosses.filter(b=>!b.eliminado||Clock.cycle-b.ciclo_entrada<5);
  }

  function _comprobarProximidad(boss, prevNode){
    const playerNode=Player.pos();
    const dist=distancia(boss.nodeId, playerNode);
    const prevDist=distancia(prevNode, playerNode);

    // Boss llega al nodo del jugador → combate automático
    if(boss.nodeId===playerNode){
      setTimeout(()=>_iniciarCombateBoss(boss),400);
      return;
    }

    // A 1 nodo → mensaje de miedo
    if(dist===1&&prevDist>1){
      const dir=dirHaciaBoss(playerNode,boss.nodeId)||'cerca';
      R.sp();
      R.w(`☠ EL MIEDO SE SIENTE HACIA EL ${dir.toUpperCase()}`,boss.def.color,true);
      R.w(boss.def.frase_cerca,'t-pel');
      R.sp();
    }
    // A 2 nodos → mensaje de advertencia
    else if(dist===2&&prevDist>2){
      const dir=dirHaciaBoss(playerNode,boss.nodeId)||'lejos';
      R.sp();
      R.w(`${boss.def.icon} Algo poderoso se siente hacia el ${dir.toUpperCase()}.`,boss.def.color);
      R.w(boss.def.frase_lejos,'t-dim');
      R.sp();
    }
  }

  // ── Combate automático con boss ───────────────────────────────
  function _iniciarCombateBoss(boss){
    if(boss.eliminado) return;
    const p=Player.get();
    const def=boss.def;

    R.sp();R.sep('═');
    R.w(`${def.icon} ${def.nombre.toUpperCase()}`,def.color,true);
    R.w(`"${def.titulo}"`,def.color);
    R.w(def.desc,'t-out');
    R.w(`HP:${boss.hp_actual}/${def.hp}  ATK:${def.atk}  DEF:${def.def}`,'t-pel');
    R.w(`⚠ Se recomienda un equipo de 8 para sobrevivir.`,'t-pel',true);
    R.sep('═');R.sp();

    // Incluir todos los jugadores conectados en el mismo nodo
    const jugadoresNodo=Net?Object.values(Net.getPlayers()).filter(j=>j.nodeId===Player.pos()):[];
    const combatants=[
      // Jugador local
      {tipo:'player',id:p.id,name:p.name,
       hp:p.hp,maxHp:p.maxHp,atk:Player.getAtk(),def:Player.getDef(),vivo:true,
       nodeId:Player.pos(),playerId:p.id},
      // Jugadores conectados en el mismo nodo
      ...jugadoresNodo.map(j=>({
        tipo:'player',id:j.id,name:j.name,
        hp:j.hp||40,maxHp:j.maxHp||40,atk:j.atk||5,def:j.def||1,
        nodeId:j.nodeId,playerId:j.id,peerId:j.peerId,
      })),
      // El boss
      {tipo:'enemy',id:boss.id,name:def.nombre,
       hp:boss.hp_actual,maxHp:def.hp,atk:def.atk,def:def.def,vivo:true,
       nodeId:Player.pos(),
       tags:def.tags,
       poise_max:def.poise_max,
       poise:def.poise_max,
       es_boss:true,
       boss_ref:boss,
       color:def.color,
       ataques_especiales:[...def.ataques_especiales],
      },
    ];

    Net.startBattle(Player.pos(), combatants);
    // Marcar boss como en combate
    boss.en_combate=true;
    // Hook al fin de batalla
    EventBus.on('combat:enemy_defeat',({enemy})=>{
      if(enemy.es_boss&&enemy.id===boss.id) _onBossDefeated(boss);
    },'boss_defeat_'+boss.id);
  }

  // ── Derrota del boss → loot + XP ─────────────────────────────
  function _onBossDefeated(boss){
    boss.eliminado=true;
    boss.en_combate=false;
    EventBus.off('boss_defeat_'+boss.id);

    const def=boss.def;
    R.sp();R.sep('═');
    R.w(`${def.icon} ${def.nombre} HA CAÍDO`,def.color,true);
    R.w(`"${def.titulo}" ya no acecha el mundo.`,'t-dim');
    R.sep('─');

    // XP masiva al jugador
    const xpTotal=def.xp_base;
    XP.ganar('combate',   Math.floor(xpTotal*0.5), `boss kill: ${def.nombre}`);
    XP.ganar('exploración',Math.floor(xpTotal*0.25),`boss kill: ${def.nombre}`);
    XP.ganar('narrativa', Math.floor(xpTotal*0.25),`boss kill: ${def.nombre}`);
    R.w(`⬆ +${xpTotal} XP distribuida entre combate, exploración y narrativa.`,'t-mem',true);

    // Generar los 8 ítems míticos
    const lootItems=genLootBoss(def);
    R.w(`Loot mítico (${lootItems.length} objetos):`,def.color);
    lootItems.forEach(item=>{
      Player.addItem(item);
      const col=item.tipo==='arma'?'t-pel':item.tipo==='armadura'?'t-sis':item.tipo==='magia'?'t-mag':item.tipo==='habilidad'?'t-hab':'t-cor';
      R.w(`  ✦ ${item.nombre}  [${item.tipo.toUpperCase()}]${item.atk?'  ATK+'+item.atk:''}${item.def?'  DEF+'+item.def:''}${item.poder?'  POD+'+item.poder:''}`,col);
    });

    // Twist narrativo permanente
    const twist={id:'boss_'+boss.id,titulo:`Caída de ${def.nombre}`,texto:`${def.nombre} fue derrotado en el ciclo ${Clock.cycle}. Su poder se fragmentó en 8 reliquias.`,boss:true};
    GS.addTwist(twist);

    // Reputación con facciones
    Object.keys(FactionSystem.controlNodos||{}).forEach(facId=>{
      FactionSystem.modRep(facId,+30);
    });
    R.w(`+30 reputación con todas las facciones.`,'t-eco');
    R.sep('═');R.sp();
    EventBus.emit('boss:defeated',{boss,loot:lootItems,xp:xpTotal});
    save();
  }

  // ── Ataques especiales del boss en combate ────────────────────
  // Se enganchan en execBattleAction como acción adicional de la IA
  function procesarAtaqueEspecial(bossActor, battle){
    const specs=bossActor.ataques_especiales;
    if(!specs||!specs.length) return;
    const ataque=specs[Math.floor(Math.random()*specs.length)];
    const jugadores=battle.cola.filter(c=>c.vivo&&c.tipo==='player');
    if(!jugadores.length) return;

    switch(ataque){
      case 'colapso_area':
      case 'eco_masivo':
      case 'ardor_total':{
        const dmg=Math.floor(bossActor.atk*0.6);
        jugadores.forEach(j=>{
          j.hp=Math.max(0,j.hp-dmg);
          if(j.hp<=0)j.vivo=false;
        });
        battleLog(battle,`💥 ${bossActor.name}: ¡ATAQUE DE ÁREA! Todos reciben ${dmg} daño.`,'t-cor');
        break;
      }
      case 'rotura_poise_total':{
        jugadores.forEach(j=>{j.poise=0;j.poise_roto=true;j.poise_turnos=3;});
        battleLog(battle,`⚡ ${bossActor.name}: ¡POSTURA DESTROZADA! Todos VULNERABLES 3 turnos.`,'t-cor');
        break;
      }
      case 'vacío_absoluto':{
        const target=jugadores[0];
        if(target){
          target.elemento_estado='VACÍO';
          const dmg=Math.floor(bossActor.atk*0.8);
          target.hp=Math.max(0,target.hp-dmg);
          battleLog(battle,`◇ ${bossActor.name}: VACÍO ABSOLUTO sobre ${target.name} −${dmg}HP  [VACÍO]`,'t-twi');
        }
        break;
      }
      case 'memoria_paralizante':{
        const target=jugadores[Math.floor(Math.random()*jugadores.length)];
        if(target){target.stun_turnos=2;target.skipping=true;}
        battleLog(battle,`◎ ${bossActor.name}: MEMORIA PARALIZANTE — ${target?.name} aturdido 2 turnos.`,'t-mag');
        break;
      }
      case 'resonancia_area':{
        const dmg=Math.floor(bossActor.atk*0.5);
        jugadores.forEach(j=>{j.hp=Math.max(0,j.hp-dmg);j.elemento_estado='RESONANTE';});
        battleLog(battle,`◎ ${bossActor.name}: RESONANCIA — todos reciben ${dmg} y quedan RESONANTES.`,'t-mag');
        break;
      }
      case 'devorar_stamina':{
        jugadores.forEach(j=>{if(j.playerId===Player.get().id){const p=Player.get();p.stamina=Math.max(0,(p.stamina||0)-40);}});
        battleLog(battle,`✦ ${bossActor.name}: DEVORAR STAMINA — −40 stamina.`,'t-pel');
        break;
      }
      case 'consumir_ciclo':{
        Clock.tick(2);
        const dmg=Math.floor(bossActor.atk*0.4);
        jugadores.forEach(j=>{j.hp=Math.max(0,j.hp-dmg);});
        battleLog(battle,`✦ ${bossActor.name}: CONSUMIR CICLO — el tiempo avanza y todos reciben ${dmg}.`,'t-cor');
        break;
      }
    }
  }

  // ── Tick del boss (cada 3 ciclos) ─────────────────────────────
  let lastBossTick=0;
  let lastSpawnCycle=0;
  const BOSS_MOVE_INTERVAL=3;
  const BOSS_SPAWN_CHANCE=0.08;  // 8% por tick = raro
  const BOSS_SPAWN_MIN_CYCLE=5;  // No antes del ciclo 5

  EventBus.on('world:tick',()=>{
    const cycle=Clock.cycle;
    if(cycle-lastBossTick<BOSS_MOVE_INTERVAL) return;
    lastBossTick=cycle;

    // Intentar spawnear nuevo boss (máx 2 activos simultáneos)
    const activos=bosses.filter(b=>!b.eliminado).length;
    if(activos<2&&cycle>=BOSS_SPAWN_MIN_CYCLE&&Math.random()<BOSS_SPAWN_CHANCE){
      spawn();
    }

    // Mover bosses activos
    moverBosses();

    // Comprobar si hay boss en el nodo actual del jugador
    bosses.filter(b=>!b.eliminado&&!b.en_combate&&b.nodeId===Player.pos())
          .forEach(b=>setTimeout(()=>_iniciarCombateBoss(b),300));

  },'boss_tick');

  // Al entrar a un nodo, comprobar boss
  EventBus.on('world:node_enter',({nodeId})=>{
    const boss=bosses.find(b=>!b.eliminado&&!b.en_combate&&b.nodeId===nodeId);
    if(boss) setTimeout(()=>_iniciarCombateBoss(boss),500);
  },'boss_enter');

  // ── Mostrar información de bosses activos ─────────────────────
  function cmdBosses(){
    R.sp();R.w('— BOSSES ACTIVOS —','t-cor');
    const activos=bosses.filter(b=>!b.eliminado);
    if(!activos.length){R.w('No hay bosses en el mundo actualmente.','t-dim');R.sp();return;}
    activos.forEach(b=>{
      const dist=distancia(Player.pos(),b.nodeId);
      const nodo=World.node(b.nodeId);
      const distStr=dist===0?'¡EN TU NODO!':dist===1?'A 1 nodo':dist===2?'A 2 nodos':`A ${dist} nodos`;
      R.w(`  ${b.def.icon} ${b.def.nombre}  "${b.def.titulo}"`,b.def.color,true);
      R.w(`    HP:${b.hp_actual}/${b.def.hp}  Nodo:${nodo?.name||b.nodeId}  ${distStr}`,dist<=2?'t-pel':'t-dim');
      R.w(`    Ciclos restantes: ~${Math.max(0,b.ciclo_salida-Clock.cycle)}`,'t-dim');
      R.w(`    Loot: ${b.def.loot_especial.length} objetos míticos  XP:${b.def.xp_base}`,'t-cor');
    });
    R.sp();
  }

  return {
    spawn, moverBosses, distancia,
    procesarAtaqueEspecial,
    cmdBosses,
    getBosses:()=>bosses,
    getBossEnNodo:(nid)=>bosses.find(b=>!b.eliminado&&b.nodeId===nid),
  };
})();

// IMPRINT
// ════════════════════════════════════════════════════════════════
const Imprint={
  gen(blueprint,materials,ctx,tension=0){
    const muts=D.narrative.mutaciones||[];
    const pay=`${blueprint}|${materials.join(',')}|${ctx.nodeId}|${ctx.cycle}|${ctx.pid}|${Date.now()}|${Math.random()}`;
    const seed=U.hash(pay);const rng=U.rng(seed);
    const picked=muts.length?U.pickN(muts,Math.floor(rng()*(2+tension*4)),rng):[];
    let result={seed,blueprint,materials:[...materials],ctx:{...ctx},mutations:picked,hash:U.hex(pay+seed),tension,created:Date.now(),parent_hash:null};
    // SOCKET: forge:imprint_gen
    result=EventBus.emit('forge:imprint_gen',result)||result;
    return result;
  }
};

// TAGS ENGINE
// ════════════════════════════════════════════════════════════════
const Tags={
  aff(tags){
    let best=null,bs=0;
    for(let i=0;i<tags.length;i++)for(let j=i+1;j<tags.length;j++){
      const k1=`${tags[i]}:${tags[j]}`,k2=`${tags[j]}:${tags[i]}`;
      const af=D.tagAff[k1]||D.tagAff[k2];
      if(af&&af.fuerza>bs){best=af;bs=af.fuerza;}
    }
    return best;
  },
  tension(tags){
    let t=0;(D.tagOpp||[]).forEach(([a,b])=>{if(tags.includes(a)&&tags.includes(b))t+=.3;});
    return U.clamp(t,0,1);
  }
};

// FORGE ENGINE
// ════════════════════════════════════════════════════════════════
const Forge={
  calcStat(def,s,t,rng){if(!def)return 0;return U.clamp(Math.floor(def.base+(def.escala||0)*s+(def.tension||0)*t+rng()*(def.rng||0)),def.min||0,def.max||999);},
  buildStats(arcId,s,t,rng){const arc=D.archetypes[arcId];if(!arc)return null;const out={};for(const[k,def]of Object.entries(arc.stats||{})){const v=this.calcStat(def,s,t,rng);if(v>0)out[k]=v;}return out;},

  forjar(matIds,ctx,nodeEstado,phaseName,modo){
    // SOCKET: forge:before
    const{cancelled,payload:pre}=EventBus.emitCancellable('forge:before',{matIds,ctx,nodeEstado,phaseName,cancelled:false});
    if(cancelled)return{cancelled:true};

    const rng=U.rng(Date.now()+Math.random());
    const allTags=matIds.flatMap(id=>D.matTags(id));
    const freq={};allTags.forEach(t=>{freq[t]=(freq[t]||0)+1;});
    const dom=Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
    const tension=Tags.tension(dom);
    const afRes=Tags.aff(dom);
    const c=Clock.get();
    const bonus=[...c.bonusTags];
    if(nodeEstado==='corrompido')bonus.push('corrupto');
    const allTagsPlus=[...dom,...bonus];

    let rType=afRes?.resultado||'consumible',strength=afRes?.fuerza||.3;
    if(tension>.7&&rng()<tension-.4)rType='colapso';
    if(Clock.cycle>=(ModuleLoader.get('mitico_chance_ciclo_min')||10)&&rng()<(ModuleLoader.get('mitico_chance')||.12))rType='mítico';

    // ── Sesgo de modo ──────────────────────────────────────────
    if(modo==='corporal'&&rType!=='colapso'&&rType!=='mítico'){
      // encarnar: forzar resultado habilidad si hay afinidad corporal
      rType='habilidad'; strength=Math.max(strength,0.6);
    } else if(modo==='mágico'&&rType!=='colapso'&&rType!=='mítico'){
      // conjurar: forzar resultado magia si hay afinidad mágica
      rType='magia'; strength=Math.max(strength,0.6);
    }

    // SOCKET: forge:resolve_type — plugins pueden cambiar el tipo resultado
    const resolved=EventBus.emit('forge:resolve_type',{rType,strength,dom,tension,bonus});
    if(resolved){rType=resolved.rType||rType;strength=resolved.strength||strength;}

    if(rType==='colapso'){
      EventBus.emit('forge:collapse',{tension,matIds});
      return{colapso:true,tension};
    }

    const baseStats=this.buildStats(rType,strength,tension,rng);
    if(!baseStats)return{colapso:true,tension};

    const arc=D.archetypes[rType];
    const adj=arc?.adjetivos?.length?U.pick(arc.adjetivos,rng):'?';
    const nou=arc?.sustantivos?.length?U.pick(arc.sustantivos,rng):'?';
    const nombre=`${adj} ${nou}`;
    const blueprint=nombre.toLowerCase().replace(/ /g,'_');
    const tipoMap={habilidad:'habilidad',magia:'magia',arma:'arma',armadura:'armadura',consumible:'consumible',reliquia:'reliquia',anomalía:'anomalía',mítico:'mítico',híbrido:'arma',corrupto:'arma',resonante:'reliquia'};
    const tipo=tipoMap[rType]||'reliquia';

    let habData=null,magData=null;
    if(tipo==='habilidad'){habData=U.pick(D.habPool,rng);baseStats.efecto=habData.efecto;baseStats.desc=habData.desc;baseStats.nombre=habData.nombre;baseStats.evolucion_umbral=habData.evolucion_umbral||10;}
    if(tipo==='magia'){magData=U.pick(D.magPool,rng);baseStats.efecto=magData.efecto;baseStats.desc=magData.desc;baseStats.nombre=magData.nombre;baseStats.cargas=magData.cargas;baseStats.cargas_max=magData.cargas;baseStats.fragilidad=magData.fragilidad_base||0;}

    const imp=Imprint.gen(blueprint,matIds,ctx,tension);
    let item={id:U.uid(),blueprint,nombre,tipo,tags:allTagsPlus.slice(0,5),imprint:imp,estado:'nativo',...baseStats,forjado:true,tension_origen:tension};
    if(habData)item.evolucion={contador:0,umbral:habData.evolucion_umbral||10};

    // ── Propiedades tácticas según tipo ──────────────────────────
    if(['arma','híbrido','corrupto'].includes(tipo)||tipo==='arma'){
      // Durabilidad inicial según tensión (más tensión = más frágil)
      item.durabilidad = Math.round(U.clamp(100 - tension*30, 40, 100));
      item.mellada = false;
      // Daño de poise según ATK
      item.poise_dmg = Math.floor((item.atk||0)*0.3);
      // Bonus de tensión al daño táctico
      item.tension_bonus = Math.floor(tension*4);
    }
    if(tipo==='armadura'){
      item.durabilidad = Math.round(U.clamp(100 - tension*20, 50, 100));
    }
    // ── Anclas: forjables con materiales de su categoría ─────────
    // Si todos los materiales son de categoría ancla o tienen tags ancla
    const todosAncla=matIds.every(id=>D.mat(id)?.categoria==='ancla');
    const hayAncla=matIds.some(id=>D.mat(id)?.categoria==='ancla');
    if(hayAncla){
      // Determinar tipo de ancla por tags dominantes
      let anclaId='ancla_resonante';
      if(dom.includes('corrupto')||dom.includes('metal'))       anclaId='ancla_corrupta';
      else if(dom.includes('antiguo')||dom.includes('orgánico'))anclaId='ancla_antigua';
      else if(dom.includes('inestable')||dom.includes('vacío')) anclaId='ancla_inestable';
      const anclaMatDef=D.mat(anclaId);
      const anclaItem={
        id:U.uid(), blueprint:anclaId,
        nombre:anclaId.replace('_',' '),
        tipo:'material', categoria:'ancla',
        tags:anclaMatDef?.tags||dom.slice(0,2),
        desc:anclaMatDef?.desc||'Ancla de captura forjada.',
        imprint:imp, estado:'forjado', forjado:true,
      };
      EventBus.emit('forge:after',{item:anclaItem,rType:'ancla',tension,domTags:dom,bonus});
      return{item:anclaItem, tension, rType:'ancla', domTags:dom, bonus};
    }

    // Ítems de tipo consumible o reliquia pueden tener efecto táctico
    if(tipo==='consumible'){
      if(dom.includes('medicina')||dom.includes('curativo'))  { item.efecto='hp';item.valor=10+Math.floor(strength*15); }
      else if(dom.includes('energía')||dom.includes('vital')) { item.efecto='stamina';item.valor=20+Math.floor(strength*20); }
      else if(dom.includes('resonante'))                      { item.efecto='elemento_arma';item.elemento='RESONANTE';item.dur=3; }
      else if(dom.includes('fuego')||dom.includes('ardiente')){ item.efecto='elemento_arma';item.elemento='ARDIENDO';item.dur=3; }
      else if(dom.includes('hielo')||dom.includes('frío'))    { item.efecto='elemento_arma';item.elemento='CONGELADO';item.dur=3; }
      else if(dom.includes('rayo')||dom.includes('eléctrico')){ item.efecto='elemento_arma';item.elemento='ELECTRIZADO';item.dur=3; }
      else if(dom.includes('vacío')||dom.includes('corrupto')){ item.efecto='elemento_arma';item.elemento='VACÍO';item.dur=2; }
    }

    // SOCKET: forge:after — plugins pueden modificar el item resultante
    const afterResult=EventBus.emit('forge:after',{item,rType,tension,domTags:dom,bonus});
    if(afterResult?.item)item=afterResult.item;

    return{item,tension,rType,domTags:dom,bonus};
  }
};
