  // Items del inventario del jugador
  function getInventario(filtro){
    return Player.get().inventory
      .filter(i=>!filtro||filtro(i))
      .map(i=>({
        label:i.nombre||i.blueprint,
        value:(i.nombre||i.blueprint).toLowerCase().replace(/ /g,'_'),
        hint:`[${i.tipo}]${i.imprint?' #'+i.imprint.hash.slice(0,4):''}`,
        color:i.tipo==='magia'?'t-mag':i.tipo==='habilidad'?'t-hab':i.tipo==='mítico'||i.tipo==='reliquia'?'t-cor':i.tipo==='consumible'?'t-cra':'t-out',
        group:'inventario',
      }));
  }

  // Solo NPCs en este nodo (nunca de otros nodos)
  function getNPCsAqui(){
    return GS.npcEnNodo(Player.pos())
      .map(n=>({
        label:n.nombre,
        value:n.nombre.toLowerCase().replace(/\s+/g,'_'),
        hint:`[${n.arq_vis}]${n.misiones_ofrecidas.length?' ◈':''}${n.desesperacion>75?' ⚠':''}`,
        color:n.estado==='sometido'?'t-mem':'t-npc',
        group:'npc',
      }));
  }

  // Solo materiales en el inventario — excluir los ya escritos
  function getMaterialesInv(yaEscritos){
    const used=new Set(yaEscritos||[]);
    return Player.get().inventory
      .filter(i=>i.tipo==='material'&&!used.has(i.blueprint))
      .map(i=>({
        label:i.blueprint,value:i.blueprint,
        hint:D.matTags(i.blueprint).join(', '),
        color:'t-cra',group:'inventario',
      }));
  }

  // Solo habilidades encarnadas actualmente
  function getHabilidades(){
    return Player.get().habilidades.map(h=>({
      label:h.nombre,value:h.nombre.toLowerCase().replace(/ /g,'_'),
      hint:`efecto:${h.efecto}  val:${h.valor||'—'}`,color:'t-hab',group:'habilidad',
    }));
  }

  // Solo magias conjuradas (con cargas primero si soloConCargas)
  function getMagias(soloConCargas){
    return Player.get().magias
      .filter(m=>!soloConCargas||m.cargas>0)
      .map(m=>({
        label:m.nombre,value:m.nombre.toLowerCase().replace(/ /g,'_'),
        hint:`cargas:${m.cargas}/${m.cargas_max}  frag:${m.fragilidad||0}%`,
        color:m.cargas>0?'t-mag':'t-dim',group:'magia',
      }));
  }

  // Solo compañeros vinculados actualmente
  function getCompañeros(filtro){
    return Player.get().compañeros
      .filter(c=>!filtro||filtro(c))
      .map(c=>({
        label:c.nombre,value:c.nombre.split('-')[0].toLowerCase(),
        hint:`[${c.arquetipo}] afin:${c.afinidad} vol:${c.voluntad}`,
        color:'t-cri',group:'compañero',
      }));
  }

  // Misiones activas del juego
  function getMisiones(soloAceptadas){
    return GS.activas()
      .filter(m=>!soloAceptadas||m.aceptada)
      .map(m=>({
        label:m.id,value:m.id,
        hint:`"${m.titulo.slice(0,30)}"  [${m.tipo}]${m.aceptada?' ✓':''}`,
        color:'t-mis',group:'mision',
      }));
  }

  // Temas de ayuda registrados
  function getTemasAyuda(){
    return Object.keys(AYUDA_TEMAS).map(k=>({
      label:k,value:k,
      hint:AYUDA_TEMAS[k].desc.slice(0,40)+'…',color:'t-dim',group:'tema',
    }));
  }

  // Plugins activos ahora mismo
  function getPlugins(){
    return PluginLoader.order.map(id=>({label:id,value:id,hint:'plugin activo',color:'t-mag',group:'plugin'}));
  }

  // Solo salidas reales del nodo actual
  function getSalidas(){
    return Object.entries(World.exits(Player.pos())).map(([dir,nid])=>{
      const n=World.node(nid);
      return{label:dir,value:dir,hint:n?`→ ${n.name} [${n.tipo}]`:'',color:'t-sis',group:'salida'};
    });
  }

  // Solo objetos en el suelo de este nodo
  function getSuelo(){
    return(World.node(Player.pos())?.loot||[]).map(l=>({
      label:l,value:l,hint:D.matTags(l).join(', '),color:'t-cra',group:'suelo',
    }));
  }

  // Solo criaturas salvajes en este nodo
  function getCriaturasNodo(){
    return(World.node(Player.pos())?.creatures||[]).map(c=>({
      label:c.nombre,value:c.nombre.split('-')[0].toLowerCase(),
      hint:`[${c.arquetipo}] HP:${c.hp}`,color:'t-cri',group:'criatura',
    }));
  }

  // Solo enemigos en este nodo
  function getEnemigosNodo(){
    return(World.node(Player.pos())?.enemies||[]).map(e=>({
      label:e.nombre,value:e.nombre.toLowerCase().replace(/\s+/g,'_'),
      hint:`HP:${e.hp_current||e.hp}  ATK:${e.atk}`,color:'t-pel',group:'enemigo',
    }));
  }

  // Solo materiales del inv que sirven para recargar
  function getMatRecarga(){
    return Player.get().inventory
      .filter(i=>i.tipo==='material'&&D.matTags(i.blueprint).some(t=>['resonante','corrupto'].includes(t)))
      .map(i=>({label:i.blueprint,value:i.blueprint,hint:D.matTags(i.blueprint).join(', '),color:'t-mag',group:'recarga'}));
  }

  // Solo armas/armaduras del inventario
  function getEquipables(){
    return Player.get().inventory
      .filter(i=>['arma','armadura'].includes(i.tipo))
      .map(i=>({
        label:i.nombre||i.blueprint,
        value:(i.nombre||i.blueprint).toLowerCase().replace(/ /g,'_'),
        hint:`[${i.tipo}]${i.atk?' ATK+'+i.atk:''}${i.def?' DEF+'+i.def:''}`,
        color:'t-cra',group:i.tipo,
      }));
  }

  // Solo consumibles y huevos del inventario
  function getUsables(){
    return Player.get().inventory
      .filter(i=>{
        if(i.blueprint==='huevo_impronta')return true;
        const m=D.mat(i.blueprint);
        return i.tipo==='consumible'||m?.hp||m?.hunger||i.hp||i.hunger;
      })
      .map(i=>({
        label:i.nombre||i.blueprint,
        value:(i.nombre||i.blueprint).toLowerCase().replace(/ /g,'_'),
        hint:i.blueprint==='huevo_impronta'?'incubar':
          `${i.hp||D.mat(i.blueprint)?.hp?'HP+'+(i.hp||D.mat(i.blueprint)?.hp):''}${i.hunger||D.mat(i.blueprint)?.hunger?' HAM+':''}`.trim(),
        color:i.blueprint==='huevo_impronta'?'t-cri':'t-cra',group:'usable',
      }));
  }

  const MODOS=['activo','defensivo','caza','autónomo','latente'];

  // ── Resolver — SOLO opciones válidas en este momento ─────────
  function resolve(raw){
    const parts=raw.split(' ');
    const verb=parts[0].toLowerCase();
    const args=parts.slice(1);
    const nargs=args.length;
    const endsSpace=raw.endsWith(' ');

    // ── MODO BATALLA — reemplaza el autocomplete general ─────────
    const battle=Net.getMyBattle();
    if(battle&&battle.estado==='activo'){
      const actor=Net.getBattleActor?.(battle);
      const esMiTurno=actor?.playerId===Player.get().id;

      // Acciones de batalla disponibles
      const accionesBase=[
        {v:'atacar',   h:'[objetivo?]  atacar combatiente', color:'t-pel'},
        {v:'defender', h:'reducir daño · +15 stamina',      color:'t-sis'},
        {v:'magia',    h:'[nombre?]  usar magia equipada',   color:'t-mag'},
        {v:'habilidad',h:'[nombre?]  usar habilidad',        color:'t-hab'},
        {v:'vincular', h:'[ancla?]  vincular criatura < 30% HP',  color:'t-cri'},
        {v:'huir',     h:'escapar de la batalla (siempre funciona)', color:'t-mem'},
        {v:'examinar', h:'[nombre]  ver stats del combatiente',      color:'t-dim'},
        {v:'batalla',  h:'refrescar estado de la batalla',           color:'t-dim'},
      ];

      // Si no es mi turno, solo mostrar acciones pasivas
      const acciones=esMiTurno
        ? accionesBase
        : accionesBase.filter(a=>['huir','examinar','batalla'].includes(a.v));

      if(nargs===0||(nargs===1&&!endsSpace)){
        // Filtrar por lo que el usuario ha escrito
        const filtered=acciones.filter(a=>a.v.startsWith(verb));
        return{list:filtered.map(a=>({
          label:a.v, value:a.v, hint:a.h, color:a.color||'t-acc', group:'batalla',
        }))};
      }

      // Segundo argumento: objetivo (combatiente vivo enemigo)
      if(['atacar','examinar'].includes(verb)){
        const enemigos=battle.cola.filter(c=>c.vivo&&!c.huyó&&(c.tipo!=='player'||c.playerId!==Player.get().id));
        return{list:enemigos.map(c=>({
          label: c.name,
          value: c.name.toLowerCase().replace(/\s+/g,'_'),
          hint:  `HP:${c.hp}/${c.maxHp}  ATK:${c.atk}${c.poise_roto?' ⚡VULNERABLE':''}${c.elemento_estado?' ['+c.elemento_estado+']':''}`,
          color: c.color||'t-pel',
          group: 'objetivo',
        }))};
      }

      if(verb==='magia'){
        return{list:Player.get().magias.filter(m=>m.cargas>0).map(m=>({
          label:m.nombre, value:m.nombre.toLowerCase().replace(/ /g,'_'),
          hint:`cargas:${m.cargas}/${m.cargas_max}`,color:'t-mag',group:'magia',
        }))};
      }

      if(verb==='habilidad'){
        return{list:Player.get().habilidades.map(h=>({
          label:h.nombre, value:h.nombre.toLowerCase().replace(/ /g,'_'),
          hint:`efecto:${h.efecto}`,color:'t-hab',group:'habilidad',
        }))};
      }

      return{list:[]};
    }

    // Completar verbo parcial
    if(nargs===0||(nargs===1&&!endsSpace)){
      const verbos=getVerbs();
      return{list:verbos.filter(b=>b.v.startsWith(verb)).map(b=>({
        label:b.v,value:b.v,hint:b.h,color:'t-acc',group:'comando',
      }))};
    }

    // Helper: args ya confirmados (todos excepto el que se está escribiendo)
    const yaEscritos=endsSpace?args:args.slice(0,-1);

    switch(verb){

      case 'ir':case 'go':
        return{list:getSalidas()};

      case 'hablar':case 'observar':case 'traicionar':
        return{list:getNPCsAqui()};

      case 'preguntar':
        if(nargs<=1||(!endsSpace&&nargs===1))return{list:getNPCsAqui()};
        return{list:['deseo','miedo','secreto','pasado','anterior','vínculo'].map(t=>({
          label:t,value:t,
          hint:{deseo:'libre',miedo:'leal>40',secreto:'leal>50',pasado:'leal>60',anterior:'ecos',vínculo:'vínculos'}[t],
          color:'t-dim',group:'tema',
        }))};

      case 'atacar':
        return{list:[...getNPCsAqui(),...getEnemigosNodo()]};

      case 'capturar':
        return{list:getCriaturasNodo()};

      case 'recoger':case 'tomar':
        return{list:getSuelo()};

      case 'soltar':case 'drop':
        return{list:getInventario()};

      case 'equipar':
        return{list:getEquipables()};

      case 'usar':
        return{list:getUsables()};

      case 'examinar':case 'ex':
        return{list:[...getInventario(),...getHabilidades(),...getMagias(),...getCompañeros(),...getNPCsAqui()]};

      case 'forjar':case 'encarnar':case 'conjurar':
        return{list:getMaterialesInv(yaEscritos)};

      case 'fusionar':{
        const usedSet=new Set(yaEscritos);
        return{list:[
          ...getInventario(i=>!usedSet.has((i.nombre||i.blueprint).toLowerCase().replace(/ /g,'_'))),
          ...getHabilidades().filter(h=>!usedSet.has(h.value)),
          ...getMagias().filter(m=>!usedSet.has(m.value)),
        ]};
      }

      case 'lanzar':
        return{list:getMagias(true)};

      case 'recargar':
        if(nargs<=1||(!endsSpace&&nargs===1))return{list:getMagias()};
        return{list:getMatRecarga()};

      case 'liberar':case 'nombrar':
        return{list:getCompañeros()};

      case 'modo':
        if(nargs<=1||(!endsSpace&&nargs===1))return{list:getCompañeros()};
        return{list:MODOS.map(m=>({label:m,value:m,
          hint:{activo:'ataca',defensivo:'protege',caza:'prioriza HP',autónomo:'decide solo',latente:'descansa'}[m],
          color:'t-cri',group:'modo'}))};

      case 'criar':{
        const ya=new Set(yaEscritos);
        return{list:getCompañeros(c=>c.afinidad>=60&&!ya.has(c.nombre.split('-')[0].toLowerCase()))};
      }

      case 'aceptar':
        return{list:getMisiones(false).filter(m=>!GS.mision(m.value)?.aceptada)};

      case 'rechazar':
        return{list:getMisiones(false)};

      case 'completar':
        return{list:getMisiones(true)};

      case 'ayuda':case 'help':case '?':
        return{list:getTemasAyuda()};

      case 'descargar_plugin':
        return{list:getPlugins()};

      case 'nombre':
        return{list:[{label:Player.get().name,value:Player.get().name.replace(/\s+/g,'_'),hint:'nombre actual',color:'t-npc',group:'nombre'}]};

      case 'mapa':case 'map':{
        // Segundo argumento: nombre de jugador para pathfinding
        const otrosJ=Object.values(Net.getPlayers()).filter(p=>p.id!==Player.get().id);
        if(!otrosJ.length) return{list:[]};
        return{list:otrosJ.map(p=>({
          label:p.name, value:p.name.toLowerCase().replace(/\s+/g,'_'),
          hint:`→ ${World.node(p.nodeId)?.name||p.nodeId}  [${BossSystem.distancia(Player.pos(),p.nodeId)} pasos]`,
          color:p.color||'t-eco', group:'jugador',
        }))};
      }

      case 'asignar':case 'assign':
        return{list:Object.entries(XP.ATRIBUTOS).map(([k,def])=>({
          label:k, value:k, hint:def.desc, color:def.color, group:'atributo',
        }))};

      default:
        return{list:[]};
    }
  }

  // ── Filtrar lista por lo que ya escribió el usuario ───────────
  function filter(list, partial){
    if(!partial)return list;
    const q=partial.toLowerCase();
    return list.filter(i=>(i.value||i.label).toLowerCase().startsWith(q)||i.label.toLowerCase().startsWith(q));
  }

  // ── Render del dropdown ───────────────────────────────────────
  function render(list){
    el.innerHTML='';
    if(!list.length){hide();return;}

    let lastGroup='';
    list.slice(0,18).forEach((item,i)=>{
      // Separador de grupo
      if(item.group && item.group!==lastGroup){
        const sep=document.createElement('div');
        sep.className='ac-sep';
        const labels={
          comando:'comandos',inventario:'inventario',
          npc:'aquí',habilidad:'habilidades',magia:'magias',
          compañero:'compañeros',mision:'misiones',tema:'temas',plugin:'plugins',
          salida:'salidas',suelo:'en el suelo',criatura:'criaturas',enemigo:'enemigos',
          arma:'armas',armadura:'armaduras',usable:'usables',recarga:'recarga',
          modo:'modos',nombre:'nombre',atributo:'atributos',batalla:'acciones de batalla',objetivo:'objetivos',jugador:'jugadores',
        };
        sep.textContent=(labels[item.group]||item.group).toUpperCase();
        el.appendChild(sep);
        lastGroup=item.group;
      }
      const d=document.createElement('div');
      d.className='ac-item'+(i===sel?' ac-sel':'');
      d.dataset.idx=i;
      d.innerHTML=`<span class="ac-verb ${item.color||'t-out'}">${item.label}</span><span class="ac-hint">${item.hint||''}</span>`;
      d.addEventListener('mousedown',ev=>{ev.preventDefault();applyItem(item);});
      el.appendChild(d);
    });
    el.style.display='block';
    items=list.slice(0,18);
  }

  function hide(){el.style.display='none';sel=-1;items=[];}

  function setSel(idx){
    sel=U.clamp(idx,0,items.length-1);
    el.querySelectorAll('.ac-item').forEach((d,i)=>d.classList.toggle('ac-sel',i===sel));
    // Scroll al elemento seleccionado
    const active=el.querySelectorAll('.ac-item')[sel];
    if(active)active.scrollIntoView({block:'nearest'});
  }

  // ── Aplicar ítem seleccionado al input ────────────────────────
  function applyItem(item){
    const raw=inp.value;
    const parts=raw.split(' ');
    const verb=parts[0];
    const args=parts.slice(1);
    const val=item.value||item.label;

    if(!raw.includes(' ')){
      // Completar el verbo
      inp.value=val+' ';
    } else {
      // Reemplazar el último argumento
      args[Math.max(0,args.length-1)]=val;
      inp.value=verb+' '+args.join(' ')+' ';
    }
    hide();
    inp.focus();
    // Re-trigger para siguiente argumento
    setTimeout(()=>update(),50);
  }

  // ── Actualizar dropdown según input actual ────────────────────
  function update(){
    const raw=inp.value;
    if(!raw.trim()){hide();return;}

    const parts=raw.split(' ');
    const endsWithSpace=raw.endsWith(' ');
    const verb=parts[0].toLowerCase();
    const args=parts.slice(1);
    const lastArg=endsWithSpace?'':(args[args.length-1]||'');

    const{list}=resolve(endsWithSpace?raw:raw.slice(0,raw.lastIndexOf(' ')+1)||raw);

    if(!list.length){hide();return;}

    // Filtrar por lo que el usuario ya escribió en el argumento actual
    const filtered = endsWithSpace ? list : filter(list, lastArg);
    sel=-1;
    render(filtered);
  }

  return{
    hide,
    update,
    moveDown(){ if(!items.length)return false; setSel(sel<0?0:sel+1); return true; },
    moveUp(){   if(!items.length)return false; setSel(sel<=0?0:sel-1); return true; },
    accept(){
      if(sel>=0&&sel<items.length){ applyItem(items[sel]); return true; }
      if(items.length===1){ applyItem(items[0]); return true; }
      return false;
    },
    isOpen(){ return el.style.display==='block'; },
  };
})();

// ════════════════════════════════════════════════════════════════
// INPUT
// ════════════════════════════════════════════════════════════════
const inp=document.getElementById('inp');

inp.addEventListener('input', ()=>AC.update());

inp.addEventListener('keydown',async e=>{
  // Navegación en autocomplete
  if(AC.isOpen()){
    if(e.key==='ArrowDown'){ AC.moveDown(); e.preventDefault(); return; }
    if(e.key==='ArrowUp'){
      // Si ya estamos en el primero, cerrar y dejar el historial
      if(!AC.moveUp()){ AC.hide(); }
      e.preventDefault(); return;
    }
    if(e.key==='Tab'||e.key==='ArrowRight'){
      if(AC.accept()){ e.preventDefault(); return; }
    }
    if(e.key==='Escape'){ AC.hide(); e.preventDefault(); return; }
  } else {
    // Sin autocomplete: flechas navegan historial
    if(e.key==='ArrowUp'){ inp.value=Hist.up(); AC.hide(); e.preventDefault(); return; }
    if(e.key==='ArrowDown'){ inp.value=Hist.down(); AC.hide(); e.preventDefault(); return; }
    if(e.key==='Tab'){ e.preventDefault(); AC.update(); return; }
  }

  if(e.key==='Enter'){
    AC.hide();
    const raw=inp.value.trim();
    if(!raw)return;
    R.echo(raw);Hist.push(raw);inp.value='';
    await dispatch(parse(raw));R.upd();
  }
});

inp.addEventListener('blur', ()=>setTimeout(()=>AC.hide(), 150));
inp.addEventListener('focus', ()=>{ if(inp.value.trim()) AC.update(); });

document.getElementById('out').addEventListener('click',()=>inp.focus());
(async()=>{await bootSeq();await init();inp.focus();})();
</script>
