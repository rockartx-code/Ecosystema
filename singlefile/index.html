    'ELECTRIZADO+RESONANTE':{ nombre:'Sobrecarga',    mult:1.9, stun:true,        color:'t-cor', desc:'Aturde al objetivo 1 turno' },
  };

  // ── 3. CLIMAS DE NODO ──────────────────────────────────────────
  const CLIMAS_NODO = {
    hub:       { nombre:'Refugio',       mult_reac:1.0, elemento_base:null,         desc:'Sin efectos especiales' },
    ruina:     { nombre:'Ruina Antigua', mult_reac:1.2, elemento_base:'RESONANTE',  desc:'Resonancia ambiental: +20% reacciones' },
    bosque:    { nombre:'Bosque',        mult_reac:1.1, elemento_base:'MOJADO',     desc:'Humedad: todos empiezan mojados' },
    caverna:   { nombre:'Caverna',       mult_reac:1.3, elemento_base:'RESONANTE',  desc:'Eco: ataques resonantes x1.3' },
    abismo:    { nombre:'Abismo',        mult_reac:2.0, elemento_base:'VACÍO',      desc:'Todas las reacciones x2' },
    pantano:   { nombre:'Pantano',       mult_reac:1.2, elemento_base:'MOJADO',     desc:'Veneno ambiental: turnos en pantano = envenenado' },
    cumbre:    { nombre:'Cumbre',        mult_reac:1.1, elemento_base:'CONGELADO',  desc:'Frío extremo: criaturas de fuego debilitadas' },
    yermo:     { nombre:'Yermo',         mult_reac:1.1, elemento_base:'ARDIENDO',   desc:'Calor seco: fuego amplificado' },
    templo:    { nombre:'Templo',        mult_reac:1.5, elemento_base:'RESONANTE',  desc:'Resonancia sagrada: magias x1.5' },
    umbral:    { nombre:'Umbral',        mult_reac:1.4, elemento_base:'VACÍO',      desc:'Entre mundos: vacío amplificado' },
  };

  // ── 4. SUPERFICIES DINÁMICAS ──────────────────────────────────
  // superficie_actual → { ataque_elemento } → nueva_superficie
  const REACCIONES_SUPERFICIE = {
    'mojada+ARDIENDO':    { resultado:'niebla',       dur:3, efecto:'evasion_area' },
    'mojada+ELECTRIZADO': { resultado:'electrificada',dur:4, efecto:'daño_por_turno' },
    'ardiente+MOJADO':    { resultado:'ceniza',       dur:2, efecto:'reduce_velocidad' },
    'congelada+ARDIENDO': { resultado:'agua',         dur:2, efecto:'mojado_area' },
    'normal+MOJADO':      { resultado:'mojada',       dur:3, efecto:null },
    'normal+ARDIENDO':    { resultado:'ardiente',     dur:3, efecto:'daño_zona' },
    'normal+CONGELADO':   { resultado:'congelada',    dur:3, efecto:'reduce_velocidad' },
    'normal+ELECTRIZADO': { resultado:'electrificada',dur:3, efecto:'daño_por_turno' },
  };

  const EFECTOS_SUPERFICIE = {
    niebla:         { icon:'🌫', color:'t-dim', desc:'30% fallo de ataques en este nodo' },
    electrificada:  { icon:'⚡', color:'t-mag', desc:'2 daño/turno a quien esté en el nodo' },
    mojada:         { icon:'💧', color:'t-sis', desc:'Todos los combatientes quedan MOJADOS al inicio del turno' },
    ardiente:       { icon:'🔥', color:'t-pel', desc:'1 daño/turno a quien esté en el nodo' },
    ceniza:         { icon:'🌑', color:'t-dim', desc:'Reduce 1 de velocidad' },
    congelada:      { icon:'❄',  color:'t-acc', desc:'Moverse cuesta el doble de stamina' },
    agua:           { icon:'🌊', color:'t-sis', desc:'Zona mojada, +daño eléctrico' },
    normal:         { icon:'',   color:'t-dim', desc:'Sin efectos' },
  };

  // ── 5. HERIDAS PERSISTENTES ────────────────────────────────────
  const HERIDAS = {
    FRACTURA:    { icon:'🦴', color:'t-pel', desc:'ATK -30%, requiere reposo largo o medicina',    turnosDuracion:-1 },
    HEMORRAGIA:  { icon:'🩸', color:'t-pel', desc:'Pierde 3HP/turno y al moverse, requiere venda', turnosDuracion:-1 },
    CONMOCION:   { icon:'💫', color:'t-dim', desc:'Magias fallan 40%, desorientado',               turnosDuracion:5 },
    QUEMADURA:   { icon:'🔥', color:'t-mem', desc:'DEF -20%, dolores agudos',                      turnosDuracion:3 },
    ENVENENAMIENTO:{icon:'☠', color:'t-mem', desc:'Pierde 2HP/turno fuera de combate',             turnosDuracion:-1 },
  };

  // Probabilidad de herida según daño recibido de un solo golpe
  function calcularHerida(dmg, maxHp){
    const pct=dmg/maxHp;
    if(pct>=0.4) return U.chance(0.6)?'FRACTURA':U.chance(0.5)?'HEMORRAGIA':'CONMOCION';
    if(pct>=0.25) return U.chance(0.35)?'HEMORRAGIA':U.chance(0.3)?'CONMOCION':null;
    if(pct>=0.15) return U.chance(0.15)?'QUEMADURA':null;
    return null;
  }

  // ── Estado de batalla extendido por nodo ──────────────────────
  // nodeId → { superficie, turnosRestantes, daño_por_turno }
  const superficies = {};  // persiste entre batallas

  function getSup(nodeId){ return superficies[nodeId]||{tipo:'normal',turnosRestantes:0}; }

  function setSup(nodeId, tipo, dur){
    superficies[nodeId]={tipo, turnosRestantes:dur, icon:EFECTOS_SUPERFICIE[tipo]?.icon||'', color:EFECTOS_SUPERFICIE[tipo]?.color||'t-dim'};
  }

  function tickSup(nodeId){
    const s=superficies[nodeId];
    if(!s||s.tipo==='normal')return;
    s.turnosRestantes--;
    if(s.turnosRestantes<=0) delete superficies[nodeId];
  }

  // ── Aplicar elemento a un combatiente ────────────────────────
  function aplicarElemento(combatiente, elemento, battle){
    const prev=combatiente.elemento_estado;
    // Buscar reacción
    const reacKey=prev?`${prev}+${elemento}`:null;
    const reac=reacKey?REACCIONES[reacKey]:null;
    if(reac){
      return { reaccion:reac, prev, nuevo:elemento };
    }
    combatiente.elemento_estado=elemento;
    return { reaccion:null, prev, nuevo:elemento };
  }

  // ── Calcular modificador de clima ─────────────────────────────
  function multClima(nodeId, elemento){
    const n=World.node(nodeId);
    const tipo=n?.tipo||'hub';
    const clima=CLIMAS_NODO[tipo]||CLIMAS_NODO.hub;
    let mult=1.0;
    // Si el elemento coincide con el elemento base del clima, bonus
    if(clima.elemento_base===elemento) mult+=0.25;
    return mult;
  }

  function getClimaDesc(nodeId){
    const n=World.node(nodeId);
    const tipo=n?.tipo||'hub';
    return CLIMAS_NODO[tipo]||CLIMAS_NODO.hub;
  }

  // ── Modificador de superficie ─────────────────────────────────
  function multSuperficie(nodeId, elemento){
    const s=getSup(nodeId);
    const key=`${s.tipo}+${elemento}`;
    if(REACCIONES_SUPERFICIE[key]) return 1.3; // bonus por reacción con superficie
    if(s.tipo==='electrificada'&&elemento==='ELECTRIZADO') return 1.5;
    if(s.tipo==='mojada'&&elemento==='MOJADO') return 1.2;
    return 1.0;
  }

  // ── Calcular aura de compañeros ───────────────────────────────
  function getAuraComp(nodeId){
    const comps=Player.get().compañeros.filter(c=>c.nodeId===nodeId||!c.nodeId);
    if(!comps.length)return null;
    // El primer compañero vivo tiene aura
    const c=comps[0];
    const tags=c.tags||c.arquetipo_tags||[];
    if(tags.includes('fuego'))   return 'ARDIENDO';
    if(tags.includes('agua'))    return 'MOJADO';
    if(tags.includes('rayo'))    return 'ELECTRIZADO';
    if(tags.includes('hielo'))   return 'CONGELADO';
    if(tags.includes('eco')||tags.includes('resonante')) return 'RESONANTE';
    if(tags.includes('corrupto')||tags.includes('vacío')) return 'VACÍO';
    return null;
  }

  // ── Sistema de Poise (postura) ────────────────────────────────
  function calcPoise(enemigo){
    // Poise máximo según tipo de enemigo
    const base={player:80,npc:60,enemy:50,creature:40};
    return enemigo.poise_max||(base[enemigo.tipo]||50);
  }

  function aplicarPoiseDmg(combatiente, dmg, battle){
    if(combatiente.tipo==='player')return false; // jugadores no tienen poise
    combatiente.poise=combatiente.poise!=null?combatiente.poise:calcPoise(combatiente);
    combatiente.poise=Math.max(0,combatiente.poise-dmg);
    if(combatiente.poise<=0&&!combatiente.poise_roto){
      combatiente.poise_roto=true;
      combatiente.poise_turnos=2; // vulnerable 2 turnos
      battleLog(battle,`⚡ POSTURA ROTA — ${combatiente.name} queda VULNERABLE (crítico x1.5)!`,'t-cor');
      return true;
    }
    return false;
  }

  // ── FÓRMULA FACTORIAL PRINCIPAL ───────────────────────────────
  function calcularDaño(actor, target, arma, elemento, battle){
    const p=Player.get();
    const nodeId=battle.nodeId;

    // 1. Daño base
    let base = actor.atk + (arma?.atk||0) + (arma?.tension_bonus||0);

    // 2. Tensión de forja (impronta del arma)
    const tensionBonus = arma?.imprint?.tension ? Math.floor(arma.imprint.tension * 5) : 0;
    base += tensionBonus;

    // 3. Stamina del jugador
    const stamina = p.stamina!=null ? p.stamina : (p.maxStamina||100);
    const staminaFloor=(p._stamina_floor||0)*(p.maxStamina||100);
    const staminaMult = stamina < staminaFloor+1 ? 0.5 :   // devorador_ciclos: floor dinámico
                        stamina < (p.maxStamina||100)*0.2 ? 0.5 :
                        stamina < (p.maxStamina||100)*0.5 ? 0.75 : 1.0;

    // 4. Clima del nodo
    const climaMult = elemento ? multClima(nodeId, elemento) : 1.0;

    // 5. Superficie
    const supMult = elemento ? multSuperficie(nodeId, elemento) : 1.0;

    // 6. Reacción elemental
    let reacMult = 1.0;
    let reaccion = null;
    if(elemento && target.elemento_estado){
      const key=`${target.elemento_estado}+${elemento}`;
      reaccion = REACCIONES[key];
      if(reaccion) reacMult = reaccion.mult * (CLIMAS_NODO[World.node(nodeId)?.tipo||'hub']?.mult_reac||1.0);
    }

    // 7. Aura de compañero (sintonía)
    const aura = getAuraComp(nodeId);
    const sintonía = (aura && aura===elemento) ? 1.2 : 1.0;
    // Bonus mítico antiguo_resonante (+30% reacciones resonantes)
    if(reaccion&&elemento==='RESONANTE'&&p._reac_resonante) reacMult*=(p._reac_resonante||1);
    // Inmunidad al VACÍO del leviatán (no amplifica reacción, pero sí puede recibir el estado)
    if(elemento==='VACÍO'&&actor.playerId===p.id&&p._inmune_vacio){ reacMult=1.0; }

    // ── RESONANTE activo en el actor — amplifica este ataque ─────
    let resonanteMult=1.0;
    if(actor._resonante_listo&&actor.elemento_estado==='RESONANTE'){
      resonanteMult=1.3;
      actor._resonante_listo=false;
      actor.elemento_estado=null; // consumir el estado
    }

    // ── Potenciadores tácticos del jugador ────────────────────────
    let reacBoostMult=1.0;
    if(reaccion&&actor.playerId===p.id&&p._reaccion_boost){
      reacBoostMult=p._reaccion_boost;
      p._reaccion_boost=null; // consumir tras la primera reacción
    }

    // 8. Poise roto = crítico
    const poiseMult = target.poise_roto ? 1.5 : 1.0;

    // 9. Heridas del actor (fractura = atk -30%)
    const heridasMult = (p.heridas||[]).includes('FRACTURA') ? 0.7 : 1.0;

    // 10. Defensa del objetivo — con penalizaciones de estado
    let defTarget = target.poise_roto ? 0 :
                    (reaccion?.def_break||reaccion?.ignore_def) ? 0 :
                    (target.def||0) + (target.defendiendo?Math.ceil((target.def||1)/2):0);
    // VACÍO en el objetivo — reduce su DEF un 40%
    if(target.elemento_estado==='VACÍO') defTarget=Math.floor(defTarget*0.6);
    // QUEMADURA en el objetivo — reduce DEF un 20%
    if((target.heridas||[]).includes('QUEMADURA')) defTarget=Math.floor(defTarget*0.8);

    // Durabilidad del arma (con elemento temporal)
    const durMult = arma ? Math.max(0.3, (arma.durabilidad||100)/100) : 1.0;

    // Fórmula factorial completa
    const raw = base * staminaMult * climaMult * supMult * reacMult * reacBoostMult * resonanteMult * sintonía * poiseMult * heridasMult * durMult;
    const dmg = Math.max(1, Math.floor(raw - defTarget));

    return { dmg, reaccion, staminaMult, climaMult, supMult, reacMult, sintonía, poiseMult, tensionBonus, resonanteMult, reacBoostMult };
  }

  // ── Aplicar efectos de reacción ───────────────────────────────
  function aplicarReaccion(reaccion, actor, target, battle){
    if(!reaccion)return;

    // Daño en área
    if(reaccion.area){
      battle.cola.filter(c=>c.vivo&&c.id!==actor.id&&_sonEnemigos(actor,c)&&c.id!==target.id).forEach(c=>{
        const splash=Math.floor(Math.random()*6)+3;
        c.hp=Math.max(0,c.hp-splash);
        battleLog(battle,`  ↳ ${c.name} recibe ${splash} de daño en área.`,'t-pel');
        if(c.hp<=0){c.vivo=false;battleLog(battle,`  ${c.name} cae.`,'t-cor');}
      });
    }

    // Efectos de estado en target
    if(reaccion.efecto==='stun_1t'||reaccion.stun) { target.stun_turnos=1; battleLog(battle,`  ↳ ${target.name} ATURDIDO 1 turno.`,'t-acc'); }
    if(reaccion.efecto==='inmovil')  { target.inmovil_turnos=reaccion.dura||2; battleLog(battle,`  ↳ ${target.name} INMÓVIL ${reaccion.dura||2} turnos.`,'t-acc'); }
    if(reaccion.silence)             { target.silenciado=true; battleLog(battle,`  ↳ ${target.name} SILENCIADO (sin magias).`,'t-mag'); }
    if(reaccion.def_break)           { target.def_rota=true;   battleLog(battle,`  ↳ DEF de ${target.name} ELIMINADA este turno.`,'t-cor'); }
    if(reaccion.poise_dmg)           { aplicarPoiseDmg(target, reaccion.poise_dmg, battle); }
    if(reaccion.remove)              { target.elemento_estado=null; }

    // Limpiar estado elemental del target después de reacción
    target.elemento_estado=null;
  }

  // ── Actualizar superficie después de un ataque ────────────────
  function actualizarSuperficie(nodeId, elemento, battle){
    const s=getSup(nodeId);
    const key=`${s.tipo}+${elemento}`;
    const reacSup=REACCIONES_SUPERFICIE[key];
    if(reacSup){
      setSup(nodeId, reacSup.resultado, reacSup.dur);
      battleLog(battle,`  ↳ Superficie → ${reacSup.resultado.toUpperCase()} (${reacSup.dur} turnos). ${EFECTOS_SUPERFICIE[reacSup.resultado]?.desc||''}`,EFECTOS_SUPERFICIE[reacSup.resultado]?.color||'t-dim');
    } else {
      // Aplicar elemento directamente a la superficie
      const directKey=`normal+${elemento}`;
      const directReac=REACCIONES_SUPERFICIE[directKey];
      if(directReac&&s.tipo==='normal'){
        setSup(nodeId, directReac.resultado, directReac.dur);
      }
    }
    // Aplicar efecto de superficie existente a combatientes
    _aplicarEfectoSup(nodeId, battle);
  }

  function _aplicarEfectoSup(nodeId, battle){
    const s=getSup(nodeId);
    if(s.tipo==='normal')return;
    const efecto=EFECTOS_SUPERFICIE[s.tipo];
    if(!efecto)return;

    if(s.tipo==='mojada'||s.tipo==='agua'){
      // Todos los combatientes quedan MOJADOS si no tienen ya un elemento
      battle.cola.filter(c=>c.vivo&&!c.elemento_estado).forEach(c=>{ c.elemento_estado='MOJADO'; });
    }
    if(s.tipo==='electrificada'||s.tipo==='ardiente'){
      const dmg=s.tipo==='electrificada'?2:1;
      battle.cola.filter(c=>c.vivo).forEach(c=>{
        c.hp=Math.max(0,c.hp-dmg);
        if(c.hp<=0)c.vivo=false;
      });
      battleLog(battle,`  ↳ Superficie ${efecto.icon} daña a todos (${dmg} HP).`,efecto.color);
    }
    if(s.tipo==='congelada'){
      // Moverse en congelada cuesta +10 stamina adicional (se aplica al jugador)
      const p=Player.get();
      p.stamina=Math.max(0,(p.stamina||0)-10);
      battleLog(battle,`  ❄ Superficie congelada — stamina −10.`,'t-acc');
    }
    if(s.tipo==='ceniza'){
      // Reduce iniciativa: los combatientes más lentos van un turno después
      // Se implementa como skip de probabilidad 30%
      battle.cola.filter(c=>c.vivo&&c.tipo!=='player').forEach(c=>{
        if(Math.random()<0.3) c.skipping=true;
      });
    }
  }

  // ── Tick de inicio de turno (heridas, venenos, estados, poise) ──
  function tickTurno(combatiente, battle){
    // Hemorragia
    if((combatiente.heridas||[]).includes('HEMORRAGIA')){
      const dmg=3; combatiente.hp=Math.max(0,combatiente.hp-dmg);
      battleLog(battle,`  🩸 ${combatiente.name} sangra (−${dmg}HP).`,'t-pel');
      if(combatiente.hp<=0){combatiente.vivo=false;}
    }
    // Envenenado (escala por stacks)
    if(combatiente.elemento_estado==='ENVENENADO'){
      const dmg=combatiente.veneno_stacks||2;
      combatiente.hp=Math.max(0,combatiente.hp-dmg);
      combatiente.veneno_stacks=(combatiente.veneno_stacks||2)+1;
      battleLog(battle,`  ☠ ${combatiente.name} envenenado (−${dmg}HP).`,'t-mem');
      if(combatiente.hp<=0){combatiente.vivo=false;}
    }
    // ARDIENDO — daño por turno
    if(combatiente.elemento_estado==='ARDIENDO'){
      combatiente.hp=Math.max(0,combatiente.hp-2);
      battleLog(battle,`  🔥 ${combatiente.name} arde (−2HP).`,'t-pel');
      if(combatiente.hp<=0){combatiente.vivo=false;}
    }
    // ELECTRIZADO — daño por turno
    if(combatiente.elemento_estado==='ELECTRIZADO'){
      combatiente.hp=Math.max(0,combatiente.hp-2);
      battleLog(battle,`  ⚡ ${combatiente.name} electrizado (−2HP).`,'t-mag');
      if(combatiente.hp<=0){combatiente.vivo=false;}
    }
    // CONGELADO — salta 1 de cada 2 turnos (ralentiza)
    if(combatiente.elemento_estado==='CONGELADO'){
      combatiente._congelado_tick=(combatiente._congelado_tick||0)+1;
      if(combatiente._congelado_tick%2===0){
        combatiente.skipping=true;
        battleLog(battle,`  ❄ ${combatiente.name} está congelado y no puede actuar.`,'t-acc');
      }
    } else { combatiente._congelado_tick=0; }
    // SANGRANDO (estado elemental distinto de la herida HEMORRAGIA)
    if(combatiente.elemento_estado==='SANGRANDO'){
      const dmg=2; combatiente.hp=Math.max(0,combatiente.hp-dmg);
      battleLog(battle,`  🩸 ${combatiente.name} sangra (−${dmg}HP).`,'t-pel');
      if(combatiente.hp<=0){combatiente.vivo=false;}
    }
    // RESONANTE — marca que el próximo ataque de este combatiente está amplificado
    if(combatiente.elemento_estado==='RESONANTE'){
      combatiente._resonante_listo=true;
      // El estado se consume en calcularDaño cuando el combatiente ataca
    }
    // Poise recovery
    if(combatiente.poise_roto){
      combatiente.poise_turnos=(combatiente.poise_turnos||0)-1;
      if(combatiente.poise_turnos<=0){
        combatiente.poise_roto=false;
        combatiente.poise=calcPoise(combatiente)*0.5;
        battleLog(battle,`  ${combatiente.name} recupera postura (50%).`,'t-dim');
      }
    }
    // Stun
    if(combatiente.stun_turnos>0){
      combatiente.stun_turnos--;
      if(combatiente.stun_turnos>0) combatiente.skipping=true;
    } else if(!combatiente.inmovil_turnos) { combatiente.skipping=false; }
    // Inmóvil
    if(combatiente.inmovil_turnos>0){
      combatiente.inmovil_turnos--;
      combatiente.skipping=true;
    }
    // Conmoción — se maneja en case 'magia'
    // Def rota dura 1 turno
    if(combatiente.def_rota) combatiente.def_rota=false;
    // Silencio dura 2 turnos
    if(combatiente.silenciado){
      combatiente._silencio_turnos=(combatiente._silencio_turnos||2)-1;
      if(combatiente._silencio_turnos<=0) combatiente.silenciado=false;
    }
    // Niebla personal del jugador (_niebla_turnos)
    if(combatiente.playerId===Player.get().id){
      const p=Player.get();
      if(p._niebla_turnos>0) p._niebla_turnos--;
    }
  }

  // ── Aura de compañero al inicio del turno del jugador ─────────
  function aplicarAura(battle, nodeId){
    const aura=getAuraComp(nodeId);
    if(!aura)return;
    // El aura del compañero aplica el elemento a un enemigo random
    const enemigos=battle.cola.filter(c=>c.vivo&&(c.tipo==='enemy'||c.tipo==='npc'));
    if(!enemigos.length)return;
    const target=enemigos[Math.floor(Math.random()*enemigos.length)];
    if(!target.elemento_estado){
      target.elemento_estado=aura;
      battleLog(battle,`  ✦ Aura del compañero aplica ${aura} a ${target.name}.`,ELEMENTOS[aura]?.color||'t-eco');
    }
  }

  // ── Determinar elemento del arma/magia ────────────────────────
  function getElementoArma(arma){
    if(!arma)return null;
    // Elemento temporal (infusión de ítem) — tiene prioridad sobre tags
    if(arma._elemento_temporal&&(arma._elemento_dur||0)>0) return arma._elemento_temporal;
    const tags=arma.tags||[];
    if(tags.includes('fuego')||tags.includes('ardiente'))  return 'ARDIENDO';
    if(tags.includes('agua')||tags.includes('mojado'))     return 'MOJADO';
    if(tags.includes('rayo')||tags.includes('eléctrico'))  return 'ELECTRIZADO';
    if(tags.includes('hielo')||tags.includes('frío'))      return 'CONGELADO';
    if(tags.includes('resonante')||tags.includes('sonido'))return 'RESONANTE';
    if(tags.includes('vacío')||tags.includes('corrupto'))  return 'VACÍO';
    if(tags.includes('veneno'))                            return 'ENVENENADO';
    return null;
  }

  // ── Desgaste de arma + decremento de elemento temporal ────────
  function desgastarArma(arma){
    if(!arma)return;
    arma.durabilidad=Math.max(0,(arma.durabilidad!=null?arma.durabilidad:100)-U.rand(1,4));
    if(arma.durabilidad===0) arma.mellada=true;
    // Decrementar duración del elemento temporal tras cada ataque
    if(arma._elemento_temporal&&arma._elemento_dur>0){
      arma._elemento_dur--;
      if(arma._elemento_dur<=0){
        arma._elemento_temporal=null;
        arma._elemento_dur=0;
      }
    }
  }

  // ── Stamina y Maná ────────────────────────────────────────────
  function consumirStamina(coste){
    const p=Player.get();
    p.stamina=Math.max(0,(p.stamina!=null?p.stamina:p.maxStamina||100)-coste);
  }
  function consumirMana(coste){
    const p=Player.get();
    p.mana=Math.max(0,(p.mana!=null?p.mana:p.maxMana||60)-coste);
    return p.mana>=0;
  }
  function staminaPct(){
    const p=Player.get();
    return (p.stamina!=null?p.stamina:p.maxStamina||100)/(p.maxStamina||100);
  }

  // ── Render de estado táctico ──────────────────────────────────
  function renderTactico(battle){
    const nodeId=battle.nodeId;
    const clima=getClimaDesc(nodeId);
    const sup=getSup(nodeId);
    R.sp();
    R.w(`  CLIMA: ${clima.nombre} ${sup.tipo!=='normal'?'| SUP: '+sup.tipo.toUpperCase()+'('+sup.turnosRestantes+'t)':''}  — ${clima.desc}`,'t-dim');
    const aura=getAuraComp(nodeId);
    if(aura) R.w(`  ✦ AURA COMPAÑERO: ${aura}  ${ELEMENTOS[aura]?.desc||''}`,ELEMENTOS[aura]?.color||'t-eco');
    // Estados de los combatientes
    battle.cola.filter(c=>c.vivo).forEach(c=>{
      const el=c.elemento_estado?(` [${c.elemento_estado}${ELEMENTOS[c.elemento_estado]?.icon||''}]`):'';
      const poise=c.poise!=null?` POISE:${c.poise}/${calcPoise(c)}`:'';
      const roto=c.poise_roto?' ⚡VULNERABLE':'';
      const stun=c.stun_turnos>0?' 💫ATURDIDO':'';
      if(el||poise||roto||stun) R.w(`  ${c.name}:${el}${poise}${roto}${stun}`,'t-dim');
    });
    // Stamina del jugador
    const p=Player.get();
    const stpct=Math.round(staminaPct()*100);
    const mnapct=Math.round(((p.mana!=null?p.mana:60)/(p.maxMana||60))*100);
    R.w(`  STAMINA: ${stpct}%${stpct<20?' ⚠AGOTADO':''}  MANÁ: ${mnapct}%  HP: ${p.hp}/${p.maxHp}`,'t-dim');
    if((p.heridas||[]).length) R.w(`  HERIDAS: ${p.heridas.map(h=>HERIDAS[h]?.icon+h).join(', ')}`,'t-pel');
    R.sp();
  }

  // ── Inicializar batalla con clima ─────────────────────────────
  function initBattle(battle){
    const nodeId=battle.nodeId;
    const n=World.node(nodeId);
    const clima=CLIMAS_NODO[n?.tipo||'hub']||CLIMAS_NODO.hub;

    // Aplicar elemento base del clima
    if(clima.elemento_base){
      battle.cola.filter(c=>c.vivo).forEach(c=>{
        c.elemento_estado=clima.elemento_base;
      });
      battleLog(battle,`Clima "${clima.nombre}": todos empiezan ${clima.elemento_base}.`,clima.color||'t-dim');
    }

    // Inicializar poise para no-jugadores
    battle.cola.filter(c=>c.tipo!=='player').forEach(c=>{
      c.poise=calcPoise(c);
      c.poise_roto=false;
    });

    // Riesgo de emboscada al descansar en nodo peligroso — se maneja en cmdDescansar
  }

  // ── Comando DESCANSAR ─────────────────────────────────────────
  async function cmdDescansar(){
    const p=Player.get();
    const n=World.node(Player.pos());
    const esSeguro=(n?.tipo==='hub')||(n?.estado==='pacificado');

    R.sp();R.sep('─');
    R.w('DESCANSO','t-acc',true);

    // Coste: hambre y avance de ciclo
    const hambreCosto=esSeguro?15:25;
    p.hunger=Math.max(0,p.hunger-hambreCosto);
    Clock.tick(3);
    R.w(`Hambre −${hambreCosto}  ·  Ciclo avanza.`,'t-dim');

    if(p.hunger<=0){
      R.w('Demasiada hambre para descansar bien.','t-pel');
      p.stamina=Math.min(p.maxStamina||100,(p.stamina||0)+30); // recuperación parcial
      R.sep('─');R.sp();R.upd();save();return;
    }

    // Recuperar stamina y maná
    p.stamina=p.maxStamina||100;
    p.mana=p.maxMana||60;

    // Curar heridas (solo en nodos seguros o con medicina)
    const heridas=[...(p.heridas||[])];
    const medicina=p.inventory.find(i=>i.blueprint?.includes('medicina')||i.tags?.includes('medicina'));
    if(esSeguro||medicina){
      if(medicina){Player.rmItem(medicina.id);R.w(`Usas ${medicina.nombre} para curar heridas.`,'t-cra');}
      p.heridas=heridas.filter(h=>HERIDAS[h]?.turnosDuracion>0); // solo mantiene temporales
      if(heridas.length>p.heridas.length) R.w(`Heridas curadas: ${heridas.filter(h=>!p.heridas.includes(h)).join(', ')}`,'t-mem');
    } else if(heridas.length){
      R.w(`Heridas persisten: ${heridas.map(h=>HERIDAS[h]?.icon+h).join(', ')}`,'t-pel');
      R.w('Necesitas un nodo HUB o medicina para curar heridas graves.','t-dim');
    }

    // Curación parcial de HP
    const hpRec=esSeguro?Math.floor(p.maxHp*0.4):Math.floor(p.maxHp*0.2);
    p.hp=Math.min(p.maxHp,p.hp+hpRec);
    R.w(`+${hpRec}HP  Stamina restaurada  Maná restaurado`,'t-cra');

    // Riesgo de emboscada en nodo peligroso
    if(!esSeguro){
      const riesgo=['abismo','yermo','umbral','ruina'].includes(n?.tipo)?0.4:0.25;
      if(U.chance(riesgo)){
        R.w('¡EMBOSCADA! Enemies atacan mientras descansabas.','t-pel',true);
        R.sep('─');R.sp();
        R.upd();save();
        // Generar combate inmediato con el jugador vulnerable (stamina al 20%)
        setTimeout(()=>{
          p.stamina=Math.floor((p.maxStamina||100)*0.2);
          const enemies=n?.enemies||[];
          if(enemies.length){
            const e=enemies[0];
            e.hp_current=e.hp_current||e.hp;
            const combatants=[
              {tipo:'player',id:p.id,name:p.name,hp:p.hp,maxHp:p.maxHp,atk:Player.getAtk(),def:Player.getDef(),vivo:true,nodeId:Player.pos(),playerId:p.id},
              {tipo:'enemy',id:e.id,name:e.nombre,hp:e.hp_current,maxHp:e.hp||e.hp_current,atk:e.atk,def:e.def||0,vivo:true,nodeId:Player.pos()},
            ];
            Net.startBattle(Player.pos(),combatants);
          }
        },800);
        return;
      }
    }

    R.w(esSeguro?'Descansas en un lugar seguro.':'Descansas en terreno peligroso. Con un ojo abierto.','t-dim');
    R.sep('─');R.sp();
    R.upd();save();
  }

  // ── Comando inspeccionar táctica del nodo ─────────────────────
  function cmdTactica(){
    const nodeId=Player.pos();
    const n=World.node(nodeId);
    const clima=getClimaDesc(nodeId);
    const sup=getSup(nodeId);
    const aura=getAuraComp(nodeId);
    R.sp();R.w('— SITUACIÓN TÁCTICA —','t-acc');
    R.w(`Nodo: ${n?.name||'—'}  [${n?.tipo||'—'}]`,'t-dim');
    R.w(`Clima: ${clima.nombre}  — ${clima.desc}`,'t-sis');
    R.w(`Reacciones: x${clima.mult_reac}${clima.elemento_base?'  | Elemento base: '+clima.elemento_base:''}`,'t-dim');
    if(sup.tipo!=='normal') R.w(`Superficie: ${EFECTOS_SUPERFICIE[sup.tipo]?.icon} ${sup.tipo.toUpperCase()}  (${sup.turnosRestantes} turnos)  — ${EFECTOS_SUPERFICIE[sup.tipo]?.desc}`,EFECTOS_SUPERFICIE[sup.tipo]?.color||'t-dim');
    else R.w('Superficie: normal','t-dim');
    if(aura) R.w(`Aura compañero: ${aura}  ${ELEMENTOS[aura]?.desc||''}`,ELEMENTOS[aura]?.color||'t-eco');
    const p=Player.get();
    const st=Math.round(staminaPct()*100);
    const mn=Math.round(((p.mana!=null?p.mana:60)/(p.maxMana||60))*100);
    R.w(`Stamina: ${st}%  Maná: ${mn}%`,'t-dim');
    if((p.heridas||[]).length){
      R.w('Heridas activas:','t-pel');
      p.heridas.forEach(h=>R.w(`  ${HERIDAS[h]?.icon} ${h}: ${HERIDAS[h]?.desc}`,'t-pel'));
    }
    const arma=p.equipped?.arma;
    if(arma){
      const el=getElementoArma(arma);
      const dur=arma.durabilidad!=null?arma.durabilidad:100;
      R.w(`Arma: ${arma.nombre||arma.blueprint}  Durabilidad:${dur}%${arma.mellada?' [MELLADA]':''}${el?'  Elemento:'+el:''}`,dur<30?'t-pel':'t-cra');
    }
    R.sp();
    R.w('Reacciones posibles con elemento base del clima:','t-dim');
    if(clima.elemento_base){
      Object.entries(REACCIONES).filter(([k])=>k.startsWith(clima.elemento_base+'+'))
        .forEach(([k,v])=>R.w(`  ${k} → ${v.nombre}  x${v.mult}  ${v.desc}`,'t-mem'));
    }
    R.sp();
  }

  function getElementoMagia(mag){
    if(!mag)return null;
    const tags=mag.tags||[];
    if(tags.includes('fuego')||tags.includes('ardiente'))  return 'ARDIENDO';
    if(tags.includes('agua')||tags.includes('mojado'))     return 'MOJADO';
    if(tags.includes('rayo')||tags.includes('eléctrico'))  return 'ELECTRIZADO';
    if(tags.includes('hielo')||tags.includes('frío'))      return 'CONGELADO';
    if(tags.includes('resonante')||tags.includes('sonido'))return 'RESONANTE';
    if(tags.includes('vacío')||tags.includes('corrupto'))  return 'VACÍO';
    if(tags.includes('veneno'))                            return 'ENVENENADO';
    const n=(mag.nombre||'').toLowerCase();
    if(n.includes('fuego')||n.includes('llama'))    return 'ARDIENDO';
    if(n.includes('agua')||n.includes('lluvia'))    return 'MOJADO';
    if(n.includes('rayo')||n.includes('tormenta'))  return 'ELECTRIZADO';
    if(n.includes('hielo')||n.includes('escarcha')) return 'CONGELADO';
    if(n.includes('eco')||n.includes('resonan'))    return 'RESONANTE';
    if(n.includes('vacío')||n.includes('corru'))    return 'VACÍO';
    if(n.includes('veneno'))                        return 'ENVENENADO';
    return null;
  }

  return {
    calcularDaño, aplicarElemento, aplicarReaccion, actualizarSuperficie,
    aplicarAura, tickTurno, initBattle, renderTactico,
    calcPoise, aplicarPoiseDmg, desgastarArma,
    consumirStamina, consumirMana, staminaPct,
    getElementoArma, getElementoMagia, getAuraComp,
    getClimaDesc, getSup, setSup, tickSup,
    cmdDescansar, cmdTactica,
    ELEMENTOS, REACCIONES, CLIMAS_NODO, EFECTOS_SUPERFICIE, HERIDAS,
    calcularHerida,
  };
})();

    // KITS DE REPARACIÓN
    kit_reparacion:  { nombre:'Kit de Reparación', tipo:'reparacion',efecto:'reparar', valor:40, desc:'Restaura 40% de durabilidad a cualquier arma.', tags:['herramienta','metal'] },
    kit_maestro:     { nombre:'Kit Maestro',       tipo:'reparacion',efecto:'reparar_total', valor:100, desc:'Restaura al 100% y mejora ligeramente el arma.', tags:['herramienta','maestra'] },
    lima_afilado:    { nombre:'Lima de Afilado',   tipo:'reparacion',efecto:'afilar', valor:10, desc:'Aumenta el ATK del arma en +2 permanentemente.', tags:['herramienta','filo'] },

    // POTENCIADORES TÁCTICOS
    piedra_poise:    { nombre:'Piedra de Poise',   tipo:'potenciador',efecto:'poise_shield', valor:30, desc:'Activa un escudo de postura: el siguiente golpe no rompe postura.', tags:['defensa','poise'] },
    talismán_reac:   { nombre:'Talismán Reactivo', tipo:'potenciador',efecto:'reaccion_boost', valor:1.5, desc:'Próxima reacción elemental x1.5.', tags:['elemental','talismán'] },
    polvo_humo:      { nombre:'Polvo de Humo',     tipo:'potenciador',efecto:'niebla_personal', desc:'Crea niebla local: 40% fallo en ataques contra ti por 2 turnos.', tags:['evasión','polvo'] },
    cristal_poise:   { nombre:'Cristal de Poise',  tipo:'potenciador',efecto:'romper_poise', desc:'Rompe instantáneamente la postura del enemigo más cercano.', tags:['poise','cristal'] },
  };

  // ── Aplicar efecto de ítem ────────────────────────────────────
  function aplicar(item, battle){
    const p=Player.get();
    const def=CATALOGO[item.blueprint]||_inferirEfecto(item);
    if(!def){ R.w(`"${item.nombre||item.blueprint}" no tiene efecto táctico conocido.`,'t-dim'); return false; }

    const efecto=def.efecto||item.efecto;

    switch(efecto){
      case 'curar_herida':{
        const herida=def.herida;
        if(!(p.heridas||[]).includes(herida)){ R.w(`No tienes ${herida}.`,'t-dim'); return false; }
        p.heridas=p.heridas.filter(h=>h!==herida);
        if(def.hp) p.hp=Math.min(p.maxHp, p.hp+def.hp);
        R.w(`✓ ${herida} curada.${def.hp?` +${def.hp}HP`:''}`,'t-mem');
        break;
      }
      case 'curar_todas':{
        const n=(p.heridas||[]).length;
        p.heridas=[];
        if(def.hp) p.hp=Math.min(p.maxHp, p.hp+def.hp);
        R.w(`✓ ${n} herida${n!==1?'s':''} curada${n!==1?'s':''}. +${def.hp||0}HP`,'t-mem');
        break;
      }
      case 'stamina':
        p.stamina=Math.min(p.maxStamina||100,(p.stamina||0)+def.valor);
        R.w(`+${def.valor} Stamina  (${p.stamina}/${p.maxStamina||100})`,'t-cra'); break;
      case 'mana':
        p.mana=Math.min(p.maxMana||60,(p.mana||0)+def.valor);
        R.w(`+${def.valor} Maná  (${p.mana}/${p.maxMana||60})`,'t-mag'); break;
      case 'stamina_max':
        p.maxStamina=(p.maxStamina||100)+def.valor;
        p.stamina=Math.min(p.maxStamina,p.stamina||0);
        R.w(`Stamina máxima +${def.valor} → ${p.maxStamina}`,'t-cra'); break;
      case 'mana_max':
        p.maxMana=(p.maxMana||60)+def.valor;
        p.mana=Math.min(p.maxMana,p.mana||0);
        R.w(`Maná máximo +${def.valor} → ${p.maxMana}`,'t-mag'); break;
      case 'hp':
        p.hp=Math.min(p.maxHp, p.hp+def.valor);
        R.w(`+${def.valor}HP  (${p.hp}/${p.maxHp})`,'t-cra'); break;

      case 'elemento_arma':{
        const arma=p.equipped?.arma;
        if(!arma){ R.w('No tienes arma equipada.','t-dim'); return false; }
        arma._elemento_temporal=def.elemento;
        arma._elemento_dur=def.dur||3;
        // Añadir tag permanentemente para que Tactics lo detecte
        arma.tags=arma.tags||[];
        if(!arma.tags.includes(def.elemento.toLowerCase())) arma.tags.push(def.elemento.toLowerCase());
        R.w(`${arma.nombre||arma.blueprint} infundida con ${def.elemento} (${def.dur} ataques).`,Tactics.ELEMENTOS[def.elemento]?.color||'t-cra');
        break;
      }

      case 'reparar':{
        const arma=p.equipped?.arma||p.inventory.find(i=>i.tipo==='arma');
        if(!arma){ R.w('No hay arma que reparar.','t-dim'); return false; }
        const antes=arma.durabilidad||0;
        arma.durabilidad=Math.min(100,(arma.durabilidad||0)+def.valor);
        arma.mellada=arma.durabilidad>0?false:arma.mellada;
        R.w(`${arma.nombre||arma.blueprint}: durabilidad ${antes}% → ${arma.durabilidad}%`,'t-cra');
        break;
      }
      case 'reparar_total':{
        const arma=p.equipped?.arma||p.inventory.find(i=>i.tipo==='arma');
        if(!arma){ R.w('No hay arma que reparar.','t-dim'); return false; }
        arma.durabilidad=100; arma.mellada=false; arma.atk=(arma.atk||0)+1;
        R.w(`${arma.nombre||arma.blueprint}: restaurada al 100% · ATK +1`,'t-cra');
        break;
      }
      case 'afilar':{
        const arma=p.equipped?.arma||p.inventory.find(i=>i.tipo==='arma');
        if(!arma){ R.w('No hay arma que afilar.','t-dim'); return false; }
        arma.atk=(arma.atk||0)+2;
        R.w(`${arma.nombre||arma.blueprint}: ATK +2 permanente`,'t-cra');
        break;
      }

      case 'poise_shield':
        p._poise_shield=true;
        R.w('Escudo de postura activo: el próximo golpe no romperá tu postura.','t-sis'); break;
      case 'reaccion_boost':
        p._reaccion_boost=def.valor||1.5;
        R.w(`Próxima reacción elemental ×${def.valor||1.5}.`,'t-cor'); break;
      case 'niebla_personal':
        p._niebla_turnos=2;
        R.w('Niebla personal: 40% fallo en ataques contra ti (2 turnos).','t-dim'); break;
      case 'romper_poise':{
        if(!battle){ R.w('Solo funciona en batalla.','t-dim'); return false; }
        const target=battle.cola.find(c=>c.vivo&&c.tipo!=='player');
        if(!target){ R.w('Sin objetivo.','t-dim'); return false; }
        target.poise=0; target.poise_roto=true; target.poise_turnos=2;
        battleLog(battle,`⚡ ${target.name} POSTURA ROTA por ${item.nombre||item.blueprint}!`,'t-cor');
        break;
      }

      default:
        // Efecto genérico HP/stamina legacy
        if(def.hp||item.hp){ const v=def.hp||item.hp; p.hp=Math.min(p.maxHp,p.hp+v); R.w(`+${v}HP`,'t-cra'); }
        else { R.w(`Usas ${item.nombre||item.blueprint}.`,'t-dim'); }
    }

    Player.rmItem(item.id);
    R.upd();
    return true;
  }

  // Inferir efecto de ítem genérico (legacy items)
  function _inferirEfecto(item){
    const tags=item.tags||[];
    if(tags.includes('medicina')) return {efecto:'curar_todas',hp:10};
    if(item.hp)                   return {efecto:'hp',valor:item.hp};
    if(item.stamina)              return {efecto:'stamina',valor:item.stamina};
    if(tags.includes('consumible'))return {efecto:'hp',valor:5};
    return null;
  }

  // ── Generar ítems tácticos como loot ─────────────────────────
  function genLootTactico(nodeType, rng){
    const pools={
      hub:    ['fragmento_cura','polvo_vitalidad','kit_reparacion'],
      ruina:  ['kit_reparacion','lima_afilado','piedra_poise','agua_eco','ancla_antigua','ancla_resonante'],
      bosque: ['venda_burda','raíz_resistente','aceite_llama','agua_eco','ancla_resonante'],
      caverna:['tintura_amarga','polvo_hielo','piedra_poise','kit_reparacion','ancla_resonante'],
      abismo: ['esencia_vacío','talismán_reac','medicina_mayor','cristal_poise','ancla_inestable','ancla_corrupta'],
      pantano:['tintura_amarga','venda_burda','esencia_mente','polvo_humo','ancla_corrupta'],
      cumbre: ['ungüento_hueso','polvo_hielo','cristal_maná','kit_maestro','ancla_antigua'],
      yermo:  ['bálsamo_piel','aceite_llama','resina_rayo','polvo_vitalidad','ancla_inestable'],
      templo: ['agua_claridad','talismán_reac','cristal_maná','medicina_mayor','ancla_resonante','ancla_antigua'],
      umbral: ['esencia_vacío','néctar_antiguo','cristal_poise','medicina_mayor','ancla_inestable','ancla_antigua'],
    };
    const pool=pools[nodeType]||pools.hub;
    const id=U.pick(pool,rng);

    // Anclas son materiales, no ítems del catálogo — generarlas directamente
    if(id&&id.startsWith('ancla_')){
      const matDef=D.mat(id);
      if(!matDef) return null;
      return {
        id:U.uid(), blueprint:id, nombre:id.replace('_',' '),
        tipo:'material', categoria:'ancla',
        tags:matDef.tags||[], desc:matDef.desc||'Ancla de captura.',
        estado:'nativo',
      };
    }

    const def=CATALOGO[id];
    if(!def) return null;
    return {
      id:U.uid(), blueprint:id, nombre:def.nombre, tipo:def.tipo,
      tags:def.tags||[], efecto:def.efecto, desc:def.desc,
      herida:def.herida, valor:def.valor, elemento:def.elemento,
      dur:def.dur, estado:'nativo',
    };
  }

  // ── Crear ítem del catálogo para inventario ───────────────────
  function crear(blueprintId){
    const def=CATALOGO[blueprintId];
    if(!def) return null;
    return {id:U.uid(),blueprint:blueprintId,nombre:def.nombre,tipo:def.tipo,tags:def.tags||[],efecto:def.efecto,desc:def.desc,herida:def.herida,valor:def.valor,elemento:def.elemento,dur:def.dur,estado:'nativo'};
  }

  // ── Listar ítems tácticos en inventario ──────────────────────
  function cmdItems(){
    R.sp();R.w('— ÍTEMS TÁCTICOS —','t-acc');
    const p=Player.get();
    const tacticos=p.inventory.filter(i=>CATALOGO[i.blueprint]);
    if(!tacticos.length){R.w('Sin ítems tácticos. Busca en nodos o forja.','t-dim');R.sp();return;}
    const porTipo={};
    tacticos.forEach(i=>{
      const def=CATALOGO[i.blueprint];
      const t=def.tipo||i.tipo;
      if(!porTipo[t]) porTipo[t]=[];
      porTipo[t].push({i,def});
    });
    Object.entries(porTipo).forEach(([tipo,lista])=>{
      R.w(`${tipo.toUpperCase()}:`,'t-acc');
      lista.forEach(({i,def})=>{
        const col=tipo==='medicina'?'t-mem':tipo==='reparacion'?'t-cra':tipo==='potenciador'?'t-cor':'t-out';
        R.w(`  usar ${i.blueprint}  — ${def.nombre}  ${def.desc||''}`,col);
      });
    });
    R.sp();
    // Mostrar estado del arma equipada
    const arma=p.equipped?.arma;
    if(arma){
      const dur=arma.durabilidad!=null?arma.durabilidad:100;
      R.w(`Arma equipada: ${arma.nombre||arma.blueprint}  Durabilidad:${dur}%${arma.mellada?' [MELLADA]':''}${arma._elemento_temporal?' ['+arma._elemento_temporal+']':''}`,dur<30?'t-pel':'t-cra');
    }
    if((p.heridas||[]).length){
      R.sp();R.w('Heridas activas:','t-pel');
      p.heridas.forEach(h=>R.w(`  ${Tactics.HERIDAS[h]?.icon} ${h}: ${Tactics.HERIDAS[h]?.desc}`,'t-pel'));
    }
    R.sp();
  }

  return { aplicar, genLootTactico, crear, CATALOGO };
})();

// RUN MEMORY
// ════════════════════════════════════════════════════════════════
const RunMem={
  KEY:'eco_v12_runs',data:{runs:[],ecos:[]},
  load(){try{const r=localStorage.getItem(this.KEY);if(r)this.data=JSON.parse(r);}catch{}},
  save(){try{localStorage.setItem(this.KEY,JSON.stringify(this.data));}catch{}},
  registrar(player,npcs,misiones,wseed){
    let run={id:U.uid(),player_name:player.name,player_id:player.id,seed:wseed,ciclos:Clock.cycle,muerte:{causa:player.causa_muerte||'?',ciclo:Clock.cycle,phase:Clock.get().name},mis_ok:misiones.filter(m=>m.completada).map(m=>m.titulo),mis_fail:misiones.filter(m=>m.fallida).map(m=>m.titulo),legados:[],modulos:ModuleLoader.list(),plugins:PluginLoader.order,ts:Date.now()};
    if(misiones.some(m=>!m.completada&&!m.fallida))run.legados.push({tipo:'mision_inconclusa',desc:`${player.name} dejó misiones sin resolver.`});
    npcs.filter(n=>n.lealtad>60).forEach(n=>run.legados.push({tipo:'vinculo',desc:`${n.nombre} recordará a ${player.name}.`}));
    // Arcs completados como legados
    GS.allArcs().filter(a=>a.epitafio).forEach(a=>{
      run.legados.push({tipo:'arc',desc:`${a.titulo}: ${a.epitafio}`,resultado:a.resultado,tema:a.tema});
    });
    // SOCKET: memory:run_end
    const result=EventBus.emit('memory:run_end',{run,player,npcs,misiones});
    if(result?.run)run=result.run;
    this.data.runs.push(run);
    this.data.ecos=this.data.runs.slice(-3).map(r=>({run_id:r.id,nombre:r.player_name,ciclos:r.ciclos,muerte:r.muerte,legados:r.legados}));
    this.save();
  },
  ecos(){return this.data.ecos||[];},runs(){return this.data.runs||[];},count(){return this.data.runs.length;}
};

const R={
  el:document.getElementById('out'),
  w(t,c='t-out',b=false){const d=document.createElement('div');d.className='ln'+(b?' bl':'');d.innerHTML=`<span class="${c}">${t}</span>`;this.el.appendChild(d);this.el.scrollTop=this.el.scrollHeight;},
  sp(){const d=document.createElement('div');d.className='ln sp';this.el.appendChild(d);this.el.scrollTop=this.el.scrollHeight;},
  sep(c='─',l=46){const d=document.createElement('div');d.className='ln sep';d.textContent=c.repeat(l);this.el.appendChild(d);this.el.scrollTop=this.el.scrollHeight;},
  echo(cmd){const d=document.createElement('div');d.className='ln pecho';d.innerHTML=`<span class="t-dim">› </span><span>${cmd.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;this.el.appendChild(d);this.el.scrollTop=this.el.scrollHeight;},
  async tw(t,c='t-out',delay=18){return new Promise(res=>{const d=document.createElement('div');d.className='ln';const s=document.createElement('span');s.className=c;d.appendChild(s);this.el.appendChild(d);const clean=t.replace(/<[^>]+>/g,'');let i=0;const step=()=>{if(i<clean.length){s.textContent+=clean[i++];this.el.scrollTop=this.el.scrollHeight;setTimeout(step,delay);}else res();};step();});},
  upd(){
    const p=Player.get(),c=Clock.get(),n=World.node(p.position);
    const hpEl=document.getElementById('s-hp');hpEl.textContent=`${p.hp}/${p.maxHp}`;hpEl.className=p.hp<15?'t-pel':p.hp<30?'t-mem':'';
    document.getElementById('s-hun').textContent=p.hunger>60?'bien':p.hunger>30?'hambre':'crítico';
    // Stamina y maná tácticos
    const sta=p.stamina!=null?p.stamina:(p.maxStamina||100);
    const mna=p.mana!=null?p.mana:(p.maxMana||60);
    const staEl=document.getElementById('s-sta');if(staEl){staEl.textContent=`${sta}%`||`${Math.round(sta/(p.maxStamina||100)*100)}%`;staEl.className=sta<20?'t-pel':sta<50?'t-mem':'';}
    const mnaEl=document.getElementById('s-mna');if(mnaEl){mnaEl.textContent=`${mna}`;mnaEl.className=mna<15?'t-pel':mna<30?'t-mem':'t-mag';}
    document.getElementById('s-loc').textContent=n?n.name.slice(0,16):'—';
    document.getElementById('s-cyc').textContent=`${c.cycle}·${c.name}`;
    document.getElementById('s-inv').textContent=p.inventory.length;
    document.getElementById('s-hab').textContent=`${p.habilidades.length}/${Player.maxHab()}`;
    document.getElementById('s-mag').textContent=`${p.magias.length}/${Player.maxMag()}`;
    document.getElementById('s-comp').textContent=`${p.compañeros.length}/${Player.maxComp()}`;
    document.getElementById('s-npc').textContent=GS.npcEnNodo(p.position).length+'/'+GS.aliveNPCs().length;
    document.getElementById('s-mis').textContent=GS.activas().length;
    document.getElementById('s-run').textContent=RunMem.count()+1;
    document.getElementById('s-mod').textContent=ModuleLoader.list().join('+');
    // Actualizar status bars de plugins
    PluginLoader.updateStatusBar();
    Net.updateBar();
    // SOCKET: render:status_bar
    EventBus.emit('render:status_bar',{player:p,clock:c,node:n});
  }
};

// EXPERIENCE & ATTRIBUTE SYSTEM
// ════════════════════════════════════════════════════════════════
const XP = (() => {
  // ── Ramas de experiencia ─────────────────────────────────────
  const RAMAS = {
    combate:     { label:'COMBATE',     color:'t-pel', icon:'⚔' },
    forja:       { label:'FORJA',       color:'t-hab', icon:'⚒' },
    exploración: { label:'EXPLORACIÓN', color:'t-sis', icon:'◉' },
    narrativa:   { label:'NARRATIVA',   color:'t-npc', icon:'◈' },
    criaturas:   { label:'CRIATURAS',   color:'t-cri', icon:'✦' },
    cuerpo:      { label:'CUERPO',      color:'t-cra', icon:'◆' },
    mente:       { label:'MENTE',       color:'t-mag', icon:'◇' },
    suerte:      { label:'SUERTE',      color:'t-mem', icon:'✧' },
  };

  // ── Atributos asignables ──────────────────────────────────────
  const ATRIBUTOS = {
    fuerza:    { label:'Fuerza',    desc:'ATK base +1',            color:'t-pel', apply(p){p.atk++;} },
    aguante:   { label:'Aguante',   desc:'HP máx +5',              color:'t-cra', apply(p){p.maxHp+=5;p.hp=Math.min(p.hp+5,p.maxHp);} },
    defensa:   { label:'Defensa',   desc:'DEF base +1',            color:'t-sis', apply(p){p.def++;} },
    velocidad: { label:'Velocidad', desc:'Evasión +3% (cap 60%)',  color:'t-mem', apply(p){p.evasion=Math.min(0.60,(p.evasion||0)+0.03);} },
    voluntad:  { label:'Voluntad',  desc:'Maná máx +8, slot mágico c/3pts', color:'t-mag', apply(p){p.voluntad_pts=(p.voluntad_pts||0)+1; p.maxMana=(p.maxMana||60)+8; p.mana=Math.min(p.mana||0,p.maxMana);} },
    vigor:     { label:'Vigor',     desc:'Stamina máx +10, slot corporal c/3pts', color:'t-hab', apply(p){p.vigor_pts=(p.vigor_pts||0)+1; p.maxStamina=(p.maxStamina||100)+10; p.stamina=Math.min(p.stamina||0,p.maxStamina);} },
    presencia: { label:'Presencia', desc:'Lealtad inicial NPC +3', color:'t-npc', apply(p){p.presencia=(p.presencia||0)+1;} },
    suerte:    { label:'Suerte',    desc:'Drop chance +2%',        color:'t-mem', apply(p){p.suerte=(p.suerte||0)+1;} },
  };

  // ── Curva logarítmica 1-100 ───────────────────────────────────
  // XP para pasar del nivel N al N+1
  // Fórmula: floor(50 * N * ln(N+1))
  // Nivel 1→2: ~69  |  10→11: ~1197  |  50→51: ~19560  |  99→100: ~228k
  function xpParaNivel(n){
    return Math.floor(50 * n * Math.log(n + 1));
  }

  // XP acumulada para alcanzar el nivel N desde 0
  function xpAcumulada(n){
    let total=0;
    for(let i=1;i<n;i++) total+=xpParaNivel(i);
    return total;
  }

  // Nivel actual dado el XP total de una rama
  function nivelDesdeXP(xpTotal){
    let nivel=1;
    while(nivel<100 && xpTotal >= xpAcumulada(nivel+1)) nivel++;
    return nivel;
  }

  // XP necesaria para el siguiente nivel desde el nivel actual
  function xpParaSiguiente(nivelActual){
    if(nivelActual>=100) return 0;
    return xpParaNivel(nivelActual);
  }

  // XP dentro del nivel actual (progreso parcial)
  function xpEnNivel(xpTotal, nivelActual){
    return xpTotal - xpAcumulada(nivelActual);
  }

  // ── Estado interno ────────────────────────────────────────────
  let state = {
    ramas: {},        // rama → { xp, nivel }
    puntos: 0,        // puntos de atributo disponibles para asignar
    atributos: {},    // atributo → puntos invertidos
    historial: [],    // últimas ganancias de XP para mostrar
  };

  function init(){
    Object.keys(RAMAS).forEach(r=>{
      if(!state.ramas[r]) state.ramas[r]={xp:0,nivel:1};
    });
    Object.keys(ATRIBUTOS).forEach(a=>{
      if(!state.atributos[a]) state.atributos[a]=0;
    });
  }

  // ── Ganar XP ─────────────────────────────────────────────────
  function ganar(rama, cantidad, motivo){
    if(!RAMAS[rama])return;
    init();
    const r=state.ramas[rama];
    const nivelAntes=r.nivel;
    r.xp+=cantidad;
    r.nivel=nivelDesdeXP(r.xp);
    const nivelDespues=r.nivel;

    // Registro para mostrar
    state.historial.push({rama,cantidad,motivo,ts:Date.now()});
    if(state.historial.length>30)state.historial.shift();

    // Level up
    if(nivelDespues>nivelAntes){
      const ganados=nivelDespues-nivelAntes;
      state.puntos+=ganados;
      const rama_def=RAMAS[rama];
      // Notificación diferida (no interrumpe la acción actual)
      setTimeout(()=>{
        R.sp();R.sep('═');
        R.w(`⬆ NIVEL ${nivelDespues} — ${rama_def.icon} ${rama_def.label}`,[rama_def.color],true);
        if(ganados>1) R.w(`Saltaste ${ganados} niveles.`,'t-dim');
        R.w(`+${ganados} punto${ganados>1?'s':''} de atributo disponible${ganados>1?'s':''}.`,'t-mem');
        R.w(`Puntos totales disponibles: ${state.puntos}  →  "asignar [atributo]"`,'t-dim');
        R.sep('═');R.sp();
        R.upd();
      }, 100);
    }

    // Aplicar efectos pasivos que dependen de XP continua
    _aplicarPasivos();
  }

  // ── Efectos pasivos que escalan con niveles ───────────────────
  function _aplicarPasivos(){
    const p=Player.get();
    // Presencia → lealtad inicial NPCs (se aplica al generar NPCs, no aquí)
    // Slots extra por voluntad/vigor (se recalculan en maxMag/maxHab override)
  }

  // ── Asignar punto de atributo ─────────────────────────────────
  function asignar(atributo){
    const def=ATRIBUTOS[atributo];
    if(!def){
      R.w(`Atributo desconocido: "${atributo}". Escribe "atributos" para ver opciones.`,'t-dim');
      return false;
    }
    if(state.puntos<=0){
      R.w('Sin puntos de atributo disponibles. Sube de nivel en cualquier rama.'+'  (usa "experiencia" para ver progreso)','t-dim');
      return false;
    }
    state.puntos--;
    state.atributos[atributo]=(state.atributos[atributo]||0)+1;
    def.apply(Player.get());
    R.sp();
    R.w(`▲ ${def.label}  →  ${def.desc}`,[def.color],true);
    R.w(`Puntos restantes: ${state.puntos}`,'t-dim');
    R.sp();
    // Aplicar slots extra si aplica
    if(atributo==='voluntad'){
      const pts=state.atributos.voluntad||0;
      // +1 slot mental cada 3 puntos
      Player.get()._extra_mag_slots=Math.floor(pts/3);
    }
    if(atributo==='vigor'){
      const pts=state.atributos.vigor||0;
      Player.get()._extra_hab_slots=Math.floor(pts/3);
    }
    R.upd();
    return true;
  }

  // ── Comandos ─────────────────────────────────────────────────
  function cmdExperiencia(){
    init();
    R.sp();R.w('— EXPERIENCIA —','t-acc');
    if(state.puntos>0){
      R.w(`⬆ ${state.puntos} punto${state.puntos>1?'s':''} de atributo disponible${state.puntos>1?'s':''}  →  "asignar [atributo]"`,'t-mem',true);
      R.sp();
    }
    Object.entries(RAMAS).forEach(([id,def])=>{
      const r=state.ramas[id]||{xp:0,nivel:1};
      const lv=r.nivel;
      const enNivel=xpEnNivel(r.xp,lv);
      const paraNext=xpParaSiguiente(lv);
      const pct=lv>=100?100:Math.floor(enNivel/paraNext*100);
      const barLen=24;
      const filled=Math.floor(pct/100*barLen);
      const bar='█'.repeat(filled)+'░'.repeat(barLen-filled);
      const lvTag=lv>=100?'MAX':String(lv).padStart(3);
      R.w(`  ${def.icon} ${def.label.padEnd(12)} Lv ${lvTag}  ${bar}  ${lv<100?enNivel+'/'+paraNext+'xp':''}`,def.color);
    });
    R.sp();
    // Atributos invertidos
    const invertidos=Object.entries(state.atributos).filter(([,v])=>v>0);
    if(invertidos.length){
      R.w('Atributos invertidos:','t-acc');
      invertidos.forEach(([a,v])=>{
        const def=ATRIBUTOS[a];
        R.w(`  ${def.label.padEnd(12)} ${v} pts  — ${def.desc}`,def.color);
      });
    }
    R.sp();
  }

  function cmdAtributos(){
    R.sp();R.w('— ATRIBUTOS —','t-acc');
    R.w(`Puntos disponibles: ${state.puntos}`,'t-mem');R.sp();
    Object.entries(ATRIBUTOS).forEach(([id,def])=>{
      const pts=state.atributos[id]||0;
      R.w(`  asignar ${id.padEnd(12)} ${def.desc.padEnd(26)} [invertidos: ${pts}]`,def.color);
    });
    R.sp();R.w('Uso: asignar [atributo]','t-dim');R.sp();
  }

  function cmdAsignar(target){
    if(!target){cmdAtributos();return;}
    const key=Object.keys(ATRIBUTOS).find(k=>k.startsWith(target.toLowerCase()));
    if(!key){R.w(`"${target}" no es un atributo válido. Escribe "atributos" para ver opciones.`,'t-dim');return;}
    asignar(key);
    save();
  }

  // ── Serializar / cargar ───────────────────────────────────────
  function ser(){ return state; }
  function load(d){ if(d){state=d;init();} }

  // ── API pública ───────────────────────────────────────────────
  return{
    ganar, asignar, nivelDesdeXP, xpParaSiguiente, xpEnNivel, xpAcumulada,
    cmdExperiencia, cmdAtributos, cmdAsignar,
    getRama:(r)=>(state.ramas[r]||{xp:0,nivel:1}),
    getPuntos:()=>state.puntos,
    getAtributos:()=>state.atributos,
    ser, load, init,
    RAMAS, ATRIBUTOS,
    // Slots extra para Player
    extraMagSlots:()=>Player.get()._extra_mag_slots||0,
    extraHabSlots:()=>Player.get()._extra_hab_slots||0,
  };
})();

const _origMaxMag = Player.maxMag.bind(Player);

Player.maxHab = function(){ return _origMaxHab() + XP.extraHabSlots(); };

// ── Parchar Combat.atk para evasión, XP de combate y cuerpo ──
const _origCombatAtk = Combat.atk.bind(Combat);
Combat.atk = function(){
  if(!this.active)return;
  // Evasión del jugador (atributo velocidad)
  const evasion=Player.get().evasion||0;
  if(evasion>0&&U.chance(evasion)){
    R.w(`Esquivas el ataque. [evasión ${Math.round(evasion*100)}%]`,'t-mem');
    const pa=Player.getAtk();
    let roll=Math.floor(Math.random()*pa)+Math.floor(pa*.5);
    this.enemy.hp_current-=roll;
    R.w(`Atacas → −${roll} HP  (${this.enemy.nombre}: ${Math.max(0,this.enemy.hp_current)} HP)`,'t-pel');
    XP.ganar('combate',Math.ceil(roll/2),'daño con evasión');
    if(Player.get().habilidades.length)XP.ganar('cuerpo',3,'combate con habilidades');
    if(this.enemy.hp_current<=0){if(this.isNPC&&this.npcRef)this.winNPC(false);else this.win();}
    R.upd();return;
  }
  // XP de daño antes de la ronda normal
  const pa=Player.getAtk();
  const rollEstimado=Math.floor(pa*0.75);
  XP.ganar('combate',Math.ceil(rollEstimado/3),'daño en combate');
  if(Player.get().habilidades.length)XP.ganar('cuerpo',3,'combate con habilidades');
  if(Player.get().magias.length)XP.ganar('mente',2,'presencia mágica en combate');
  _origCombatAtk();
};

// ── Parchar drop chance con suerte ────────────────────────────
const _origCombatWin = Combat.win.bind(Combat);
Combat.win = function(){
  // Suerte añade % de drop
  const suerteBonus=(Player.get().suerte||0)*0.02;
  const dropChance=0.45+suerteBonus;
  this.active=false;Player.get().stats.kills++;
  R.w(`${this.enemy.nombre} colapsa.`,'t-cra',true);
  XP.ganar('combate', 20, `kill: ${this.enemy.nombre}`);
  const edef=D.enemies.find(e=>e.nombre===this.enemy.nombre);
  if(edef?.loot?.length&&U.chance(dropChance)){
    const d=U.pick(edef.loot,U.rng(Math.random()));
    Player.addItem({id:U.uid(),blueprint:d,nombre:d,tipo:'material',tags:D.matTags(d),estado:'nativo',desc:D.mat(d)?.desc});
    R.w(`Loot: ${d}`+(suerteBonus>0?` [suerte +${Math.round(suerteBonus*100)}%]`:''),'t-cra');
  }
  World.rmEnemy(this.nodeId,this.enemy.id);
  EventBus.emit('combat:enemy_defeat',{enemy:this.enemy,nodeId:this.nodeId});
  this.enemy=null;R.upd();save();
};

// ════════════════════════════════════════════════════════════════
// P2P MULTIPLAYER — WebRTC via PeerJS
// ════════════════════════════════════════════════════════════════
const Net = (() => {
  // ── Estado ───────────────────────────────────────────────────
  let p2p        = null;   // instancia P2PCF
  let roomId     = null;   // código de sala (4 palabras cortas)
  let role       = null;   // 'host' | 'client' | null
  const peers    = {};     // peerId → SimplePeer DataChannel
  const players  = {};     // playerId → {name, nodeId, peerId, color}
  let hostPeer   = null;   // peer del host (si somos cliente)

  const MAX_CLIENTS = 7;
  const VERSION     = '1.4';
  const COLORS      = ['t-eco','t-mem','t-acc','t-mag','t-cri','t-mis','t-cor'];
  let colorIdx      = 0;

  // ── Generar código de sala legible ────────────────────────────
  function genRoomId(){
    const words=['eco','sol','mar','rio','luz','voz','red','nexo','eco','nodo',
                 'arco','filo','ola','roca','bruma','senda','umbral','grieta'];
    const pick=()=>words[Math.floor(Math.random()*words.length)];
    return `${pick()}-${pick()}-${U.rand(100,999)}`;
  }

  // ── Helpers de UI ─────────────────────────────────────────────
  function netMsg(txt, col='t-eco'){
    const d=document.createElement('div');
    d.className='ln p2p-msg';
    d.innerHTML=`<span class="${col}">[NET] ${txt}</span>`;
    R.el.appendChild(d);R.el.scrollTop=R.el.scrollHeight;
  }

  function updateBar(){
    const wrap=document.getElementById('s-p2p-wrap');
    const el=document.getElementById('s-p2p');
    if(!role){wrap.style.display='none';return;}
    wrap.style.display='';
    const n=Object.keys(players).length+1;
    if(role==='host') el.textContent=`HOST ${n}j`;
    else el.textContent=`CLIENT ${n}j`;
    el.className=role==='host'?'t-cra':'t-eco';
  }

  // ── Serializar estado del mundo para snapshot ─────────────────
  function buildSnapshot(){
    // Incluir al host como jugador visible para los clientes
    const hostEntry={
      id:Player.get().id,
      name:Player.get().name,
      nodeId:Player.pos(),
      hp:Player.get().hp, maxHp:Player.get().maxHp,
      atk:Player.getAtk(), def:Player.getDef(),
      color:'t-cra', peerId:'host', isHost:true,
    };
    return{
      type:'WORLD_SNAPSHOT',
      world: World.ser(),
      gs:    GS.ser(),
      clock: Clock.ser(),
      xp:    XP.ser(),
      players: {...players, [Player.get().id]:hostEntry},
      ts: Date.now(),
    };
  }

  // ── Aplicar snapshot recibido (cliente) ───────────────────────
  function applySnapshot(d){
    World.load(d.world);
    GS.load(d.gs);
    Clock.load(d.clock);
    if(d.xp) XP.load(d.xp);
    Object.assign(players, d.players||{});
    // Guardar localmente
    saveLocal();
    R.upd();
    netMsg('Mundo sincronizado con el host.');
  }

  // ── Aplicar patch delta (cliente) ────────────────────────────
  function applyPatch(d){
    if(d.world)  World.load(d.world);
    if(d.gs)     GS.load(d.gs);
    if(d.clock)  Clock.load(d.clock);
    if(d.xp)     XP.load(d.xp);
    if(d.players)Object.assign(players, d.players);
    saveLocal();
    R.upd();
  }

  // ── Construir patch delta para broadcast ─────────────────────
  function buildPatch(){
    return{
      type:'WORLD_PATCH',
      world: World.ser(),
      gs:    GS.ser(),
      clock: Clock.ser(),
      xp:    XP.ser(),
      players:{...players},
    };
  }

  // ── Enviar mensaje a un peer específico ──────────────────────
  function sendToPeer(peerId, msg){
    const p=peers[peerId];
    if(p && p.readyState==='open'){
      try{ p.send(JSON.stringify(msg)); }catch(e){}
    }
  }

  // ── HOST: broadcast a todos los peers conectados ─────────────
  function broadcast(msg, excludePeer=null){
    const str=JSON.stringify(msg);
    Object.entries(peers).forEach(([pid,p])=>{
      if(pid!==excludePeer && p.readyState==='open'){
        try{ p.send(str); }catch(e){}
      }
    });
  }

  // ── HOST: manejar mensaje de un cliente ──────────────────────
  // ════════════════════════════════════════════════════════════════
  // TRADE SYSTEM
  // ════════════════════════════════════════════════════════════════
  const trades = {};  // tradeId → TradeState

  function tradeId(a,b){ return [a,b].sort().join(':'); }

  function initTrade(fromId, fromName, toId){
    const id=tradeId(fromId,toId);
    trades[id]={
      id, estado:'pendiente',
      a:{ playerId:fromId, nombre:fromName, oferta:[], confirmado:false },
      b:{ playerId:toId,   nombre:'',       oferta:[], confirmado:false },
    };
    return trades[id];
  }

  function getTrade(pid){
    return Object.values(trades).find(t=>
      (t.a.playerId===pid||t.b.playerId===pid) && t.estado!=='cerrado'
    )||null;
  }

  function renderTrade(trade){
    R.sp();R.sep('═');
    R.w(`COMERCIO — ${trade.a.nombre}  ⇄  ${trade.b.nombre}`,'t-mem',true);
    R.sep('─');
    const colA=trade.a.confirmado?'t-cra':'t-out';
    const colB=trade.b.confirmado?'t-cra':'t-out';
    R.w(`  ${trade.a.nombre}${trade.a.confirmado?' ✓':''}`,[colA]);
    if(trade.a.oferta.length) trade.a.oferta.forEach(o=>R.w(`    → ${o.nombre||o.blueprint} [${o.tipo}]`,'t-cra'));
    else R.w('    (sin oferta)','t-dim');
    R.sep('─');
    R.w(`  ${trade.b.nombre}${trade.b.confirmado?' ✓':''}`,[colB]);
    if(trade.b.oferta.length) trade.b.oferta.forEach(o=>R.w(`    → ${o.nombre||o.blueprint} [${o.tipo}]`,'t-cra'));
    else R.w('    (sin oferta)','t-dim');
    R.sep('─');
    R.w('ofrecer [obj] · retirar [obj] · confirmar_trade · cancelar_trade','t-dim');
    R.sep('═');R.sp();
  }

  // ════════════════════════════════════════════════════════════════
  // BATTLE SYSTEM — turnos multijugador
  // ════════════════════════════════════════════════════════════════
  const battles = {};     // battleId → BattleState
  let myBattleId = null;  // batalla en la que participo actualmente

  function buildCombatant(tipo, entity, playerId=null){
    return{
      tipo,                             // 'player'|'npc'|'enemy'|'creature'
      id:      playerId||entity.id||U.uid(),
      name:    entity.name||entity.nombre||'?',
      hp:      entity.hp,
      maxHp:   entity.maxHp||entity.hp,
      atk:     entity.atk||(entity.getAtk?entity.getAtk():5),
      def:     entity.def||(entity.getDef?entity.getDef():1),
      nodeId:  entity.nodeId||Player.pos(),
      color:   tipo==='player'? (players[playerId]?.color||'t-cra') :
               tipo==='npc'  ? 't-npc' :
               tipo==='enemy'? 't-pel' : 't-cri',
      vivo:    true,
      defendiendo: false,
      playerId: playerId||null,     // si es jugador local o remoto
      peerId:   playerId ? (players[playerId]?.peerId||null) : null,
    };
  }

  function calcIniciativa(c){ return (c.atk||0)+(c.def||0)+U.rand(0,10); }

  function newBattle(nodeId, participantes){
    const id=U.uid();
    // Ordenar por iniciativa y garantizar vivo:true en todos
    const cola=participantes
      .filter(c=>c&&c.tipo)  // eliminar nulls (ej: el null residual de cmdAtacar)
      .map(c=>({
        vivo:true,           // garantizar antes del spread
        defendiendo:false,
        ...c,
        // Forzar vivo:true incluso si el objeto original lo tenía false
        vivo:true,
        iniciativa:calcIniciativa(c),
      }))
      .sort((a,b)=>b.iniciativa-a.iniciativa);
    const battle={
      id, nodeId,
      cola,
      turno: 0,          // índice en cola del actor actual
      ronda: 1,
      estado: 'activo',  // 'activo'|'esperando_accion'|'fin'
      log: [],
      ganadores: [],
      ts: Date.now(),
    };
    battles[id]=battle;
    return battle;
  }

  function battleLog(battle, txt, color='t-out'){
    battle.log.push({txt,color,ts:Date.now()});
    if(battle.log.length>60) battle.log.shift();
  }

  function actorActual(battle){
    const total=battle.cola.length;
    if(!total) return null;
    // Buscar el primer actor vivo desde el índice actual
    let idx=battle.turno%total;
    let loops=0;
    while(loops<total){
      const c=battle.cola[idx];
      if(c && c.vivo && !c.huyó) return c;
      idx=(idx+1)%total;
      loops++;
    }
    return null; // todos caídos o huidos
  }

  function renderBattle(battle, prompt=true){
    if(!battle)return;
    R.sp();R.sep('═');
    R.w(`⚔ BATALLA  Nodo: ${World.node(battle.nodeId)?.name||battle.nodeId}  Ronda ${battle.ronda}`,'t-pel',true);
    R.sep('─');
    battle.cola.forEach(c=>{
      const bar=hpBar(c.hp,c.maxHp,12);
      const turnoMark=(actorActual(battle)?.id===c.id)?'▶ ':'  ';
      const status=c.vivo?(c.defendiendo?'[DEF]':''):'[†]';
      const el=c.elemento_estado?(` ${Tactics.ELEMENTOS[c.elemento_estado]?.icon||''}${c.elemento_estado}`): '';
      const poiseBar=c.poise!=null&&c.tipo!=='player'?` P:${c.poise}/${Tactics.calcPoise(c)}${c.poise_roto?' ⚡':''}`:'';
      R.w(`${turnoMark}${c.name.padEnd(16)} ${bar} ${c.hp}/${c.maxHp}${el}${poiseBar} ${status}`,c.color||'t-out');
    });
    // Línea táctica: clima + superficie
    Tactics.renderTactico(battle);
    R.sep('─');
    const actor=actorActual(battle);
    if(actor&&actor.vivo){
      if(actor.playerId===Player.get().id){
        R.w(`▶ TU TURNO — elegir acción:`,'t-cra',true);
        R.w('  atacar [nombre]  ·  defender  ·  magia [nombre]  ·  habilidad [nombre]  ·  huir','t-dim');
      } else {
        R.w(`⧗ Turno de ${actor.name}... esperando.`,'t-dim');
      }
    }
    if(!prompt) return;
    // Mostrar últimas 3 líneas del log
    const lastLog=battle.log.slice(-3);
    if(lastLog.length){R.sep('·');lastLog.forEach(l=>R.w(`  ${l.txt}`,l.color||'t-dim'));}
    R.sep('═');R.sp();
  }

  function hpBar(hp,max,len=10){
    const pct=Math.max(0,Math.min(1,hp/Math.max(1,max)));
    const f=Math.round(pct*len);
    const color=pct>.6?'█':pct>.3?'▓':'░';
    return color.repeat(f)+'░'.repeat(len-f)+` ${Math.round(pct*100)}%`;
  }

  // Aplicar una acción en el BattleState canónico (corre en host)
  function execBattleAction(battle, actorId, action, targetName){
    const actor=battle.cola.find(c=>c.id===actorId);
    if(!actor||!actor.vivo) return;
    if(actorActual(battle)?.id!==actorId){
      if(actor.playerId){
        const conn=actor.peerId?peers[actor.peerId]:null;
        if(conn) try{conn.send(JSON.stringify({type:'BATTLE_NOT_YOUR_TURN',battleId:battle.id}));}catch{}
      }
      return;
    }

    // Tick de inicio de turno (heridas, venenos, estados)
    Tactics.tickTurno(actor, battle);
    // Tick de superficie
    Tactics.tickSup(battle.nodeId);

    // Saltar turno si aturdido/inmóvil
    if(actor.skipping){
      actor.skipping=false;
      battleLog(battle,`${actor.name} no puede actuar este turno.`,'t-dim');
      _advanceTurn(battle);_checkBattleEnd(battle);
      return;
    }

    actor.defendiendo=false;
    let logEntry='';
    const p=Player.get();
    const isMyTurn=actor.playerId===p.id;

    switch(action){
      case 'atacar':{
        const target = targetName
          ? battle.cola.find(c=>c.vivo&&c.name.toLowerCase().includes(targetName.toLowerCase())&&c.id!==actorId)
          : battle.cola.find(c=>c.vivo&&_sonEnemigos(actor,c));
        if(!target){battleLog(battle,'Sin objetivo válido.','t-dim');break;}

        // ── Trickster: interception total del ataque ────────────
        if(target.esTrickster){
          _procesarTrickster(battle, target, 0, actor);
          _advanceTurn(battle);
          _checkBattleEnd(battle);
          break;
        }

        // Duplicar acción si está activo (Bifurcación Menor)
        const duplicar=p._duplicar_accion;
        if(duplicar) p._duplicar_accion=false;

        // Elemento del arma equipada
        const arma=isMyTurn?p.equipped?.arma:null;
        const elemento=Tactics.getElementoArma(arma);

        // Fórmula factorial
        const calc=Tactics.calcularDaño(actor, target, arma, elemento, battle);
        let {dmg,reaccion}=calc;

        // Misfit check: superficie niebla
        const sup=Tactics.getSup(battle.nodeId);
        if(sup.tipo==='niebla'&&U.chance(0.30)){
          battleLog(battle,`  🌫 Niebla: ataque de ${actor.name} falla!`,'t-dim');
          if(isMyTurn) Tactics.consumirStamina(5);
          break;
        }

        // Aplicar daño
        target.hp=Math.max(0,target.hp-dmg);

        // Construir log detallado
        const mults=[];
        if(calc.staminaMult<1)   mults.push(`STA×${calc.staminaMult.toFixed(1)}`);
        if(calc.climaMult>1)     mults.push(`CLI×${calc.climaMult.toFixed(1)}`);
        if(calc.supMult>1)       mults.push(`SUP×${calc.supMult.toFixed(1)}`);
        if(calc.reacMult>1)      mults.push(`REAC×${calc.reacMult.toFixed(1)}`);
        if(calc.sintonía>1)      mults.push(`SIN×${calc.sintonía.toFixed(1)}`);
        if(calc.poiseMult>1)     mults.push(`CRÍTICO×${calc.poiseMult}`);
        const multStr=mults.length?` [${mults.join(' ')}]`:'';

        logEntry=`${actor.name} → ${target.name}  −${dmg}HP${multStr}  (${target.hp}/${target.maxHp})`;
        battleLog(battle,logEntry,'t-pel');

        // Reacción elemental
        if(reaccion){
          battleLog(battle,`  ⚗ REACCIÓN: ${reaccion.nombre}! ${reaccion.desc||''}`,reaccion.color||'t-cor');
          Tactics.aplicarReaccion(reaccion, actor, target, battle);
          if(isMyTurn) XP.ganar('mente',15,'reacción elemental');
        }

        // Aplicar elemento al target
        if(elemento) Tactics.aplicarElemento(target, elemento, battle);

        // Actualizar superficie
        if(elemento) Tactics.actualizarSuperficie(battle.nodeId, elemento, battle);

        // Daño de poise
        const poiseDmg=Math.floor(dmg*0.4)+(arma?.poise_dmg||0);
        const poiseRoto=Tactics.aplicarPoiseDmg(target, poiseDmg, battle);

        // Desgaste del arma
        if(arma) Tactics.desgastarArma(arma);
        if(arma?.mellada) battleLog(battle,`  ⚠ ${arma.nombre} está mellada. Efecto reducido.`,'t-mem');

        // Stamina
        if(isMyTurn) Tactics.consumirStamina(8);

        // Herida al target
        const herida=Tactics.calcularHerida(dmg, target.maxHp);
        if(herida&&target.tipo!=='player'){
          battleLog(battle,`  ${Tactics.HERIDAS[herida]?.icon} ${target.name} sufre ${herida}!`,Tactics.HERIDAS[herida]?.color||'t-pel');
        } else if(herida&&target.tipo==='player'&&target.playerId===p.id){
          p.heridas=p.heridas||[];
          if(!p.heridas.includes(herida)){
            p.heridas.push(herida);
            battleLog(battle,`  ${Tactics.HERIDAS[herida]?.icon} ¡${herida}! ${Tactics.HERIDAS[herida]?.desc}`,Tactics.HERIDAS[herida]?.color||'t-pel');
          }
        }

        // XP combate
        if(isMyTurn) XP.ganar('combate',Math.ceil(dmg/3),'daño en batalla');

        // Duplicar acción (Bifurcación Menor) — segundo golpe al 60% de daño
        if(duplicar&&target.vivo){
          const dmg2=Math.max(1,Math.floor(dmg*0.6));
          target.hp=Math.max(0,target.hp-dmg2);
          battleLog(battle,`  ✦ Bifurcación → ${target.name}  −${dmg2}HP (segundo golpe)`,'t-mag');
          if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
        }

        if(target.hp<=0){
          target.vivo=false;
          battleLog(battle,`${target.name} cae.`,'t-cor');
          if(isMyTurn){
            const xpGain=target.tipo==='player'?50:target.tipo==='npc'?40:20;
            XP.ganar('combate',xpGain,`kill en batalla: ${target.name}`);
          }
          if(target.tipo==='npc'){const npcRef=GS.npc(target.id);if(npcRef){npcRef.estado='muerto';GS.allMisiones().filter(m=>m.npc_id===npcRef.id&&!m.completada).forEach(m=>m.fallida=true);}}
          if(target.tipo==='enemy') World.rmEnemy(battle.nodeId,target.id);
        }
        break;
      }

      case 'defender':{
        actor.defendiendo=true;
        // Recuperar stamina al defender
        if(isMyTurn) p.stamina=Math.min(p.maxStamina||100,(p.stamina||0)+15);
        logEntry=`${actor.name} se defiende. DEF+${Math.ceil((actor.def||1)/2)} · +15 stamina.`;
        battleLog(battle,logEntry,'t-sis');
        break;
      }

      case 'huir':{
        const allPvP=battle.cola.filter(c=>['enemy','npc','creature'].includes(c.tipo)).length===0;
        actor.vivo=false;actor.huyó=true;
        logEntry=allPvP?`${actor.name} huye del duelo.`:`${actor.name} escapa de la batalla.`;
        battleLog(battle,logEntry,'t-mem');
        // Si había Trickster — el loot acumulado ya está en el inventario, mostrar resumen
        const trick=battle.cola.find(c=>c.esTrickster&&c.vivo);
        if(trick){
          const dano=999-trick.hp;
          const xpTrick=Math.max(5,dano*2);
          battleLog(battle,`  ✦ Escapas del Trickster.`,'t-cor');
          if(trick._lootLog?.length){
            R.sp();R.w(`✦ LOOT DEL TRICKSTER (${dano} golpes)`,'t-cor',true);
            trick._lootLog.forEach(l=>R.w(`  · ${l}`,'t-cra'));
            R.w(`XP suerte ganada: ${xpTrick}`,'t-mem');R.sp();
          } else {
            battleLog(battle,`  ✦ Golpes dados: ${dano}  XP: ${xpTrick}`,'t-mem');
          }
          XP.ganar('suerte',xpTrick,`huir del Trickster tras ${dano} golpes`);
          trick.vivo=false;trick.huyó=true;
        }
        if(actor.playerId===p.id){myBattleId=null;Combat.active=false;}
        break;
      }

      case 'magia':{
        if(isMyTurn){
          const mag=targetName?Player.findMag(targetName):p.magias.find(m=>m.cargas>0);
          if(!mag||mag.cargas<=0){battleLog(battle,'Sin magia disponible.','t-dim');break;}

          // Conmoción: 40% fallo
          if((p.heridas||[]).includes('CONMOCION')&&U.chance(0.4)){
            battleLog(battle,'💫 Conmoción: la magia falla!','t-dim');
            mag.cargas--;break;
          }
          // Silenciado
          const actorState=battle.cola.find(c=>c.id===actorId);
          if(actorState?.silenciado){battleLog(battle,'Silenciado: no puedes usar magias.','t-mag');break;}

          // Coste de maná
          const manaCost=mag.poder||8;
          if((p.mana||0)<manaCost){battleLog(battle,`Maná insuficiente (necesitas ${manaCost}).`,'t-mag');break;}
          Tactics.consumirMana(manaCost);

          mag.cargas--;mag.fragilidad=U.clamp((mag.fragilidad||0)+10,0,100);
          const elemento=Tactics.getElementoMagia(mag);
          const target=battle.cola.find(c=>c.vivo&&_sonEnemigos(actor,c));

          if(target){
            // Efectos especiales de magia según efecto
            switch(mag.efecto){
              case 'debuff':{
                // Degrada ATK del objetivo -30% temporal
                const reduccion=Math.max(1,Math.floor((target.atk||4)*0.3));
                target.atk=Math.max(1,(target.atk||4)-reduccion);
                target._debuff_atk=true;
                const dmg=Math.max(1,Math.floor((mag.poder||8)*0.5)); // daño reducido
                target.hp=Math.max(0,target.hp-dmg);
                logEntry=`${actor.name} [${mag.nombre}] → ${target.name}  ATK−${reduccion}  −${dmg}HP`;
                battleLog(battle,logEntry,'t-mag');
                if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
                break;
              }
              case 'duplicar':{
                // Marca para duplicar la próxima acción del jugador
                p._duplicar_accion=true;
                logEntry=`${actor.name} [${mag.nombre}] — próxima acción se duplica`;
                battleLog(battle,logEntry,'t-mag');
                // Y hace daño normal también
                const calc2=Tactics.calcularDaño(actor,target,{atk:mag.poder||8,tags:mag.tags||[]},elemento,battle);
                target.hp=Math.max(0,target.hp-calc2.dmg);
                battleLog(battle,`  ↳ Daño inicial −${calc2.dmg}HP`,'t-mag');
                if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
                break;
              }
              case 'invisibilidad':{
                // En batalla: evasión mejorada por 2 turnos
                p._niebla_turnos=(p._niebla_turnos||0)+3;
                logEntry=`${actor.name} [${mag.nombre}] — invisible (3 turnos, 40% fallo IA)`;
                battleLog(battle,logEntry,'t-mag');
                break;
              }
              default:{
                // dmg_dist y cualquier otro: daño con cálculo táctico completo
                const calc=Tactics.calcularDaño(actor,target,{atk:mag.poder||8,tags:mag.tags||[]},elemento,battle);
                const dmg=calc.dmg;
                target.hp=Math.max(0,target.hp-dmg);
                logEntry=`${actor.name} lanza ${mag.nombre} → ${target.name}  −${dmg}HP`;
                battleLog(battle,logEntry,'t-mag');
                if(calc.reaccion){
                  battleLog(battle,`  ⚗ REACCIÓN: ${calc.reaccion.nombre}! ${calc.reaccion.desc||''}`,calc.reaccion.color||'t-cor');
                  Tactics.aplicarReaccion(calc.reaccion,actor,target,battle);
                  XP.ganar('mente',20,'reacción elemental magia');
                }
                if(elemento) Tactics.aplicarElemento(target,elemento,battle);
                if(elemento) Tactics.actualizarSuperficie(battle.nodeId,elemento,battle);
                if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
              }
            }
          } else {
            // Sin target — magia sin objetivo
            logEntry=`${actor.name} usa ${mag.nombre}.`;
            battleLog(battle,logEntry,'t-mag');
            // Invisibilidad/evasión sin target también funciona
            if(mag.efecto==='invisibilidad'){p._niebla_turnos=(p._niebla_turnos||0)+3;battleLog(battle,`  ✦ Invisible (3 turnos).`,'t-mag');}
            if(elemento) Tactics.actualizarSuperficie(battle.nodeId,elemento,battle);
          }
          XP.ganar('mente',12,'magia en batalla');
        }
        break;
      }

      case 'habilidad':{
        if(isMyTurn){
          const hab=targetName?Player.findHab(targetName):p.habilidades[0];
          if(!hab){battleLog(battle,'Sin habilidad disponible.','t-dim');break;}
          Tactics.consumirStamina(12);
          const target=battle.cola.find(c=>c.vivo&&_sonEnemigos(actor,c));

          switch(hab.efecto){
            case 'atk_mult':{
              if(!target) break;
              const dmg=Math.max(1,Math.floor(actor.atk*(hab.valor||2)-(target.poise_roto?0:target.def||0)));
              const d=Tactics.staminaPct()<0.2?Math.floor(dmg*0.5):dmg;
              target.hp=Math.max(0,target.hp-d);
              logEntry=`${actor.name} [${hab.nombre}] → ${target.name}  −${d}HP (×${hab.valor||2})`;
              battleLog(battle,logEntry,'t-hab');
              Tactics.aplicarPoiseDmg(target,Math.floor(d*0.6),battle);
              if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
              break;
            }
            case 'atk_bonus':{
              if(!target) break;
              const bonus=hab.valor||5;
              // impulso_antiguo: bonus solo contra entidades con tag 'antiguo'
              const esAntiguo=(target.tags||[]).includes('antiguo')||(target.name||'').toLowerCase().includes('antiguo');
              const atkEfectivo=actor.atk+(hab.id==='impulso_antiguo'?esAntiguo?bonus:1:bonus);
              const dmg=Math.max(1,atkEfectivo-(target.poise_roto?0:target.def||0));
              target.hp=Math.max(0,target.hp-dmg);
              logEntry=`${actor.name} [${hab.nombre}] → ${target.name}  −${dmg}HP`;
              if(hab.id==='impulso_antiguo'&&esAntiguo) logEntry+=' ⚡BONO ANTIGUO';
              battleLog(battle,logEntry,'t-hab');
              Tactics.aplicarPoiseDmg(target,Math.floor(dmg*0.5),battle);
