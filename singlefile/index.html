              if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
              break;
            }
            case 'atk_drain':{
              // ATK aumentado pero drena HP del jugador
              if(!target) break;
              const drainMult=hab.valor||1.8;
              const dmg=Math.max(1,Math.floor(actor.atk*drainMult-(target.poise_roto?0:target.def||0)));
              const drain=Math.floor(dmg*0.2); // 20% del daño como autoinfligido
              target.hp=Math.max(0,target.hp-dmg);
              p.hp=Math.max(1,p.hp-drain);
              logEntry=`${actor.name} [${hab.nombre}] → ${target.name}  −${dmg}HP  (autoinflige −${drain}HP)`;
              battleLog(battle,logEntry,'t-pel');
              Tactics.aplicarPoiseDmg(target,Math.floor(dmg*0.7),battle);
              if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
              break;
            }
            case 'aoe':{
              // Daño a TODOS los enemigos
              const enemigos=battle.cola.filter(c=>c.vivo&&_sonEnemigos(actor,c));
              if(!enemigos.length){battleLog(battle,'Sin objetivos.','t-dim');break;}
              const dmgBase=Math.max(1,Math.floor(actor.atk*0.7));
              enemigos.forEach(e=>{
                const d=Math.max(1,dmgBase-(e.poise_roto?0:e.def||0));
                e.hp=Math.max(0,e.hp-d);
                battleLog(battle,`  ↳ ${hab.nombre} → ${e.name}  −${d}HP`,'t-hab');
                if(e.hp<=0){e.vivo=false;battleLog(battle,`  ${e.name} cae.`,'t-cor');}
              });
              logEntry=`${actor.name} [${hab.nombre}] — daño en área (${enemigos.length} objetivos)`;
              // Aplicar elemento RESONANTE a superficie como bonus
              Tactics.actualizarSuperficie(battle.nodeId,'RESONANTE',battle);
              break;
            }
            case 'scan':{
              // Revela stats de todos los enemigos vivos
              const enemigos=battle.cola.filter(c=>c.vivo&&_sonEnemigos(actor,c));
              enemigos.forEach(e=>{
                const el=e.elemento_estado?` [${e.elemento_estado}]`:'';
                const poi=e.poise!=null?` P:${e.poise}/${e.poise_max||50}`:'';
                battleLog(battle,`  📊 ${e.name}: HP ${e.hp}/${e.maxHp}  ATK:${e.atk}  DEF:${e.def||0}${poi}${el}`,'t-dim');
              });
              logEntry=`${actor.name} [${hab.nombre}] — stats revelados`;
              Tactics.consumirStamina(-6); // recupera algo de stamina al escanear
              break;
            }
            case 'evol':{
              // Activa evolución — incrementar el contador
              hab.evolucion=hab.evolucion||{contador:0,umbral:hab.evolucion_umbral||5};
              hab.evolucion.contador++;
              if(hab.evolucion.contador>=hab.evolucion.umbral){
                // Evolucionar: incrementar ATK base y resetear contador
                p.atk++;
                hab.evolucion.contador=0;
                hab.evolucion.umbral=Math.floor(hab.evolucion.umbral*1.5);
                battleLog(battle,`✦ ${hab.nombre} evoluciona. ATK base +1.`,'t-cor');
                XP.ganar('cuerpo',30,'evolución de habilidad');
              }
              // Ataque normal además
              if(target){
                const dmg=Math.max(1,actor.atk-(target.def||0));
                target.hp=Math.max(0,target.hp-dmg);
                if(target.hp<=0){target.vivo=false;}
              }
              logEntry=`${actor.name} [${hab.nombre}] — evol.${hab.evolucion.contador}/${hab.evolucion.umbral}`;
              break;
            }
            case 'evasion':{
              // Activa evasión táctica: 40% fallo en ataques contra el jugador 2 turnos
              p._niebla_turnos=(p._niebla_turnos||0)+2;
              logEntry=`${actor.name} [${hab.nombre}] — evasión activa (${Math.round((hab.valor||0.4)*100)}%, 2 turnos)`;
              battleLog(battle,logEntry,'t-hab');
              break;
            }
            default:{
              // Daño genérico para efectos no implementados
              if(target){
                const dmg=Math.max(1,actor.atk+U.rand(2,8)-(target.def||0));
                target.hp=Math.max(0,target.hp-dmg);
                logEntry=`${actor.name} usa ${hab.nombre} → ${target.name}  −${dmg}HP`;
                battleLog(battle,logEntry,'t-hab');
                if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
              }
            }
          }

          if(logEntry) battleLog(battle,logEntry,'t-hab');
          // Incrementar contador de evolución en TODAS las habilidades al usarlas
          if(hab.evolucion){
            hab.evolucion.contador=(hab.evolucion.contador||0)+1;
            if(hab.evolucion.contador>=hab.evolucion.umbral&&hab.efecto!=='evol'){
              // Evolución automática para habilidades no-evol
              hab.evolucion.contador=0;
              hab.evolucion.umbral=Math.floor(hab.evolucion.umbral*1.5);
              hab.valor=(hab.valor||1)+1;
              battleLog(battle,`✦ ${hab.nombre} evoluciona. ${hab.efecto==='atk_mult'?'Multiplicador':'Valor'} +1 → ${hab.valor}`,'t-cor');
              XP.ganar('cuerpo',25,'habilidad evolucionada');
            }
          }
          XP.ganar('cuerpo',8,'habilidad en batalla');
        }
        break;
      }

      default:
        battleLog(battle,`Acción desconocida: ${action}`,'t-dim');
    }

    // Aura del compañero al inicio del próximo turno del jugador
    Tactics.aplicarAura(battle, battle.nodeId);

    _advanceTurn(battle);
    _checkBattleEnd(battle);
    return logEntry;
  }

  // Determina si dos combatientes son enemigos
  function _sonEnemigos(a,b){
    if(a.tipo==='player'&&b.tipo==='player') return true;  // PvP: ambos jugadores son rivales
    if(a.tipo==='player'&&['enemy','npc','creature'].includes(b.tipo)) return true;
    if(['enemy','npc','creature'].includes(a.tipo)&&b.tipo==='player') return true;
    if(a.tipo==='enemy'&&b.tipo==='npc') return false;   // enemigos y NPCs no se atacan entre sí
    return false;
  }

  function _advanceTurn(battle){
    const total=battle.cola.length;
    let next=(battle.turno+1)%total;
    let loops=0;
    while(loops<total && (!battle.cola[next].vivo || battle.cola[next].huyó)){
      next=(next+1)%total;
      loops++;
    }
    if(next < battle.turno) battle.ronda++;
    battle.turno=next;
    if(battle.cola[next]) battle.cola[next].defendiendo=false;

    // Al inicio del turno del jugador — ejecutar apoyo de compañeros
    const actor=battle.cola[next];
    if(actor&&actor.playerId===Player.get().id&&actor.tipo==='player'){
      Player.get().compañeros.forEach(cre=>{
        if(cre.modo!=='latente'&&cre.estado!=='latente'){
          CreatureEngine.apoyoEnTurno(cre, battle);
        }
      });
    }
  }

  function _checkBattleEnd(battle){
    const equipoA  = battle.cola.filter(c=>c.tipo==='player');
    const equipoB  = battle.cola.filter(c=>['enemy','npc','creature'].includes(c.tipo));
    const allPvP   = equipoB.length===0;
    const myId     = Player.get().id;

    if(allPvP){
      // ── PvP ────────────────────────────────────────────────────
      // Vivos = no han caído (hp=0) ni huido
      const caidos  = equipoA.filter(c=>!c.vivo && !c.huyó);   // derrotados en combate
      const vivos   = equipoA.filter(c=>c.vivo  && !c.huyó);

      // Procesar cada jugador caído en PvP → muerte real
      caidos.forEach(c=>{
        if(c._deathProcessed) return;
        c._deathProcessed=true;
        battleLog(battle,`☠ ${c.name} ha caído. Muerte permanente.`,'t-cor');

        if(c.playerId===myId){
          // SOY YO el caído — muerte real
          _triggerPvPDeath(battle);
        } else {
          // Es otro jugador — notificarle via red
          _broadcastPlayerDeath(battle, c.playerId);
        }
      });

      // ¿Termina la batalla?
      if(vivos.length<=1 && equipoA.every(c=>!c.vivo||c.huyó||c._deathProcessed)){
        battle.estado='fin';
        battle.ganadores=vivos.map(c=>c.id);
        if(vivos.length===1){
          battleLog(battle,`⚑ ${vivos[0].name} gana el duelo.`,'t-cra');
          // XP al ganador si soy yo
          if(vivos[0].playerId===myId){
            XP.ganar('combate',80,'victoria PvP');
            XP.ganar('narrativa',30,'duelo ganado');
          }
        } else {
          battleLog(battle,'Sin supervivientes.','t-dim');
        }
      }

    } else {
      // ── PvE ────────────────────────────────────────────────────
      const jugadoresVivos = equipoA.filter(c=>c.vivo&&!c.huyó);
      const enemigosVivos  = equipoB.filter(c=>c.vivo&&!c.huyó);

      if(!jugadoresVivos.length){
        battle.estado='fin';
        battle.ganadores=enemigosVivos.map(c=>c.id);
        battleLog(battle,'Los jugadores han caído.','t-pel');
        // Si soy uno de los caídos → muerte normal del juego
        const yoCalido=equipoA.find(c=>c.playerId===myId&&!c.vivo&&!c.huyó);
        if(yoCalido) setTimeout(()=>die('caído en batalla'),600);

      } else if(!enemigosVivos.length){
        battle.estado='fin';
        battle.ganadores=jugadoresVivos.map(c=>c.id);
        battleLog(battle,'¡Victoria!','t-cra');

        // Procesar cada enemigo derrotado
        battle.cola.filter(c=>['enemy','npc','creature'].includes(c.tipo)&&!c.vivo&&!c._deathProcessed).forEach(e=>{
          e._deathProcessed=true;

          // ── Trickster: loot especial propio ────────────────────
          if(e.esTrickster){
            if(!e.huyó) _tricksterLoot();
            return;
          }

          // ── 1. Boss defeat ──────────────────────────────────────
          if(e.es_boss){
            EventBus.emit('combat:enemy_defeat',{enemy:e, nodeId:battle.nodeId});
            return; // BossSystem maneja el loot y XP
          }

          // ── 2. NPC muerto en combate táctico ───────────────────
          if(e.tipo==='npc'){
            const npcRef=GS.npc(e.id);
            if(npcRef&&npcRef.estado!=='muerto'){
              npcRef.estado='muerto';
              Player.get().stats.kills++;
              XP.ganar('combate',40,`kill NPC: ${e.name}`);
              GS.allMisiones().filter(m=>m.npc_id===e.id&&!m.completada).forEach(m=>m.fallida=true);
              ArcEngine.onNPCMuerto(e.id);
              FactionSystem.onNPCMuerto({...npcRef, faccion:npcRef.faccion||e.faccion});
              EventBus.emit('narrative:npc_death',{npc:npcRef,causa:'combate'});
            }
          }

          // ── 3. Criatura capturada si era para captura ───────────
          if(e.tipo==='creature'&&e._cre_ref){
            const cre=e._cre_ref;
            const hpPct=e.hp/e.maxHp;
            if(hpPct<=0.25){
              // Criatura debilitada — captura automática
              cre.estado='sometida'; cre.hp=Math.max(1,Math.floor(e.maxHp*0.15));
              if(Player.addComp(cre)){
                battleLog(battle,`✦ ${cre.nombre} ha sido vinculado.`,'t-cri');
                XP.ganar('criaturas',50,'captura en batalla');
                World.rmCreature(battle.nodeId,cre.id);
              } else {
                battleLog(battle,`No hay espacio para ${cre.nombre}.`,'t-dim');
              }
            }
          }

          // ── 4. Loot táctico con suerte ─────────────────────────
          const suerteBonus=(Player.get().suerte||0)*0.02;
          const dropChance=0.45+suerteBonus;

          // Loot del catálogo de enemigos
          const edef=D.enemies.find(x=>x.id===e.id||x.nombre===e.name);
          if(edef?.loot?.length&&U.chance(dropChance)){
            const d=U.pick(edef.loot,U.rng(Math.random()));
            Player.addItem({id:U.uid(),blueprint:d,nombre:d,tipo:'material',tags:D.matTags(d),estado:'nativo',desc:D.mat(d)?.desc});
            battleLog(battle,`Loot: ${d}${suerteBonus>0?' [✦suerte]':''}`,'t-cra');
          }

          // Loot táctico adicional (ítems de ItemSystem)
          if(U.chance(0.30+suerteBonus)){
            const nodo=World.node(battle.nodeId);
            const itemTac=ItemSystem.genLootTactico(nodo?.tipo||'ruina',U.rng(Date.now()));
            if(itemTac){
              Player.addItem({...itemTac,id:U.uid()});
              battleLog(battle,`Loot táctico: ${itemTac.nombre}`,'t-cra');
            }
          }

          // XP por kill
          const xpKill=e.tipo==='npc'?0:20+(e.maxHp||10)/5; // NPC ya sumó arriba
          if(e.tipo!=='npc') XP.ganar('combate',Math.floor(xpKill),`kill batalla: ${e.name}`);

          // Reputación con facciones — matar miembro de facción
          if(e.faccion) FactionSystem.modRep(e.faccion,-8);

          // Limpiar enemigo del nodo
          if(e.tipo==='enemy') World.rmEnemy(battle.nodeId,e.id);
        });

        // ── 5. XP extra por victoria limpia ────────────────────
        if(jugadoresVivos.length===equipoA.length) XP.ganar('combate',10,'victoria sin bajas');

        // ── 6. Post-batalla criaturas ───────────────────────────
        CreatureEngine.postBatalla(true);
        // Sincronizar HP de compañeros desde la batalla
        battle.cola.filter(c=>c.esCompañero&&c._comp_ref).forEach(c=>{
          c._comp_ref.hp=Math.max(1,c.hp);
        });

        // ── 6. Arc — intentar generar arc al vencer NPC importante ─
        const npcVencido=battle.cola.find(c=>c.tipo==='npc'&&!c.vivo);
        if(npcVencido){
          const npcsVivos=GS.aliveNPCs().filter(n=>n.lealtad>=30&&n.id!==npcVencido.id);
          if(npcsVivos.length) setTimeout(()=>ArcEngine.intentarGenArc(npcsVivos[0]),500);
        }
      }
    }

    if(battle.estado==='fin'){
      if(myBattleId===battle.id){ myBattleId=null; }
      Combat.active=false;
    }
  }

  // ── Muerte real en PvP — muerte permanente del personaje ─────
  function _triggerPvPDeath(battle){
    // Desconectar del multijugador primero (guarda el estado)
    const myName=Player.get().name;
    setTimeout(()=>{
      R.sp();R.sep('═');
      R.w('☠  MUERTE EN DUELO  ☠','t-cor',true);
      R.w(`${myName} ha caído en combate PvP.`,'t-pel');
      R.w('La muerte en duelo es permanente.','t-dim');
      R.w('Serás desconectado del servidor.','t-dim');
      R.sep('─');
      R.w('Escribe "nuevo" para crear un nuevo personaje.','t-mem');
      R.sep('═');R.sp();
      // Desconectar de la partida multijugador
      if(Net.isOnline()) Net.disconnect();
      // Trigger muerte del personaje
      die('caído en duelo PvP');
    }, 1200);
  }

  // ── Notificar a jugador remoto su muerte PvP ─────────────────
  function _broadcastPlayerDeath(battle, victimPlayerId){
    const msg={type:'BATTLE_PLAYER_DEAD', battleId:battle.id, playerId:victimPlayerId};
    // Host lo reenvía al cliente afectado
    const victimPeer=players[victimPlayerId]?.peerId;
    if(victimPeer&&peers[victimPeer]){
      sendToPeer(victimPeer, msg);
    }
    // También broadcast para que todos lo vean
    broadcast({
      type:'ACTION_BROADCAST',
      playerId: victimPlayerId,
      playerName: players[victimPlayerId]?.name||'Jugador',
      summary: `☠ ${players[victimPlayerId]?.name||'Jugador'} ha muerto en duelo.`,
    });
    // Eliminar al jugador del mundo
    setTimeout(()=>{
      delete players[victimPlayerId];
      updateBar();
      save();
    }, 2000);
  }

  // IA para combatientes no jugadores en el turno
  // ════════════════════════════════════════════════════════════════
  // IA TÁCTICA PROCEDURAL — Enemigos, NPCs y Criaturas
  // ════════════════════════════════════════════════════════════════

  // Personalidades de IA que determinan prioridades de decisión
  const AI_PERFILES = {
    berserker:  { agresivo:0.9, defensivo:0.0, elemental:0.3, huye:0.0,  prio:'dps'    },
    guardián:   { agresivo:0.5, defensivo:0.4, elemental:0.2, huye:0.05, prio:'tank'   },
    chamán:     { agresivo:0.4, defensivo:0.2, elemental:0.8, huye:0.1,  prio:'elemental'},
    cazador:    { agresivo:0.7, defensivo:0.1, elemental:0.4, huye:0.2,  prio:'focus'  },
    oportunista:{ agresivo:0.6, defensivo:0.2, elemental:0.5, huye:0.3,  prio:'debuff' },
    cobarde:    { agresivo:0.2, defensivo:0.3, elemental:0.1, huye:0.6,  prio:'huir'   },
    táctico:    { agresivo:0.5, defensivo:0.4, elemental:0.6, huye:0.05, prio:'reaccion'},
    bestia:     { agresivo:0.8, defensivo:0.0, elemental:0.1, huye:0.1,  prio:'dps'    },
  };

  // Asignar perfil según nombre/tipo del actor
  function _perfilIA(actor){
    const n=(actor.name||'').toLowerCase();
    const tipo=actor.tipo;
    if(tipo==='creature')                          return AI_PERFILES.bestia;
    if(n.includes('guardián')||n.includes('custodio')) return AI_PERFILES.guardián;
    if(n.includes('eco')||n.includes('resonante')) return AI_PERFILES.chamán;
    if(n.includes('berserker')||n.includes('errante'))return AI_PERFILES.berserker;
    if(n.includes('antiguo')||n.includes('grieta')) return AI_PERFILES.táctico;
    if(tipo==='npc'){
      const npcRef=GS.aliveNPCs().find(x=>x.id===actor.id);
      const arq=npcRef?.arq_ocu||npcRef?.arq_vis||'errante';
      if(['traidor','corrupto','vengativo'].includes(arq)) return AI_PERFILES.oportunista;
      if(['mártir','sacrificio'].includes(arq))            return AI_PERFILES.guardián;
      if(['fanático'].includes(arq))                       return AI_PERFILES.berserker;
    }
    // Aleatorio basado en id del actor
    const perfiles=Object.values(AI_PERFILES);
    return perfiles[U.rng(actor.id||Date.now())()%perfiles.length*perfiles.length|0]||AI_PERFILES.cazador;
  }

  // Decidir y ejecutar turno de IA con lógica táctica completa
  function _execAITurn(battle){
    const actor=actorActual(battle);
    if(!actor||actor.tipo==='player') return;

    // Tick táctico del actor (heridas, estados)
    Tactics.tickTurno(actor, battle);
    Tactics.tickSup(battle.nodeId);

    // ── Trickster: no ataca, solo intenta escapar ────────────
    if(actor.esTrickster){
      _tricksterAITurn(actor, battle);
      _advanceTurn(battle);
      _checkBattleEnd(battle);
      return;
    }

    // Aturdido / inmóvil
    if(actor.skipping){
      actor.skipping=false;
      battleLog(battle,`${actor.name} no puede actuar.`,'t-dim');
      _advanceTurn(battle);_checkBattleEnd(battle);return;
    }

    // ── Boss: ataque especial cada 3 rondas ──────────────────
    if(actor.es_boss){
      // Actualizar HP del boss_ref
      if(actor.boss_ref) actor.boss_ref.hp_actual=actor.hp;
      if(battle.ronda%3===0&&actor.ataques_especiales?.length){
        BossSystem.procesarAtaqueEspecial(actor,battle);
      }
    }

    const targets=battle.cola.filter(c=>c.vivo&&!c.huyó&&_sonEnemigos(actor,c));
    if(!targets.length){
      battleLog(battle,`${actor.name} espera.`,'t-dim');
      _advanceTurn(battle);_checkBattleEnd(battle);return;
    }

    const perfil=_perfilIA(actor);
    const roll=Math.random();

    // ── Evaluar huida ──────────────────────────────────────────
    if(roll < perfil.huye && (actor.hp/(actor.maxHp||actor.hp)) < 0.25){
      actor.vivo=false;actor.huyó=true;
      battleLog(battle,`${actor.name} huye de la batalla.`,'t-mem');
      _advanceTurn(battle);_checkBattleEnd(battle);return;
    }

    // ── Elegir target ──────────────────────────────────────────
    let target;
    if(perfil.prio==='focus'){
      // Cazador: atacar al más débil en porcentaje de vida
      target=targets.reduce((a,b)=>(a.hp/a.maxHp)<(b.hp/b.maxHp)?a:b);
    } else if(perfil.prio==='tank'){
      // Guardián: atacar al más fuerte (mayor ATK)
      target=targets.reduce((a,b)=>(b.atk||0)>(a.atk||0)?b:a);
    } else {
      // Resto: target aleatorio
      target=U.pick(targets,U.rng(Date.now()+Math.random()));
    }

    // ── Decidir acción táctica ─────────────────────────────────

    // 1. Defender si HP bajo y perfil defensivo
    if(roll<perfil.defensivo && actor.hp/(actor.maxHp||actor.hp)<0.35){
      actor.defendiendo=true;
      battleLog(battle,`${actor.name} adopta postura defensiva.`,'t-sis');
      _advanceTurn(battle);_checkBattleEnd(battle);return;
    }

    // 2. Acción elemental / reacción si perfil elemental
    if(roll<perfil.elemental){
      const elementoActor=_inferirElementoAI(actor);
      if(elementoActor){
        // Intentar generar reacción con el estado existente del target
        const reacKey=target.elemento_estado?`${target.elemento_estado}+${elementoActor}`:null;
        const reac=reacKey?Tactics.REACCIONES[reacKey]:null;

        const dmgBase=Math.max(1,(actor.atk||4)+U.rand(0,3)-(target.defendiendo?Math.ceil((target.def||0)/2):target.def||0));
        const multReac=reac?reac.mult*(Tactics.CLIMAS_NODO[World.node(battle.nodeId)?.tipo||'hub']?.mult_reac||1):1;
        const dmg=Math.max(1,Math.floor(dmgBase*multReac));

        target.hp=Math.max(0,target.hp-dmg);
        let log=`${actor.name} ataca ${target.name} [${elementoActor}] −${dmg}HP`;
        if(reac){
          log+=`  ⚗${reac.nombre}!`;
          Tactics.aplicarReaccion(reac,actor,target,battle);
          battleLog(battle,log,'t-cor');
        } else {
          // Aplicar elemento al target para cebar reacción futura
          Tactics.aplicarElemento(target,elementoActor,battle);
          Tactics.actualizarSuperficie(battle.nodeId,elementoActor,battle);
          battleLog(battle,log,Tactics.ELEMENTOS[elementoActor]?.color||'t-pel');
        }

        // Daño de poise
        Tactics.aplicarPoiseDmg(target,Math.floor(dmg*0.35),battle);

        if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
        _advanceTurn(battle);_checkBattleEnd(battle);return;
      }
    }

    // 3. Ataque directo estándar (con fórmula táctica simplificada)
    const sup=Tactics.getSup(battle.nodeId);

    // Niebla — 30% fallo también para la IA
    if(sup.tipo==='niebla'&&Math.random()<0.30){
      battleLog(battle,`  🌫 Niebla: ataque de ${actor.name} falla!`,'t-dim');
      _advanceTurn(battle);_checkBattleEnd(battle);return;
    }

    // _niebla_turnos del jugador — 40% fallo en ataques contra el jugador
    if(target.tipo==='player'&&target.playerId===Player.get().id){
      const p=Player.get();
      if((p._niebla_turnos||0)>0&&Math.random()<0.40){
        battleLog(battle,`  🌫 ${target.name} desaparece en la niebla. Fallo.`,'t-dim');
        _advanceTurn(battle);_checkBattleEnd(battle);return;
      }
    }

    const supMult=sup.tipo!=='normal'?1.15:1.0;
    const critMult=target.poise_roto?1.5:1.0;
    const dmgRaw=Math.max(1,(actor.atk||4)+U.rand(-1,3));
    // VACÍO en objetivo — reduce DEF
    let defBase=target.poise_roto?0:(target.defendiendo?Math.ceil((target.def||0)/2):target.def||0);
    if(target.elemento_estado==='VACÍO') defBase=Math.floor(defBase*0.6);
    if((target.heridas||[]).includes('QUEMADURA')) defBase=Math.floor(defBase*0.8);
    const dmg=Math.max(1,Math.floor(dmgRaw*supMult*critMult-defBase));

    // _poise_shield del jugador — absorbe el daño de poise de este golpe
    const p=Player.get();
    const pShield=target.tipo==='player'&&target.playerId===p.id&&p._poise_shield;
    if(pShield){ p._poise_shield=false; battleLog(battle,`  🛡 Escudo de postura absorbe el impacto.`,'t-sis'); }

    target.hp=Math.max(0,target.hp-dmg);
    const critTag=critMult>1?' ⚡CRÍTICO':'';
    battleLog(battle,`${actor.name} → ${target.name}  −${dmg}HP${critTag}  (${target.hp}/${target.maxHp})`,'t-pel');

    // Daño de poise (bloqueado por shield)
    if(!pShield) Tactics.aplicarPoiseDmg(target,Math.floor(dmg*0.4),battle);

    // Aplicar herida al jugador si el daño es alto
    if(target.tipo==='player'&&target.playerId===p.id){
      const herida=Tactics.calcularHerida(dmg,target.maxHp);
      if(herida){
        p.heridas=p.heridas||[];
        if(!p.heridas.includes(herida)){
          p.heridas.push(herida);
          battleLog(battle,`  ${Tactics.HERIDAS[herida]?.icon} ¡${herida}! ${Tactics.HERIDAS[herida]?.desc}`,Tactics.HERIDAS[herida]?.color||'t-pel');
        }
      }
    }

    if(target.hp<=0){target.vivo=false;battleLog(battle,`${target.name} cae.`,'t-cor');}
    _advanceTurn(battle);
    _checkBattleEnd(battle);
  }

  // Inferir elemento de un actor IA según sus tags/tipo
  function _inferirElementoAI(actor){
    const tags=(actor.tags||[]).map(t=>t.toLowerCase());
    if(tags.some(t=>['fuego','ardiente'].includes(t))) return 'ARDIENDO';
    if(tags.some(t=>['agua','mojado'].includes(t)))    return 'MOJADO';
    if(tags.some(t=>['rayo','eléctrico'].includes(t))) return 'ELECTRIZADO';
    if(tags.some(t=>['hielo','frío'].includes(t)))     return 'CONGELADO';
    if(tags.some(t=>['resonante','eco','sonido'].includes(t))) return 'RESONANTE';
    if(tags.some(t=>['vacío','corrupto'].includes(t))) return 'VACÍO';
    // Inferir por nombre del actor
    const n=(actor.name||'').toLowerCase();
    if(n.includes('eco')||n.includes('resonant')) return 'RESONANTE';
    if(n.includes('grieta')||n.includes('vacío'))  return 'VACÍO';
    if(n.includes('corrupto'))                      return 'VACÍO';
    return null;
  }

  // Lanzar el siguiente turno si es IA (host lo ejecuta automáticamente)
  function tickBattleAI(battle){
    if(battle.estado!=='activo') return;
    const actor=actorActual(battle);
    if(!actor) return;
    if(actor.tipo==='player') return;
    // Marcar que la IA está procesando (evita que el jugador vea "espera")
    battle._aiThinking=true;
    setTimeout(()=>{
      if(battle.estado!=='activo'){battle._aiThinking=false;return;}
      _execAITurn(battle);
      battle._aiThinking=false;
      _broadcastBattleState(battle);
      const next=actorActual(battle);
      if(next&&next.tipo!=='player'&&battle.estado==='activo') tickBattleAI(battle);
      else if(battle.estado==='activo') renderBattle(battle);
    }, 600);
  }

  function _broadcastBattleState(battle){
    // Host hace broadcast del estado de la batalla a todos los participantes
    const msg={type:'BATTLE_STATE', battle, battleId:battle.id};
    battle.cola.forEach(c=>{
      if(c.tipo==='player'&&c.peerId&&peers[c.peerId]){
        sendToPeer(c.peerId, msg);
      }
    });
    // También actualizar el host localmente
    if(myBattleId===battle.id) renderBattle(battle);
    save();
  }

  // ── HOST: manejar mensajes de batalla ─────────────────────────
  function handleBattleClientMsg(peerId, msg){
    switch(msg.type){

      case 'BATTLE_ACTION':{
        const battle=battles[msg.battleId];
        if(!battle||battle.estado!=='activo') return;
        execBattleAction(battle, msg.actorId, msg.action, msg.target);
        _broadcastBattleState(battle);
        // Tick IA si toca
        const next=actorActual(battle);
        if(next&&next.tipo!=='player'&&battle.estado==='activo') tickBattleAI(battle);
        break;
      }

      case 'BATTLE_JOIN':{
        const battle=battles[msg.battleId];
        if(!battle||battle.estado!=='activo') return;
        const pInfo=players[msg.playerId];
        if(!pInfo||pInfo.nodeId!==battle.nodeId) return; // no está en el mismo nodo
        // Añadir a la cola
        const c=buildCombatant('player',
          {name:pInfo.name, hp:msg.hp||40, maxHp:msg.hp||40, atk:msg.atk||5, def:msg.def||1},
          msg.playerId
        );
        c.peerId=peerId;
        c.iniciativa=calcIniciativa(c);
        // Insertar en posición correcta por iniciativa
        let ins=battle.cola.findIndex(x=>x.iniciativa<c.iniciativa);
        if(ins<0) ins=battle.cola.length;
        battle.cola.splice(ins,0,c);
        battleLog(battle,`${pInfo.name} entra en la batalla.`,'t-eco');
        _broadcastBattleState(battle);
        break;
      }

      case 'TRADE_REQUEST':{
        // Reenviar al destinatario
        const target=players[msg.toId];
        if(target?.peerId&&peers[target.peerId]){
          sendToPeer(target.peerId, msg);
        } else if(msg.toId===Player.get().id){
          handleTradeMsg(msg);
        }
        break;
      }

      case 'TRADE_RESPONSE':
      case 'TRADE_OFFER':
      case 'TRADE_CONFIRM':
      case 'TRADE_CANCEL':{
        // Rutear al otro jugador del trade
        const trade=Object.values(trades).find(t=>t.id===msg.tradeId);
        if(!trade) return;
        const otherId=trade.a.playerId===msg.fromId?trade.b.playerId:trade.a.playerId;
        const otherPeer=players[otherId]?.peerId;
        // Entregar al otro jugador
        if(otherPeer&&peers[otherPeer]) sendToPeer(otherPeer, msg);
        // Si el otro es el host, procesar localmente
        if(otherId===Player.get().id) handleTradeMsg(msg);
        // También procesar en host si es participante del trade
        if(msg.fromId===Player.get().id||otherId===Player.get().id) handleTradeMsg(msg);
        break;
      }
    }
  }

  // ── CLIENT: manejar mensajes de batalla ───────────────────────
  function handleBattleHostMsg(msg){
    switch(msg.type){

      case 'BATTLE_STATE':{
        const b=msg.battle;
        battles[b.id]=b;
        myBattleId=b.id;
        Combat.active=b.estado==='activo';
        renderBattle(b);
        const actor=actorActual(b);
        if(actor?.playerId===Player.get().id&&b.estado==='activo'){
          R.w('▶ ES TU TURNO. Escribe tu acción.','t-cra',true);
        }
        R.upd();
        break;
      }

      case 'BATTLE_PLAYER_DEAD':{
        // El host nos dice que nuestro personaje murió en PvP
        if(msg.playerId===Player.get().id){
          _triggerPvPDeath(msg.battle||{id:msg.battleId});
        }
        break;
      }

      case 'BATTLE_NOT_YOUR_TURN':
        R.w('No es tu turno aún.','t-dim');
        break;

      case 'TRADE_REQUEST':
      case 'TRADE_RESPONSE':
      case 'TRADE_OFFER':
      case 'TRADE_CONFIRM':
      case 'TRADE_CANCEL':
        handleTradeMsg(msg);
        break;
    }
  }

  // ── TRADE: manejar mensajes ────────────────────────────────────
  function handleTradeMsg(msg){
    switch(msg.type){

      case 'TRADE_REQUEST':{
        R.sp();R.sep('═');
        R.w(`SOLICITUD DE COMERCIO`,'t-mem',true);
        R.w(`${msg.fromName} quiere comerciar contigo.`,'t-out');
        R.w('"aceptar_trade" · "rechazar_trade"','t-dim');
        R.sep('═');R.sp();
        // Guardar pendiente
        const id=tradeId(msg.fromId, Player.get().id);
        trades[id]={
          id, estado:'pendiente',
          a:{playerId:msg.fromId, nombre:msg.fromName, oferta:[], confirmado:false},
          b:{playerId:Player.get().id, nombre:Player.get().name, oferta:[], confirmado:false},
        };
        break;
      }

      case 'TRADE_RESPONSE':{
        const trade=trades[msg.tradeId];
        if(!trade) return;
        if(msg.accepted){
          trade.estado='activo';
          R.sp();R.w(`${trade.b.nombre} acepta el comercio.`,'t-mem',true);
          renderTrade(trade);
        } else {
          trade.estado='cerrado';
          R.w(`Comercio rechazado.`,'t-dim');
        }
        break;
      }

      case 'TRADE_OFFER':{
        const trade=getTrade(msg.fromId);
        if(!trade) return;
        const lado=trade.a.playerId===msg.fromId?trade.a:trade.b;
        lado.oferta=msg.oferta;
        lado.confirmado=false;
        renderTrade(trade);
        break;
      }

      case 'TRADE_CONFIRM':{
        const trade=getTrade(msg.fromId);
        if(!trade) return;
        const lado=trade.a.playerId===msg.fromId?trade.a:trade.b;
        lado.confirmado=true;
        if(trade.a.confirmado&&trade.b.confirmado){
          _executeTrade(trade);
        } else {
          R.w(`${lado.nombre} confirma el trato. Esperando al otro.`,'t-mem');
          renderTrade(trade);
        }
        break;
      }

      case 'TRADE_CANCEL':{
        const trade=getTrade(msg.fromId||Player.get().id);
        if(!trade) return;
        trade.estado='cerrado';
        R.w(`Comercio cancelado.`,'t-dim');
        break;
      }
    }
  }

  function _executeTrade(trade){
    // Solo ejecutar si soy el jugador A (evitar doble ejecución)
    if(trade.a.playerId!==Player.get().id) return;
    // Dar los items de A a B (local) y de B a A (local)
    trade.a.oferta.forEach(item=>{
      Player.rmItem(item.id);
    });
    trade.b.oferta.forEach(item=>{
      Player.addItem({...item, id:U.uid()});
    });
    trade.estado='cerrado';
    R.sp();R.sep('═');
    R.w('COMERCIO COMPLETADO','t-cra',true);
    if(trade.a.oferta.length) R.w(`Entregaste: ${trade.a.oferta.map(i=>i.nombre||i.blueprint).join(', ')}`,'t-dim');
    if(trade.b.oferta.length) R.w(`Recibiste: ${trade.b.oferta.map(i=>i.nombre||i.blueprint).join(', ')}`,'t-cra');
    R.sep('═');R.sp();
    XP.ganar('narrativa',15,'trade completado');
    save();
  }

  // ── Función para enviar mensaje de trade al host ──────────────
  function sendTradeMsg(msg){
    if(role==='host') handleBattleClientMsg(null, msg);
    else if(role==='client'&&hostPeer) hostPeer.send(JSON.stringify(msg));
  }

  // ── Función para enviar acción de batalla al host ─────────────
  function sendBattleAction(battleId, actorId, action, target){
    const msg={type:'BATTLE_ACTION', battleId, actorId, action, target};
    if(role==='host'){
      // Ejecutar directamente
      const battle=battles[battleId];
      if(battle){
        execBattleAction(battle, actorId, action, target);
        _broadcastBattleState(battle);
        const next=actorActual(battle);
        if(next&&next.tipo!=='player'&&battle.estado==='activo') tickBattleAI(battle);
      }
    } else if(role==='client'&&hostPeer){
      hostPeer.send(JSON.stringify(msg));
    } else {
      // Single player — ejecutar localmente
      const battle=battles[battleId];
      if(battle){
        execBattleAction(battle, actorId, action, target);
        _broadcastBattleState(battle);
        const next=actorActual(battle);
        if(next&&next.tipo!=='player'&&battle.estado==='activo') tickBattleAI(battle);
        else if(battle.estado==='activo') renderBattle(battle);
        R.upd();
      }
    }
  }

  // ── Iniciar batalla (host o singleplayer) ─────────────────────
  function startBattle(nodeId, participantes){
    const battle=newBattle(nodeId, participantes);
    myBattleId=battle.id;
    Combat.active=true;
    battles[battle.id]=battle;
    Tactics.initBattle(battle);  // aplicar clima, poise inicial
    _broadcastBattleState(battle);
    renderBattle(battle);
    // Primer tick IA si el primero no es jugador — delay para que el render se muestre primero
    const firstActor=actorActual(battle);
    if(firstActor&&firstActor.tipo!=='player'){
      setTimeout(()=>tickBattleAI(battle), 200);
    }
    return battle;
  }

  // ── Unirse a batalla existente en el nodo ────────────────────
  function joinBattle(battleId){
    const p=Player.get();
    const joinMsg={
      type:'BATTLE_JOIN',
      battleId,
      playerId:p.id,
      hp:p.hp, atk:Player.getAtk(), def:Player.getDef(),
    };
    if(role==='host') handleBattleClientMsg(null,joinMsg);
    else if(role==='client'&&hostPeer) hostPeer.send(JSON.stringify(joinMsg));
    else{
      // Singleplayer
      const battle=battles[battleId];
      if(!battle) return;
      const c=buildCombatant('player',{name:p.name,hp:p.hp,maxHp:p.maxHp,atk:Player.getAtk(),def:Player.getDef()},p.id);
      c.iniciativa=calcIniciativa(c);
      let ins=battle.cola.findIndex(x=>x.iniciativa<c.iniciativa);
      if(ins<0) ins=battle.cola.length;
      battle.cola.splice(ins,0,c);
      myBattleId=battleId;
      battleLog(battle,`${p.name} entra en la batalla.`,'t-eco');
      renderBattle(battle);
    }
  }

  // ── handleClientMsg extendido ────────────────────────────────
  function handleClientMsg(peerId, msg){
    // Rutear mensajes de batalla y trade primero
    if(['BATTLE_ACTION','BATTLE_JOIN','TRADE_REQUEST','TRADE_RESPONSE',
        'TRADE_OFFER','TRADE_CONFIRM','TRADE_CANCEL'].includes(msg.type)){
      handleBattleClientMsg(peerId,msg);
      return;
    }

    switch(msg.type){

      case 'JOIN':{
        if(Object.keys(peers).length > MAX_CLIENTS){
          sendToPeer(peerId, {type:'REJECTED',reason:'Servidor lleno.'});
          return;
        }
        if(msg.version !== VERSION){
          sendToPeer(peerId, {type:'REJECTED',reason:`Versión incompatible (esperada ${VERSION}, recibida ${msg.version||'?'}).`});
          return;
        }
        // Validar nombre del jugador
        let pName=(msg.playerName||'').trim().replace(/[<>&"]/g,'').slice(0,24);
        if(!pName||pName.length<2) pName=`Viajero_${Object.keys(players).length+1}`;
        // Evitar nombre duplicado
        const taken=Object.values(players).some(p=>p.name.toLowerCase()===pName.toLowerCase());
        if(taken) pName=`${pName}_${Math.floor(Math.random()*99)+1}`;
        const nodeIds=Object.keys(World.all());
        const nodeId=Player.pos()||nodeIds[Math.floor(Math.random()*nodeIds.length)];
        const color=COLORS[colorIdx++ % COLORS.length];
        const pInfo={name:pName, nodeId, peerId, color, id:msg.playerId,
          hp:msg.hp||50, maxHp:msg.hp||50, atk:msg.atk||5, def:msg.def||1};
        players[msg.playerId]=pInfo;
        sendToPeer(peerId, buildSnapshot());
        // Confirmar nombre y posición inicial (nodo del host)
        sendToPeer(peerId, {type:'NAME_CONFIRM', name:pName, playerId:msg.playerId, startNodeId:nodeId});
        broadcast({type:'PLAYER_JOINED', player:pInfo}, peerId);
        netMsg(`⊕ ${pInfo.name} se unió → ${World.node(nodeId)?.name||nodeId}`, 't-eco');
        updateBar();
        save();
        break;
      }

      case 'ACTION':{
        const pInfo=players[msg.playerId];
        if(!pInfo) return;
        _execRemoteAction(msg.playerId, pInfo, msg.verb, msg.args);
        break;
      }

      case 'LEAVE':{
        const pInfo=players[msg.playerId];
        if(pInfo) netMsg(`⊖ ${pInfo.name} se desconectó.`,'t-dim');
        // Si estaba en batalla, eliminarla
        Object.values(battles).forEach(b=>{
          const c=b.cola.find(x=>x.playerId===msg.playerId);
          if(c){c.vivo=false;c.huyó=true;battleLog(b,`${pInfo?.name||'Jugador'} se desconectó de la batalla.`,'t-dim');_checkBattleEnd(b);_broadcastBattleState(b);}
        });
        delete players[msg.playerId];
        broadcast({type:'PLAYER_LEFT', playerId:msg.playerId});
        updateBar();save();
        break;
      }

      case 'PING':
        sendToPeer(peerId, {type:'PONG', ts:Date.now()});
        break;
    }
  }

  // ── handleHostMsg extendido ───────────────────────────────────
  function handleHostMsg(msg){
    // Rutear mensajes de batalla y trade
    if(['BATTLE_STATE','BATTLE_NOT_YOUR_TURN','BATTLE_PLAYER_DEAD','TRADE_REQUEST',
        'TRADE_RESPONSE','TRADE_OFFER','TRADE_CONFIRM','TRADE_CANCEL'].includes(msg.type)){
      handleBattleHostMsg(msg);
      return;
    }

    switch(msg.type){

      case 'WORLD_SNAPSHOT':
        applySnapshot(msg);
        break;

      case 'WORLD_PATCH':
        applyPatch(msg);
        break;

      case 'PLAYER_JOINED':
        players[msg.player.id]=msg.player;
        netMsg(`⊕ ${msg.player.name} se unió al mundo.`,'t-eco');
        updateBar();R.upd();
        break;

      case 'PLAYER_LEFT':
        if(players[msg.playerId])
          netMsg(`⊖ ${players[msg.playerId].name} se fue.`,'t-dim');
        delete players[msg.playerId];
        updateBar();R.upd();
        break;

      case 'ACTION_BROADCAST':{
        const pInfo=players[msg.playerId];
        if(pInfo?.nodeId===Player.pos())
          netMsg(`${msg.summary||msg.playerName+': '+msg.verb}`, pInfo?.color||'t-eco');
        if(msg.patch) applyPatch(msg.patch);
        break;
      }

      case 'REJECTED':
        netMsg(`Conexión rechazada: ${msg.reason}`,'t-pel');
        disconnect();
        break;

      case 'NAME_CONFIRM':
        // El host asignó/validó nuestro nombre — actualizarlo si cambió
        if(msg.name && msg.name !== Player.get().name){
          Player.rename(msg.name);
          netMsg(`Nombre asignado por el host: ${msg.name}`,'t-eco');
          R.upd();
        }
        // Teletransportar al nodo del host
        if(msg.startNodeId && msg.startNodeId !== Player.pos()){
          Player.setPos(msg.startNodeId);
          World.visit(msg.startNodeId);
          netMsg(`Apareces en ${World.node(msg.startNodeId)?.name||msg.startNodeId}.`,'t-eco');
          setTimeout(()=>cmdMirar(), 300);
        }
        break;

      case 'PONG':
        break;
    }
  }

  // ── Guardar estado localmente (host y cliente) ────────────────
  function saveLocal(){
    save(); // función save() global existente
  }

  // ── Inicializar PeerJS ────────────────────────────────────────
  // ── Inicializar p2pcf en sala ─────────────────────────────────
  // ════════════════════════════════════════════════════════════════
  // SEÑALIZACIÓN MANUAL — WebRTC nativo sin servidor
  // El host genera un código SDP, el cliente lo pega. Sin servidor.
  // ════════════════════════════════════════════════════════════════

  const STUN = {iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'stun:stun2.l.google.com:19302'},
  ]};

  // Comprimir/descomprimir SDP para hacerlo más corto al compartir
  function encSDP(sdp){ return btoa(JSON.stringify(sdp)); }
  function decSDP(s){ try{return JSON.parse(atob(s));}catch{return null;} }

  // Crear RTCPeerConnection con datachannel y retornar {pc, dc}
  function makePeerConn(onMsg, onOpen, onClose){
    const pc=new RTCPeerConnection(STUN);
    let dc=null;

    function attachDC(channel){
      dc=channel;
      dc.onmessage=ev=>{
        let msg; try{msg=JSON.parse(ev.data);}catch{return;}
        onMsg(msg);
      };
      dc.onopen=()=>onOpen(dc);
      dc.onclose=()=>onClose();
    }

    pc.ondatachannel=ev=>attachDC(ev.channel);
    return{pc, getDC:()=>dc, attachDC};
  }

  // Esperar candidatos ICE (trickle off — esperamos todos antes de mostrar el código)
  function waitICE(pc){ return new Promise(res=>{ if(pc.iceGatheringState==='complete'){res();return;} pc.onicegatheringstatechange=()=>{if(pc.iceGatheringState==='complete')res();}; setTimeout(res,4000); }); }

  // Mostrar código para compartir con formato legible en terminal
  function showCode(label, code){
    R.sp();R.sep('─');
    R.w(label,'t-acc',true);

    // Crear bloque con el código y botón de copiar
    const wrap=document.createElement('div');
    wrap.style.cssText='margin:6px 0 4px 0;';

    const block=document.createElement('div');
    block.className='sdp-block';
    block.textContent=code;
    wrap.appendChild(block);

    const btn=document.createElement('button');
    btn.className='copy-btn';
    btn.textContent='⎘ Copiar código';
    btn.onclick=()=>{
      navigator.clipboard.writeText(code).then(()=>{
        btn.textContent='✓ Copiado';
        btn.classList.add('copied');
        setTimeout(()=>{btn.textContent='⎘ Copiar código';btn.classList.remove('copied');},2000);
      }).catch(()=>{
        // Fallback para navegadores sin clipboard API
        const ta=document.createElement('textarea');
        ta.value=code;ta.style.position='fixed';ta.style.opacity='0';
        document.body.appendChild(ta);ta.select();
        document.execCommand('copy');document.body.removeChild(ta);
        btn.textContent='✓ Copiado';btn.classList.add('copied');
        setTimeout(()=>{btn.textContent='⎘ Copiar código';btn.classList.remove('copied');},2000);
      });
    };
    wrap.appendChild(btn);

    // Añadir al output directamente
    const ln=document.createElement('div');
    ln.className='ln';
    ln.appendChild(wrap);
    R.el.appendChild(ln);
    R.el.scrollTop=R.el.scrollHeight;

    R.sep('─');R.sp();
  }

  // ── HOST: pendingSlots — una PeerConnection por cliente esperando ──
  // slotId → { pc, slotIdx }
  const pendingSlots = {};
  let slotCounter = 0;

  // Iniciar como HOST — genera oferta SDP para un nuevo slot
  async function host(){
    if(!role) role='host';
    if(role!=='host'){netMsg('Ya estás conectado como cliente. Usa "desconectar" primero.','t-dim');return;}
    const totalConected=Object.keys(peers).length + Object.keys(pendingSlots).length;
    if(totalConected >= MAX_CLIENTS){netMsg(`Sala llena (máx ${MAX_CLIENTS} jugadores).`,'t-pel');return;}

    netMsg('Generando código de conexión...','t-mem');
    try{
      roomId=roomId||genRoomId();
      EventBus.on('net:patch',(patch)=>{ broadcast(patch); },'net_host');

      const slotId=`client_${slotCounter++}`;

      const {pc, attachDC} = makePeerConn(
        msg => handleClientMsg(slotId, msg),
        dc  => {
          // Canal abierto → registrar peer
          peers[slotId]=dc;
          delete pendingSlots[slotId];
          netMsg('¡Jugador conectado!','t-cra');
          updateBar();
          dc.send(JSON.stringify(buildSnapshot()));
        },
        () => {
          delete peers[slotId];
          const pId=Object.keys(players).find(k=>players[k].peerId===slotId);
          if(pId){netMsg(`⊖ ${players[pId].name} se desconectó.`,'t-dim');delete players[pId];broadcast({type:'PLAYER_LEFT',playerId:pId});updateBar();save();}
          netMsg('Jugador desconectado.','t-dim');
        }
      );

      // Crear DataChannel
      const dc=pc.createDataChannel('eco',{ordered:true});
      attachDC(dc);

      const offer=await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitICE(pc);

      // Guardar slot pendiente
      pendingSlots[slotId]={pc, slotId};
      if(!p2p) p2p=pc; // guardar referencia al primer pc para compatibilidad

      const code=encSDP(pc.localDescription);
      updateBar();
      R.sp();R.sep('═');
      R.w(`HOST — Slot ${slotId} listo`,'t-cra',true);
      R.w(`Jugadores: ${Object.keys(peers).length}/${MAX_CLIENTS}`,'t-dim');
      showCode('CÓDIGO DE OFERTA (envía al cliente):', code);
      R.w(`Cuando el cliente te dé su código:`,'t-dim');
      R.w(`  aceptar_conexion [CÓDIGO] ${slotId}`,'t-mem');
      R.w(`(el segundo argumento es el slot: ${slotId})`,'t-dim');
      R.sep('═');R.sp();

    }catch(e){
      netMsg(`No se pudo iniciar: ${e.message}`,'t-pel');
    }
  }

  // HOST: acepta la respuesta SDP del cliente — soporta múltiples slots
  async function acceptConexion(code, slotId){
    // Si no se especifica slot, usar el primer slot pendiente
    const sid=slotId||(Object.keys(pendingSlots)[0]);
    const slot=pendingSlots[sid];
    if(!slot){
      // Compatibilidad con window._hostPC legacy
      const pc=window._hostPC;
      if(!pc){netMsg('No hay conexión pendiente. Usa "conectar" para generar un slot.','t-dim');return;}
      const answer=decSDP(code);
      if(!answer){netMsg('Código inválido.','t-pel');return;}
      try{await pc.setRemoteDescription(answer);netMsg('Respuesta aceptada. Conectando...','t-mem');}
      catch(e){netMsg(`Error: ${e.message}`,'t-pel');}
      return;
    }
    const answer=decSDP(code);
    if(!answer){netMsg('Código inválido. Copia exactamente lo que te dio el cliente.','t-pel');return;}
    try{
      await slot.pc.setRemoteDescription(answer);
      netMsg(`Respuesta aceptada para slot ${sid}. Conectando...`,'t-mem');
    }catch(e){
      netMsg(`Error al aceptar: ${e.message}`,'t-pel');
    }
  }

  // Conectar como CLIENTE — pega el código del host, genera respuesta
  async function connect(offerCode){
    if(role){netMsg('Ya estás conectado. Usa "desconectar" primero.','t-dim');return;}
    if(!offerCode){
      R.sp();R.w('Para conectarte:','t-acc');
      R.w('1. El host escribe "conectar" y te manda su código','t-dim');
      R.w('2. Tú escribes:  conectar [CÓDIGO_DEL_HOST]','t-mem');
      R.w('3. Te aparecerá tu código — mándaselo al host','t-dim');
      R.w('4. El host escribe:  aceptar_conexion [TU_CÓDIGO]','t-dim');
      R.sp();return;
    }

    const offer=decSDP(offerCode);
    if(!offer){netMsg('Código inválido. Copia exactamente lo que te dio el host.','t-pel');return;}

    netMsg('Procesando código del host...','t-mem');
    try{
      role='client';
      roomId='manual';

      const {pc, getDC} = makePeerConn(
        msg => handleHostMsg(msg),
        dc  => {
          hostPeer=dc;
          netMsg('¡Conectado al host!','t-cra');
          updateBar();
          // JOIN
          dc.send(JSON.stringify({
            type:'JOIN', version:VERSION,
            playerId:Player.get().id,
            playerName:Player.get().name,
            hp:Player.get().hp, maxHp:Player.get().maxHp,
            atk:Player.getAtk(), def:Player.getDef(),
          }));
          setInterval(()=>{ if(hostPeer) try{hostPeer.send(JSON.stringify({type:'PING'}));}catch{}; },15000);
        },
        () => {
          netMsg('Conexión con el host cerrada.','t-dim');
          saveLocal(); role=null; p2p=null; hostPeer=null;
          Object.keys(players).forEach(k=>delete players[k]);
          updateBar();R.upd();
        }
      );
      p2p=pc;

      await pc.setRemoteDescription(offer);
      const answer=await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await waitICE(pc);

      const code=encSDP(pc.localDescription);
      updateBar();
      R.sp();R.sep('═');
      R.w('PASO 2 — TÚ ERES EL CLIENTE','t-eco',true);
      showCode('TU CÓDIGO DE RESPUESTA (envía esto al host):', code);
      R.w('El host escribe:  aceptar_conexion [TU_CÓDIGO]','t-dim');
      R.w('Cuando acepte, la conexión se establecerá automáticamente.','t-dim');
      R.sep('═');R.sp();

    }catch(e){
      role=null; roomId=null; hostPeer=null;
      netMsg(`No se pudo conectar: ${e.message}`,'t-pel');
      updateBar();
    }
  }

  // Desconectar
  function disconnect(){
    if(!role){netMsg('No estás conectado.','t-dim');return;}
    saveLocal();
    if(role==='client' && hostPeer){
      try{hostPeer.send(JSON.stringify({type:'LEAVE', playerId:Player.get().id}));}catch{}
    }
    if(role==='host') broadcast({type:'REJECTED',reason:'El host cerró el servidor.'});
    // Cerrar todas las PeerConnections
    Object.values(pendingSlots).forEach(s=>{try{s.pc.close();}catch{}});
    Object.keys(pendingSlots).forEach(k=>delete pendingSlots[k]);
    try{if(p2p) p2p.close();}catch{}
    try{if(window._hostPC) window._hostPC.close();}catch{}
    p2p=null; window._hostPC=null; roomId=null; role=null; hostPeer=null;
    Object.keys(peers).forEach(k=>delete peers[k]);
    Object.keys(players).forEach(k=>delete players[k]);
    colorIdx=0;
    EventBus.off('net_host');
    netMsg('Desconectado. Estado guardado localmente.','t-mem');
    updateBar();R.upd();
  }

  // Enviar acción al host (cliente)
  function sendAction(verb, args){
    if(role==='client' && hostPeer){
      try{hostPeer.send(JSON.stringify({type:'ACTION',playerId:Player.get().id,verb,args,ts:Date.now()}));}catch{}
    }
  }

  // Mostrar jugadores conectados
  function cmdJugadores(){
    R.sp();R.w('— JUGADORES EN RED —','t-eco');
    if(!role){
      R.sp();R.w('Sin conexión activa. Comandos:','t-dim');
      R.w('  conectar              → iniciar como host (genera slot para 1 cliente)','t-dim');
      R.w('  conectar [código]     → unirse como cliente','t-dim');
      R.w('  aceptar_conexion [c]  → host acepta respuesta del cliente','t-dim');
      R.w('Para añadir más jugadores: repite "conectar" por cada uno.','t-eco');
      R.sp();return;
    }
    R.w(`Modo: ${role.toUpperCase()}  ·  Sala: ${roomId||'—'}`, 't-eco');
    R.w(`Conectados: ${Object.keys(peers).length}/${MAX_CLIENTS}  Slots pendientes: ${Object.keys(pendingSlots).length}`, 't-dim');
    R.sp();
    R.w(`  [TÚ] ${Player.get().name}  → ${World.node(Player.pos())?.name||Player.pos()}`, 't-cra');
    Object.values(players).forEach(p=>{
      const nodo=World.node(p.nodeId);
      R.w(`  [${p.peerId}] ${p.name}  → ${nodo?.name||p.nodeId}`, p.color||'t-eco');
    });
    if(!Object.keys(players).length) R.w('  Sin otros jugadores aún.','t-dim');
    if(role==='host'&&Object.keys(peers).length<MAX_CLIENTS){
      R.sp();R.w('  "conectar" → generar slot para otro jugador.','t-dim');
    }
    R.sp();
  }

  // Mostrar otros jugadores en el nodo actual (para cmdMirar)
  function playersEnNodo(nodeId){
    return Object.values(players).filter(p=>p.nodeId===nodeId);
  }

  // ── HOST: ejecutar acción remota de movimiento ────────────────
  function _execRemoteAction(playerId, pInfo, verb, args){
    const ALLOWED=new Set(['ir','n','s','e','o','recoger','tomar','soltar','drop',
      'forjar','encarnar','conjurar','fusionar','capturar','liberar','criar',
      'hablar','preguntar','observar','traicionar','aceptar','rechazar','completar',
      'atacar','equipar','usar','lanzar','recargar']);
    const v=verb?.toLowerCase();
    if(!ALLOWED.has(v)) return;
    if(['ir','n','s','e','o'].includes(v)){
      const dir={n:'norte',s:'sur',e:'este',o:'oeste'}[v]||v;
      const exits=World.exits(pInfo.nodeId);
      const dest=exits[dir];
      if(dest){
        pInfo.nodeId=dest; players[playerId]=pInfo;
        broadcast({type:'ACTION_BROADCAST',playerId,verb:v,args,playerName:pInfo.name,
          summary:`${pInfo.name} se mueve a ${World.node(dest)?.name||dest}`,patch:buildPatch()});
        updateBar();save();
      }
      return;
    }
    broadcast({type:'ACTION_BROADCAST',playerId,verb:v,args,playerName:pInfo.name,
      summary:`${pInfo.name}: ${v}${args?.length?' '+args.join(' '):''}`,patch:buildPatch()});
    save();
  }

  return{
    host, connect, acceptConexion, disconnect, sendAction,
    cmdJugadores, playersEnNodo,
    getRole:()=>role,
    getId:()=>roomId,
    getPlayers:()=>players,
    isHost:()=>role==='host',
    isClient:()=>role==='client',
    isOnline:()=>role!==null,
    updateBar,
    // Battle
    startBattle, joinBattle, sendBattleAction, renderBattle,
    getMyBattle:()=>myBattleId?battles[myBattleId]:null,
    getBattle:(id)=>battles[id],
    getBattleActor:(battle)=>actorActual(battle),
    tickAI:(battle)=>tickBattleAI(battle),
    battles,
    // Trade
    initTrade, getTrade, sendTradeMsg, renderTrade,
    handleTradeMsg,
  };
})();

// ── Serializar estado completo a bytes ────────────────────────
function _buildSaveData(){
  return {
    ver:'1.4', ts:Date.now(),

    clock:Clock.ser(), plugins:PluginLoader.ser(), xp:XP.ser(),
  };

// ── Exportar partida como archivo binario hexadecimal ─────────
function exportarPartida(){
  try{
    const json=JSON.stringify(_buildSaveData());
    // Codificar UTF-8 → bytes → hex
    const bytes=new TextEncoder().encode(json);
    let hex='';
    // Cabecera mágica: 'ECO\x14' (ECO + versión 1.4 como byte 0x14)
    hex+='45434f14';
    // 4 bytes de longitud (big-endian)
    const len=bytes.length;
    hex+=(len>>>24&0xff).toString(16).padStart(2,'0');
    hex+=(len>>>16&0xff).toString(16).padStart(2,'0');
    hex+=(len>>>8 &0xff).toString(16).padStart(2,'0');
    hex+=(len      &0xff).toString(16).padStart(2,'0');
    // Datos
    for(let i=0;i<bytes.length;i++){
      hex+=bytes[i].toString(16).padStart(2,'0');
    }
    // Checksum CRC32 simplificado (suma de todos los bytes mod 2^32)
    let crc=0;
    for(let i=0;i<bytes.length;i++) crc=(crc+bytes[i])>>>0;
    hex+=crc.toString(16).padStart(8,'0');

    // Crear blob y descargar
    const blob=new Blob([hex],{type:'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const fname=`ECO_${Player.get().name.replace(/\s+/g,'_')}_C${Clock.cycle}_${Date.now().toString(36)}.ecohex`;
    a.href=url; a.download=fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),2000);

    R.sp();
    R.w(`✓ Partida exportada: ${fname}`,'t-cra',true);
    R.w(`Jugador: ${Player.get().name}  Ciclo: ${Clock.cycle}  Nodo: ${World.node(Player.pos())?.name||'?'}`,'t-dim');
    R.w(`Tamaño: ${(hex.length/2/1024).toFixed(1)} KB  ·  ${hex.length} caracteres hex`,'t-dim');
    R.sp();
  }catch(e){
    R.w(`Error al exportar: ${e.message}`,'t-pel');
  }
}

// ── Importar partida desde archivo .ecohex ────────────────────
function importarPartida(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.ecohex,.hex,.bin,.txt';
  input.style.display='none';
  document.body.appendChild(input);

  input.onchange=async()=>{
    const file=input.files?.[0];
    document.body.removeChild(input);
    if(!file){R.w('Importación cancelada.','t-dim');return;}

    try{
      R.w(`Leyendo ${file.name}...`,'t-mem');
      const text=await file.text();
      const hex=text.trim().replace(/\s/g,'').toLowerCase();

      // Verificar cabecera mágica 'ECO\x14' = 45434f14
      if(!hex.startsWith('45434f')){
        R.w('Archivo inválido — no es un save de ECOSISTEMA.','t-pel');return;
      }
      // Versión (byte 3)
      const verByte=parseInt(hex.slice(6,8),16);
      if(verByte<0x12){
        R.w(`Versión de save muy antigua (v${(verByte>>4)}.${verByte&0xf}). Puede ser incompatible.`,'t-mem');
      }

      // Longitud (bytes 4-7, big-endian)
      const len=(parseInt(hex.slice(8,10),16)<<24)|(parseInt(hex.slice(10,12),16)<<16)|(parseInt(hex.slice(12,14),16)<<8)|parseInt(hex.slice(14,16),16);
      const dataHex=hex.slice(16, 16+len*2);
      if(dataHex.length!==len*2){
        R.w('Archivo corrupto — longitud no coincide.','t-pel');return;
      }

      // Decodificar hex → bytes → UTF-8
      const bytes=new Uint8Array(len);
      for(let i=0;i<len;i++) bytes[i]=parseInt(dataHex.slice(i*2,i*2+2),16);

      // Verificar checksum
      const crcHex=hex.slice(16+len*2, 16+len*2+8);
      if(crcHex.length===8){
        let crc=0;
        for(let i=0;i<bytes.length;i++) crc=(crc+bytes[i])>>>0;
        const crcExpected=crc.toString(16).padStart(8,'0');
        if(crcHex!==crcExpected){
          R.w(`⚠ Checksum no coincide (esperado: ${crcExpected}, encontrado: ${crcHex}).`,'t-mem');
          R.w('El archivo puede estar dañado. Intentando cargar de todas formas...','t-dim');
        }
      }

      const json=new TextDecoder().decode(bytes);
      const d=JSON.parse(json);

      // Cargar estado
      World.load(d.world);
      Player.load(d.player);
      GS.load(d.gs);
      Clock.load(d.clock);
      if(d.plugins) PluginLoader.load(d.plugins);
      if(d.xp) XP.load(d.xp);

      // Persistir también en localStorage
      localStorage.setItem('eco_v12',JSON.stringify(d));

      // Refrescar UI
      R.sp();R.sep('═');
      R.w('✓ PARTIDA IMPORTADA','t-cra',true);
      R.w(`Jugador: ${Player.get().name}  Ciclo: ${Clock.cycle}`,'t-dim');
      R.w(`Nodo: ${World.node(Player.pos())?.name||Player.pos()}  [${World.node(Player.pos())?.tipo||'?'}]`,'t-dim');
      R.w(`Versión save: ${d.ver||'?'}  Guardado: ${d.ts?new Date(d.ts).toLocaleString():'?'}`,'t-dim');
      R.sep('═');R.sp();
      cmdMirar();
      R.upd();
    }catch(e){
      R.w(`Error al importar: ${e.message}`,'t-pel');
      console.error('Import error:',e);
    }
  };

  input.click();
}
function die(causa='desconocida'){
  Player.get().causa_muerte=causa;
  EventBus.emit('player:die',{player:Player.get(),causa});
  RunMem.registrar(Player.get(),GS.aliveNPCs(),GS.allMisiones(),World.seed);
  EventBus.emit('memory:run_end',{run:RunMem.runs().slice(-1)[0],causa,ciclo:Clock.cycle});
  localStorage.removeItem('eco_v12');
  R.sp();R.sep('═');
  R.w(`EPITAFIO — ${Player.get().name}`,'t-cor',true);
  R.w(`Ciclos: ${Clock.cycle}  ·  Causa: ${causa}`,'t-dim');
  R.w(`Misiones: ${GS.allMisiones().filter(m=>m.completada).length} completadas  ·  Kills: ${Player.get().stats.kills}`,'t-dim');
  if(GS.twists.length)R.w(`Verdades: ${GS.twists.map(t=>t.titulo).join(', ')}`,'t-twi');
  // Arcs narrativos — epitafios
  const arcsCompletos=GS.allArcs().filter(a=>a.estado!=='latente'&&a.epitafio);
  if(arcsCompletos.length){
    R.sep('─');R.w('Arcos narrativos:','t-acc');
    arcsCompletos.forEach(a=>{
      const col=a.resultado==='victoria'?'t-cra':a.resultado==='tragedia'?'t-pel':'t-mem';
      R.w(`  ${ArcEngine.TEMAS[a.tema]?.icon||'◈'} "${a.titulo}" — ${a.epitafio}`,col);
    });
  }
  if(PluginLoader.order.length)R.w(`Plugins activos: ${PluginLoader.order.join(', ')}`,'t-eco');
  R.sep('─');R.w(`Run ${RunMem.count()} registrada.`,'t-eco');
  R.w('Escribe "nuevo" para continuar.','t-dim');R.sep('═');
}
