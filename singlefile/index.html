// NPC ENGINE
// ════════════════════════════════════════════════════════════════
const NPCEngine={
  nombre(rng){const nd=D.npcs;const n=U.pick(nd.nombres_prefijos||['X'],rng)+U.pick(nd.nombres_sufijos||[''],rng);return U.chance(nd.titulo_chance||.3)?n+' '+U.pick(nd.nombres_titulos||[''],rng):n;},

  gen(nodeId,wseed,idx,ecos,otros){
    const rng=U.rng(wseed+nodeId+idx+Date.now());const nd=D.npcs;
    let npc={
      id:U.uid(),nombre:this.nombre(rng),
      arq_vis:U.pick(nd.arquetipos_visibles||['errante'],rng),
      arq_ocu:U.pick(nd.arquetipos_ocultos||['vacío'],rng),
      deseo:U.pick(nd.deseos||['—'],rng),
      necesidad:U.pick(nd.necesidades||['—'],rng),
      miedo:U.pick(nd.miedos||['—'],rng),
      secreto:U.pick(nd.secretos||['—'],rng),
      secreto_idx:Math.floor(rng()*(nd.secretos||['—']).length),
      trauma:U.pick(nd.traumas||['—'],rng),
      lealtad:U.rand(10,40)+(Player.get().presencia||0)*3,corrupcion:U.rand(5,30),desesperacion:U.rand(10,50),
      nodeId,estado:'vivo',secreto_expuesto:false,arq_ocu_expuesto:false,
      fragmentos:[],vinculos:[],misiones_ofrecidas:[],interacciones:0,
      eco_run_id:ecos?.length&&U.chance(.3)?U.pick(ecos,rng).run_id:null,
      twists_activados:[],hp_combat:null,
      faccion: null,  // se asigna por FactionSystem o plugin
    };
    if(otros?.length&&U.chance(nd.vinculo_chance||.6)){
      const otro=U.pick(otros,rng);const tipo=U.pick(nd.tipos_vinculo||['deuda'],rng);
      const hp=nd.vinculos_historia?.[tipo]||['Hay algo entre ellos.'];
      const hist=U.pick(hp,rng).replace(/{na}/g,npc.nombre).replace(/{nb}/g,otro.nombre);
      const v={tipo,intensidad:U.rand(30,90),historia:hist,estado:'activo',npc_a:npc.id,npc_b:otro.id};
      npc.vinculos.push(v);otro.vinculos.push({...v,npc_a:otro.id,npc_b:npc.id});
    }
    // SOCKET: narrative:npc_gen
    const result=EventBus.emit('narrative:npc_gen',{npc,nodeId,ecos,otros});
    if(result?.npc)npc=result.npc;
    return npc;
  },

  dialogo(npc,runs){
    const rng=U.rng(npc.id+Clock.cycle+Math.random());const dl=D.npcs.dialogos||{};
    let est='normal';
    if(npc.desesperacion>75)est='desesperado';
    else if(npc.arq_ocu_expuesto&&npc.arq_ocu==='traidor')est='traicionando';
    else if(npc.corrupcion>65)est='corrupto';
    else if(npc.secreto_expuesto)est='secreto_parcial';
    else if(npc.lealtad>65)est='vinculo_alto';
    else if(npc.eco_run_id&&runs?.length)est='eco_anterior';
    let pool=est==='normal'?(dl.saludo?.[npc.arq_vis]||[]):(dl.estados?.[est]||dl.saludo?.[npc.arq_vis]||[]);
    if(!pool.length)pool=[`${npc.nombre} te mira en silencio.`];
    let text=U.pick(pool,rng).replace(/{n}/g,npc.nombre);
    if(npc.lealtad>50&&U.chance(.4)&&!npc.fragmentos.includes('deseo')){text+=` "${npc.deseo}."`;npc.fragmentos.push('deseo');}
    if(npc.eco_run_id){const er=runs?.find(r=>r.id===npc.eco_run_id);if(er&&U.chance(.45))text+=` "Hubo alguien antes de ti. ${er.player_name||'Sin nombre'}."`;}

    // SOCKET: narrative:npc_speak
    const result=EventBus.emit('narrative:npc_speak',{text,npc,est});
    return result?.text||text;
  },

  interactuar(npc){
    npc.interacciones++;npc.lealtad=U.clamp(npc.lealtad+U.rand(2,8),0,100);
    // SOCKET: narrative:npc_interact
    EventBus.emit('narrative:npc_interact',{npc,lealtad:npc.lealtad});
    if(npc.lealtad>60&&!npc.secreto_expuesto&&U.chance(.25)){npc.secreto_expuesto=true;XP.ganar('narrativa',25,'secreto descubierto');return{tipo:'secreto',texto:`${npc.nombre}: "${npc.secreto}"`};}
    if(npc.lealtad>80&&!npc.arq_ocu_expuesto&&U.chance(.2)){npc.arq_ocu_expuesto=true;XP.ganar('narrativa',40,'naturaleza oculta revelada');return{tipo:'arquetipo',texto:`${npc.nombre} deja de actuar. Es ${npc.arq_ocu}. Siempre lo fue.`};}
    return null;
  },

  observar(npc){
    const obs=[`${npc.nombre} — ${npc.arq_vis.toUpperCase()}`,`Lealtad:${npc.lealtad}  Corrupción:${npc.corrupcion}  Desesperación:${npc.desesperacion}`];
    if(npc.fragmentos.includes('deseo'))obs.push(`Deseo: "${npc.deseo}"`);
    if(npc.fragmentos.includes('miedo'))obs.push(`Miedo: "${npc.miedo}"`);
    if(npc.arq_ocu_expuesto)obs.push(`Naturaleza real: ${npc.arq_ocu.toUpperCase()}`);
    else if(npc.corrupcion>60)obs.push('Algo en su comportamiento no encaja.');
    npc.vinculos.forEach(v=>obs.push(`Vínculo [${v.tipo}]: "${v.historia}"`));
    if(npc.eco_run_id)obs.push('Hay algo en él que pertenece a otro ciclo.');
    return obs;
  },

  combatStats(npc){
    const base=D.npcs.combat_stats?.[npc.arq_vis]||{hp:20,atk:5,def:1};
    const dB=npc.desesperacion>70?4:0;
    const cB=Math.floor(npc.corrupcion/20);
    const lM=npc.lealtad>60?-1:0;
    const oB=(D.npcs.arquetipos_hostiles||[]).includes(npc.arq_ocu)&&npc.arq_ocu_expuesto?5:0;
    return{hp:base.hp+dB,atk:Math.max(1,base.atk+dB+cB+lM+oB),def:base.def};
  },

  combatLine(poolKey,npc){
    const rng=U.rng(npc.id+Math.random());const dl=D.npcs.dialogos||{};
    let pool=dl[poolKey]?.normal||dl[poolKey]||[];
    if(npc.desesperacion>75&&dl[poolKey]?.desesperado?.length)pool=dl[poolKey].desesperado;
    if(!Array.isArray(pool)||!pool.length)return`${npc.nombre}.`;
    return U.pick(pool,rng).replace(/{n}/g,npc.nombre).replace(/\{deseo\}/g,npc.deseo||'—');
  },

  checkTwists(npc,player,misiones,ecos,wd){
    const act=[];
    for(const def of D.twistDefs){
      if(npc.twists_activados?.includes(def.id))continue;
      const c=def.check||{};let ok=true;
      if(c.arq_vis&&npc.arq_vis!==c.arq_vis)ok=false;
      if(c.corrupcion_min&&npc.corrupcion<c.corrupcion_min)ok=false;
      if(c.lealtad_jugador_min&&npc.lealtad<c.lealtad_jugador_min)ok=false;
      if(c.lealtad_min&&npc.lealtad<c.lealtad_min)ok=false;
      if(c.desesperacion_min&&npc.desesperacion<c.desesperacion_min)ok=false;
      if(c.misiones_completadas_min){if(misiones.filter(m=>m.npc_id===npc.id&&m.completada).length<c.misiones_completadas_min)ok=false;}
      if(c.mision_completada_trampa&&!misiones.some(m=>m.npc_id===npc.id&&m.completada&&m.es_trampa))ok=false;
      if(c.mundo_tiene_destruidos&&(!wd||!wd.length))ok=false;
      if(c.tiene_eco_run&&!npc.eco_run_id)ok=false;
      if(c.ecos_disponibles&&(!ecos||!ecos.length))ok=false;
      if(c.secreto_idx!==undefined&&npc.secreto_idx!==c.secreto_idx)ok=false;
      if(ok){
        const vars={npc:npc.nombre,eco_nombre:ecos?.[0]?.nombre||'alguien',arq_ocu:npc.arq_ocu};
        const texto=U.tmpl(def.texto,vars);
        const twist={id:def.id,titulo:def.titulo,texto,npc_id:npc.id};
        act.push(twist);npc.twists_activados.push(def.id);
        // SOCKET: narrative:npc_twist
        EventBus.emit('narrative:npc_twist',{twist,npc});
      }
    }
    return act;
  },

  genMision(npc,npcs,ecos){
    const rng=U.rng(npc.id+Clock.cycle+Math.random());const md=D.missions;
    let pool=[...(md.tipos||[])];
    if(npc.desesperacion>70)pool=md.tipo_por_desesperacion_alta||pool;
    const arqPool=md.tipo_por_arq_oculto?.[npc.arq_ocu];
    if(arqPool)pool=[...pool,...arqPool];
    if(npc.eco_run_id&&ecos?.length){const boost=md.legado_boost||2;for(let i=0;i<boost;i++)pool.push('legado');}
    const tipo=U.pick(pool,rng);const tpl=md.plantillas?.[tipo];if(!tpl)return null;
    const vic=npcs?.find(x=>x.id!==npc.id);const eco=ecos?.length?U.pick(ecos,rng):null;
    const vars={npc:npc.nombre,victima:vic?.nombre||'alguien',eco:eco?.nombre||'alguien',
      objetivo:tpl.objetivos?.length?U.pick(tpl.objetivos,rng):'algo',
      costo:tpl.costos?.length?U.pick(tpl.costos,rng):'algo',
      amenaza:tpl.amenazas?.length?U.pick(tpl.amenazas,rng):'algo',
      verdad:tpl.verdades?.length?U.pick(tpl.verdades,rng):'algo',
      ciclos:U.rand(...(tpl.ciclos_rng||[2,10]))};
    let mision={id:U.uid(),tipo,npc_id:npc.id,titulo:U.tmpl(tpl.titulo||tipo,vars),desc:U.tmpl(tpl.desc||'—',vars),objetivo:vars.objetivo,recompensa:tpl.recompensas?.length?U.pick(tpl.recompensas,rng):'algo',consecuencia_fallo:U.tmpl(tpl.consecuencia||'—',vars),victima_id:vic?.id||null,eco_id:eco?.run_id||null,es_trampa:tipo==='traición'&&U.chance(tpl.trampa_chance||0),es_imposible:tipo==='imposible',completada:false,fallida:false,aceptada:false,ciclo:Clock.cycle};
    npc.misiones_ofrecidas.push(mision.id);
    // SOCKET: narrative:mission_gen
    const result=EventBus.emit('narrative:mission_gen',{mision,npc,vars});
    if(result?.mision)mision=result.mision;
    return mision;
  },

  narrativaLoot(npc,pool){
    const source=pool==='rendicion'?(D.narrative.loot_rendicion||{}):(D.narrative.loot_narrativo||{});
    const items=[];
    for(const[bp,def]of Object.entries(source)){
      if(U.chance(def.chance||1)){
        const vars={npc:npc.nombre,deseo:npc.deseo,secreto:npc.secreto,trauma:npc.trauma};
        items.push({id:U.uid(),blueprint:bp,nombre:U.tmpl(def.nombre,vars),tipo:'reliquia',tags:['narrativo','antiguo'],estado:'nativo',desc:U.tmpl(def.desc,vars),npc_origen:npc.id});
      }
    }
    return items;
  },

  consecuenciaDesperación(npc){
    if(npc.estado!=='vivo')return;
    const nd=D.narrative.consecuencia_desesperacion||{};const r=Math.random();
    const vars={npc:npc.nombre,deseo:npc.deseo,arq_ocu:npc.arq_ocu};
    if(r<(nd.muerte_chance||.3)){
      npc.estado='muerto';
      R.w(`⟁ ${U.tmpl(nd.texto_muerte||'{npc} muere.',vars)}`,'t-twi',true);
      GS.allMisiones().filter(m=>m.npc_id===npc.id&&!m.completada).forEach(m=>m.fallida=true);
      EventBus.emit('narrative:npc_death',{npc,causa:'desesperación'});
    } else if(r<(nd.muerte_chance||.3)+(nd.desaparicion_chance||.3)){
      npc.nodeId='??';npc.estado='desaparecido';
      R.w(`⟁ ${U.tmpl(nd.texto_desaparicion||'{npc} desaparece.',vars)}`,'t-twi',true);
    } else {
      npc.arq_ocu_expuesto=true;npc.corrupcion=Math.min(100,npc.corrupcion+25);
      R.w(`⟁ ${U.tmpl(nd.texto_quiebre||'{npc} quiebra.',vars)}`,'t-twi',true);
    }
    R.upd();save();
  }
};

// ════════════════════════════════════════════════════════════════
// WORLD
// ════════════════════════════════════════════════════════════════
const World={
  nodes:{},edges:{},seed:'',startId:'',
  DIRS:['norte','sur','este','oeste'],OPP:{norte:'sur',sur:'norte',este:'oeste',oeste:'este'},

  gen(wseed,ecos){
    this.seed=wseed||U.uid()+U.uid();this.nodes={};this.edges={};
    const wd=D.world;const rng=U.rng(this.seed);const ids=[],COUNT=wd.node_count||32;const npcNodes={};

    // SOCKET: world:before_gen
    EventBus.emit('world:before_gen',{seed:this.seed,count:COUNT});

    for(let i=0;i<COUNT;i++){
      const id=U.hex(this.seed+i);const tipo=U.pick(wd.tipos_nodo||['hub'],rng);
      const lp=wd.loot_por_tipo?.[tipo]||Object.keys(D.mats).slice(0,3);
      const loot=U.chance(wd.loot_chance||.6)?U.pickN(lp,U.rand(1,3),rng):[];
      // Añadir ítem táctico con 35% de probabilidad
      if(U.chance(0.35)){
        const itemTac=ItemSystem.genLootTactico(tipo,rng);
        if(itemTac) loot.push(itemTac.blueprint);
        // Guardar el ítem completo en un stash del nodo para cmdRecoger
        if(itemTac) loot._items=(loot._items||[]).concat([itemTac]);
      }
      const ep=D.enemies;
      const enemies=U.chance(wd.enemy_chance||.38)&&ep.length?[{...U.pick(ep,rng),id:U.uid()}].map(e=>{e.hp_current=e.hp;return e;}):[]; 
      const cp=wd.criaturas_por_tipo?.[tipo]||Object.keys(D.creatures).slice(0,1);
      const creatures=U.chance(wd.creature_chance||.35)?[this._mkCreature(U.pick(cp,rng),id,'virgen')]:[]; 
      this.nodes[id]={id,tipo,name:U.pick(wd.nombres_nodo?.[tipo]||[tipo],rng),atmos:U.pick(wd.atmósferas||['...'],rng),loot,enemies,creatures,estado:'virgen',visitado:false,npc_ids:[],destruido:false};
      if((wd.npc_nodos_permitidos||[]).includes(tipo)&&U.chance(wd.npc_chance||.55))npcNodes[id]=true;
      ids.push(id);
    }
    for(let i=1;i<ids.length;i++){const from=ids[i],to=ids[Math.floor(rng()*i)];const dir=U.pick(this.DIRS,rng),opp=this.OPP[dir];if(!this.edges[from])this.edges[from]={};if(!this.edges[to])this.edges[to]={};this.edges[from][dir]=to;this.edges[to][opp]=from;}
    for(let i=0;i<Math.floor(COUNT*.4);i++){const a=U.pick(ids,rng),b=U.pick(ids,rng);if(a===b)continue;const dir=U.pick(this.DIRS,rng),opp=this.OPP[dir];if(!this.edges[a])this.edges[a]={};if(!this.edges[b])this.edges[b]={};if(!this.edges[a][dir]){this.edges[a][dir]=b;this.edges[b][opp]=a;}}
    this.startId=ids[0];
    const allNpcs=[];
    Object.keys(npcNodes).forEach(nid=>{const npc=NPCEngine.gen(nid,this.seed,allNpcs.length,ecos,allNpcs);this.nodes[nid].npc_ids.push(npc.id);allNpcs.push(npc);});

    // SOCKET: world:after_gen
    EventBus.emit('world:after_gen',{nodes:this.nodes,edges:this.edges,npcs:allNpcs,seed:this.seed});
    return{startId:this.startId,npcs:allNpcs};
  },

  _mkCreature(arcId,nodeId,nodeEstado){
    const arq=D.creatures[arcId]||Object.values(D.creatures)[0]||{tags:[],hp:10,atk:4,def:0,desc:'—'};
    const rng=U.rng(Date.now()+Math.random());const extra=[];
    if(nodeEstado==='corrompido')extra.push('corrupto');
    const cn=D.creNames;
    const nombre=(cn.prefijos?.length?U.pick(cn.prefijos,rng):'Eco')+'-'+(cn.sufijos?.length?U.pick(cn.sufijos,rng):'Profundo');
    const imp=Imprint.gen(arcId,[...(arq.tags||[]),...extra],{nodeId,cycle:Clock.cycle,pid:'world'});
    let c={id:U.uid(),nombre,arquetipo:arcId,tags:[...(arq.tags||[]),...extra],imprint:imp,hp:arq.hp||10,maxHp:arq.hp||10,atk:arq.atk||4,def:arq.def||0,voluntad:U.rand(20,65),afinidad:0,inestabilidad:extra.includes('inestable')?U.rand(40,70):U.rand(10,35),estado:'libre',memoria:{combates:0,ciclos:0},linaje:{parent_a:null,parent_b:null,generacion:0},fase:2,modo:'activo',desc:arq.desc||'—'};
    // SOCKET: creature:gen
    const result=EventBus.emit('creature:gen',{creature:c,arcId,nodeId});
    if(result?.creature)c=result.creature;
    return c;
  },

  node(id){return this.nodes[id]||null;},exits(id){return this.edges[id]||{};},all(){return this.nodes;},

  // ── Detectar si un nodo es frontera (borde del mapa) ─────────
  isBorder(nodeId){
    const exits=this.exits(nodeId);
    // Borde = tiene menos de 3 salidas Y al menos una dirección libre
    return Object.keys(exits).length < 3;
  },

  // ── Calcular dificultad escalada al jugador ────────────────────
  calcDificultad(){
    const p=Player.get();
    // Nivel promedio del jugador en ramas de combate+exploración+mente
    const xpRamas=XP?['combate','exploración','mente','cuerpo'].map(r=>XP.getRama(r).nivel):[];
    const nivelPromXP=xpRamas.length?Math.round(xpRamas.reduce((a,b)=>a+b,0)/xpRamas.length):1;
    // Poder de equipamiento
    const atk=Player.getAtk();
    const def=Player.getDef();
    const arma=p.equipped?.arma;
    const armadura=p.equipped?.armadura;
    const equipPoder=atk*1.5+def*2+(arma?.durabilidad||100)/20+(armadura?5:0);
    // Ciclos del mundo
    const ciclos=Clock.cycle||1;
    // Kills
    const kills=p.stats?.kills||0;
    // Score final de dificultad (1.0 = base)
    const score=(nivelPromXP*0.4)+(equipPoder/20*0.3)+(ciclos/5*0.2)+(kills/10*0.1);
    return Math.max(1.0, score);
  },

  // ── Tipos de nodos por profundidad de sección ─────────────────
  _tiposPorProfundidad(seccion, dificultad){
    if(seccion<=1) return ['hub','bosque','ruina','caverna'];
    if(seccion<=2) return ['ruina','caverna','pantano','yermo'];
    if(seccion<=3) return ['yermo','umbral','abismo','templo'];
    return ['abismo','umbral','templo','abismo']; // Profundo: máxima dificultad
  },

  // ── Generar enemigo escalado a la dificultad ──────────────────
  _mkEnemyEscalado(dificultad, rng){
    const ep=D.enemies;
    if(!ep.length) return null;
    const base={...U.pick(ep,rng)};
    // Escalar stats proporcionalmente
    const mult=dificultad;
    base.id=U.uid();
    base.hp=Math.round((base.hp||10)*mult);
    base.atk=Math.round((base.atk||4)*Math.sqrt(mult));
    base.def=Math.round((base.def||0)*Math.sqrt(mult)*0.8);
    base.hp_current=base.hp;
    // Añadir tags elementales en secciones avanzadas
    if(dificultad>=2.5){
      const elementos=['fuego','hielo','rayo','vacío','resonante'];
      const el=U.pick(elementos,rng);
      base.tags=[...(base.tags||[]),el];
      base.nombre=`${base.nombre} [${el.toUpperCase()}]`;
    }
    return base;
  },

  // ── Expandir el mapa desde un nodo frontera ────────────────────
  expandSection(fromNodeId, dir){
    const wd=D.world;
    const dif=this.calcDificultad();
    const seccion=(this.sectionCount||0)+1;
    this.sectionCount=seccion;
    const rng=U.rng(Date.now()+fromNodeId+dir);
    const opp=this.OPP[dir];

    // Tamaño de la nueva sección (5-10 nodos)
    const SIZE=U.rand(5,10);
    const tipos=this._tiposPorProfundidad(seccion,dif);
    const ids=[];

    // Anuncio
    R.sp();R.sep('═');
    R.w(`◉ FRONTERA CRUZADA — Sección ${seccion}`, 't-eco', true);
    R.w(`Dificultad detectada: ×${dif.toFixed(2)}  ·  ${SIZE} nuevos nodos`, 't-dim');

    // Generar nodos de la nueva sección
    for(let i=0;i<SIZE;i++){
      const id=U.hex(this.seed+seccion+i+dir);
      const tipo=U.pick(tipos,rng);
      const lp=wd.loot_por_tipo?.[tipo]||Object.keys(D.mats).slice(0,3);
      const loot=U.chance(0.7)?U.pickN(lp,U.rand(1,3),rng):[];

      // Loot táctico escalado (más ítems en secciones avanzadas)
      if(U.chance(0.4+seccion*0.05)){
        const itemTac=ItemSystem.genLootTactico(tipo,rng);
        if(itemTac){ loot.push(itemTac.blueprint); loot._items=(loot._items||[]).concat([itemTac]); }
      }
      // Kit de reparación extra en secciones difíciles
      if(dif>=2.0&&U.chance(0.3)){
        const kitId=dif>=3?'kit_maestro':'kit_reparacion';
        const kit=ItemSystem.crear(kitId);
        if(kit){ loot.push(kit.blueprint); loot._items=(loot._items||[]).concat([kit]); }
      }

      // Enemigos escalados — más cantidad y más fuertes
      const numEnemigos=Math.min(3, 1+Math.floor(seccion/2));
      const enemies=[];
      for(let e=0;e<numEnemigos;e++){
        if(U.chance(0.5+seccion*0.08)){
          const en=this._mkEnemyEscalado(dif,rng);
          if(en) enemies.push(en);
        }
      }

      // Criaturas escaladas
      const cp=wd.criaturas_por_tipo?.[tipo]||Object.keys(D.creatures).slice(0,1);
      const creatures=U.chance(0.4)?[this._mkCreature(U.pick(cp,rng),id,dif>=2?'corrompido':'virgen')]:[];
      // Escalar criatura
      creatures.forEach(c=>{ c.hp=Math.round(c.hp*Math.sqrt(dif)); c.maxHp=c.hp; c.atk=Math.round(c.atk*Math.sqrt(dif)*0.9); });

      // Nombre del nodo con indicador de dificultad
      const difTag=dif>=3?'[PELIGROSO] ':dif>=2?'[HOSTIL] ':'';
      const nombre=difTag+U.pick(wd.nombres_nodo?.[tipo]||[tipo],rng);

      this.nodes[id]={
        id,tipo,name:nombre,
        atmos:U.pick(wd.atmósferas||['...'],rng),
        loot,enemies,creatures,
        estado:'virgen',visitado:false,npc_ids:[],destruido:false,
        seccion,dificultad:dif,  // metadatos de expansión
      };

      // NPCs en la nueva sección (menos frecuentes en zonas peligrosas)
      if((wd.npc_nodos_permitidos||[]).includes(tipo)&&U.chance(Math.max(0.2,0.55-seccion*0.1))){
        const npc=NPCEngine.gen(id,this.seed+seccion,GS.aliveNPCs().length,RunMem.ecos(),GS.aliveNPCs());
        // Ajustar NPC a la dureza de la sección
        npc.desesperacion=Math.min(100,npc.desesperacion+seccion*10);
        if(dif>=2.5) npc.arq_ocu=U.pick(D.npcs.arquetipos_hostiles||['corrupto'],rng);
        GS.addNPC(npc);
        this.nodes[id].npc_ids.push(npc.id);
      }

      ids.push(id);
    }

    // Conectar la sección internamente (cadena + conexiones extra)
    for(let i=1;i<ids.length;i++){
      const from=ids[i],to=ids[i-1];
      const d=U.pick(this.DIRS,rng),op=this.OPP[d];
      if(!this.edges[from])this.edges[from]={};
      if(!this.edges[to])this.edges[to]={};
      if(!this.edges[from][d]){this.edges[from][d]=to;this.edges[to][op]=from;}
    }
    // Conexiones cruzadas internas (~30%)
    for(let i=0;i<Math.floor(SIZE*0.3);i++){
      const a=U.pick(ids,rng),b=U.pick(ids,rng);
      if(a===b)continue;
      const d=U.pick(this.DIRS,rng),op=this.OPP[d];
      if(!this.edges[a])this.edges[a]={};
      if(!this.edges[b])this.edges[b]={};
      if(!this.edges[a][d]){this.edges[a][d]=b;this.edges[b][op]=a;}
    }

    // Conectar la nueva sección al nodo frontera de origen
    const entryId=ids[0];
    if(!this.edges[fromNodeId])this.edges[fromNodeId]={};
    if(!this.edges[entryId])  this.edges[entryId]={};
    this.edges[fromNodeId][dir]=entryId;
    this.edges[entryId][opp]=fromNodeId;

    // Mensaje de entrada
    const entryNode=this.nodes[entryId];
    const climaDesc=Tactics?.CLIMAS_NODO[entryNode.tipo]?.desc||'';
    R.w(`Acceso a: ${entryNode.name}  [${entryNode.tipo.toUpperCase()}]`, 't-eco');
    R.w(climaDesc,'t-dim');
    R.w(`Enemigos potenciados ×${dif.toFixed(1)}  ·  ${ids.length} nodos`,'t-pel');

    // Arc narrativo por exploración profunda
    if(seccion>=2 && XP) XP.ganar('exploración',30*seccion,'sección nueva descubierta');

    // Intentar generar arc narrativo si hay NPCs nuevos
    if(seccion>=2){
      const nuevosNPCs=GS.aliveNPCs().filter(n=>this.nodes[n.nodeId]?.seccion===seccion);
      if(nuevosNPCs.length) ArcEngine.intentarGenArc(nuevosNPCs[0]);
    }

    R.sep('═');R.sp();
    EventBus.emit('world:section_expand',{seccion,dificultad:dif,nodeIds:ids,fromNodeId,dir});
    // Asignar control territorial a los nuevos nodos
    if(typeof FactionSystem!=='undefined'){
      ids.forEach(nid=>{
        const tipo=this.nodes[nid]?.tipo;
        Object.entries(FactionSystem.controlNodos||{}).forEach(([facId])=>{
          const fac=FactionSystem.getFaccion(facId);
          const tipos=fac?._tipos_nodo_base||[];
          if(tipos.includes(tipo)&&Math.random()<0.5){
            FactionSystem.controlNodos[facId]=FactionSystem.controlNodos[facId]||new Set();
            FactionSystem.controlNodos[facId].add(nid);
          }
        });
      });
    }
    save();
    return entryId;
  },

  visit(id){
    if(this.nodes[id]){this.nodes[id].visitado=true;this.nodes[id].estado='visitado';}
    // SOCKET: world:node_enter
    EventBus.emit('world:node_enter',{nodeId:id,node:this.nodes[id],player:Player.get()});
  },
  rmLoot(id,item){if(!this.nodes[id])return;const i=this.nodes[id].loot.indexOf(item);if(i>=0)this.nodes[id].loot.splice(i,1);},
  rmEnemy(id,eid){if(!this.nodes[id])return;this.nodes[id].enemies=this.nodes[id].enemies.filter(e=>e.id!==eid);},
  rmCreature(id,cid){if(!this.nodes[id])return;this.nodes[id].creatures=this.nodes[id].creatures.filter(c=>c.id!==cid);},
  ser(){return{nodes:this.nodes,edges:this.edges,seed:this.seed,startId:this.startId,sectionCount:this.sectionCount||0};},
  load(d){this.nodes=d.nodes;this.edges=d.edges;this.seed=d.seed;this.startId=d.startId;this.sectionCount=d.sectionCount||0;}
};

const GS={
  npcs:{},misiones:{},twists:[],destruidos:[],arcs:{},

};

// ════════════════════════════════════════════════════════════════
// PLAYER
// ════════════════════════════════════════════════════════════════
const Player={
  s:{},
  create(){
    const pd=D.playerDef;
    this.s={id:U.uid(),name:'Sin Nombre',hp:pd.hp_base||50,maxHp:pd.hp_base||50,atk:pd.atk_base||5,def:pd.def_base||1,hunger:pd.hunger_base||100,maxHunger:pd.hunger_base||100,position:'',inventory:[],equipped:{arma:null,armadura:null,reliquia:null,mitico:null},habilidades:[],magias:[],compañeros:[],stats:{kills:0,steps:0,crafted:0,capturas:0,breeding:0},flags:[],causa_muerte:null,
      stamina:100,maxStamina:100,mana:60,maxMana:60,heridas:[]};
    // SOCKET: player:create
    const result=EventBus.emit('player:create',{player:this.s});
    if(result?.player)this.s=result.player;
  },
  get(){return this.s;},pos(){return this.s.position;},
  setPos(id){this.s.position=id;this.s.stats.steps++;},
  hp(){return this.s.hp;},alive(){return this.s.hp>0;},
  maxHab(){return D.playerDef.slots_habilidades||3;},
  maxMag(){return(D.playerDef.slots_magias||2)+(this.s.inventory.some(i=>D.mat(i.blueprint)?.efecto_pasivo==='+1_slot_magia')?1:0);},
  maxComp(){return D.playerDef.slots_compañeros||1;},
  heal(n){
    const prev=this.s.hp;this.s.hp=U.clamp(this.s.hp+n,0,this.s.maxHp);
    EventBus.emit('player:stat_change',{stat:'hp',prev,current:this.s.hp,delta:n});
  },
  damage(n){
    const r=Math.max(1,n-this.s.def-(this.s.equipped.armadura?.def||0));
    const prev=this.s.hp;
    // SOCKET: player:stat_change — plugins pueden modificar daño
    const result=EventBus.emit('player:stat_change',{stat:'hp',prev,current:this.s.hp-r,delta:-r,damage:r});
    const finalDmg=(result&&result.damage!=null?result.damage:r);
    this.s.hp-=finalDmg;
    return finalDmg;
  },
  feed(n){this.s.hunger=U.clamp(this.s.hunger+n,0,this.s.maxHunger);},
  hungerTick(){
    this.s.hunger-=ModuleLoader.get('ciclo_hunger_perdida')||3;
    if(this.s.hunger<=0){this.s.hunger=0;this.s.hp-=ModuleLoader.get('hunger_cero_hp_perdida')||2;}
    // Heridas persistentes fuera de combate
    const heridas=this.s.heridas||[];
    if(heridas.includes('HEMORRAGIA')){this.s.hp=Math.max(1,this.s.hp-2);}
    if(heridas.includes('ENVENENAMIENTO')){this.s.hp=Math.max(1,this.s.hp-1);}
  },
  addItem(o){this.s.inventory.push(o);EventBus.emit('player:item_add',{item:o,player:this.s});return o;},
  rmItem(id){
    const item=this.s.inventory.find(x=>x.id===id);
    this.s.inventory=this.s.inventory.filter(x=>x.id!==id);
    if(item)EventBus.emit('player:item_remove',{item,player:this.s});
  },
  findItem(q){if(!q)return null;const qn=q.toLowerCase().replace(/_/g,' ');return this.s.inventory.find(i=>i.id===q||i.blueprint?.toLowerCase().includes(q.toLowerCase())||i.nombre?.toLowerCase().includes(qn));},
  addHab(h){if(this.s.habilidades.length>=this.maxHab())return false;this.s.habilidades.push(h);return true;},
  rmHab(id){this.s.habilidades=this.s.habilidades.filter(h=>h.id!==id);},
  findHab(q){return this.s.habilidades.find(h=>h.nombre?.toLowerCase().includes(q?.toLowerCase()));},
  addMag(m){if(this.s.magias.length>=this.maxMag())return false;this.s.magias.push(m);return true;},
  rmMag(id){this.s.magias=this.s.magias.filter(m=>m.id!==id);},
  findMag(q){return this.s.magias.find(m=>m.nombre?.toLowerCase().includes(q?.toLowerCase()));},
  addComp(c){if(this.s.compañeros.length>=this.maxComp())return false;this.s.compañeros.push(c);return true;},
  rmComp(id){this.s.compañeros=this.s.compañeros.filter(c=>c.id!==id);},
  findComp(q){return this.s.compañeros.find(c=>c.id===q||c.nombre?.toLowerCase().includes(q?.toLowerCase()));},
  getAtk(){
    let a=this.s.atk+(this.s.equipped.arma?.atk||0);
    this.s.habilidades.forEach(h=>{if(h.efecto==='atk_bonus')a+=h.valor||0;});
    // Reliquia/Mítico con atk pasivo
    if(this.s.equipped.reliquia?.atk) a+=Math.floor(this.s.equipped.reliquia.atk*0.5);
    if(this.s.equipped.mitico?.atk)   a+=Math.floor(this.s.equipped.mitico.atk*0.3);
    return a;
  },
  getDef(){
    let d=this.s.def+(this.s.equipped.armadura?.def||0)+this.s.habilidades.filter(h=>h.efecto==='def_pasiva').reduce((s,h)=>s+(h.valor||0),0);
    if(this.s.equipped.reliquia?.def) d+=Math.floor(this.s.equipped.reliquia.def*0.5);
    if(this.s.equipped.mitico?.def)   d+=Math.floor(this.s.equipped.mitico.def*0.3);
    return d;
  },
  equip(item){
    if(item.tipo==='arma')      this.s.equipped.arma=item;
    if(item.tipo==='armadura')  this.s.equipped.armadura=item;
    if(item.tipo==='reliquia')  this.s.equipped.reliquia=item;
    if(item.tipo==='mítico'||item.es_mitico) this.s.equipped.mitico=item;
    EventBus.emit('player:equip',{item,player:this.s});
  },
  ser(){return this.s;},load(d){this.s=d;},rename(n){this.s.name=n;}
};

// ════════════════════════════════════════════════════════════════
// COMBAT ENGINE
// ════════════════════════════════════════════════════════════════
const Combat={
  active:false,enemy:null,nodeId:'',isNPC:false,npcRef:null,
  isActive(){return this.active;},

  start(e,nid,fromNPC=false,npcRef=null){
    this.active=true;this.isNPC=fromNPC;this.npcRef=npcRef||null;
    const mhp=e.maxHp||e.hp||20;
    this.enemy={...e,hp_current:e.hp_current||e.hp||mhp,maxHp:mhp};this.nodeId=nid;
    // SOCKET: combat:start
    EventBus.emit('combat:start',{enemy:this.enemy,nodeId:nid,isNPC:fromNPC,npcRef});
    R.sep('═');
    if(fromNPC&&npcRef){
      R.w(`COMBATE — ${npcRef.nombre}  [${npcRef.arq_vis.toUpperCase()}]`,'t-npc',true);
      R.w(NPCEngine.combatLine('combat_inicio',npcRef),'t-out');
      R.w(`HP: ${this.enemy.hp_current}/${this.enemy.maxHp}  ATK: ${this.enemy.atk}  DEF: ${this.enemy.def||0}`,'t-dim');
      if(npcRef.arq_ocu_expuesto)R.w(`Naturaleza: ${npcRef.arq_ocu.toUpperCase()}`,'t-twi');
      R.sep('─');R.w('atacar · huir · rendir · intimidar · examinar','t-dim');
    } else {
      R.w(`ENCUENTRO — ${e.nombre}`,'t-pel',true);
      R.w(e.desc||'—','t-dim');R.w(`HP: ${this.enemy.hp_current}/${this.enemy.maxHp}  ATK: ${e.atk}`,'t-out');
      R.sep('─');R.w('atacar · huir · examinar','t-dim');
    }
    R.sep('═');
  },

  atk(){
    if(!this.active)return;
    const pa=Player.getAtk();
    let roll=Math.floor(Math.random()*pa)+Math.floor(pa*.5);

    // SOCKET: combat:before_attack — plugins pueden modificar el ataque
    const pre=EventBus.emit('combat:before_attack',{damage:roll,attacker:'player',defender:this.enemy,isPlayer:true});
    if(pre?.damage!==undefined)roll=pre.damage;

    this.enemy.hp_current-=roll;
    R.w(`Atacas → −${roll} HP  (${this.enemy.nombre}: ${Math.max(0,this.enemy.hp_current)} HP)`,'t-pel');

    // SOCKET: combat:after_attack
    EventBus.emit('combat:after_attack',{damage:roll,attacker:'player',defender:this.enemy,isPlayer:true});

    if(this.enemy.hp_current<=0){if(this.isNPC&&this.npcRef)this.winNPC(false);else this.win();return;}

    if(this.isNPC&&this.npcRef){
      const hpPct=this.enemy.hp_current/this.enemy.maxHp;
      const pool=hpPct<.3?'combat_hp_bajo':'combat_contraataque';
      const dl=D.npcs.dialogos?.[pool]||[];
      if(dl.length)R.w(U.pick(dl,U.rng(this.npcRef.id+Math.random())).replace(/{n}/g,this.npcRef.nombre),'t-npc');
    }

    let dmg=this.enemy.atk+U.rand(0,2);
    // SOCKET: combat:player_hit
    const hitResult=EventBus.emit('combat:player_hit',{damage:dmg,enemy:this.enemy});
    if(hitResult?.damage!==undefined)dmg=hitResult.damage;

    const taken=Player.damage(dmg);
    R.w(`${this.enemy.nombre} contraataca → −${taken} HP  (tú: ${Player.hp()} HP)`,'t-pel');
    if(!Player.alive()){
      R.sp();R.w('██ COLAPSO ██','t-cor',true);this.active=false;
      setTimeout(()=>die(this.isNPC&&this.npcRef?`caído por ${this.npcRef.nombre}`:'caído en combate'),800);
    }
    R.upd();
  },

  flee(){
    if(!this.active)return;
    const ch=this.isNPC&&this.npcRef&&this.npcRef.desesperacion>70?.25:.45;
    if(U.chance(ch)){
      R.w('Escapas.','t-mem');
      if(this.isNPC&&this.npcRef){R.w(`${this.npcRef.nombre} no te persigue. Por ahora.`,'t-dim');this.npcRef.lealtad=U.clamp(this.npcRef.lealtad-10,0,100);}
      this.active=false;this.enemy=null;this.npcRef=null;this.isNPC=false;
    } else {const d=Player.damage(this.enemy.atk);R.w(`Fallas. −${d} HP`,'t-pel');R.upd();}
  },

  rendir(){
    if(!this.active||!this.isNPC||!this.npcRef){R.w('Solo en combate contra NPC.','t-dim');return;}
    const npc=this.npcRef;const hpPct=this.enemy.hp_current/this.enemy.maxHp;
    const facil=(D.npcs.arquetipos_rendicion_facil||[]).includes(npc.arq_ocu);
    const hostil=(D.npcs.arquetipos_hostiles||[]).includes(npc.arq_ocu)&&npc.arq_ocu_expuesto;
    const ch=(hpPct<.4?.65:.3)+(npc.lealtad>50?.15:0)+(facil?.1:0)+(hostil?-.2:0);
    if(U.chance(ch))this.winNPC(true);
    else{R.w(`${npc.nombre} rechaza rendirse.`,'t-dim');const d=Player.damage(npc.atk+3);R.w(`−${d} HP`,'t-pel');R.upd();}
    // SOCKET: combat:npc_surrender
    EventBus.emit('combat:npc_surrender',{npc,success:this.enemy===null});
  },

  intimidar(){
    if(!this.active||!this.isNPC||!this.npcRef){R.w('Solo en combate contra NPC.','t-dim');return;}
    const npc=this.npcRef;const hpPct=this.enemy.hp_current/this.enemy.maxHp;
    if(hpPct<.5||npc.desesperacion>60){npc.arq_ocu_expuesto=true;npc.desesperacion=U.clamp(npc.desesperacion+25,0,100);R.w(`Naturaleza real: ${npc.arq_ocu.toUpperCase()}.`,'t-twi');if(npc.desesperacion>=90)setTimeout(()=>this.winNPC(true),600);}
    else{R.w(`${npc.nombre} no cede. ATK +3.`,'t-dim');this.enemy.atk+=3;}
    // SOCKET: combat:npc_intimidate
    EventBus.emit('combat:npc_intimidate',{npc,success:npc.arq_ocu_expuesto});
  },

  examEnemy(){
    if(!this.active||!this.enemy)return;
    if(this.isNPC&&this.npcRef){const n=this.npcRef;R.w(`${n.nombre}  HP:${this.enemy.hp_current}/${this.enemy.maxHp}  ATK:${this.enemy.atk}`,'t-npc');if(n.arq_ocu_expuesto)R.w(`Real: ${n.arq_ocu.toUpperCase()}`,'t-twi');}
    else R.w(`${this.enemy.nombre}: HP ${this.enemy.hp_current}  ATK ${this.enemy.atk}`,'t-out');
  },

  win(){
    this.active=false;Player.get().stats.kills++;
    R.w(`${this.enemy.nombre} colapsa.`,'t-cra',true);
    const edef=D.enemies.find(e=>e.nombre===this.enemy.nombre);
    let loot=[];
    if(edef?.loot?.length&&U.chance(.45)){
      const d=U.pick(edef.loot,U.rng(Math.random()));
      const it={id:U.uid(),blueprint:d,nombre:d,tipo:'material',tags:D.matTags(d),estado:'nativo',desc:D.mat(d)?.desc};
      loot=[it];Player.addItem(it);R.w(`Loot: ${d}`,'t-cra');
    }
    World.rmEnemy(this.nodeId,this.enemy.id);
    // SOCKET: combat:enemy_defeat
    EventBus.emit('combat:enemy_defeat',{enemy:this.enemy,loot,nodeId:this.nodeId});
    // SOCKET: combat:loot
    if(loot.length)EventBus.emit('combat:loot',{items:loot,source:'enemy',nodeId:this.nodeId});
    this.enemy=null;R.upd();save();
  },

  winNPC(rend){
    this.active=false;const npc=this.npcRef;this.npcRef=null;this.isNPC=false;if(!npc)return;
    R.sp();R.sep('═');
    if(rend){
      const dl=D.npcs.dialogos?.combat_rendicion||[];
      R.w(`RENDICIÓN — ${npc.nombre}`,'t-npc',true);
      if(dl.length)R.w(U.pick(dl,U.rng(npc.id+Date.now())).replace(/{n}/g,npc.nombre),'t-out');
      npc.estado='sometido';npc.lealtad=U.clamp(npc.lealtad-30,0,100);npc.desesperacion=U.clamp(npc.desesperacion+20,0,100);
      XP.ganar('combate',30,'rendición NPC');XP.ganar('narrativa',20,'información bajo presión');
      if((D.npcs.arquetipos_hostiles||[]).includes(npc.arq_ocu)){npc.arq_ocu_expuesto=true;R.sp();R.w(`⟁ La rendición revela: ${npc.arq_ocu.toUpperCase()}`,'t-twi',true);GS.addTwist({id:'rend_'+npc.id,titulo:`La verdad de ${npc.nombre}`,texto:`${npc.nombre} era ${npc.arq_ocu}.`,npc_id:npc.id});}
      if(U.chance(.6)){npc.secreto_expuesto=true;XP.ganar('narrativa',25,'secreto extraído');R.sp();R.w(`"${npc.secreto}"`,'t-npc',true);}
      const loot=NPCEngine.narrativaLoot(npc,'rendicion');
      loot.forEach(l=>{Player.addItem(l);R.w(`  ${l.nombre}`,'t-mis');});
      EventBus.emit('combat:npc_surrender',{npc,success:true});
      EventBus.emit('combat:loot',{items:loot,source:'npc_rendicion',nodeId:this.nodeId});
    } else {
      npc.estado='muerto';Player.get().stats.kills++;
      XP.ganar('combate',40,'kill NPC');
      ArcEngine.onNPCMuerto(npc.id);
      FactionSystem.onNPCMuerto(npc);
      R.w(`CAÍDA — ${npc.nombre}`,'t-twi',true);
      const ul=D.npcs.dialogos?.ultimas_palabras||['{n} cae.'];
      R.w(U.pick(ul,U.rng(npc.id+Date.now())).replace(/{n}/g,npc.nombre).replace(/\{deseo\}/g,npc.deseo||'—'),'t-out');R.sp();
      GS.allMisiones().filter(m=>m.npc_id===npc.id&&!m.completada).forEach(m=>m.fallida=true);
      GS.aliveNPCs().forEach(otro=>{const v=otro.vinculos.find(v=>(v.npc_a===npc.id||v.npc_b===npc.id)&&['amor','lealtad','gratitud'].includes(v.tipo));if(v){otro.desesperacion=U.clamp(otro.desesperacion+U.rand(15,30),0,100);otro.lealtad=U.clamp(otro.lealtad-20,0,100);R.w(`${otro.nombre} lo siente. [${v.tipo}] se rompe.`,'t-npc');}});
      const loot=NPCEngine.narrativaLoot(npc,'muerte');
      loot.forEach(l=>{Player.addItem(l);R.w(`  ${l.nombre}`,'t-out');});
      EventBus.emit('narrative:npc_death',{npc,causa:'combate'});
      EventBus.emit('combat:loot',{items:loot,source:'npc_muerte',nodeId:this.nodeId});
    }
    R.sep('═');R.sp();this.enemy=null;R.upd();save();
  }
};

  // Temas con fallback a venganza si no está definido

  // ── Generar un arc procedural ─────────────────────────────────
  function genArc(npc, npcs){
    if(GS.arcsActivos().length>=2) return null; // máx 2 arcs activos

    const rng=U.rng(npc.id+Clock.cycle+Date.now());
    const temasDisp=Object.keys(TEMAS);
    // Sesgar el tema según el arquetipo del NPC
    const sesgos={
      protector:['sacrificio','redención'],corrompido:['traición','poder'],
      visionario:['ascenso','poder'],      superviviente:['pérdida','venganza'],
      manipulador:['traición','secreto'],  leal:['sacrificio','redención'],
      errante:['pérdida','secreto'],       predador:['venganza','poder'],
    };
    let pool=[...temasDisp];
    const sesg=sesgos[npc.arq_vis]||sesgos[npc.arq_ocu];
    if(sesg) sesg.forEach(t=>{pool.push(t);pool.push(t);}); // doble peso
    const tema=U.pick(pool,rng);
    const def=TEMAS[tema];
    const plantillas=PLANTILLAS_ACTO[tema]||PLANTILLAS_ACTO.venganza;

    // Elegir NPCs secundarios para los actos
    const secNPCs=npcs.filter(n=>n.id!==npc.id&&n.estado==='vivo');
    const antagonista=secNPCs.find(n=>
      (D.npcs.arquetipos_hostiles||[]).includes(n.arq_ocu)
    )||U.pick(secNPCs,rng)||npc;

    const arcId=U.uid();

    // Construir actos
    const actos=plantillas.map((ptpl,i)=>({
      id:         ptpl.id||`acto_${i}`,
      titulo:     ptpl.titulo,
      tipo_mision:ptpl.tipo_mision,
      es_final:   ptpl.es_final||false,
      resultado:  ptpl.resultado||null,
      desviaciones:(ptpl.desviaciones||[]).map(d=>({...d})),
      mision_id:  null,    // se genera al activar el acto
      completado: false,
      fallido:    false,
      skipped:    false,
    }));

    const arc={
      id:       arcId,
      tema,
      titulo:   _genTitulo(tema, npc.nombre, antagonista.nombre, rng),
      desc:     def.desc,
      color:    def.color,
      icon:     def.icon,
      npc_id:   npc.id,
      antagonista_id: antagonista.id,
      actos,
      acto_actual_idx: 0,
      estado:   'latente',    // latente → activo → completo | colapsado
      resultado: null,
      epitafio:  null,
      ciclo_inicio: Clock.cycle,
      log_narrativo: [],      // historial de decisiones del jugador
    };

    return arc;
  }

  function _genTitulo(tema, npcNombre, antNombre, rng){
    const titles={
      venganza:  ['La deuda de {npc}','Lo que {ant} debe','El precio de {npc}','Cuentas pendientes'],
      secreto:   ['Lo que {npc} guarda','El silencio de {ant}','La verdad enterrada','Lo que no se dice'],
      traición:  ['La red de {ant}','Quién traicionó a {npc}','Cara de dos lados','Lo que {npc} no vio'],
      redención: ['{npc} y el peso viejo','El camino de vuelta','Lo que {npc} debe','La oportunidad'],
      poder:     ['El ascenso de {ant}','Lo que {npc} controla','El equilibrio roto','Por encima de todo'],
      pérdida:   ['Lo que perdió {npc}','El vacío de {ant}','Lo que ya no está','El costo de existir'],
      sacrificio:['{npc} y el precio','Lo que {ant} pide','El costo final','Hasta dónde llega {npc}'],
      ascenso:   ['La subida de {ant}','El camino de {npc}','Quién llega primero','El trono vacío'],
    };
    const pool=titles[tema]||titles.venganza;
    return U.pick(pool,rng)
      .replace(/{npc}/g,npcNombre.split(' ')[0])
      .replace(/{ant}/g,antNombre.split(' ')[0]);
  }

  // ── Activar un arc (pasar de latente a activo, generar misión del acto 0) ──
  function activarArc(arc){
    arc.estado='activo';
    _generarMisionActo(arc, arc.actos[0]);
    _logArc(arc,`Arc iniciado en ciclo ${Clock.cycle}.`);
    GS.addArc(arc);

    R.sp();R.sep('═');
    const def=TEMAS[arc.tema];
    R.w(`${def.icon} ARC NARRATIVO — "${arc.titulo}"`,def.color,true);
    R.w(arc.desc,'t-dim');
    R.w(`Acto I: ${arc.actos[0].titulo}`,'t-acc');
    R.sep('═');R.sp();

    EventBus.emit('arc:start',{arc});
    save();
    return arc;
  }

  // ── Generar la misión de un acto ─────────────────────────────
  function _generarMisionActo(arc, acto){
    const npc=GS.npc(arc.npc_id)||GS.aliveNPCs()[0];
    if(!npc)return;

    // Crear la misión con el tipo del acto, enriquecida con contexto del arc
    const m=NPCEngine.genMision(npc, GS.aliveNPCs(), RunMem.ecos());
    if(!m)return;

    // Sobreescribir tipo y marcarla como parte del arc
    m.tipo = acto.tipo_mision;
    m.arc_id = arc.id;
    m.acto_id = acto.id;
    m.titulo = `[ARC] ${acto.titulo}`;
    m.es_arc = true;

    // Enriquecer la descripción con el contexto narrativo del arc
    const antagonista=GS.npc(arc.antagonista_id);
    const enrichTpl={
      deuda:      `En el marco de "${arc.titulo}": ${npc.nombre} necesita que recuperes algo antes de que ${antagonista?.nombre||'alguien'} lo tome.`,
      búsqueda:   `El rastro de "${arc.titulo}" lleva a un objeto o persona que ${antagonista?.nombre||'alguien'} también busca.`,
      protección: `Dentro de "${arc.titulo}": ${npc.nombre} teme que ${antagonista?.nombre||'alguien'} actúe antes de que tú llegues.`,
      revelación: `"${arc.titulo}" exige descubrir una verdad que ${antagonista?.nombre||'alguien'} prefiere oculta.`,
      traición:   `"${arc.titulo}" llega a su momento más oscuro: alguien traicionó a ${npc.nombre}.`,
      sacrificio: `"${arc.titulo}": el siguiente paso tiene un precio real. ${npc.nombre} lo sabe.`,
      venganza:   `"${arc.titulo}" converge: ${npc.nombre} y ${antagonista?.nombre||'alguien'} se acercan al ajuste de cuentas.`,
      ambigua:    `"${arc.titulo}" no tiene respuesta fácil. ${npc.nombre} tampoco la tiene.`,
      imposible:  `"${arc.titulo}" ha colapsado. Lo que queda es un final sin resolución.`,
    };
    m.desc = enrichTpl[acto.tipo_mision]||m.desc;
    m.aceptada = false;
    m.completada = false;
    m.fallida = false;

    acto.mision_id = m.id;
    GS.addMision(m);
    npc.misiones_ofrecidas.push(m.id);

    R.sp();
    R.w(`◈ [ARC "${arc.titulo}" — ${acto.titulo}]`,'t-mis',true);
    R.w(m.desc,'t-out');
    R.w(`"aceptar ${m.id}" para continuar el arc.`,'t-dim');
    R.sp();

    return m;
  }

  // ── Evaluar trigger de desviación ────────────────────────────
  function _evalTrigger(trigger, mision, npc){
    switch(trigger){
      case 'completado':          return mision.completada&&!mision.fallida;
      case 'completado_lealtad_alta': return mision.completada&&(npc?.lealtad||0)>=60;
      case 'fallido':             return mision.fallida&&!mision.completada;
      case 'traicionado':         return mision.fallida&&npc?.estado==='hostil';
      case 'npc_muerto':          return npc?.estado==='muerto';
      default:                    return false;
    }
  }

  // ── Procesar resultado de un acto y avanzar al siguiente ─────
  function procesarActo(arcId, actoId){
    const arc=GS.arc(arcId);
    if(!arc||arc.estado!=='activo')return;

    const actoIdx=arc.actos.findIndex(a=>a.id===actoId);
    if(actoIdx<0)return;
    const acto=arc.actos[actoIdx];
    const mision=acto.mision_id?GS.mision(acto.mision_id):null;
    const npc=GS.npc(arc.npc_id);

    // Registrar en log
    const estado_mision=mision?.completada?'completado':mision?.fallida?'fallido':'pendiente';
    _logArc(arc,`Acto "${acto.titulo}" → ${estado_mision} (ciclo ${Clock.cycle}).`);

    // Si es acto final → cerrar arc
    if(acto.es_final){
      _cerrarArc(arc, acto.resultado||'ambiguo', npc);
      return;
    }

    // Evaluar desviaciones en orden
    let siguienteId=null;
    for(const desv of (acto.desviaciones||[])){
      if(_evalTrigger(desv.trigger, mision||{completada:false,fallida:false}, npc)){
        siguienteId=desv.sig;
        _logArc(arc,`Desviación activada: "${desv.trigger}" → "${desv.sig}".`);
        break;
      }
    }

    if(!siguienteId){
      // Sin desviación válida → acto_colapso por defecto
      siguienteId='acto_colapso';
    }

    // Encontrar el siguiente acto
    const sigActo=arc.actos.find(a=>a.id===siguienteId);
    if(!sigActo){
      _cerrarArc(arc,'colapso',npc);
      return;
    }

    const siguienteIdx=arc.actos.indexOf(sigActo);
    arc.acto_actual_idx=siguienteIdx;

    // Anunciar transición
    R.sp();R.sep('─');
    const def=TEMAS[arc.tema];
    R.w(`${def.icon} ARC "${arc.titulo}" — nuevo acto`,def.color,true);
    R.w(`▶ ${sigActo.titulo}`,'t-acc');
    if(sigActo.es_final) R.w('Este es el acto final.','t-dim');
    R.sep('─');R.sp();

    // Generar misión del siguiente acto
    _generarMisionActo(arc, sigActo);

    // XP por avanzar el arc
    XP.ganar('narrativa', 35, `avance arc: ${arc.titulo}`);
    EventBus.emit('arc:advance',{arc, acto_anterior:acto, acto_siguiente:sigActo});
    save();
  }

  // ── Cerrar arc con resultado ──────────────────────────────────
  function _cerrarArc(arc, resultado, npc){
    arc.estado = resultado==='colapso'?'colapsado':'completo';
    arc.resultado = resultado;
    arc.epitafio = (EPITAFIOS[arc.tema]||{})[resultado]||'El arc terminó.';

    const cons=CONSECUENCIAS_RESULTADO[resultado]||CONSECUENCIAS_RESULTADO.ambiguo;

    // Aplicar consecuencias
    XP.ganar(cons.xp_rama, cons.xp, `arc completo: ${arc.tema} → ${resultado}`);
    if(npc){
      npc.lealtad=U.clamp((npc.lealtad||0)+cons.npc_lealtad,0,100);
      npc.desesperacion=U.clamp((npc.desesperacion||0)+cons.npc_desep,0,100);
    }

    // Marcar misiones restantes del arc como imposibles si colapsó
    if(resultado==='colapso'||resultado==='tragedia'){
      GS.allMisiones().filter(m=>m.arc_id===arc.id&&!m.completada).forEach(m=>{
        m.fallida=true;
        m.es_imposible=true;
      });
    }

    // Añadir twist narrativo
    const twist={
      id:`arc_fin_${arc.id}`,
      titulo:`Fin de "${arc.titulo}"`,
      texto:`${arc.epitafio} (${resultado.toUpperCase()})`,
      arc_id:arc.id,
      resultado,
    };
    GS.addTwist(twist);

    // Display
    R.sp();R.sep('═');
    const def=TEMAS[arc.tema];
    R.w(`${def.icon} ARC COMPLETO — "${arc.titulo}"`,def.color,true);
    R.w(cons.msg,cons.color);
    R.w(`Epitafio: "${arc.epitafio}"`,'t-eco');
    if(arc.log_narrativo.length){
      R.sep('─');
      R.w('Decisiones que llevaron aquí:','t-dim');
      arc.log_narrativo.forEach(l=>R.w(`  · ${l}`,'t-dim'));
    }
    R.sep('═');R.sp();

    EventBus.emit('arc:complete',{arc,resultado,epitafio:arc.epitafio});
    save();
  }

  function _logArc(arc,txt){
    arc.log_narrativo.push(txt);
    if(arc.log_narrativo.length>20)arc.log_narrativo.shift();
  }

  // ── Hook: cuando se completa o falla una misión de arc ────────
  function onMisionResuelta(mision){
    if(!mision.arc_id)return;
    const arc=GS.arc(mision.arc_id);
    if(!arc||arc.estado!=='activo')return;
    // Delay breve para que el mensaje de misión aparezca primero
    setTimeout(()=>procesarActo(mision.arc_id, mision.acto_id), 400);
  }

  // ── Hook: cuando muere un NPC ─────────────────────────────────
  function onNPCMuerto(npcId){
    GS.allArcs().filter(a=>a.estado==='activo'&&(a.npc_id===npcId||a.antagonista_id===npcId))
      .forEach(arc=>{
        const acto=arc.actos[arc.acto_actual_idx];
        if(!acto)return;
        // Forzar trigger npc_muerto
        if(acto.desviaciones.some(d=>d.trigger==='npc_muerto')){
          _logArc(arc,`NPC clave (${GS.npc(npcId)?.nombre||npcId}) murió.`);
          setTimeout(()=>procesarActo(arc.id, acto.id), 600);
        }
      });
  }

  // ── Intentar generar un arc desde un NPC ─────────────────────
  function intentarGenArc(npc){
    if(GS.arcsActivos().length>=2)return null;
    // Solo generar si el NPC tiene al menos un vínculo y lealtad >30
    if((npc.lealtad||0)<30)return null;
    if(!npc.vinculos?.length&&!npc.secreto)return null;
    // No generar si este NPC ya tiene un arc activo
    if(GS.arcsActivos().some(a=>a.npc_id===npc.id))return null;
    // 25% de probabilidad base (se puede ajustar)
    if(!U.chance(0.25))return null;

    const arc=genArc(npc, GS.aliveNPCs());
    if(!arc)return null;
    return activarArc(arc);
  }

  // ── Comando: ver arcs ─────────────────────────────────────────
  function cmdArcs(){
    R.sp();R.w('— ARCOS NARRATIVOS —','t-acc');
    const todos=GS.allArcs();
    if(!todos.length){R.w('Sin arcos activos. Habla con NPCs y completa misiones.','t-dim');R.sp();return;}

    const activos=todos.filter(a=>a.estado==='activo');
    const cerrados=todos.filter(a=>a.estado!=='activo');

    if(activos.length){
      R.w('ACTIVOS:','t-acc');
      activos.forEach(arc=>{
        const def=TEMAS[arc.tema];
        const acto=arc.actos[arc.acto_actual_idx];
        const npc=GS.npc(arc.npc_id);
        R.w(`  ${def.icon} "${arc.titulo}"  [${arc.tema.toUpperCase()}]`,def.color);
        R.w(`    Acto actual: ${acto?.titulo||'—'}  (${arc.acto_actual_idx+1}/${arc.actos.filter(a=>!a.skipped).length})`,'t-dim');
        if(npc) R.w(`    NPC central: ${npc.nombre}  [lealtad:${npc.lealtad}]`,'t-npc');
        const mActual=acto?.mision_id?GS.mision(acto.mision_id):null;
        if(mActual) R.w(`    Misión activa: "${mActual.titulo}"${mActual.aceptada?' ✓':''}`,'t-mis');
      });
    }

    if(cerrados.length){
      R.sp();R.w('CERRADOS:','t-dim');
      cerrados.forEach(arc=>{
        const def=TEMAS[arc.tema];
        const col=arc.resultado==='victoria'?'t-cra':arc.resultado==='tragedia'?'t-pel':arc.resultado==='colapso'?'t-twi':'t-mem';
        R.w(`  ${def.icon} "${arc.titulo}"  → ${(arc.resultado||'?').toUpperCase()}`,col);
        if(arc.epitafio) R.w(`    "${arc.epitafio}"`,'t-dim');
      });
    }
    R.sp();
  }

  // Integrar con EventBus
  EventBus.on('narrative:mission_complete', ({mision})=>onMisionResuelta(mision),'arc_engine');
  EventBus.on('narrative:mission_fail',     ({mision})=>onMisionResuelta(mision),'arc_engine');
  EventBus.on('narrative:npc_death',        ({npc})   =>onNPCMuerto(npc.id),     'arc_engine');

  return { genArc, activarArc, intentarGenArc, onMisionResuelta, onNPCMuerto, cmdArcs, TEMAS, EPITAFIOS };
})();
