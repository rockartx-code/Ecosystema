<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECOSISTEMA — v2.0</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">


<!-- Datos del juego ahora viven en data/module.json -->


<!-- Plugins/systems declarativos ahora viven en data/module.json -->

</head>
<body>

<!-- ── Boot screen ─────────────────────────────────────────────── -->
<div id="boot">
  <div class="logo">ECOSISTEMA</div>
  <div class="sub">v2.0 — motor con plugins</div>
  <div class="bl" id="b1"></div>
  <div class="bl" id="b2"></div>
  <div class="bl" id="b3"></div>
  <div class="bl" id="b4"></div>
  <div class="bl" id="b5"></div>
</div>

<!-- ── Shell ───────────────────────────────────────────────────── -->
<div id="shell">

  <!-- Cabecera: título + versión del módulo activo -->
  <div id="hdr">
    <div class="htit">ECOSISTEMA</div>
    <div class="hver" id="hmod">v2.0</div>
  </div>

  <!-- Status bar: stats del jugador + stats de plugins -->
  <div id="sbar">
    <div class="st hp">HP   <span id="s-hp">—</span></div>
    <div class="st">HAM  <span id="s-hun">—</span></div>
    <div class="st">STA  <span id="s-sta">—</span></div>
    <div class="st">MAG  <span id="s-mna">—</span></div>
    <div class="st loc">NODO <span id="s-loc">—</span></div>
    <div class="st cyc">CICLO<span id="s-cyc">—</span></div>
    <div class="st">INV  <span id="s-inv">0</span></div>
    <div class="st">HAB  <span id="s-hab">0/0</span></div>
    <div class="st">MAG  <span id="s-mag">0/0</span></div>
    <div class="st">COMP <span id="s-comp">0/0</span></div>
    <div class="st npc">NPCs <span id="s-npc">0</span></div>
    <div class="st mis">MIS  <span id="s-mis">0</span></div>
    <div class="st run">RUN  <span id="s-run">1</span></div>
    <!-- Los plugins de status bar montan sus elementos aquí -->
    <div id="plugin-stats"></div>
    <div class="st">MOD  <span id="s-mod">—</span></div>
    <div class="st" id="s-p2p-wrap" style="display:none">NET <span id="s-p2p" class="t-cra">—</span></div>
  </div>

  <!-- Área de output -->
  <div id="out"></div>

  <!-- Input con autocomplete -->
  <div id="iln">
    <div id="ac"></div>
    <div id="ps">›</div>
    <input id="inp" type="text" autocomplete="off" spellcheck="false" placeholder="comando...">
  </div>

</div><!-- #shell -->


<!-- ═══════════════════════════════════════════════════════════════
     SCRIPTS — orden de carga estricto
     Cada archivo depende de los anteriores. No reordenar.

     CORE (sin dependencias de dominio)
       core.js      → U, EventBus, ModuleLoader, PluginLoader,
                       CommandRegistry, D
       entity.js    → Entity, EntityRegistry
       player.js    → Player
       world.js     → Clock, World, GS
       combat-resolution.js → CombatResolution, battleLog

     SISTEMAS INTERNOS (dependen del core, no van en PluginLoader)
       — estos archivos se añaden aquí cuando se extraigan —
       systems/world-ai.js
       systems/forge.js
       systems/npc-engine.js
       systems/arc-engine.js
       systems/run-memory.js
       systems/xp.js
       systems/imprint.js
       systems/tags.js
       systems/tactics.js
       systems/item-system.js
       systems/faction-system.js
       systems/boss-system.js
       systems/net.js
       systems/renderer.js
       systems/save-load.js

     PLUGINS DE DOMINIO (se registran en PluginLoader vía main.js)
       plugins/plugin-criaturas.js
       plugins/plugin-habilidades.js
       plugins/plugin-magias.js

     ENTRADA
       core/main.js  → CTX, bootstrap, init()
     ═══════════════════════════════════════════════════════════════ -->
<script>
  // Durante la migración, los sistemas internos aún viven en un
  // único bloque inline hasta ser extraídos uno a uno.
  // Este bloque se irá vaciando a medida que cada sistema
  // pase a su propio archivo en systems/.
</script>

<!-- ═══════════════════════════════════════════════════════════════
     SCRIPTS — orden de carga estricto
     ═══════════════════════════════════════════════════════════════ -->

<!-- CORE -->
<script src="core/core.js"></script>
<script src="core/entity.js"></script>
<script src="core/player.js"></script>
<script src="core/world.js"></script>
<script src="core/combat-resolution.js"></script>
<script src="core/io-bus.js"></script>
<script src="core/renderer.js"></script>

<!-- SISTEMAS INTERNOS -->
<script src="systems/run-memory.js"></script>
<script src="systems/forge.js"></script>
<script src="systems/npc-engine.js"></script>
<script src="systems/arc-engine.js"></script>
<script src="systems/tactics.js"></script>
<script src="systems/item-system.js"></script>
<script src="systems/xp.js"></script>
<script src="systems/world-ai.js"></script>
<script src="systems/music.js"></script>
<script src="systems/sfx.js"></script>
<script src="systems/net.js"></script>
<script src="systems/save-load.js"></script>
<script src="systems/commands.js"></script>
<script src="systems/autocomplete.js"></script>

<!-- PLUGINS DE DOMINIO -->
<script src="plugins/plugin-criaturas.js"></script>
<script src="plugins/plugin-habilidades.js"></script>
<script src="plugins/plugin-magias.js"></script>
<script src="plugins/plugin-ia-batalla.js"></script>
<script src="plugins/plugin-facciones.js"></script>
<script src="plugins/plugin-bosses.js"></script>
<script src="plugins/plugin-tricksters.js"></script>
<script src="plugins/plugin-sombra-herrante.js"></script>
<script src="plugins/plugin-arbol-vida.js"></script>
<script src="plugins/plugin-transformaciones.js"></script>
<script src="plugins/plugin-guarida.js"></script>
<script src="plugins/plugin-invocaciones.js"></script>
<script src="plugins/plugin-reino-pesadilla.js"></script>
<script src="plugins/plugin-cultos.js"></script>
<script src="plugins/plugin-concentracion.js"></script>

<!-- ENTRADA: CTX + bootstrap -->
<script src="core/main.js"></script>

</body>
</html>
