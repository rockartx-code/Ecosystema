<!-- ═══════════════════════════════════════════════════════════════
     PLUGINS DECLARATIVOS (JSON + handlers)
     Para añadir un plugin: copia el bloque y cambia el id y el JSON.
     El motor los detecta por type="application/json+plugin".
     ═══════════════════════════════════════════════════════════════ -->
<script id="plugin-resonance" type="application/json+plugin">
{
  "id": "resonance_field",
  "nombre": "Campo de Resonancia",
  "version": "1.0.0",
  "descripcion": "Acumula resonancia en combate y la libera en área.",
  "modulo": {
    "materiales": {
      "núcleo_resonante": { "tags":["resonante","resonante","mineral"], "desc":"Amplifica campos de resonancia.", "categoria":"especial" }
    }
  },
  "statusBar": [
    { "id":"resonance", "label":"RES", "getValue":"player.resonance||0", "color":"t-mag" }
  ],
  "hooks": {
    "player:create":        { "fn":"onPlayerCreate" },
    "combat:after_attack":  { "fn":"onAttack" },
    "world:tick":           { "fn":"onTick" },
    "render:node_extra":    { "fn":"onNodeExtra" }
  },
  "comandos": {
    "resonancia":        { "fn":"cmdResonancia" },
    "liberar_resonancia":{ "fn":"cmdLiberarResonancia" }
  },
  "handlers": {
    "onPlayerCreate":       "payload.player.resonance=0;payload.player.maxResonance=100;return payload;",
    "onAttack":             "if(payload.isPlayer){ctx.Player.get().resonance=ctx.U.clamp((ctx.Player.get().resonance||0)+Math.floor(payload.damage/3),0,100);}return payload;",
    "onTick":               "const p=ctx.Player.get();if(p.resonance>0)p.resonance=Math.max(0,p.resonance-1);return payload;",
    "onNodeExtra":          "const res=ctx.Player.get().resonance||0;if(res>50)payload.lines.push({text:`Campo resonante activo: ${res}/100`,color:'t-mag'});return payload;",
    "cmdResonancia":        "const p=ctx.Player.get();ctx.R.w(`Resonancia acumulada: ${p.resonance||0}/100`,'t-mag');if((p.resonance||0)>=80)ctx.R.w('Listo para liberar. Usa \"liberar_resonancia\"','t-mag');",
    "cmdLiberarResonancia": "const p=ctx.Player.get();if((p.resonance||0)<50){ctx.R.w('Resonancia insuficiente (mín. 50).','t-dim');return;}const n=ctx.World.node(ctx.Player.pos());if(n?.enemies?.length){const dmg=Math.floor(p.resonance*0.8);n.enemies.forEach(e=>{e.hp_current-=dmg;ctx.R.w(`Descarga resonante → ${e.nombre} -${dmg}HP`,'t-mag');if(e.hp_current<=0){ctx.World.rmEnemy(ctx.Player.pos(),e.id);ctx.R.w(`${e.nombre} colapsa.`,'t-cra');}});}else ctx.R.w('Sin objetivos en el nodo.','t-dim');p.resonance=0;ctx.R.upd();"
  }
}
</script>

</head>
