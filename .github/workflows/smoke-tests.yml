name: Smoke Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Run smoke suite
        run: npm test
